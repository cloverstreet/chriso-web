<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TelloFoam — Room</title>
<link rel="stylesheet" href="../../TestCases/_shared/audio-widgets.css">
<style>
  /* Room-page contrast bump and edge padding — iPhone edge-swipe (back / control center)
     fires when UI is too close to either side. Wider gutters move
     touchable elements inboard. env(safe-area-inset-*) honors notch + home
     indicator on devices that report them; max() falls back to 28px. */
  :root {
    --text-primary: #e8e8e8;
    --text-2nd:     #d0c8b4;
    --text-dim:     #aa8a52;
    --text-muted:   #8a7848;
    --amber-bright: #ffd07a;
  }
  body {
    padding-top:    max(20px, env(safe-area-inset-top));
    padding-bottom: max(80px, env(safe-area-inset-bottom));
    padding-left:   max(28px, env(safe-area-inset-left));
    padding-right:  max(28px, env(safe-area-inset-right));
    touch-action: manipulation;
  }
  /* Larger base text — the .lbl/.val pair carries everything; bump both. */
  .lbl    { font-size: .78rem !important; letter-spacing: .12em; color: var(--text-dim) !important; }
  .val    { font-size: .82rem !important; color: var(--text-primary) !important; }
  .docs   { font-size: .82rem !important; line-height: 1.65; color: var(--text-2nd) !important; }
  .module .mod-head { font-size: .9rem; color: var(--amber-bright); }
  button  { font-size: .82rem; padding: 9px 14px; }
  .copy-btn { font-size: .74rem; padding: 6px 10px; }
  /* iPhone-safe: never let interactive UI sit within 20px of the screen edge */
  .strip   { padding: 10px 16px !important; gap: 14px !important; }
  .strip button { padding: 7px 14px !important; font-size: .74rem !important; }
  .strip .me, .strip .room-name { font-size: 1rem !important; }
  .strip .stat .lbl, .strip .stat .val { font-size: .72rem !important; }
  .room-state { font-size: .76rem !important; padding: 9px 16px !important; color: var(--text-2nd); }

  /* ── Status strip ──────────────────────────────────────── */
  .strip {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    width:100%; max-width:980px;
    padding:7px 12px;
    background:var(--bg-module); border:1px solid var(--border);
  }
  .strip .room-name {
    font-size:.8rem; color:var(--amber); letter-spacing:.18em;
    text-transform:uppercase; user-select:none;
  }
  .strip .role {
    font-size:.55rem; color:var(--text-muted); letter-spacing:.18em;
    text-transform:uppercase; padding:2px 6px; border:1px solid var(--border-mute);
  }
  .strip .role.host { color:var(--green); border-color:var(--green); }
  .strip .me { font-size:.62rem; color:var(--text-2nd); letter-spacing:.06em; }
  .strip .sep { color:var(--text-faint); }
  .strip .stat {
    display:inline-flex; align-items:center; gap:4px;
    font-size:.58rem; letter-spacing:.08em; color:var(--text-2nd);
    text-transform:uppercase;
  }
  .strip .stat .lbl { font-size:.55rem; color:var(--text-muted); letter-spacing:.12em; }
  .strip .stat .val { font-size:.62rem; color:var(--text-2nd); }
  .strip .dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--text-faint); border:1px solid var(--border-mute);
    flex-shrink:0;
  }
  .strip .dot.ok    { background:var(--green); border-color:var(--green); box-shadow:0 0 4px #2a9a2a88; }
  .strip .dot.warn  { background:var(--amber); border-color:var(--amber); }
  .strip .dot.err   { background:var(--red);   border-color:var(--red); }
  .strip .spacer { flex:1; min-width: 4px; }
  .strip button { padding: 4px 10px; font-size:.58rem; }
  .strip a { text-decoration: none; }

  /* Sub-state line: room-state under the strip */
  .room-state {
    width:100%; max-width:980px;
    padding:5px 12px; font-size:.58rem; color:var(--text-2nd);
    text-align:left; letter-spacing:.08em; text-transform:uppercase;
    background:var(--bg-inset); border:1px solid var(--border-dim); border-top:0;
  }
  .room-state.connecting { color:var(--amber-bright); }
  .room-state.connected  { color:var(--green); border-color:var(--border-dim); }
  .room-state.failed     { color:var(--red); }

  /* ── Layout under strip ────────────────────────────────── */
  .row { padding-top: 8px; align-items:flex-start; }
  .module { min-width: 220px; }

  .peer-card {
    display:flex; flex-direction:column; gap:6px;
    background:var(--bg-page); border:1px solid var(--border-dim); padding:8px;
  }
  .peer-card .peer-name {
    font-size:.72rem; color:var(--amber); letter-spacing:.12em; text-transform:uppercase;
  }
  .peer-card .peer-meta { font-size:.58rem; color:var(--text-dim); letter-spacing:.08em; }
  .peers-empty { padding:14px; font-size:.62rem; color:var(--text-muted); letter-spacing:.14em; text-align:center; }

  .docs { font-size:.62rem; line-height:1.7; color:var(--text-2nd); max-width:520px; }
  .docs em { color:var(--amber); font-style:normal; }

  /* Missing-state guard (shown if user hits /room.html without going through entry) */
  .missing-entry {
    width:420px; max-width:100%;
    padding:24px; text-align:center;
    background:var(--bg-module); border:1px solid var(--amber);
    color:var(--text-2nd); font-size:.66rem; line-height:1.7;
  }
  .missing-entry a { color:var(--amber); }
</style>
</head>
<body>

<div class="strip">
  <span class="room-name">TelloFoam</span>
  <span class="role" id="roleBadge">guest</span>
  <span class="me" id="meName">—</span>
  <span class="sep">·</span>
  <span class="stat"><span class="lbl">Online</span><span class="dot" id="dotBroker"></span></span>
  <span class="sep">·</span>
  <span class="stat"><span class="lbl">Audio</span><span class="dot" id="dotAudio"></span></span>
  <span class="sep">·</span>
  <span class="stat"><span class="lbl">Mic</span><span class="dot" id="dotMic"></span></span>
  <span class="sep">·</span>
  <span class="stat"><span class="lbl">Peers</span><span class="val" id="peerCount">0</span></span>
  <span class="sep">·</span>
  <span class="stat"><span class="lbl">RTT</span><span class="val" id="rttVal">—</span></span>
  <span class="spacer"></span>
  <button id="muteSelfBtn" class="danger" disabled>Mute</button>
  <a href="index.html"><button class="danger">Leave</button></a>
</div>

<div class="room-state connecting" id="roomState">initializing…</div>

<div class="row" id="mainLayout">

  <div class="col">
    <div class="module">
      <div class="mod-head">You</div>
      <div class="mod-body">
        <div id="selfMeterMount"></div>
      </div>
    </div>
  </div>

  <div class="col" style="min-width:340px">
    <div class="module">
      <div class="mod-head">In the Room</div>
      <div class="mod-body" id="peersMount">
        <div class="peers-empty">no one else here yet</div>
      </div>
    </div>
  </div>

</div>

<!-- Hidden: shown only if entry-state is missing -->
<div class="missing-entry" id="missingEntry" style="display:none">
  Looks like you arrived here without going through setup.<br><br>
  <a href="index.html">→ start at the entrance</a>
</div>

<div class="foot">v0.3 · slim room · status strip · auto-init from entry · ≤5 people</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="../../TestCases/_shared/audio-widgets.js"></script>
<script>
'use strict';
const W = window.AudioWidgets;
const $ = id => document.getElementById(id);

// ── Mode + identity ───────────────────────────────────
const params = new URLSearchParams(location.search);
const OPTED_HOST = params.get('host') === '1' || sessionStorage.getItem('tf.isHost') === '1';
const MY_NAME = (params.get('name') || sessionStorage.getItem('tf.name') || 'Guest').slice(0, 24);
const MY_CODE = params.get('code') || sessionStorage.getItem('tf.code') || '';
const HOST_PEER_ID = 'tellofoam-room-host';

// Mic gain (dB) chosen in entrance Step 3 mic-test. Restored at openLocalAudio.
const SAVED_MIC_GAIN_DB = parseFloat(sessionStorage.getItem('tf.micGainDb'));

// Role is determined at broker registration time: anyone can be the first
// to claim HOST_PEER_ID and become the host of the room. The 5x-title-click
// flag (OPTED_HOST) is now just a "I want host status" preference — if the
// ID is already taken we'll still drop to guest. This is the multi-peer
// fix: nobody has to know to opt-in for the room to work.
let isHost = false;

// Saved device choices from entry. Fall back to system default if missing.
const SAVED_INPUT  = sessionStorage.getItem('tf.inputDeviceId');     // null = not saved → use default
const SAVED_OUTPUT = sessionStorage.getItem('tf.outputDeviceId');
const SAVED_PAIR   = sessionStorage.getItem('tf.outputChannelPair');

// Guard: a user reaching /room.html without an entry walkthrough is probably
// bookmarking / pasting URLs. Send them through the entry. Host opt-in
// users still need device choices but skip the code check.
if (SAVED_INPUT === null || (!OPTED_HOST && !MY_CODE)) {
  document.querySelectorAll('.strip, .room-state, .row').forEach(el => el.style.display = 'none');
  $('missingEntry').style.display = 'block';
  throw new Error('Missing entry-state — redirected to setup');
}

// Host-side invite codes — edit + redeploy to add codes.
const HOST_CODES = {
  'TEST':       { uses: 99, expires: null },
  'MADRIGAL':   { uses: 10, expires: null },
  'TUESDAY':    { uses: 5,  expires: null },
};
const codeUsage = new Map();

// Role badge is updated on broker connect; default to guest until determined.
function refreshRoleUI() {
  $('roleBadge').textContent = isHost ? 'host' : 'guest';
  $('roleBadge').classList.toggle('host', isHost);
}
refreshRoleUI();
$('meName').textContent = MY_NAME;

// ── Audio + peer state ─────────────────────────────────
let peer = null;
let myStream = null;
let audioCtx = null;
let micSource = null, micGain = null, micDest = null;
let outLimiter = null;   // DynamicsCompressor between local audio and destination
let selfMeter = null;
let muted = false;
const peers = new Map();
let hostDataConn = null;
const pendingCallIds = new Set();
const pendingIncomingCalls = [];
let statsTimer = null;

function setRoomState(text, cls) {
  $('roomState').textContent = text;
  $('roomState').className = 'room-state ' + (cls || '');
}
function setDot(id, state) {
  const el = $(id);
  el.classList.remove('ok','warn','err');
  if (state) el.classList.add(state);
}

// ── Boot sequence ──────────────────────────────────────
(async function boot() {
  setRoomState('opening audio & mic…', 'connecting');
  try {
    await openLocalAudio();
    setDot('dotAudio', 'ok');
    setDot('dotMic', 'ok');
  } catch (e) {
    setRoomState('audio init failed: ' + e.message, 'failed');
    setDot('dotAudio', 'err');
    setDot('dotMic', 'err');
    return;
  }
  setRoomState('connecting to broker…', 'connecting');
  initPeer();
})();

async function openLocalAudio() {
  // Use saved deviceId if present and non-empty, else system default
  const deviceId = SAVED_INPUT || undefined;
  // AGC opt-in carried over from entrance Step 2 — required on iPhone
  // for usable mic loudness. Default off everywhere else.
  const useAgc = sessionStorage.getItem('tf.autoGainControl') === '1';
  const cons = W.micConstraints(deviceId, 1);
  if (useAgc) cons.audio.autoGainControl = true;
  let rawStream;
  try {
    rawStream = await navigator.mediaDevices.getUserMedia(cons);
  } catch (e) {
    throw new Error('mic open: ' + e.message);
  }

  audioCtx = new AudioContext({ sampleRate: 48000, latencyHint: 'interactive' });
  if (SAVED_OUTPUT && audioCtx.setSinkId) {
    try { await audioCtx.setSinkId(SAVED_OUTPUT); } catch (e) { console.warn('setSinkId:', e); }
  }

  // Output limiter — transparent DynamicsCompressor sitting between every
  // local audio source (self-monitor, incoming peers) and audioCtx.destination.
  // Lets self mic + per-peer gains be cranked without clipping the output.
  // Threshold -10, knee 12, ratio 8 — brickwall-ish.
  outLimiter = audioCtx.createDynamicsCompressor();
  outLimiter.threshold.value = -10;
  outLimiter.knee.value      = 12;
  outLimiter.ratio.value     = 8;
  outLimiter.attack.value    = 0.003;
  outLimiter.release.value   = 0.15;
  outLimiter.connect(audioCtx.destination);

  micSource = audioCtx.createMediaStreamSource(rawStream);
  micGain   = audioCtx.createGain(); micGain.gain.value = W.dbToGain(0);
  micDest   = audioCtx.createMediaStreamDestination();
  micSource.connect(micGain).connect(micDest);
  myStream  = micDest.stream;

  // Self meter — gainMax raised +12 → +30 so quiet sources (iPhone mic
  // with AGC off, distant lavs) can be boosted enough for peers to hear.
  // The boosted signal feeds WebRTC encoders which clip-protect downstream.
  // Restore the mic gain (dB) the user dialed in during entrance Step 3.
  // Falls back to 0 dB if not saved or non-finite.
  const initialMicDb = (Number.isFinite(SAVED_MIC_GAIN_DB)) ? SAVED_MIC_GAIN_DB : 0;
  $('selfMeterMount').innerHTML = '';
  selfMeter = new W.MeterStrip($('selfMeterMount'), micGain, {
    label: 'YOUR MIC', gainNode: micGain,
    gainMin: -30, gainMax: 30, gainDefault: initialMicDb,
    height: 100, stereo: false,
  });
  selfMeter.setGainDb(initialMicDb);  // explicitly apply to the gain node
  selfMeter.start();

  $('muteSelfBtn').disabled = false;
}

// ── PeerJS setup ───────────────────────────────────────
function initPeer() {
  const opts = {
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ]},
  };
  // First-arrival-as-host: every user attempts to claim HOST_PEER_ID. The
  // first to register wins → becomes host. Subsequent users get an
  // 'unavailable-id' error during initial registration → fall back to a
  // random ID and join as a guest. Once registration resolves (either
  // success or 'unavailable-id'), we never re-evaluate role for this tab.
  let resolved = false;
  const hostPeer = new Peer(HOST_PEER_ID, opts);

  hostPeer.on('open', () => {
    if (resolved) return;
    resolved = true;
    peer = hostPeer;
    isHost = true;
    onPeerReady();
  });
  hostPeer.on('error', err => {
    if (!resolved && err.type === 'unavailable-id') {
      // Host already exists — become a guest.
      resolved = true;
      try { hostPeer.destroy(); } catch (e) {}
      becomeGuest(opts);
    } else if (!resolved) {
      // Broker reach failure before either branch resolved.
      resolved = true;
      onPeerError(err);
    } else {
      // Post-resolve error on whichever Peer wound up active.
      onPeerError(err);
    }
  });
  hostPeer.on('disconnected', () => { if (resolved && peer === hostPeer) onBrokerDisconnected(); });
  hostPeer.on('close',        () => { if (resolved && peer === hostPeer) onPeerClosed(); });
  hostPeer.on('connection', dataConn => {
    if (resolved && peer === hostPeer && isHost) bindHostSideDataConn(dataConn);
  });
  hostPeer.on('call', mediaCall => incomingMediaCall(mediaCall));
}

function becomeGuest(opts) {
  peer = new Peer(opts);
  isHost = false;
  peer.on('open', () => onPeerReady());
  peer.on('error', err => onPeerError(err));
  peer.on('disconnected', () => onBrokerDisconnected());
  peer.on('close', () => onPeerClosed());
  peer.on('connection', () => { /* guests don't accept incoming data conns in v0 */ });
  peer.on('call', mediaCall => incomingMediaCall(mediaCall));
}

function onPeerReady() {
  refreshRoleUI();
  setDot('dotBroker', 'ok');
  if (isHost) {
    setRoomState('host · room open · waiting for guests', 'connected');
  } else {
    setRoomState('connected to broker · joining room…', 'connecting');
    connectToHost();
  }
}
function onPeerError(err) {
  setDot('dotBroker', 'err');
  if (err.type === 'peer-unavailable') {
    setRoomState('host is offline — room is closed', 'failed');
  } else if (err.type === 'unavailable-id') {
    // Only reached if user opted into host explicitly via ?host=1 AND lost the
    // race AND we didn't fall back (we always fall back now, but kept for
    // diagnostic clarity).
    setRoomState('host id taken — couldn\'t claim it', 'failed');
  } else {
    setRoomState('peer error: ' + err.type, 'failed');
  }
}
function onBrokerDisconnected() { setDot('dotBroker', 'warn'); setRoomState('disconnected from broker', 'failed'); }
function onPeerClosed()         { setDot('dotBroker', 'err');  setRoomState('peer closed', 'failed'); }

function incomingMediaCall(mediaCall) {
  // Shared between host and guest paths. If our mic isn't open yet, queue
  // the call and answer it when openLocalAudio finishes (handled by
  // drainPendingCalls).
  if (!myStream) {
    pendingIncomingCalls.push(mediaCall);
    if (!peers.has(mediaCall.peer)) {
      const isHostId = mediaCall.peer === HOST_PEER_ID;
      addPeerEntry(mediaCall.peer, isHostId ? 'Host' : 'Joining…');
    }
    return;
  }
  mediaCall.answer(myStream);
  bindMediaCall(mediaCall);
}

// ── Guest: connect to host ─────────────────────────────
function connectToHost() {
  hostDataConn = peer.connect(HOST_PEER_ID, { reliable: true });
  hostDataConn.on('open', () => {
    hostDataConn.send({ type: 'join', code: MY_CODE, name: MY_NAME });
  });
  hostDataConn.on('data', msg => handleGuestSideMessage(msg));
  hostDataConn.on('close', () => {
    setRoomState('host disconnected — room closed', 'failed');
    setDot('dotBroker', 'warn');
    teardownAllPeers();
  });
  hostDataConn.on('error', err => setRoomState('cannot reach host — is the room open?', 'failed'));
}

function handleGuestSideMessage(msg) {
  switch (msg.type) {
    case 'admitted': {
      addPeerEntry(HOST_PEER_ID, msg.hostName || 'Host');
      callPeer(HOST_PEER_ID);
      for (const p of (msg.peers || [])) {
        if (p.peerId === peer.id) continue;
        addPeerEntry(p.peerId, p.name);
        callPeer(p.peerId);
      }
      setRoomState(myStream ? 'in room' : 'admitted · waiting on audio…', myStream ? 'connected' : 'connecting');
      break;
    }
    case 'rejected':
      setRoomState('rejected: ' + (msg.reason || 'invalid code'), 'failed');
      hostDataConn.close();
      break;
    case 'peer-added': {
      const p = msg.peer;
      if (!peers.has(p.peerId) && p.peerId !== peer.id) {
        addPeerEntry(p.peerId, p.name);
      }
      break;
    }
    case 'peer-removed':
      removePeerEntry(msg.peerId);
      break;
  }
}

// ── Host: handle join requests ─────────────────────────
function bindHostSideDataConn(dataConn) {
  let admitted = false;
  let admittedName = null;

  dataConn.on('data', msg => {
    if (msg.type === 'join') {
      const ok = validateCode(msg.code);
      if (!ok.ok) {
        dataConn.send({ type: 'rejected', reason: ok.reason });
        setTimeout(() => dataConn.close(), 200);
        return;
      }
      admitted = true;
      admittedName = (msg.name || 'Guest').slice(0, 24);

      const existing = [...peers.values()].map(p => ({ peerId: p.peerId, name: p.name }));
      peers.set(dataConn.peer, {
        peerId: dataConn.peer, name: admittedName,
        dataConn, mediaCall: null,
        source: null, gain: null, meter: null, cardEl: null,
      });
      dataConn.send({ type: 'admitted', hostName: MY_NAME, peers: existing });
      broadcastToOthers(dataConn.peer, {
        type: 'peer-added', peer: { peerId: dataConn.peer, name: admittedName },
      });
      addPeerEntry(dataConn.peer, admittedName);
    }
  });

  dataConn.on('close', () => {
    if (admitted) {
      removePeerEntry(dataConn.peer);
      broadcastToOthers(dataConn.peer, { type: 'peer-removed', peerId: dataConn.peer });
    }
  });
}

function broadcastToOthers(exceptPeerId, msg) {
  for (const p of peers.values()) {
    if (p.peerId === exceptPeerId) continue;
    if (p.dataConn && p.dataConn.open) {
      try { p.dataConn.send(msg); } catch (e) {}
    }
  }
}

function validateCode(code) {
  if (!code) return { ok: false, reason: 'no code provided' };
  const norm = code.trim().toUpperCase();
  const entry = HOST_CODES[norm];
  if (!entry) return { ok: false, reason: 'invalid code' };
  if (entry.expires && new Date(entry.expires) < new Date()) return { ok: false, reason: 'code expired' };
  const used = codeUsage.get(norm) || 0;
  if (used >= entry.uses) return { ok: false, reason: 'code already used up' };
  codeUsage.set(norm, used + 1);
  return { ok: true };
}

// ── Outbound call queueing ─────────────────────────────
function callPeer(peerId) {
  if (!myStream) {
    pendingCallIds.add(peerId);
    return;
  }
  const call = peer.call(peerId, myStream);
  if (!call) return;
  bindMediaCall(call);
}
function drainPendingCalls() {
  if (!myStream) return;
  if (pendingCallIds.size > 0) {
    for (const peerId of pendingCallIds) {
      const call = peer.call(peerId, myStream);
      if (call) bindMediaCall(call);
    }
    pendingCallIds.clear();
  }
  if (pendingIncomingCalls.length > 0) {
    while (pendingIncomingCalls.length) {
      const mediaCall = pendingIncomingCalls.shift();
      try { mediaCall.answer(myStream); bindMediaCall(mediaCall); } catch (e) {}
    }
  }
  if (!isHost) setRoomState('in room', 'connected');
}

function bindMediaCall(mediaCall) {
  mediaCall.on('stream', remoteStream => {
    if (!peers.has(mediaCall.peer)) addPeerEntry(mediaCall.peer, 'Joining…');
    const p = peers.get(mediaCall.peer);
    p.mediaCall = mediaCall;
    attachRemoteAudio(p, remoteStream);
    if (!statsTimer) startStatsLoop();
  });
  mediaCall.on('close', () => {
    if (!isHost && mediaCall.peer === HOST_PEER_ID) {
      setRoomState('host disconnected — room closed', 'failed');
      teardownAllPeers();
    }
  });
}

function attachRemoteAudio(peerObj, remoteStream) {
  if (!audioCtx) return;
  if (peerObj.source) try { peerObj.source.disconnect(); } catch (e) {}
  if (peerObj.meter) peerObj.meter.destroy();

  peerObj.source = audioCtx.createMediaStreamSource(remoteStream);
  peerObj.gain   = audioCtx.createGain(); peerObj.gain.gain.value = W.dbToGain(0);
  peerObj.source.connect(peerObj.gain);
  // Route through the shared output limiter (created in openLocalAudio)
  // so a peer who joins loud can't clip the destination, and so a quiet
  // peer can be cranked without risk.
  peerObj.gain.connect(outLimiter || audioCtx.destination);

  // Chrome remote-stream workaround
  const ghost = document.createElement('audio');
  ghost.srcObject = remoteStream;
  ghost.muted = true; ghost.autoplay = true;
  document.body.appendChild(ghost);
  peerObj.ghostEl = ghost;

  const meterMount = peerObj.cardEl.querySelector('[data-meter-mount]');
  meterMount.innerHTML = '';
  peerObj.meter = new W.MeterStrip(meterMount, peerObj.gain, {
    label: peerObj.name, gainNode: peerObj.gain,
    gainMin: -60, gainMax: 12, gainDefault: 0,
    height: 90, stereo: false,
  });
  peerObj.meter.start();

  const metaEl = peerObj.cardEl.querySelector('[data-meta]');
  if (metaEl) {
    const role = peerObj.peerId === HOST_PEER_ID ? 'host' : 'guest';
    metaEl.textContent = role + ' · connected';
    metaEl.style.color = 'var(--green)';
  }

  const muteBtn = peerObj.cardEl.querySelector('[data-mute]');
  muteBtn.disabled = false;
  let pMuted = false; let savedDb = 0;
  muteBtn.addEventListener('click', () => {
    pMuted = !pMuted;
    if (pMuted) { savedDb = W.gainToDb(peerObj.gain.gain.value); peerObj.meter.setGainDb(-60); }
    else        { peerObj.meter.setGainDb(savedDb); }
    muteBtn.textContent = pMuted ? '✓ Muted' : 'Mute';
    muteBtn.classList.toggle('active', pMuted);
  });
}

// ── Peer roster + UI ───────────────────────────────────
function addPeerEntry(peerId, name) {
  let entry = peers.get(peerId);
  if (entry && entry.cardEl) {
    entry.name = name;
    renderPeerName(peerId);
    return;
  }

  const peersMount = $('peersMount');
  if (peersMount.querySelector('.peers-empty')) peersMount.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'peer-card';
  card.dataset.peerId = peerId;
  card.innerHTML = `
    <div class="kv">
      <span class="peer-name" data-name>${escapeHtml(name)}</span>
      <button class="copy-btn" data-mute disabled>Mute</button>
    </div>
    <div class="peer-meta" data-meta>${peerId === HOST_PEER_ID ? 'host' : 'guest'} · connecting</div>
    <div data-meter-mount></div>
  `;
  peersMount.appendChild(card);

  if (entry) { entry.name = name; entry.cardEl = card; }
  else {
    peers.set(peerId, {
      peerId, name,
      dataConn: null, mediaCall: null,
      source: null, gain: null, meter: null,
      cardEl: card,
    });
  }
  updatePeerCount();
}

function renderPeerName(peerId) {
  const p = peers.get(peerId);
  if (!p || !p.cardEl) return;
  p.cardEl.querySelector('[data-name]').textContent = p.name;
  if (p.meter) p.meter.label = p.name;
}

function removePeerEntry(peerId) {
  const p = peers.get(peerId);
  if (!p) return;
  if (p.meter) p.meter.destroy();
  if (p.source) try { p.source.disconnect(); } catch (e) {}
  if (p.gain) try { p.gain.disconnect(); } catch (e) {}
  if (p.ghostEl) p.ghostEl.remove();
  if (p.cardEl) p.cardEl.remove();
  if (p.mediaCall) try { p.mediaCall.close(); } catch (e) {}
  if (p.dataConn) try { p.dataConn.close(); } catch (e) {}
  peers.delete(peerId);
  updatePeerCount();
  if (peers.size === 0) $('peersMount').innerHTML = '<div class="peers-empty">no one else here yet</div>';
}

function teardownAllPeers() {
  for (const id of [...peers.keys()]) removePeerEntry(id);
}
function updatePeerCount() { $('peerCount').textContent = String(peers.size); }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── Self-mute ──────────────────────────────────────────
$('muteSelfBtn').addEventListener('click', () => {
  muted = !muted;
  if (myStream) myStream.getAudioTracks().forEach(t => t.enabled = !muted);
  $('muteSelfBtn').textContent = muted ? '✓ Muted' : 'Mute';
  $('muteSelfBtn').classList.toggle('active', muted);
  if (muted) setDot('dotMic', 'warn'); else setDot('dotMic', 'ok');
});

// ── Stats loop (RTT) ───────────────────────────────────
function startStatsLoop() {
  if (statsTimer) clearInterval(statsTimer);
  statsTimer = setInterval(async () => {
    if (peers.size === 0) { $('rttVal').textContent = '—'; return; }
    let sum = 0, n = 0;
    for (const p of peers.values()) {
      if (!p.mediaCall || !p.mediaCall.peerConnection) continue;
      try {
        const stats = await p.mediaCall.peerConnection.getStats();
        stats.forEach(s => {
          if (s.type === 'candidate-pair' && s.state === 'succeeded' && s.nominated && s.currentRoundTripTime != null) {
            sum += s.currentRoundTripTime; n++;
          }
        });
      } catch (e) {}
    }
    $('rttVal').textContent = n ? (sum / n * 1000).toFixed(0) + 'ms' : '—';
  }, 2000);
}

// ── Drain queued calls once the connection comes up ────
// (Mostly redundant since boot opens audio first now, but kept as a
// safety net if peer.on('open') fires before our local audio is ready.)
const drainAfterStreamReady = () => { if (myStream) drainPendingCalls(); };
setInterval(drainAfterStreamReady, 500);

// ── Cleanup on unload ──────────────────────────────────
window.addEventListener('beforeunload', () => {
  if (peer) try { peer.destroy(); } catch (e) {}
  if (audioCtx) try { audioCtx.close(); } catch (e) {}
});
</script>
