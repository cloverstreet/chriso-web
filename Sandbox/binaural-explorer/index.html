<!--
  ============================================================================
  Binaural Explorer — a sandbox interface for thinking about spatial-audio
  layouts that's NOT The Something Nightclub.
  ============================================================================
  Deploy path: chriso.org/Sandbox/binaural-explorer/

  WHAT THIS IS:
    A bare interface for exploring how participants might be visualized in
    a spatial-audio setting. Distinct aesthetic from the Nightclub
    (cool palette, orthographic projection, schematic line work) so it
    reads as a separate exploration. Three.js scene with:
      - Orthographic camera (no perspective foreshortening — heads at the
        back are the same size as heads in front; the layout reads as a
        diagram, not a perspective rendering)
      - A LISTENER head (cyan) — you. Drag to pan/tilt. Double-click anywhere
        empty to reset orientation facing the other heads.
      - SPEAKER heads (warm) — three fixed positions around the room with
        labels.
      - Each head has a mouth indicator pointing forward; SPEAKER heads
        randomly "speak" at intervals — a translucent cone extends from
        their mouth in their facing direction, with length + opacity
        modulated by a synthetic amplitude envelope so you can see both
        DIRECTION and AMPLITUDE of who's talking.

    No binaural AUDIO yet — just the interface so we can think about the
    visualization. XYZ navigation hooks are stubbed but not wired.

    The TelloFoam room currently has a stereo reverb send (placeholder).
    When binaural lands, that wet path becomes per-source HRTF-positioned
    rather than a global stereo return.
  ============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Binaural Explorer — spatial-audio sketch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100vh;
    overflow: hidden;
    background: #0a1424;
    color: #d8e2f0;
    font-family: 'Inter', sans-serif;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }
  #scene { position: fixed; inset: 0; z-index: 1; cursor: grab; }
  #scene.dragging { cursor: grabbing; }

  .corner {
    position: fixed; z-index: 10;
    font-weight: 300; letter-spacing: 0.08em;
    color: rgba(216, 226, 240, 0.65);
    pointer-events: none;
  }
  .top-left  { top: 1.5rem; left: 1.5rem; font-size: 0.78rem; }
  .top-right { top: 1.5rem; right: 1.5rem; font-size: 0.62rem; text-align: right; line-height: 1.6; }
  .bottom-left { bottom: 1.5rem; left: 1.5rem; font-size: 0.62rem; line-height: 1.6; }
  .bottom-right { bottom: 1.5rem; right: 1.5rem; font-size: 0.6rem; opacity: 0.45; }

  .top-right .key   { color: #6ec6ff; }
  .bottom-left em { font-style: normal; color: #6ec6ff; }

  .back {
    position: fixed; bottom: 1.5rem; left: 1.5rem;
    z-index: 11; pointer-events: auto;
    color: #6ec6ff; text-decoration: none;
    font-size: 0.7rem; letter-spacing: 0.1em; opacity: 0.55;
    transition: opacity 0.3s;
  }
  .back:hover { opacity: 1; }
</style>
</head>
<body>

<div class="corner top-left">binaural explorer · spatial sketch</div>
<div class="corner top-right">
  drag · <span class="key">pan/tilt your head</span><br>
  double-click · <span class="key">reset to face the room</span><br>
  <span style="opacity:0.5">xyz navigation pending</span>
</div>
<div class="corner bottom-right">v0.1 · no audio engine yet</div>
<a class="back" href="/Sandbox/">← sandbox index</a>
<a class="back" href="/" style="bottom:auto; top:1.5rem; left:1.5rem;">↞ home</a>

<div id="scene"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const container = document.getElementById('scene');
const W = window.innerWidth, H = window.innerHeight;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a1424, 0.018);

// Orthographic camera — slight 3/4 angle so we can see Y (pitch). Frustum
// matches the room scale; on resize we update the frustum height to a
// fixed world-height while letting width scale with the viewport.
const FRUSTUM_H = 20;
function frustumWidth() {
  return FRUSTUM_H * (window.innerWidth / window.innerHeight);
}
const camera = new THREE.OrthographicCamera(
  -frustumWidth() / 2, frustumWidth() / 2,
  FRUSTUM_H / 2, -FRUSTUM_H / 2,
  0.1, 200
);
camera.position.set(0, 9, 14);
camera.lookAt(0, 1.4, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

// Materials — cool palette, line-work emphasis
const matSelf    = new THREE.LineBasicMaterial({ color: 0x6ec6ff, transparent: true, opacity: 0.95 });
const matSelfDim = new THREE.LineBasicMaterial({ color: 0x6ec6ff, transparent: true, opacity: 0.55 });
const matSpeaker = new THREE.LineBasicMaterial({ color: 0xff8a6a, transparent: true, opacity: 0.92 });
const matSpeakerDim = new THREE.LineBasicMaterial({ color: 0xff8a6a, transparent: true, opacity: 0.55 });
const matFloor   = new THREE.LineBasicMaterial({ color: 0x1e3050, transparent: true, opacity: 0.75 });

// Floor — grid as a faint reference plane
const grid = new THREE.GridHelper(24, 24, 0x2c4a78, 0x152035);
grid.material.transparent = true; grid.material.opacity = 0.6;
scene.add(grid);

// One light cardinal axis indicator at the room center — gives a sense of
// "north" so heads' facing-direction is anchored to something visible.
(() => {
  const arrow = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(0.05, 0.05, 1.6)),
    matFloor
  );
  arrow.position.set(0, 0.02, 0);
  scene.add(arrow);
})();

// ─── Head factory ─────────────────────────────────────────────────────────
// Each head: a wireframe sphere (the cranium) + a forward indicator (small
// triangle/cone pointing along the head's local -Z = forward) + a mouth
// (small ring on -Z face) + a sound cone (built but kept invisible until
// the speak engine activates it). Pivots happen on the group; the
// sphere's transform stays identity.
function makeHead(name, color, dim, x, y, z) {
  const group = new THREE.Group();
  const mat    = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.94 });
  const matD   = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6 });

  // Cranium — wireframe sphere
  const shell = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.SphereGeometry(0.7, 14, 10)),
    mat
  );
  group.add(shell);

  // Forward indicator — small cone at the front of the head (its tip
  // extends slightly beyond the cranium so the facing direction is
  // unambiguous on top-down views).
  const fwd = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.ConeGeometry(0.18, 0.32, 12)),
    matD
  );
  fwd.geometry.translate(0, -0.16, 0);
  fwd.geometry.rotateX(Math.PI / 2);  // axis → -Z (forward)
  fwd.position.set(0, 0, -0.7);
  group.add(fwd);

  // Mouth — small ring on the front face. Hidden in cranium for now;
  // becomes the origin of the sound-cone when speaking.
  const mouth = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.RingGeometry(0.12, 0.18, 14)),
    mat
  );
  mouth.position.set(0, -0.12, -0.71);
  group.add(mouth);

  // Sound cone — mesh, gets opacity + scale modulated by the speak engine.
  const coneMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const coneGeom = new THREE.ConeGeometry(0.9, 2.6, 32, 1, true);
  coneGeom.translate(0, -1.3, 0);       // apex at origin
  coneGeom.rotateX(Math.PI / 2);        // opens along -Z (forward)
  const coneMesh = new THREE.Mesh(coneGeom, coneMat);
  coneMesh.position.set(0, -0.12, -0.71);
  group.add(coneMesh);
  // Wireframe overlay for the cone — gives it a schematic feel
  const coneEdges = new THREE.LineSegments(
    new THREE.EdgesGeometry(coneGeom),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0 })
  );
  coneEdges.position.copy(coneMesh.position);
  group.add(coneEdges);

  group.position.set(x, y, z);
  scene.add(group);

  return {
    name, group, shell, fwd, mouth, coneMesh, coneEdges,
    color, mat, matD,
    speakUntil: 0,        // performance.now() in ms
    speakIntensity: 0,    // 0..1 envelope for the cone
    labelEl: null,
  };
}

// ─── Listener (you) + three speakers ─────────────────────────────────────
const listener = makeHead('you', 0x6ec6ff, 0x4a90c0, 0, 1.4, 0);
const speakers = [
  makeHead('A',  0xff8a6a, 0xc05a3a, -5, 1.4, -3),
  makeHead('B',  0xffd07a, 0xc09040,  5, 1.4, -3),
  makeHead('C',  0xa0e060, 0x508040,  0, 1.4, -7),
];
// Each speaker faces the listener initially
for (const s of speakers) {
  s.group.lookAt(listener.group.position);
}

// ─── Floating labels — DOM elements positioned by world projection ───────
const labelsEl = document.createElement('div');
labelsEl.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:5;';
document.body.appendChild(labelsEl);

function makeLabel(text, color) {
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = `
    position:absolute; transform:translate(-50%,-50%);
    font-family:'Inter',sans-serif; font-weight:400; font-size:.74rem;
    letter-spacing:.18em; text-transform:lowercase;
    color: ${color}; opacity:.78;
    text-shadow:0 0 8px rgba(10,20,36,0.95);
    padding: 0 4px;
    white-space:nowrap;
  `;
  labelsEl.appendChild(el);
  return el;
}
listener.labelEl = makeLabel(listener.name, '#6ec6ff');
for (const s of speakers) s.labelEl = makeLabel(s.name, '#' + s.color.toString(16).padStart(6, '0'));

function projectToScreen(vec3) {
  const v = vec3.clone().project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * window.innerWidth,
    y: (1 - (v.y * 0.5 + 0.5)) * window.innerHeight,
  };
}
function updateLabels() {
  function place(head, yOffset) {
    const world = new THREE.Vector3();
    head.group.getWorldPosition(world);
    world.y += yOffset;
    const p = projectToScreen(world);
    head.labelEl.style.left = p.x + 'px';
    head.labelEl.style.top  = p.y + 'px';
  }
  place(listener, 1.05);
  for (const s of speakers) place(s, 1.05);
}

// ─── Drag interaction — pan/tilt the listener's head ─────────────────────
// Drag horizontally → yaw (rotation around Y).
// Drag vertically   → pitch (rotation around X).
// Pitch is clamped so the head can't flip upside down.
let yaw = 0, pitch = 0;
const PITCH_LIMIT = Math.PI * 0.45;
let dragging = false;
let lastX = 0, lastY = 0;
const DRAG_SENS = 0.005;

container.addEventListener('pointerdown', e => {
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  container.classList.add('dragging');
  container.setPointerCapture?.(e.pointerId);
});
container.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  yaw   -= dx * DRAG_SENS;
  pitch -= dy * DRAG_SENS;
  pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitch));
  applyListenerOrientation();
  lastX = e.clientX; lastY = e.clientY;
});
container.addEventListener('pointerup', e => {
  dragging = false;
  container.classList.remove('dragging');
});
container.addEventListener('pointercancel', () => { dragging = false; container.classList.remove('dragging'); });
container.addEventListener('dblclick', () => {
  // Reset to face the centroid of the speakers
  const center = new THREE.Vector3();
  speakers.forEach(s => center.add(s.group.position));
  center.multiplyScalar(1 / speakers.length);
  // Compute yaw needed to point listener's -Z at the centroid
  const dx = center.x - listener.group.position.x;
  const dz = center.z - listener.group.position.z;
  yaw = Math.atan2(dx, -dz);  // because -Z is forward
  pitch = 0;
  applyListenerOrientation();
});

function applyListenerOrientation() {
  // Rotate the group: yaw on Y, then pitch on X (relative to the rotated frame).
  listener.group.rotation.set(0, 0, 0);
  listener.group.rotateY(yaw);
  listener.group.rotateX(pitch);
}
applyListenerOrientation();

// ─── Speak engine — periodic random utterances per speaker ──────────────
// Each speaker independently fires an utterance every 3–8 seconds.
// `speakUntil` marks the end time; `speakIntensity` is the envelope value
// driven from the frame loop. No audio yet — purely visual.
function scheduleSpeak(head) {
  const delay = 3000 + Math.random() * 5000;
  setTimeout(() => {
    if (!head) return;
    const dur = 600 + Math.random() * 1600;     // 0.6–2.2s utterance
    head.speakStart = performance.now();
    head.speakEnd   = head.speakStart + dur;
    scheduleSpeak(head);
  }, delay);
}
for (const s of speakers) scheduleSpeak(s);

// ─── Frame loop ──────────────────────────────────────────────────────────
function frame() {
  requestAnimationFrame(frame);
  const now = performance.now();
  // Cone envelopes — fade in over the first 80ms, hold, fade out over the
  // last 200ms. Yields a "phrase shape" rather than a square gate.
  for (const s of speakers) {
    if (s.speakStart && now < s.speakEnd) {
      const t  = now - s.speakStart;
      const T  = s.speakEnd - s.speakStart;
      const atk = Math.min(1, t / 80);
      const rel = Math.min(1, (s.speakEnd - now) / 200);
      const env = Math.min(atk, rel);
      // Add a small flutter so the cone breathes
      const flutter = 0.85 + 0.15 * Math.sin(now * 0.012 + s.color);
      s.speakIntensity = env * flutter;
    } else {
      s.speakIntensity *= 0.92;  // decay
    }
    const i = s.speakIntensity;
    s.coneMesh.material.opacity      = i * 0.28;
    s.coneEdges.material.opacity     = i * 0.55;
    // Slight scale push along forward so the cone "extends" more when louder
    const scl = 0.7 + i * 0.6;
    s.coneMesh.scale.set(scl, scl, scl);
    s.coneEdges.scale.set(scl, scl, scl);
    // Mouth ring pulses
    s.mouth.material.opacity = 0.55 + i * 0.4;
  }
  // Listener's mouth + cone are dormant for now (no mic in this sandbox).

  updateLabels();
  renderer.render(scene, camera);
}
frame();

// ─── Resize ──────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.left   = -frustumWidth() / 2;
  camera.right  =  frustumWidth() / 2;
  camera.top    =  FRUSTUM_H / 2;
  camera.bottom = -FRUSTUM_H / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
