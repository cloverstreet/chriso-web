<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>sandbox · chriso.org</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    background: #081018;
    color: #c8b894;
    font-family: 'Courier New', monospace;
  }

  /* Proximity-glow canvas — sits behind everything */
  canvas#glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* Title-area particle canvas — curl-noise flow field with hot palette
     cycling (lifted from /index2/). Bounded to the upper portion of the
     viewport so the rest of the page stays calm. */
  canvas#title-particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;          /* full screen — particles roam everywhere */
    z-index: 9;             /* above the title (8) so they can coat it */
    pointer-events: none;
    mix-blend-mode: screen;
  }

  /* Title wrap — keeps title + subtitle stacked + centered without
     having to recompute subtitle's `top` for every title size change */
  #title-wrap {
    position: fixed;
    top: 9vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 92vw;
  }
  #title {
    color: rgba(248, 232, 200, 0.78);
    font-family: 'Courier New', monospace;
    font-weight: 700;
    font-style: italic;
    font-size: clamp(36px, 7vw, 92px);
    letter-spacing: 0.10em;
    text-transform: lowercase;
    white-space: nowrap;
    /* mix-blend-mode lets the particles below show through the letters
       (same trick as /index2/'s title) */
    mix-blend-mode: screen;
    text-shadow: 0 0 36px rgba(248, 232, 200, 0.22);
    line-height: 1;
  }
  #subtitle {
    margin-top: 0.6em;
    color: #d4c098;
    font-family: 'Courier New', monospace;
    font-style: italic;
    font-size: clamp(11px, 1.05vw, 14px);
    letter-spacing: 0.36em;
    opacity: 0.92;
    text-transform: lowercase;
    white-space: nowrap;
  }

  /* Scattered links — same visual language as glitchpage entrance */
  .scattered-link {
    position: fixed;
    transform: translate(-50%, -50%);
    color: #7a7468;
    text-decoration: none;
    cursor: pointer;
    z-index: 10;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.2;
    transition: color 0.3s ease, text-shadow 0.3s ease;
    white-space: nowrap;
    text-align: center;
    font-size: clamp(15px, 1.7vw, 20px);
    font-weight: 400;
    letter-spacing: 0.13em;
    /* Touch target padding so finger taps land easily */
    padding: 10px 14px;
  }
  .scattered-link:hover {
    color: #e6d4ae;
    text-shadow: 0 0 14px rgba(220, 200, 160, 0.5);
  }
  .scattered-link .sublabel {
    font-size: 0.55em;
    letter-spacing: 0.22em;
    opacity: 0.6;
    margin-top: 0.3em;
  }

  /* Film grain overlay — matches glitchpage texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* Room-hum drifting underline at the bottom */
  .room-hum {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,196,168,0.15), transparent);
    z-index: 4;
    pointer-events: none;
    animation: drift 22s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: translateX(-30%); opacity: 0.4; }
    50%      { transform: translateX(30%);  opacity: 0.8; }
  }

  /* Stereo / binaural toggle — segmented control, lives inside the audio panel */
  #mode-toggle {
    display: inline-flex;
    gap: 0;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(220,200,160,0.18);
    border-radius: 16px;
    padding: 3px;
    font-family: 'Courier New', monospace;
  }
  /* Row holding the spatial-mode label + toggle inside the panel */
  #spatial-panel .mode-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  /* Mount point for the shared MeterStrip gain/meter widget */
  #meter-mount {
    margin: 4px 0 14px;
    min-height: 76px;
  }
  #mode-toggle button {
    appearance: none;
    border: none;
    background: transparent;
    color: #8a7c64;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: lowercase;
    padding: 6px 14px;
    border-radius: 16px;
    cursor: pointer;
    transition: color 0.3s, background 0.3s;
  }
  #mode-toggle button.active {
    color: #f0e0c0;
    background: rgba(220,200,160,0.12);
  }

  /* Standalone mute pill — lowest corner button (quick toggle) */
  #btn-mute {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 11;
    appearance: none;
    border: 1px solid rgba(220,200,160,0.18);
    background: rgba(0,0,0,0.4);
    color: #8a7c64;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: lowercase;
    padding: 6px 16px;
    border-radius: 16px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: color 0.3s, background 0.3s;
  }
  #btn-mute:hover { color: #c8b894; }
  #btn-mute.active {
    color: #f0e0c0;
    background: rgba(220,200,160,0.18);
    border-color: rgba(220,200,160,0.32);
  }

  /* Audio settings — pill that opens the consolidated audio panel */
  #btn-spatial {
    position: fixed;
    right: 18px;
    bottom: 58px;
    z-index: 11;
    appearance: none;
    border: 1px solid rgba(220,200,160,0.18);
    background: rgba(0,0,0,0.4);
    color: #8a7c64;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: lowercase;
    padding: 6px 16px;
    border-radius: 16px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: color 0.3s, background 0.3s;
  }
  #btn-spatial:hover { color: #c8b894; }
  #btn-spatial.active {
    color: #f0e0c0;
    background: rgba(220,200,160,0.18);
    border-color: rgba(220,200,160,0.32);
  }

  #spatial-panel {
    position: fixed;
    right: 18px;
    bottom: 144px;
    z-index: 12;
    width: 280px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(220,200,160,0.22);
    border-radius: 14px;
    padding: 14px 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #c8b894;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    display: none;
  }
  #spatial-panel.open { display: block; }
  #spatial-panel h4 {
    margin: 0 0 10px 0;
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: lowercase;
    font-weight: 700;
    color: #f0e0c0;
  }
  #spatial-panel .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 6px 0;
  }
  #spatial-panel .row label {
    flex: 0 0 auto;
    text-transform: lowercase;
    color: #a89878;
    font-size: 10px;
    letter-spacing: 0.14em;
  }
  #spatial-panel .row input[type=range] {
    flex: 1 1 auto;
    height: 4px;
    appearance: none;
    background: rgba(220,200,160,0.18);
    border-radius: 2px;
    outline: none;
  }
  #spatial-panel .row input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #d4c098;
    cursor: pointer;
  }
  #spatial-panel .row .val {
    flex: 0 0 38px;
    text-align: right;
    color: #d4c098;
    font-size: 10px;
  }
  #spatial-panel .actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  #spatial-panel .actions button {
    flex: 1;
    appearance: none;
    border: 1px solid rgba(220,200,160,0.24);
    background: rgba(220,200,160,0.06);
    color: #d4c098;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: lowercase;
    padding: 6px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  #spatial-panel .actions button:hover {
    background: rgba(220,200,160,0.18);
    color: #f0e0c0;
  }
  #spatial-status {
    margin-top: 8px;
    font-size: 10px;
    color: #8a7c64;
    letter-spacing: 0.10em;
  }
  #spatial-viz {
    display: block;
    margin: 8px auto 0;
    background: rgba(10,6,8,0.6);
    border: 1px solid rgba(220,200,160,0.18);
    border-radius: 6px;
  }
  /* On phone collapse the panel width */
  @media (max-width: 599px) {
    #spatial-panel {
      width: calc(100vw - 36px);
      right: 18px;
      max-height: 75vh;
      overflow-y: auto;
    }
  }

  /* Tiny hint shown until first gesture unlocks audio */
  #audio-hint {
    position: fixed;
    left: 50%;
    bottom: 22vh;
    transform: translateX(-50%);
    z-index: 9;
    color: #6b5a44;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.3em;
    opacity: 0.6;
    pointer-events: none;
    text-transform: lowercase;
    transition: opacity 1s;
  }
  #audio-hint.faded { opacity: 0; }

  /* Loading state */
  #loading {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: #6b5a44;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.3em;
    opacity: 0.6;
    z-index: 5;
  }

  /* ── Mobile layout (narrow viewport) ──────────────────────────────
     Below 600px we abandon scattered placement and stack links in a
     centered column — still reachable, still tappable. */
  @media (max-width: 599px) {
    .scattered-link {
      position: relative !important;
      left: auto !important;
      top: auto !important;
      transform: none !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 12px;
      font-size: 17px;
    }
    #links {
      position: fixed;
      top: 20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 86%;
      max-height: 64vh;
      overflow-y: auto;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    /* On phone, links don't have viewport-positioned glow centers, so
       collapse the proximity-glow to a softer ambient backdrop */
    canvas#glow { opacity: 0.45; }
    #title-wrap { top: 7vh; }
    /* Particles stay full-screen on phone too, just fewer (handled in JS) */
  }
</style>

<body>
<canvas id="glow"></canvas>
<canvas id="title-particles"></canvas>
<div id="title-wrap">
  <div id="title">/sandbox/</div>
  <div id="subtitle">rough play · prototypes in flux</div>
</div>
<div id="loading">loading…</div>
<div id="links"></div>
<div class="room-hum"></div>

<div id="audio-hint">move · tap · to begin</div>

<button id="btn-spatial">audio settings</button>
<button id="btn-mute">mute</button>

<div id="spatial-panel">
  <h4>audio settings</h4>
  <div class="row mode-row">
    <label>spatial</label>
    <div id="mode-toggle">
      <button id="btn-stereo">stereo</button>
      <button id="btn-binaural" class="active">binaural</button>
    </div>
  </div>
  <div id="meter-mount"></div>
  <div class="row">
    <label>vol</label>
    <input type="range" id="sl-vol"   min="0" max="3"    step="0.05" value="1">
    <span class="val" id="v-vol">1.0×</span>
  </div>
  <div class="row">
    <label>rate</label>
    <input type="range" id="sl-rate"  min="0.3" max="3"  step="0.05" value="1">
    <span class="val" id="v-rate">1.0×</span>
  </div>
  <div class="row">
    <label>speed</label>
    <input type="range" id="sl-speed" min="0.3" max="3"  step="0.05" value="1">
    <span class="val" id="v-speed">1.0×</span>
  </div>
  <div class="row">
    <label>dist</label>
    <input type="range" id="sl-dist"  min="0.2" max="3"  step="0.05" value="1">
    <span class="val" id="v-dist">1.0×</span>
  </div>
  <canvas id="spatial-viz" width="240" height="120"></canvas>
  <div class="actions">
    <button id="btn-test-orbit">test orbit</button>
    <button id="btn-reset-spatial">reset</button>
  </div>
  <div id="spatial-status">binaural · panners 0</div>
</div>

<!-- Shared gain/meter widget kit (provides window.AudioWidgets.MeterStrip) -->
<script src="/widgets/audio-widgets.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════════
// /Sandbox/ landing page
// ════════════════════════════════════════════════════════════════════════
// Auto-populates links from /Sandbox/list.php, lays them out in a scattered
// ring (or a column on phones), renders proximity-glow halos behind each
// (same visual language as the glitchpage entrance), and runs an audio
// engine adapted from /index2/ — FM-modulated saw drone, ring-modulated
// noise bed, dense crackle, and a granular bus where every grain rides a
// PannerNode with an animated 3D trajectory.  HRTF panning by default;
// toggle switches all panners to equalpower stereo at runtime.
// ════════════════════════════════════════════════════════════════════════


// ── Auto-populate links ────────────────────────────────────────────────
const linksContainer = document.getElementById('links');
const loadingEl      = document.getElementById('loading');

let linkEntries = [];  // { el, cx, cy, phase, freq, hueBias }

async function loadLinks() {
  let items = [];
  try {
    const res = await fetch('/Sandbox/list.php', { cache: 'no-store' });
    items = await res.json();
  } catch (e) {
    // Fallback: hardcode the known set so the page still renders if PHP fails
    items = [
      { name: 'AVBufShuf',       label: 'AVBufShuf',        href: '/Sandbox/AVBufShuf/' },
      { name: 'tellofoam',       label: 'tellofoam',        href: '/Sandbox/tellofoam/' },
      { name: 'tensegrity-robot',label: 'tensegrity robot', href: '/Sandbox/tensegrity-robot/' }
    ];
  }
  loadingEl.remove();
  renderLinks(items);
  recomputeLinkCenters();
}

function renderLinks(items) {
  // Position links scattered around a ring, with per-index radius wobble.
  // On mobile the CSS overrides position to a centered column.
  const total = Math.max(items.length, 1);
  items.forEach((cfg, i) => {
    const a = document.createElement('a');
    a.className = 'scattered-link';
    a.href = cfg.href;
    a.dataset.i = i;

    // Scatter position: ring around the central title, with radius wobble
    // and starting angle offset by index so the ring rotates as N changes.
    // Ring is centred low (58vh) so its top arc clears the title band up
    // top; moderate radius = spread out but not flung to the edges, and
    // labels stay fully on-screen.
    const angle = (i / total) * Math.PI * 2 - Math.PI / 2
                + Math.sin(i * 7.3) * 0.18;
    const rWobble = Math.sin(i * 4.7) * 5 + Math.cos(i * 3.1) * 3;
    const rx = 33 + rWobble * 0.5;   // % of viewport
    const ry = 25 + rWobble * 0.4;
    const xPct = 50 + Math.cos(angle) * rx;
    const yPct = 58 + Math.sin(angle) * ry;
    a.style.left = xPct + 'vw';
    a.style.top  = yPct + 'vh';

    const main = document.createElement('span');
    main.textContent = cfg.label;
    a.appendChild(main);

    // Per-link glow seeds for organic per-link flicker
    linkEntries.push({
      el: a, cx: 0, cy: 0,
      phase:    i * 1.7 + Math.sin(i * 1.3) * 3,
      freq:     0.55 + (i % 3) * 0.18,
      hueBias:  (i * 7) % 22 - 11
    });

    // Per-link sound is proximity-driven (handled in the audio modulation
    // loop reading L.prox) so pointerenter/leave aren't needed for tone.
    // Click still fires a small grain transient before navigation.
    a.addEventListener('click', () => triggerClickGrain());

    linksContainer.appendChild(a);
  });
}

function recomputeLinkCenters() {
  linkEntries.forEach(entry => {
    const r = entry.el.getBoundingClientRect();
    entry.cx = r.left + r.width  / 2;
    entry.cy = r.top  + r.height / 2;
  });
}
window.addEventListener('resize', recomputeLinkCenters);


// ── Proximity glow canvas ──────────────────────────────────────────────
// Ported from glitchpage entrance: per-link amber halos with pseudo-perlin
// flicker, hot core on cursor proximity, mild candlelight drift.
const glowCanvas = document.getElementById('glow');
const glowCtx    = glowCanvas.getContext('2d');
const glowDpr    = Math.min(window.devicePixelRatio || 1, 2);
let   glowW, glowH;
const glowMouse  = { x: -9999, y: -9999, active: false };
let   glowT      = 0;

function resizeGlow() {
  glowW = window.innerWidth;
  glowH = window.innerHeight;
  glowCanvas.width  = glowW * glowDpr;
  glowCanvas.height = glowH * glowDpr;
  glowCanvas.style.width  = glowW + 'px';
  glowCanvas.style.height = glowH + 'px';
  glowCtx.setTransform(glowDpr, 0, 0, glowDpr, 0, 0);
  recomputeLinkCenters();
}
resizeGlow();
window.addEventListener('resize', resizeGlow);

document.addEventListener('pointermove', e => {
  glowMouse.x = e.clientX;
  glowMouse.y = e.clientY;
  glowMouse.active = true;
});
window.addEventListener('mouseleave', () => { glowMouse.active = false; });

// Pseudo-perlin: summed sines — cheap and organic
function glowN2(x, y, time) {
  return Math.sin(x * 0.011 + time * 0.7)       * 0.42
       + Math.sin(y * 0.017 + time * 1.05)      * 0.30
       + Math.sin((x + y) * 0.009 + time * 0.45) * 0.18
       + Math.sin((x - y) * 0.014 + time * 1.6)  * 0.10;
}

function glowFrame() {
  glowT += 0.014;

  glowCtx.globalCompositeOperation = 'source-over';
  glowCtx.fillStyle = '#0a0608';
  glowCtx.fillRect(0, 0, glowW, glowH);
  glowCtx.globalCompositeOperation = 'lighter';

  for (const L of linkEntries) {
    const dx = glowMouse.x - L.cx;
    const dy = glowMouse.y - L.cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Proximity reach — cursor must get closer to light/sound a link
    // (dialed back ~20% from 460 on 2026-05-22). Drives both the visual
    // glow and the per-link audio tone (which reads L.prox).
    const reach = 368;
    let prox = 0;
    if (glowMouse.active) {
      prox = Math.max(0, 1 - dist / reach);
      prox = prox * prox * (3 - 2 * prox);
    }
    // Expose proximity to the audio loop so per-link tones ramp in
    // at the same distance the visual glow does.
    L.prox = prox;

    const slow = 0.5 + 0.5 * Math.sin(glowT * L.freq + L.phase);
    const wob  = glowN2(L.cx, L.cy, glowT + L.phase);
    const fast = 0.5 + 0.5 * Math.sin(glowT * 4.3 + L.phase * 2);

    const baseRadius = 105 + 32 * slow + 18 * wob;
    const radius = baseRadius + prox * 250;

    const cx = L.cx + Math.sin(glowT * 0.6 + L.phase) * 6 + wob * 4;
    const cy = L.cy + Math.cos(glowT * 0.8 + L.phase * 1.3) * 6;

    const hue = 22 + L.hueBias + wob * 14 + prox * -4;
    const sat = 60 + prox * 18;
    const lit = 42 + slow * 8 + prox * 14;

    const ambientA = 0.10 + 0.04 * slow + 0.025 * fast * (0.5 + 0.5 * wob);
    const alpha = ambientA + prox * 0.55;

    const grad = glowCtx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0,    `hsla(${hue}, ${sat}%, ${lit + 14}%, ${alpha})`);
    grad.addColorStop(0.18, `hsla(${hue + 4}, ${sat}%, ${lit + 4}%, ${alpha * 0.55})`);
    grad.addColorStop(0.5,  `hsla(${hue + 10}, ${sat - 10}%, ${lit - 10}%, ${alpha * 0.18})`);
    grad.addColorStop(1,    `hsla(${hue + 14}, ${sat}%, ${lit - 20}%, 0)`);
    glowCtx.fillStyle = grad;
    glowCtx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

    if (prox > 0.05) {
      const coreR = 28 + prox * 60;
      const coreG = glowCtx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
      coreG.addColorStop(0, `hsla(${hue + 8}, 78%, 62%, ${prox * 0.55})`);
      coreG.addColorStop(1, `hsla(${hue + 8}, 78%, 50%, 0)`);
      glowCtx.fillStyle = coreG;
      glowCtx.fillRect(cx - coreR, cy - coreR, coreR * 2, coreR * 2);
    }
  }

  requestAnimationFrame(glowFrame);
}
glowFrame();


// ── Title-area particle field (index2-style curl noise + hot palette) ─
// A separate canvas bounded to the upper viewport. Curl noise drives the
// flow, hot palette (magenta/cyan/yellow) cycles, cursor warps the field
// when it's near the title region. `mix-blend-mode: screen` on the canvas
// + the title text lets the particles show through the letterforms.
const tCanvas = document.getElementById('title-particles');
const tCtx    = tCanvas.getContext('2d');
let tcW, tcH;

function resizeTitleParticles() {
  tcW = window.innerWidth;
  tcH = window.innerHeight;           // full screen — particles roam everywhere
  tCanvas.width  = tcW * glowDpr;
  tCanvas.height = tcH * glowDpr;
  tCanvas.style.width  = tcW + 'px';
  tCanvas.style.height = tcH + 'px';
  tCtx.setTransform(glowDpr, 0, 0, glowDpr, 0, 0);
  tCtx.fillStyle = '#000';
  tCtx.fillRect(0, 0, tcW, tcH);
  buildTitleAttractors();
}

// Letterform attractor points sampled from the live #title element so the
// "magnet" pulls particles onto the actual on-screen /sandbox/ text.
let titleAttractors = [];
function buildTitleAttractors() {
  const titleEl = document.getElementById('title');
  if (!titleEl || !tcW) return;
  const r = titleEl.getBoundingClientRect();
  if (r.width < 2) { setTimeout(buildTitleAttractors, 250); return; }  // not laid out yet
  const off = document.createElement('canvas');
  off.width = tcW; off.height = tcH;
  const o = off.getContext('2d');
  const cs = getComputedStyle(titleEl);
  o.font = `${cs.fontStyle} ${cs.fontWeight} ${cs.fontSize} ${cs.fontFamily}`;
  try { o.letterSpacing = cs.letterSpacing; } catch (e) {}
  o.textAlign = 'center';
  o.textBaseline = 'middle';
  o.fillStyle = '#fff';
  o.fillText(titleEl.textContent, r.left + r.width / 2, r.top + r.height / 2);
  const data = o.getImageData(0, 0, tcW, tcH).data;
  titleAttractors = [];
  const step = Math.max(2, Math.floor(tcW / 480));
  for (let y = 0; y < tcH; y += step) {
    for (let x = 0; x < tcW; x += step) {
      if (data[(y * tcW + x) * 4 + 3] > 100) titleAttractors.push([x, y]);
    }
  }
}
resizeTitleParticles();
window.addEventListener('resize', resizeTitleParticles);
// Rebuild once more after webfont/layout settle so points line up exactly
setTimeout(buildTitleAttractors, 1200);

const N_TPART = Math.min(window.innerWidth, window.innerHeight) < 600 ? 450 : 1000;
const tParticles = [];
for (let i = 0; i < N_TPART; i++) {
  tParticles.push({
    x: Math.random() * tcW,
    y: Math.random() * tcH,
    vx: 0, vy: 0,
    hue: Math.random() * 360
  });
}

// Magnet state: after ~8s of cumulative pointer activity, particles start
// migrating onto the title and coat it; idle relaxes the pull.
let activitySec  = 0;
let magnetWeight = 0;
let lastMoveAt   = 0;
let lastTickAt   = performance.now();
document.addEventListener('pointermove', () => { lastMoveAt = performance.now(); });
document.addEventListener('pointerdown', () => { lastMoveAt = performance.now(); });

// Pseudo curl-noise — same shape as index2's
function tcurl(x, y, t) {
  const eps = 1.6;
  const n = (xx, yy) =>
      Math.sin(xx * 0.011 + t * 0.4)        * 0.40
    + Math.sin(yy * 0.017 + t * 0.3)        * 0.30
    + Math.sin((xx + yy) * 0.008 + t * 0.5) * 0.20
    + Math.sin((xx - yy) * 0.014 + t * 0.7) * 0.10;
  const dndy = n(x, y + eps) - n(x, y - eps);
  const dndx = n(x + eps, y) - n(x - eps, y);
  return [dndy, -dndx];
}

let tcFrame = 0;
function tickTitleParticles() {
  requestAnimationFrame(tickTitleParticles);
  tcFrame++;
  const now = performance.now();
  const dt  = Math.min(0.05, (now - lastTickAt) / 1000);
  lastTickAt = now;

  // Cumulative activity: count seconds while the pointer is moving. Once it
  // crosses 8s, the magnet engages — strongly while still active, easing
  // off (but not fully releasing) when idle, so the coating stays present.
  const moving = (now - lastMoveAt) < 400;
  if (moving) activitySec += dt;
  const magnetTarget = activitySec >= 8 ? (moving ? 1 : 0.5) : 0;
  magnetWeight += (magnetTarget - magnetWeight) * 0.012;

  // Trail decay
  tCtx.globalCompositeOperation = 'source-over';
  tCtx.fillStyle = 'rgba(0,0,0,0.10)';
  tCtx.fillRect(0, 0, tcW, tcH);
  tCtx.globalCompositeOperation = 'lighter';

  const tn = tcFrame * 0.012;
  const cursorActive = glowMouse.active;

  for (let i = 0; i < tParticles.length; i++) {
    const p = tParticles[i];
    const [cx, cy] = tcurl(p.x, p.y, tn);
    let ax = cx * 1.4, ay = cy * 1.4;

    if (cursorActive) {
      const dx = glowMouse.x - p.x, dy = glowMouse.y - p.y;
      const d  = Math.max(40, Math.sqrt(dx*dx + dy*dy));
      const k  = (mSpeed > 5 ? 70 : 18) / d;
      ax += (dx / d) * k;
      ay += (dy / d) * k;
    }

    // Magnet pull onto the title letterforms — coats the text over time
    if (magnetWeight > 0.01 && titleAttractors.length) {
      const at = titleAttractors[i % titleAttractors.length];
      const dx = at[0] - p.x, dy = at[1] - p.y;
      const d  = Math.max(2, Math.sqrt(dx*dx + dy*dy));
      const pull = magnetWeight * Math.min(36, d) * 0.22;
      ax += (dx / d) * pull;
      ay += (dy / d) * pull;
    }

    p.vx = (p.vx + ax) * 0.90;
    p.vy = (p.vy + ay) * 0.90;
    p.x += p.vx;
    p.y += p.vy;

    // Wrap to keep particles in-canvas (only matters during free flow)
    if (p.x < 0) p.x += tcW;
    if (p.x > tcW) p.x -= tcW;
    if (p.y < 0) p.y += tcH;
    if (p.y > tcH) p.y -= tcH;

    p.hue = (p.hue + 0.6) % 360;
    const hd = (p.hue * 0.5 + 280) % 360;
    const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    const a = 0.16 + Math.min(0.55, speed * 0.06);
    tCtx.fillStyle = `hsla(${hd},92%,62%,${a})`;
    tCtx.fillRect(p.x, p.y, 1.4, 1.4);

    // Speed streak
    if (speed > 2.5) {
      tCtx.fillStyle = `hsla(${hd},92%,75%,${a * 0.5})`;
      tCtx.fillRect(p.x - p.vx * 0.3, p.y - p.vy * 0.3, 1.0, 1.0);
    }
  }
}
tickTitleParticles();


// ── Audio engine — index2 variant + 3D binaural granular ──────────────
//
//  • Drone bus       — FM-modulated sawtooth stack, LPF, centered (no spatial)
//  • Noise bed       — white noise × ring modulator, centered (no spatial)
//  • Grain bus       — each grain has its OWN PannerNode with an animated
//                      3D trajectory.  Listener at origin facing -Z; grains
//                      enter from one side, swoop past, exit the other.
//  • Crackle bus     — each crackle hits a PannerNode at a random fixed
//                      3D point (no motion — just placement variety).
//  • Mode toggle     — flips all PannerNode.panningModel between 'HRTF'
//                      (true binaural) and 'equalpower' (cheap stereo).
//                      New panners use whichever mode is current.
//
let actx, master;
let droneGain, modOsc, modGain;
let noiseGain, noiseRingOsc;
let granGain, crackleGain;
let grainBuf;
let started = false;
let currentMode = 'HRTF';
const activePanners = new Set();

// ── Page visibility (site-wide standard for non-instrument pages) ─────
// When the tab isn't in front, ramp master to 0 and suspend the audio
// context; halt grain/crackle spawn loops. Resume on visible. See
// CLAUDE.md "Auto-mute non-instrument pages when not in front."
let pageVisible = (document.visibilityState !== 'hidden');
document.addEventListener('visibilitychange', () => {
  pageVisible = (document.visibilityState !== 'hidden');
  if (!actx || !master) return;
  if (pageVisible) {
    actx.resume();
    const t = actx.currentTime;
    master.gain.cancelScheduledValues(t);
    master.gain.setValueAtTime(master.gain.value, t);
    master.gain.linearRampToValueAtTime(muted ? 0 : MASTER_LEVEL, t + 0.4);
  } else {
    const t = actx.currentTime;
    master.gain.cancelScheduledValues(t);
    master.gain.setValueAtTime(master.gain.value, t);
    master.gain.linearRampToValueAtTime(0, t + 0.15);
    setTimeout(() => { if (!pageVisible && actx) actx.suspend(); }, 200);
  }
});

// ── Spatialization debug controls (live-tweakable multipliers) ────────
let grainVolMult   = 1;   // multiplier on granGain target
let grainRateMult  = 1;   // multiplier on grain spawn rate (>1 = faster)
let grainSpeedMult = 1;   // multiplier on grain travel speed (>1 = faster)
let grainDistMult  = 1;   // multiplier on trajectory radii (>1 = farther)
const GRAN_BASE = 0.13;   // baseline granular bus gain

// Cursor → audio modulation (cursor speed drives crackle + FM depth)
let mx = -1, my = -1, mLastX = -1, mLastY = -1, mSpeed = 0;
document.addEventListener('pointermove', e => {
  mx = e.clientX; my = e.clientY;
});

function startAudio() {
  if (started) return;
  started = true;
  actx = new (window.AudioContext || window.webkitAudioContext)();

  // Listener defaults: at origin, facing -Z, up +Y.  Good as-is.

  master = actx.createGain();
  master.gain.value = MASTER_LEVEL;
  master.connect(actx.destination);

  // ── Drone with FM ─────────────────────────────────────────────────
  droneGain = actx.createGain();
  droneGain.gain.value = 0.036;
  droneGain.connect(master);

  const fund = 50;
  modOsc = actx.createOscillator();
  modOsc.type = 'sine';
  modOsc.frequency.value = 0.7;
  modGain = actx.createGain();
  modGain.gain.value = 6;
  modOsc.connect(modGain);
  modOsc.start();

  for (const r of [1, 1.5, 2.04, 2.97]) {
    const o = actx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = fund * r;
    o.detune.value = (Math.random() - 0.5) * 18;
    modGain.connect(o.frequency);

    const lpf = actx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 1400;
    lpf.Q.value = 0.4;

    const g = actx.createGain();
    g.gain.value = 0.55 / (r * r);
    o.connect(lpf); lpf.connect(g); g.connect(droneGain);
    o.start();
  }

  // ── Noise bed × ring mod ──────────────────────────────────────────
  noiseGain = actx.createGain();
  noiseGain.gain.value = 0.013;
  noiseGain.connect(master);

  const nb = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const ns = actx.createBufferSource();
  ns.buffer = nb;
  ns.loop = true;

  const ringG = actx.createGain();
  ringG.gain.value = 0;
  noiseRingOsc = actx.createOscillator();
  noiseRingOsc.type = 'sine';
  noiseRingOsc.frequency.value = 220;
  noiseRingOsc.connect(ringG.gain);
  noiseRingOsc.start();

  ns.connect(ringG); ringG.connect(noiseGain);
  ns.start();

  // ── Granular bus ──────────────────────────────────────────────────
  granGain = actx.createGain();
  granGain.gain.value = GRAN_BASE;
  granGain.connect(master);

  // 5s of textured noise — used as the granular source material
  grainBuf = actx.createBuffer(2, actx.sampleRate * 5, actx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = grainBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.7;
      // Scattered impulses for texture
      if (Math.random() < 0.005) d[i] = (Math.random() < 0.5 ? 1 : -1);
    }
  }

  // ── Crackle bus ───────────────────────────────────────────────────
  crackleGain = actx.createGain();
  crackleGain.gain.value = 0.035;
  crackleGain.connect(master);

  scheduleGrain();
  scheduleCrackle();
  modulateLoop();
}

// Mount the shared MeterStrip (gain + L/R level meter) in the audio-settings
// panel, metering the master bus. The slider retunes master level (and
// MASTER_LEVEL, so mute/visibility restore to the chosen level) — this is the
// tool for dialing consistent levels across the front pages.
let masterMeter = null;
function ensureMeter() {
  if (masterMeter || !actx || !master) return;
  if (typeof AudioWidgets === 'undefined' || !AudioWidgets.MeterStrip) return;
  const mount = document.getElementById('meter-mount');
  if (!mount) return;
  masterMeter = new AudioWidgets.MeterStrip(mount, master, {
    gainNode: master,
    label: 'MASTER',
    gainMin: -40,
    gainMax: 6,
    height: 72,
    onGainChange: (db) => { MASTER_LEVEL = AudioWidgets.dbToGain(db); }
  });
}

// Spawn a grain. Every grain carries its own PannerNode whose position
// animates linearly from a start point to an end point over the grain's
// lifespan. Trajectories bias toward "pass close to the head" — start
// far on one side along ±X, end far on the opposite side, with random
// Y and Z so some pass overhead, behind, in front.
function scheduleGrain() {
  if (!actx) return;
  const wait = (55 + Math.random() * 130) / Math.max(0.1, grainRateMult);
  setTimeout(() => {
    if (!actx) return;
    spawnGrain();
    scheduleGrain();
  }, wait);
}

function spawnGrain() {
  if (!pageVisible) return;                              // halt processing while hidden
  const dur = (0.20 + Math.random() * 0.55) / Math.max(0.2, grainSpeedMult);
  const t0 = actx.currentTime + 0.01;

  const src = actx.createBufferSource();
  src.buffer = grainBuf;
  src.playbackRate.value = 0.45 + Math.random() * 1.55;
  src.detune.value = (Math.random() - 0.5) * 220;
  const sampleStart = Math.random() * (grainBuf.duration - dur - 0.01);

  const lpf = actx.createBiquadFilter();
  lpf.type = Math.random() < 0.55 ? 'bandpass' : 'highpass';
  lpf.frequency.value = 500 + Math.random() * 4200;
  lpf.Q.value = 0.6 + Math.random() * 4;

  const env = actx.createGain();
  env.gain.setValueAtTime(0, t0);
  env.gain.linearRampToValueAtTime(0.55 + Math.random() * 0.35, t0 + dur * 0.22);
  env.gain.linearRampToValueAtTime(0, t0 + dur);

  // ── 3D trajectory ───────────────────────────────────────────────
  // Random "type" — most grains pass by head on ±X; some drift around;
  // some recede into distance. Distance is in metres (Web Audio default
  // refDistance 1m).
  const panner = actx.createPanner();
  panner.panningModel  = currentMode;       // HRTF or equalpower
  panner.distanceModel = 'inverse';
  panner.refDistance   = 0.8;
  panner.maxDistance   = 22;
  panner.rolloffFactor = 1.4;

  const trajRoll = Math.random();
  let sx, sy, sz, ex, ey, ez;
  if (trajRoll < 0.70) {
    // Pass-by — start far on one side, end far on opposite side
    const side = Math.random() < 0.5 ? -1 : 1;
    const startR = 5 + Math.random() * 8;
    const endR   = 5 + Math.random() * 8;
    const startAngle = (Math.random() - 0.5) * 0.55;
    sx = side * startR * Math.cos(startAngle);
    sz = -1.5 + startR * Math.sin(startAngle);
    sy = (Math.random() - 0.5) * 2.2;
    ex = -side * endR * Math.cos(startAngle);
    ez = -1.5 + endR * Math.sin(startAngle) * 0.6;
    ey = sy + (Math.random() - 0.5) * 1.6;
  } else if (trajRoll < 0.90) {
    // Drift-around — small arc near the head
    const aStart = Math.random() * Math.PI * 2;
    const aEnd   = aStart + (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random() * 1.4);
    const r      = 1.2 + Math.random() * 2.2;
    sx = Math.cos(aStart) * r;
    sz = Math.sin(aStart) * r;
    sy = (Math.random() - 0.5) * 1.5;
    ex = Math.cos(aEnd) * r * 1.2;
    ez = Math.sin(aEnd) * r * 1.2;
    ey = sy + (Math.random() - 0.5) * 0.8;
  } else {
    // Fade-into-distance — start near, recede backward
    const angle = (Math.random() - 0.5) * Math.PI;
    sx = Math.cos(angle) * 1.2;
    sz = Math.sin(angle) * 1.2 - 0.5;
    sy = (Math.random() - 0.5) * 1.0;
    ex = sx * 6;
    ez = sz * 6 - 4;
    ey = sy * 1.4;
  }

  // Apply live-tweakable distance scaling (debug panel slider).
  sx *= grainDistMult; sz *= grainDistMult;
  ex *= grainDistMult; ez *= grainDistMult;

  panner.positionX.setValueAtTime(sx, t0);
  panner.positionY.setValueAtTime(sy, t0);
  panner.positionZ.setValueAtTime(sz, t0);
  panner.positionX.linearRampToValueAtTime(ex, t0 + dur);
  panner.positionY.linearRampToValueAtTime(ey, t0 + dur);
  panner.positionZ.linearRampToValueAtTime(ez, t0 + dur);

  // Stash trajectory on the panner so the visualizer can read positions
  // without polling AudioParam.value (which is unreliable mid-ramp).
  panner._gMeta = { startTime: t0, endTime: t0 + dur, sx, sy, sz, ex, ey, ez };

  activePanners.add(panner);
  setTimeout(() => activePanners.delete(panner), (dur + 0.2) * 1000);

  src.connect(lpf);
  lpf.connect(env);
  env.connect(panner);
  panner.connect(granGain);
  src.start(t0, sampleStart, dur);
  src.stop(t0 + dur + 0.05);
}

function scheduleCrackle() {
  if (!actx) return;
  setTimeout(() => {
    if (!actx) return;
    spawnCrackle();
    scheduleCrackle();
  }, 30 + Math.random() * 110);
}

function spawnCrackle() {
  if (!pageVisible) return;
  const t0 = actx.currentTime + 0.01;
  const dur = 0.005 + Math.random() * 0.025;

  const src = actx.createBufferSource();
  src.buffer = grainBuf;
  src.playbackRate.value = 1 + Math.random() * 0.5;

  const hpf = actx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 2200;

  const env = actx.createGain();
  env.gain.setValueAtTime(0, t0);
  env.gain.linearRampToValueAtTime(0.55, t0 + dur * 0.2);
  env.gain.linearRampToValueAtTime(0, t0 + dur);

  // Static 3D placement — each crackle just appears somewhere
  const panner = actx.createPanner();
  panner.panningModel  = currentMode;
  panner.distanceModel = 'inverse';
  panner.refDistance   = 0.8;
  panner.maxDistance   = 18;
  panner.rolloffFactor = 1.2;
  const angle = Math.random() * Math.PI * 2;
  const r     = 0.8 + Math.random() * 3;
  panner.positionX.value = Math.cos(angle) * r;
  panner.positionY.value = (Math.random() - 0.5) * 2.5;
  panner.positionZ.value = Math.sin(angle) * r - 0.5;

  activePanners.add(panner);
  setTimeout(() => activePanners.delete(panner), (dur + 0.2) * 1000);

  src.connect(hpf); hpf.connect(env); env.connect(panner); panner.connect(crackleGain);
  src.start(t0, Math.random() * grainBuf.duration * 0.9, dur);
  src.stop(t0 + dur + 0.05);
}

// Slow modulation loop — cursor speed drives crackle + FM depth
function modulateLoop() {
  if (!actx) return;
  setInterval(() => {
    if (!actx) return;
    if (mLastX >= 0) {
      const dx = mx - mLastX, dy = my - mLastY;
      mSpeed = mSpeed * 0.86 + Math.min(160, Math.sqrt(dx*dx + dy*dy)) * 0.14;
    }
    mLastX = mx; mLastY = my;
    const sNorm = Math.min(1, mSpeed / 100);
    crackleGain.gain.linearRampToValueAtTime(
      0.025 + sNorm * 0.08, actx.currentTime + 0.2);
    modGain.gain.linearRampToValueAtTime(
      4 + sNorm * 16, actx.currentTime + 0.2);
    noiseRingOsc.frequency.linearRampToValueAtTime(
      180 + sNorm * 700, actx.currentTime + 0.2);
    granGain.gain.linearRampToValueAtTime(
      GRAN_BASE * grainVolMult, actx.currentTime + 0.2);

    // ── Per-link proximity tones ──────────────────────────────────────
    // Each link gets a beating-quartet sine that rises in gain by the
    // same `prox` value the glow uses, so audio responds at the same
    // distance the visual glow does — not just on direct hover.
    for (const L of linkEntries) {
      if (L.prox > 0.04) {
        if (!L.audioNodes) createLinkAudio(L);
        const target = Math.min(1, L.prox * 1.05) * 0.040;
        L.audioGain.gain.linearRampToValueAtTime(target, actx.currentTime + 0.12);
      } else if (L.audioNodes) {
        L.audioGain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.20);
      }
    }
  }, 90);
}

// Lazily build the per-link audio nodes the first time it's audible.
// Beating quartet — slight detune produces shimmer/chorus.
function createLinkAudio(L) {
  const i = parseInt(L.el.dataset.i, 10) || 0;
  L.audioGain = actx.createGain();
  L.audioGain.gain.value = 0;
  L.audioGain.connect(master);
  L.audioOscs = [];
  const f = 220 + (i * 47) % 220;
  for (const df of [-2.5, 2.5, -4.4, 4.4]) {
    const o = actx.createOscillator();
    o.type = 'sine';
    o.frequency.value = f + df;
    o.connect(L.audioGain);
    o.start();
    L.audioOscs.push(o);
  }
  L.audioNodes = true;
}

// Click fires extra grain transients before navigation.
function triggerClickGrain() {
  if (!actx) return;
  // Fire two extra grains on click for a richer transient
  spawnGrain();
  spawnGrain();
}

// ── Mode toggle ────────────────────────────────────────────────────────
const btnStereo   = document.getElementById('btn-stereo');
const btnBinaural = document.getElementById('btn-binaural');
function setMode(mode) {
  currentMode = mode;
  for (const p of activePanners) p.panningModel = currentMode;
  btnStereo.classList.toggle('active',   mode === 'equalpower');
  btnBinaural.classList.toggle('active', mode === 'HRTF');
}
btnStereo.addEventListener('click',   () => setMode('equalpower'));
btnBinaural.addEventListener('click', () => setMode('HRTF'));

// ── Spatial debug panel ────────────────────────────────────────────────
// Lets you live-tweak grain volume, spawn rate, travel speed, and
// trajectory distance to find a sweet spot — and fire a clean test orbit
// (steady sine circling the listener) to verify the HRTF/equalpower
// chain is actually doing what the toggle says.  The tiny visualizer
// plots active grain panners as dots on a top-down (X / Z) view of the
// listener's plane, listener at center facing down (-Z).
const btnSpatial   = document.getElementById('btn-spatial');
const spatialPanel = document.getElementById('spatial-panel');
const slVol   = document.getElementById('sl-vol');
const slRate  = document.getElementById('sl-rate');
const slSpeed = document.getElementById('sl-speed');
const slDist  = document.getElementById('sl-dist');
const vVol   = document.getElementById('v-vol');
const vRate  = document.getElementById('v-rate');
const vSpeed = document.getElementById('v-speed');
const vDist  = document.getElementById('v-dist');
const btnTestOrbit = document.getElementById('btn-test-orbit');
const btnResetSpatial = document.getElementById('btn-reset-spatial');
const spatialStatus = document.getElementById('spatial-status');
const vizCanvas = document.getElementById('spatial-viz');
const vizCtx = vizCanvas.getContext('2d');

btnSpatial.addEventListener('click', () => {
  const open = !spatialPanel.classList.contains('open');
  spatialPanel.classList.toggle('open', open);
  btnSpatial.classList.toggle('active', open);
  // Mount the meter once the panel is actually visible (so the widget
  // measures a non-zero width). rAF lets the same-click audio-unlock
  // gesture create the context first.
  if (open) requestAnimationFrame(ensureMeter);
});

function bindSlider(slider, valEl, setter) {
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    setter(v);
    valEl.textContent = v.toFixed(2) + '×';
  });
}
bindSlider(slVol,   vVol,   v => grainVolMult   = v);
bindSlider(slRate,  vRate,  v => grainRateMult  = v);
bindSlider(slSpeed, vSpeed, v => grainSpeedMult = v);
bindSlider(slDist,  vDist,  v => grainDistMult  = v);

btnResetSpatial.addEventListener('click', () => {
  for (const [sl, val, setter] of [
    [slVol, vVol, v => grainVolMult = v],
    [slRate, vRate, v => grainRateMult = v],
    [slSpeed, vSpeed, v => grainSpeedMult = v],
    [slDist, vDist, v => grainDistMult = v]
  ]) {
    sl.value = 1; setter(1); val.textContent = '1.00×';
  }
});

// Test orbit: a clean sine that does ~1.5 revolutions around the head
// in 6 seconds.  Useful for verifying HRTF vs equalpower side-by-side
// without granular variation in the way.
btnTestOrbit.addEventListener('click', () => {
  if (!actx) {
    // First gesture — let the unlock handler kick in via a synthetic event
    return;
  }
  const dur = 6, t0 = actx.currentTime + 0.05;
  const osc = actx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 480;
  const env = actx.createGain();
  env.gain.setValueAtTime(0, t0);
  env.gain.linearRampToValueAtTime(0.16, t0 + 0.4);
  env.gain.setValueAtTime(0.16, t0 + dur - 0.4);
  env.gain.linearRampToValueAtTime(0, t0 + dur);

  const panner = actx.createPanner();
  panner.panningModel  = currentMode;
  panner.distanceModel = 'inverse';
  panner.refDistance   = 0.6;
  panner.maxDistance   = 18;
  panner.rolloffFactor = 1.2;
  const STEPS = 96, REVS = 1.5, R = 1.8;
  for (let i = 0; i <= STEPS; i++) {
    const phase = (i / STEPS) * Math.PI * 2 * REVS;
    const t = t0 + (i / STEPS) * dur;
    panner.positionX.setValueAtTime(Math.cos(phase) * R, t);
    panner.positionY.setValueAtTime(0, t);
    panner.positionZ.setValueAtTime(Math.sin(phase) * R, t);
  }
  panner._gMeta = { startTime: t0, endTime: t0 + dur,
                    sx: R, sy: 0, sz: 0, ex: R, ey: 0, ez: 0,
                    orbit: { revs: REVS, r: R } };

  activePanners.add(panner);
  setTimeout(() => activePanners.delete(panner), (dur + 0.3) * 1000);

  osc.connect(env);
  env.connect(panner);
  panner.connect(master);
  osc.start(t0);
  osc.stop(t0 + dur + 0.1);
});

// Visualizer + status — runs every frame, reads each active panner's
// interpolated trajectory position (so even mid-ramp positions read
// reliably), plots a dot on the XZ plane with the listener at center.
function tickViz() {
  requestAnimationFrame(tickViz);
  if (!actx) {
    spatialStatus.textContent = (currentMode === 'HRTF' ? 'binaural' : 'stereo')
      + ' · audio not started';
    return;
  }
  const w = vizCanvas.width, h = vizCanvas.height;
  // Trail decay
  vizCtx.globalCompositeOperation = 'source-over';
  vizCtx.fillStyle = 'rgba(10,6,8,0.18)';
  vizCtx.fillRect(0, 0, w, h);

  // Crosshair + listener dot
  vizCtx.strokeStyle = 'rgba(220,200,160,0.15)';
  vizCtx.lineWidth = 1;
  vizCtx.beginPath();
  vizCtx.moveTo(w/2, 0); vizCtx.lineTo(w/2, h);
  vizCtx.moveTo(0, h/2); vizCtx.lineTo(w, h/2);
  vizCtx.stroke();
  vizCtx.fillStyle = '#f0e0c0';
  vizCtx.beginPath();
  vizCtx.arc(w/2, h/2, 2.5, 0, Math.PI * 2);
  vizCtx.fill();

  // Scale: ±10m maps to ±w/2 / ±h/2 (Z grows downward so listener
  // "faces" toward the top of the canvas — closer to natural feel)
  const SCALE = (w / 2) / 10;
  const now = actx.currentTime;
  vizCtx.globalCompositeOperation = 'lighter';

  let visible = 0;
  for (const p of activePanners) {
    const m = p._gMeta;
    if (!m) continue;
    if (now < m.startTime || now > m.endTime) continue;
    let cx, cz;
    if (m.orbit) {
      const t = (now - m.startTime) / (m.endTime - m.startTime);
      const phase = t * Math.PI * 2 * m.orbit.revs;
      cx = Math.cos(phase) * m.orbit.r;
      cz = Math.sin(phase) * m.orbit.r;
    } else {
      const t = (now - m.startTime) / (m.endTime - m.startTime);
      cx = m.sx + (m.ex - m.sx) * t;
      cz = m.sz + (m.ez - m.sz) * t;
    }
    const px = w/2 + cx * SCALE;
    const py = h/2 - cz * SCALE;   // -Z is forward = up on screen
    if (px < -8 || px > w + 8 || py < -8 || py > h + 8) continue;
    visible++;
    const dist = Math.sqrt(cx*cx + cz*cz);
    const a = Math.max(0.2, Math.min(0.95, 1 - dist / 12));
    vizCtx.fillStyle = m.orbit
      ? `rgba(255,220,160,${a})`
      : `rgba(255,180,120,${a * 0.85})`;
    vizCtx.beginPath();
    vizCtx.arc(px, py, m.orbit ? 3 : 2.2, 0, Math.PI * 2);
    vizCtx.fill();
  }

  spatialStatus.textContent =
    (currentMode === 'HRTF' ? 'binaural' : 'stereo')
    + ' · panners ' + visible;
}
tickViz();


// ── Mute toggle ────────────────────────────────────────────────────────
// Ramps master gain to 0 on mute, back to the original level on unmute.
// Clicking it doesn't count as the first audio-unlock gesture (we don't
// want a brand-new visitor accidentally starting muted), so this no-ops
// silently before audio has been initialised.
const btnMute = document.getElementById('btn-mute');
let MASTER_LEVEL = 0.27;         // overall output (bumped from 0.18); the
                                 // audio-settings MeterStrip slider can retune it
let muted = false;
btnMute.addEventListener('click', (e) => {
  e.stopPropagation();
  muted = !muted;
  btnMute.classList.toggle('active', muted);
  btnMute.textContent = muted ? 'muted' : 'mute';
  if (actx && master) {
    const t = actx.currentTime;
    master.gain.cancelScheduledValues(t);
    master.gain.setValueAtTime(master.gain.value, t);
    master.gain.linearRampToValueAtTime(muted ? 0 : MASTER_LEVEL, t + 0.25);
  }
});


// ── First-gesture audio start ─────────────────────────────────────────
const audioHint = document.getElementById('audio-hint');
function tryStart() {
  startAudio();
  if (!actx) return;
  // iOS starts the context suspended — resume() inside the gesture,
  // retry until running, then fade the hint and detach.
  actx.resume().then(() => {
    if (actx.state === 'running') {
      if (audioHint) audioHint.classList.add('faded');
      for (const ev of ['pointerdown','pointermove','touchstart','touchend','click','keydown'])
        document.removeEventListener(ev, tryStart);
    }
  });
}
document.addEventListener('pointerdown', tryStart);
document.addEventListener('pointermove', tryStart);
document.addEventListener('touchstart', tryStart, { passive: true });
document.addEventListener('touchend',   tryStart, { passive: true });
document.addEventListener('click',      tryStart);
document.addEventListener('keydown',    tryStart);


// ── Bootstrap ─────────────────────────────────────────────────────────
loadLinks();
</script>
