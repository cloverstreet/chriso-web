<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>sandbox · chriso.org</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    background: #081018;
    color: #c8b894;
    font-family: 'Courier New', monospace;
  }

  /* Proximity-glow canvas — sits behind everything */
  canvas#glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* Title-area particle canvas — curl-noise flow field with hot palette
     cycling (lifted from /index2/). Bounded to the upper portion of the
     viewport so the rest of the page stays calm. */
  canvas#title-particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 38vh;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  /* Title wrap — keeps title + subtitle stacked + centered without
     having to recompute subtitle's `top` for every title size change */
  #title-wrap {
    position: fixed;
    top: 5vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 92vw;
  }
  #title {
    color: rgba(248, 232, 200, 0.78);
    font-family: 'Courier New', monospace;
    font-weight: 700;
    font-style: italic;
    font-size: clamp(36px, 7vw, 92px);
    letter-spacing: 0.10em;
    text-transform: lowercase;
    white-space: nowrap;
    /* mix-blend-mode lets the particles below show through the letters
       (same trick as /index2/'s title) */
    mix-blend-mode: screen;
    text-shadow: 0 0 36px rgba(248, 232, 200, 0.22);
    line-height: 1;
  }
  #subtitle {
    margin-top: 0.6em;
    color: #d4c098;
    font-family: 'Courier New', monospace;
    font-style: italic;
    font-size: clamp(11px, 1.05vw, 14px);
    letter-spacing: 0.36em;
    opacity: 0.92;
    text-transform: lowercase;
    white-space: nowrap;
  }

  /* Scattered links — same visual language as glitchpage entrance */
  .scattered-link {
    position: fixed;
    transform: translate(-50%, -50%);
    color: #7a7468;
    text-decoration: none;
    cursor: pointer;
    z-index: 10;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.2;
    transition: color 0.3s ease, text-shadow 0.3s ease;
    white-space: nowrap;
    text-align: center;
    font-size: clamp(15px, 1.7vw, 20px);
    font-weight: 400;
    letter-spacing: 0.13em;
    /* Touch target padding so finger taps land easily */
    padding: 10px 14px;
  }
  .scattered-link:hover {
    color: #e6d4ae;
    text-shadow: 0 0 14px rgba(220, 200, 160, 0.5);
  }
  .scattered-link .sublabel {
    font-size: 0.55em;
    letter-spacing: 0.22em;
    opacity: 0.6;
    margin-top: 0.3em;
  }

  /* Film grain overlay — matches glitchpage texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* Room-hum drifting underline at the bottom */
  .room-hum {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,196,168,0.15), transparent);
    z-index: 4;
    pointer-events: none;
    animation: drift 22s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: translateX(-30%); opacity: 0.4; }
    50%      { transform: translateX(30%);  opacity: 0.8; }
  }

  /* Stereo / binaural toggle — segmented control bottom-right */
  #mode-toggle {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 11;
    display: flex;
    gap: 0;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(220,200,160,0.18);
    border-radius: 20px;
    padding: 4px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    font-family: 'Courier New', monospace;
  }
  #mode-toggle button {
    appearance: none;
    border: none;
    background: transparent;
    color: #8a7c64;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: lowercase;
    padding: 6px 14px;
    border-radius: 16px;
    cursor: pointer;
    transition: color 0.3s, background 0.3s;
  }
  #mode-toggle button.active {
    color: #f0e0c0;
    background: rgba(220,200,160,0.12);
  }

  /* Tiny hint shown until first gesture unlocks audio */
  #audio-hint {
    position: fixed;
    left: 50%;
    bottom: 22vh;
    transform: translateX(-50%);
    z-index: 9;
    color: #6b5a44;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.3em;
    opacity: 0.6;
    pointer-events: none;
    text-transform: lowercase;
    transition: opacity 1s;
  }
  #audio-hint.faded { opacity: 0; }

  /* Loading state */
  #loading {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: #6b5a44;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.3em;
    opacity: 0.6;
    z-index: 5;
  }

  /* ── Mobile layout (narrow viewport) ──────────────────────────────
     Below 600px we abandon scattered placement and stack links in a
     centered column — still reachable, still tappable. */
  @media (max-width: 599px) {
    .scattered-link {
      position: relative !important;
      left: auto !important;
      top: auto !important;
      transform: none !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 12px;
      font-size: 17px;
    }
    #links {
      position: fixed;
      top: 20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 86%;
      max-height: 60vh;
      overflow-y: auto;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* On phone, links don't have viewport-positioned glow centers, so
       collapse the proximity-glow to a softer ambient backdrop */
    canvas#glow { opacity: 0.45; }
    #title-wrap { top: 4vh; }
    /* Particles stay on phone but at reduced density (handled in JS) */
    canvas#title-particles { height: 32vh; }
  }
</style>
</head>
<body>
<canvas id="glow"></canvas>
<canvas id="title-particles"></canvas>
<div id="title-wrap">
  <div id="title">/sandbox/</div>
  <div id="subtitle">rough play · prototypes in flux</div>
</div>
<div id="loading">loading…</div>
<div id="links"></div>
<div class="room-hum"></div>

<div id="audio-hint">move · tap · to begin</div>

<div id="mode-toggle">
  <button id="btn-stereo">stereo</button>
  <button id="btn-binaural" class="active">binaural</button>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════
// /Sandbox/ landing page
// ════════════════════════════════════════════════════════════════════════
// Auto-populates links from /Sandbox/list.php, lays them out in a scattered
// ring (or a column on phones), renders proximity-glow halos behind each
// (same visual language as the glitchpage entrance), and runs an audio
// engine adapted from /index2/ — FM-modulated saw drone, ring-modulated
// noise bed, dense crackle, and a granular bus where every grain rides a
// PannerNode with an animated 3D trajectory.  HRTF panning by default;
// toggle switches all panners to equalpower stereo at runtime.
// ════════════════════════════════════════════════════════════════════════


// ── Auto-populate links ────────────────────────────────────────────────
const linksContainer = document.getElementById('links');
const loadingEl      = document.getElementById('loading');

let linkEntries = [];  // { el, cx, cy, phase, freq, hueBias }

async function loadLinks() {
  let items = [];
  try {
    const res = await fetch('/Sandbox/list.php', { cache: 'no-store' });
    items = await res.json();
  } catch (e) {
    // Fallback: hardcode the known set so the page still renders if PHP fails
    items = [
      { name: 'AVBufShuf',       label: 'AVBufShuf',        href: '/Sandbox/AVBufShuf/' },
      { name: 'tellofoam',       label: 'tellofoam',        href: '/Sandbox/tellofoam/' },
      { name: 'tensegrity-robot',label: 'tensegrity robot', href: '/Sandbox/tensegrity-robot/' }
    ];
  }
  loadingEl.remove();
  renderLinks(items);
  recomputeLinkCenters();
}

function renderLinks(items) {
  // Position links scattered around a ring, with per-index radius wobble.
  // On mobile the CSS overrides position to a centered column.
  const total = Math.max(items.length, 1);
  items.forEach((cfg, i) => {
    const a = document.createElement('a');
    a.className = 'scattered-link';
    a.href = cfg.href;
    a.dataset.i = i;

    // Scatter position: ring around the central title, with radius wobble
    // and starting angle offset by index so the ring rotates as N changes.
    const angle = (i / total) * Math.PI * 2 - Math.PI / 2
                + Math.sin(i * 7.3) * 0.18;
    const rWobble = Math.sin(i * 4.7) * 6 + Math.cos(i * 3.1) * 4;
    const rx = 34 + rWobble * 0.5;   // % of viewport
    const ry = 28 + rWobble * 0.4;
    const xPct = 50 + Math.cos(angle) * rx;
    const yPct = 52 + Math.sin(angle) * ry;
    a.style.left = xPct + 'vw';
    a.style.top  = yPct + 'vh';

    const main = document.createElement('span');
    main.textContent = cfg.label;
    a.appendChild(main);

    // Per-link glow seeds for organic per-link flicker
    linkEntries.push({
      el: a, cx: 0, cy: 0,
      phase:    i * 1.7 + Math.sin(i * 1.3) * 3,
      freq:     0.55 + (i % 3) * 0.18,
      hueBias:  (i * 7) % 22 - 11
    });

    // Per-link sound is proximity-driven (handled in the audio modulation
    // loop reading L.prox) so pointerenter/leave aren't needed for tone.
    // Click still fires a small grain transient before navigation.
    a.addEventListener('click', () => triggerClickGrain());

    linksContainer.appendChild(a);
  });
}

function recomputeLinkCenters() {
  linkEntries.forEach(entry => {
    const r = entry.el.getBoundingClientRect();
    entry.cx = r.left + r.width  / 2;
    entry.cy = r.top  + r.height / 2;
  });
}
window.addEventListener('resize', recomputeLinkCenters);


// ── Proximity glow canvas ──────────────────────────────────────────────
// Ported from glitchpage entrance: per-link amber halos with pseudo-perlin
// flicker, hot core on cursor proximity, mild candlelight drift.
const glowCanvas = document.getElementById('glow');
const glowCtx    = glowCanvas.getContext('2d');
const glowDpr    = Math.min(window.devicePixelRatio || 1, 2);
let   glowW, glowH;
const glowMouse  = { x: -9999, y: -9999, active: false };
let   glowT      = 0;

function resizeGlow() {
  glowW = window.innerWidth;
  glowH = window.innerHeight;
  glowCanvas.width  = glowW * glowDpr;
  glowCanvas.height = glowH * glowDpr;
  glowCanvas.style.width  = glowW + 'px';
  glowCanvas.style.height = glowH + 'px';
  glowCtx.setTransform(glowDpr, 0, 0, glowDpr, 0, 0);
  recomputeLinkCenters();
}
resizeGlow();
window.addEventListener('resize', resizeGlow);

document.addEventListener('pointermove', e => {
  glowMouse.x = e.clientX;
  glowMouse.y = e.clientY;
  glowMouse.active = true;
});
window.addEventListener('mouseleave', () => { glowMouse.active = false; });

// Pseudo-perlin: summed sines — cheap and organic
function glowN2(x, y, time) {
  return Math.sin(x * 0.011 + time * 0.7)       * 0.42
       + Math.sin(y * 0.017 + time * 1.05)      * 0.30
       + Math.sin((x + y) * 0.009 + time * 0.45) * 0.18
       + Math.sin((x - y) * 0.014 + time * 1.6)  * 0.10;
}

function glowFrame() {
  glowT += 0.014;

  glowCtx.globalCompositeOperation = 'source-over';
  glowCtx.fillStyle = '#0a0608';
  glowCtx.fillRect(0, 0, glowW, glowH);
  glowCtx.globalCompositeOperation = 'lighter';

  for (const L of linkEntries) {
    const dx = glowMouse.x - L.cx;
    const dy = glowMouse.y - L.cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const reach = 460;
    let prox = 0;
    if (glowMouse.active) {
      prox = Math.max(0, 1 - dist / reach);
      prox = prox * prox * (3 - 2 * prox);
    }
    // Expose proximity to the audio loop so per-link tones ramp in
    // at the same distance the visual glow does.
    L.prox = prox;

    const slow = 0.5 + 0.5 * Math.sin(glowT * L.freq + L.phase);
    const wob  = glowN2(L.cx, L.cy, glowT + L.phase);
    const fast = 0.5 + 0.5 * Math.sin(glowT * 4.3 + L.phase * 2);

    const baseRadius = 105 + 32 * slow + 18 * wob;
    const radius = baseRadius + prox * 250;

    const cx = L.cx + Math.sin(glowT * 0.6 + L.phase) * 6 + wob * 4;
    const cy = L.cy + Math.cos(glowT * 0.8 + L.phase * 1.3) * 6;

    const hue = 22 + L.hueBias + wob * 14 + prox * -4;
    const sat = 60 + prox * 18;
    const lit = 42 + slow * 8 + prox * 14;

    const ambientA = 0.10 + 0.04 * slow + 0.025 * fast * (0.5 + 0.5 * wob);
    const alpha = ambientA + prox * 0.55;

    const grad = glowCtx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0,    `hsla(${hue}, ${sat}%, ${lit + 14}%, ${alpha})`);
    grad.addColorStop(0.18, `hsla(${hue + 4}, ${sat}%, ${lit + 4}%, ${alpha * 0.55})`);
    grad.addColorStop(0.5,  `hsla(${hue + 10}, ${sat - 10}%, ${lit - 10}%, ${alpha * 0.18})`);
    grad.addColorStop(1,    `hsla(${hue + 14}, ${sat}%, ${lit - 20}%, 0)`);
    glowCtx.fillStyle = grad;
    glowCtx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

    if (prox > 0.05) {
      const coreR = 28 + prox * 60;
      const coreG = glowCtx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
      coreG.addColorStop(0, `hsla(${hue + 8}, 78%, 62%, ${prox * 0.55})`);
      coreG.addColorStop(1, `hsla(${hue + 8}, 78%, 50%, 0)`);
      glowCtx.fillStyle = coreG;
      glowCtx.fillRect(cx - coreR, cy - coreR, coreR * 2, coreR * 2);
    }
  }

  requestAnimationFrame(glowFrame);
}
glowFrame();


// ── Title-area particle field (index2-style curl noise + hot palette) ─
// A separate canvas bounded to the upper viewport. Curl noise drives the
// flow, hot palette (magenta/cyan/yellow) cycles, cursor warps the field
// when it's near the title region. `mix-blend-mode: screen` on the canvas
// + the title text lets the particles show through the letterforms.
const tCanvas = document.getElementById('title-particles');
const tCtx    = tCanvas.getContext('2d');
let tcW, tcH;

function resizeTitleParticles() {
  tcW = window.innerWidth;
  tcH = Math.floor(window.innerHeight * (
    window.innerWidth < 600 ? 0.32 : 0.38));
  tCanvas.width  = tcW * glowDpr;
  tCanvas.height = tcH * glowDpr;
  tCanvas.style.width  = tcW + 'px';
  tCanvas.style.height = tcH + 'px';
  tCtx.setTransform(glowDpr, 0, 0, glowDpr, 0, 0);
  tCtx.fillStyle = '#000';
  tCtx.fillRect(0, 0, tcW, tcH);
}
resizeTitleParticles();
window.addEventListener('resize', resizeTitleParticles);

const N_TPART = Math.min(window.innerWidth, window.innerHeight) < 600 ? 350 : 700;
const tParticles = [];
for (let i = 0; i < N_TPART; i++) {
  tParticles.push({
    x: Math.random() * tcW,
    y: Math.random() * tcH,
    vx: 0, vy: 0,
    hue: Math.random() * 360
  });
}

// Pseudo curl-noise — same shape as index2's
function tcurl(x, y, t) {
  const eps = 1.6;
  const n = (xx, yy) =>
      Math.sin(xx * 0.011 + t * 0.4)        * 0.40
    + Math.sin(yy * 0.017 + t * 0.3)        * 0.30
    + Math.sin((xx + yy) * 0.008 + t * 0.5) * 0.20
    + Math.sin((xx - yy) * 0.014 + t * 0.7) * 0.10;
  const dndy = n(x, y + eps) - n(x, y - eps);
  const dndx = n(x + eps, y) - n(x - eps, y);
  return [dndy, -dndx];
}

let tcFrame = 0;
function tickTitleParticles() {
  requestAnimationFrame(tickTitleParticles);
  tcFrame++;

  // Trail decay
  tCtx.globalCompositeOperation = 'source-over';
  tCtx.fillStyle = 'rgba(0,0,0,0.10)';
  tCtx.fillRect(0, 0, tcW, tcH);
  tCtx.globalCompositeOperation = 'lighter';

  const tn = tcFrame * 0.012;
  // Cursor counts as "active near title" when it's within ~tcH+120 of top
  const cursorNear = glowMouse.active && glowMouse.y < tcH + 120;
  const cMy = cursorNear ? Math.min(tcH + 40, glowMouse.y) : 0;

  for (const p of tParticles) {
    const [cx, cy] = tcurl(p.x, p.y, tn);
    let ax = cx * 1.4, ay = cy * 1.4;
    if (cursorNear) {
      const dx = glowMouse.x - p.x, dy = cMy - p.y;
      const d  = Math.max(40, Math.sqrt(dx*dx + dy*dy));
      const k  = (mSpeed > 5 ? 70 : 18) / d;
      ax += (dx / d) * k;
      ay += (dy / d) * k;
    }
    p.vx = (p.vx + ax) * 0.92;
    p.vy = (p.vy + ay) * 0.92;
    p.x += p.vx;
    p.y += p.vy;

    // Wrap to keep particles in-canvas
    if (p.x < 0) p.x += tcW;
    if (p.x > tcW) p.x -= tcW;
    if (p.y < 0) p.y += tcH;
    if (p.y > tcH) p.y -= tcH;

    p.hue = (p.hue + 0.6) % 360;
    const hd = (p.hue * 0.5 + 280) % 360;
    const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    const a = 0.16 + Math.min(0.55, speed * 0.06);
    tCtx.fillStyle = `hsla(${hd},92%,62%,${a})`;
    tCtx.fillRect(p.x, p.y, 1.4, 1.4);

    // Speed streak
    if (speed > 2.5) {
      tCtx.fillStyle = `hsla(${hd},92%,75%,${a * 0.5})`;
      tCtx.fillRect(p.x - p.vx * 0.3, p.y - p.vy * 0.3, 1.0, 1.0);
    }
  }
}
tickTitleParticles();


// ── Audio engine — index2 variant + 3D binaural granular ──────────────
//
//  • Drone bus       — FM-modulated sawtooth stack, LPF, centered (no spatial)
//  • Noise bed       — white noise × ring modulator, centered (no spatial)
//  • Grain bus       — each grain has its OWN PannerNode with an animated
//                      3D trajectory.  Listener at origin facing -Z; grains
//                      enter from one side, swoop past, exit the other.
//  • Crackle bus     — each crackle hits a PannerNode at a random fixed
//                      3D point (no motion — just placement variety).
//  • Mode toggle     — flips all PannerNode.panningModel between 'HRTF'
//                      (true binaural) and 'equalpower' (cheap stereo).
//                      New panners use whichever mode is current.
//
let actx, master;
let droneGain, modOsc, modGain;
let noiseGain, noiseRingOsc;
let granGain, crackleGain;
let grainBuf;
let started = false;
let currentMode = 'HRTF';
const activePanners = new Set();

// Cursor → audio modulation (cursor speed drives crackle + FM depth)
let mx = -1, my = -1, mLastX = -1, mLastY = -1, mSpeed = 0;
document.addEventListener('pointermove', e => {
  mx = e.clientX; my = e.clientY;
});

function startAudio() {
  if (started) return;
  started = true;
  actx = new (window.AudioContext || window.webkitAudioContext)();

  // Listener defaults: at origin, facing -Z, up +Y.  Good as-is.

  master = actx.createGain();
  master.gain.value = 0.18;
  master.connect(actx.destination);

  // ── Drone with FM ─────────────────────────────────────────────────
  droneGain = actx.createGain();
  droneGain.gain.value = 0.036;
  droneGain.connect(master);

  const fund = 50;
  modOsc = actx.createOscillator();
  modOsc.type = 'sine';
  modOsc.frequency.value = 0.7;
  modGain = actx.createGain();
  modGain.gain.value = 6;
  modOsc.connect(modGain);
  modOsc.start();

  for (const r of [1, 1.5, 2.04, 2.97]) {
    const o = actx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = fund * r;
    o.detune.value = (Math.random() - 0.5) * 18;
    modGain.connect(o.frequency);

    const lpf = actx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 1400;
    lpf.Q.value = 0.4;

    const g = actx.createGain();
    g.gain.value = 0.55 / (r * r);
    o.connect(lpf); lpf.connect(g); g.connect(droneGain);
    o.start();
  }

  // ── Noise bed × ring mod ──────────────────────────────────────────
  noiseGain = actx.createGain();
  noiseGain.gain.value = 0.013;
  noiseGain.connect(master);

  const nb = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const ns = actx.createBufferSource();
  ns.buffer = nb;
  ns.loop = true;

  const ringG = actx.createGain();
  ringG.gain.value = 0;
  noiseRingOsc = actx.createOscillator();
  noiseRingOsc.type = 'sine';
  noiseRingOsc.frequency.value = 220;
  noiseRingOsc.connect(ringG.gain);
  noiseRingOsc.start();

  ns.connect(ringG); ringG.connect(noiseGain);
  ns.start();

  // ── Granular bus ──────────────────────────────────────────────────
  granGain = actx.createGain();
  granGain.gain.value = 0.13;
  granGain.connect(master);

  // 5s of textured noise — used as the granular source material
  grainBuf = actx.createBuffer(2, actx.sampleRate * 5, actx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = grainBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.7;
      // Scattered impulses for texture
      if (Math.random() < 0.005) d[i] = (Math.random() < 0.5 ? 1 : -1);
    }
  }

  // ── Crackle bus ───────────────────────────────────────────────────
  crackleGain = actx.createGain();
  crackleGain.gain.value = 0.035;
  crackleGain.connect(master);

  scheduleGrain();
  scheduleCrackle();
  modulateLoop();
}

// Spawn a grain. Every grain carries its own PannerNode whose position
// animates linearly from a start point to an end point over the grain's
// lifespan. Trajectories bias toward "pass close to the head" — start
// far on one side along ±X, end far on the opposite side, with random
// Y and Z so some pass overhead, behind, in front.
function scheduleGrain() {
  if (!actx) return;
  const wait = 55 + Math.random() * 130;
  setTimeout(() => {
    if (!actx) return;
    spawnGrain();
    scheduleGrain();
  }, wait);
}

function spawnGrain() {
  const dur = 0.20 + Math.random() * 0.55;   // longer than index2 so motion reads
  const t0 = actx.currentTime + 0.01;

  const src = actx.createBufferSource();
  src.buffer = grainBuf;
  src.playbackRate.value = 0.45 + Math.random() * 1.55;
  src.detune.value = (Math.random() - 0.5) * 220;
  const sampleStart = Math.random() * (grainBuf.duration - dur - 0.01);

  const lpf = actx.createBiquadFilter();
  lpf.type = Math.random() < 0.55 ? 'bandpass' : 'highpass';
  lpf.frequency.value = 500 + Math.random() * 4200;
  lpf.Q.value = 0.6 + Math.random() * 4;

  const env = actx.createGain();
  env.gain.setValueAtTime(0, t0);
  env.gain.linearRampToValueAtTime(0.55 + Math.random() * 0.35, t0 + dur * 0.22);
  env.gain.linearRampToValueAtTime(0, t0 + dur);

  // ── 3D trajectory ───────────────────────────────────────────────
  // Random "type" — most grains pass by head on ±X; some drift around;
  // some recede into distance. Distance is in metres (Web Audio default
  // refDistance 1m).
  const panner = actx.createPanner();
  panner.panningModel  = currentMode;       // HRTF or equalpower
  panner.distanceModel = 'inverse';
  panner.refDistance   = 0.8;
  panner.maxDistance   = 22;
  panner.rolloffFactor = 1.4;

  const trajRoll = Math.random();
  let sx, sy, sz, ex, ey, ez;
  if (trajRoll < 0.70) {
    // Pass-by — start far on one side, end far on opposite side
    const side = Math.random() < 0.5 ? -1 : 1;
    const startR = 5 + Math.random() * 8;
    const endR   = 5 + Math.random() * 8;
    const startAngle = (Math.random() - 0.5) * 0.55;
    sx = side * startR * Math.cos(startAngle);
    sz = -1.5 + startR * Math.sin(startAngle);
    sy = (Math.random() - 0.5) * 2.2;
    ex = -side * endR * Math.cos(startAngle);
    ez = -1.5 + endR * Math.sin(startAngle) * 0.6;
    ey = sy + (Math.random() - 0.5) * 1.6;
  } else if (trajRoll < 0.90) {
    // Drift-around — small arc near the head
    const aStart = Math.random() * Math.PI * 2;
    const aEnd   = aStart + (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random() * 1.4);
    const r      = 1.2 + Math.random() * 2.2;
    sx = Math.cos(aStart) * r;
    sz = Math.sin(aStart) * r;
    sy = (Math.random() - 0.5) * 1.5;
    ex = Math.cos(aEnd) * r * 1.2;
    ez = Math.sin(aEnd) * r * 1.2;
    ey = sy + (Math.random() - 0.5) * 0.8;
  } else {
    // Fade-into-distance — start near, recede backward
    const angle = (Math.random() - 0.5) * Math.PI;
    sx = Math.cos(angle) * 1.2;
    sz = Math.sin(angle) * 1.2 - 0.5;
    sy = (Math.random() - 0.5) * 1.0;
    ex = sx * 6;
    ez = sz * 6 - 4;
    ey = sy * 1.4;
  }

  panner.positionX.setValueAtTime(sx, t0);
  panner.positionY.setValueAtTime(sy, t0);
  panner.positionZ.setValueAtTime(sz, t0);
  panner.positionX.linearRampToValueAtTime(ex, t0 + dur);
  panner.positionY.linearRampToValueAtTime(ey, t0 + dur);
  panner.positionZ.linearRampToValueAtTime(ez, t0 + dur);

  activePanners.add(panner);
  setTimeout(() => activePanners.delete(panner), (dur + 0.2) * 1000);

  src.connect(lpf);
  lpf.connect(env);
  env.connect(panner);
  panner.connect(granGain);
  src.start(t0, sampleStart, dur);
  src.stop(t0 + dur + 0.05);
}

function scheduleCrackle() {
  if (!actx) return;
  setTimeout(() => {
    if (!actx) return;
    spawnCrackle();
    scheduleCrackle();
  }, 30 + Math.random() * 110);
}

function spawnCrackle() {
  const t0 = actx.currentTime + 0.01;
  const dur = 0.005 + Math.random() * 0.025;

  const src = actx.createBufferSource();
  src.buffer = grainBuf;
  src.playbackRate.value = 1 + Math.random() * 0.5;

  const hpf = actx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 2200;

  const env = actx.createGain();
  env.gain.setValueAtTime(0, t0);
  env.gain.linearRampToValueAtTime(0.55, t0 + dur * 0.2);
  env.gain.linearRampToValueAtTime(0, t0 + dur);

  // Static 3D placement — each crackle just appears somewhere
  const panner = actx.createPanner();
  panner.panningModel  = currentMode;
  panner.distanceModel = 'inverse';
  panner.refDistance   = 0.8;
  panner.maxDistance   = 18;
  panner.rolloffFactor = 1.2;
  const angle = Math.random() * Math.PI * 2;
  const r     = 0.8 + Math.random() * 3;
  panner.positionX.value = Math.cos(angle) * r;
  panner.positionY.value = (Math.random() - 0.5) * 2.5;
  panner.positionZ.value = Math.sin(angle) * r - 0.5;

  activePanners.add(panner);
  setTimeout(() => activePanners.delete(panner), (dur + 0.2) * 1000);

  src.connect(hpf); hpf.connect(env); env.connect(panner); panner.connect(crackleGain);
  src.start(t0, Math.random() * grainBuf.duration * 0.9, dur);
  src.stop(t0 + dur + 0.05);
}

// Slow modulation loop — cursor speed drives crackle + FM depth
function modulateLoop() {
  if (!actx) return;
  setInterval(() => {
    if (!actx) return;
    if (mLastX >= 0) {
      const dx = mx - mLastX, dy = my - mLastY;
      mSpeed = mSpeed * 0.86 + Math.min(160, Math.sqrt(dx*dx + dy*dy)) * 0.14;
    }
    mLastX = mx; mLastY = my;
    const sNorm = Math.min(1, mSpeed / 100);
    crackleGain.gain.linearRampToValueAtTime(
      0.025 + sNorm * 0.08, actx.currentTime + 0.2);
    modGain.gain.linearRampToValueAtTime(
      4 + sNorm * 16, actx.currentTime + 0.2);
    noiseRingOsc.frequency.linearRampToValueAtTime(
      180 + sNorm * 700, actx.currentTime + 0.2);

    // ── Per-link proximity tones ──────────────────────────────────────
    // Each link gets a beating-quartet sine that rises in gain by the
    // same `prox` value the glow uses, so audio responds at the same
    // distance the visual glow does — not just on direct hover.
    for (const L of linkEntries) {
      if (L.prox > 0.04) {
        if (!L.audioNodes) createLinkAudio(L);
        const target = Math.min(1, L.prox * 1.05) * 0.040;
        L.audioGain.gain.linearRampToValueAtTime(target, actx.currentTime + 0.12);
      } else if (L.audioNodes) {
        L.audioGain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.20);
      }
    }
  }, 90);
}

// Lazily build the per-link audio nodes the first time it's audible.
// Beating quartet — slight detune produces shimmer/chorus.
function createLinkAudio(L) {
  const i = parseInt(L.el.dataset.i, 10) || 0;
  L.audioGain = actx.createGain();
  L.audioGain.gain.value = 0;
  L.audioGain.connect(master);
  L.audioOscs = [];
  const f = 220 + (i * 47) % 220;
  for (const df of [-2.5, 2.5, -4.4, 4.4]) {
    const o = actx.createOscillator();
    o.type = 'sine';
    o.frequency.value = f + df;
    o.connect(L.audioGain);
    o.start();
    L.audioOscs.push(o);
  }
  L.audioNodes = true;
}

// Click fires extra grain transients before navigation.
function triggerClickGrain() {
  if (!actx) return;
  // Fire two extra grains on click for a richer transient
  spawnGrain();
  spawnGrain();
}

// ── Mode toggle ────────────────────────────────────────────────────────
const btnStereo   = document.getElementById('btn-stereo');
const btnBinaural = document.getElementById('btn-binaural');
function setMode(mode) {
  currentMode = mode;
  for (const p of activePanners) p.panningModel = currentMode;
  btnStereo.classList.toggle('active',   mode === 'equalpower');
  btnBinaural.classList.toggle('active', mode === 'HRTF');
}
btnStereo.addEventListener('click',   () => setMode('equalpower'));
btnBinaural.addEventListener('click', () => setMode('HRTF'));


// ── First-gesture audio start ─────────────────────────────────────────
const audioHint = document.getElementById('audio-hint');
function tryStart() {
  startAudio();
  if (audioHint) audioHint.classList.add('faded');
  document.removeEventListener('pointerdown', tryStart);
  document.removeEventListener('pointermove', tryStart);
  document.removeEventListener('touchstart', tryStart);
}
document.addEventListener('pointerdown', tryStart);
document.addEventListener('pointermove', tryStart);
document.addEventListener('touchstart', tryStart, { passive: true });


// ── Bootstrap ─────────────────────────────────────────────────────────
loadLinks();
</script>
