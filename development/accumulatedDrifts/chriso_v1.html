<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChrisO.org</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1c18; }
canvas { display: block; width: 100%; height: 100%; }
#ui {
  position: fixed; bottom: 20px; left: 20px;
  font-family: 'Courier New', monospace; font-size: 11px;
  color: rgba(180, 165, 135, 0.4); letter-spacing: 0.5px;
  pointer-events: none; z-index: 10;
  line-height: 1.6;
}
#preset-label {
  position: fixed; top: 20px; right: 20px;
  font-family: 'Courier New', monospace; font-size: 13px;
  color: rgba(180, 165, 135, 0.0); letter-spacing: 1px;
  pointer-events: none; z-index: 10;
  transition: color 0.5s ease;
}
#preset-label.visible { color: rgba(180, 165, 135, 0.5); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <span id="space-name"></span><br>
  <span id="coords"></span>
</div>
<div id="preset-label"></div>

<script type="x-shader/x-vertex" id="vs">
precision highp float;
attribute vec2 position;
varying vec2 vUv;
void main() {
  vUv = position * 0.5 + 0.5;
  gl_Position = vec4(position, 0.0, 1.0);
}
</script>

<script type="x-shader/x-fragment" id="fs">
precision highp float;

varying vec2 vUv;

uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uMouse;        // normalized mouse position
uniform float uMouseSpeed;  // mouse velocity magnitude

// Interpolation Space parameters (all 0-1 range, lerped between presets)
uniform float uWarmth;       // gold vs blue dominance
uniform float uDensity;      // atmospheric thickness
uniform float uDepth;        // z-depth / parallax intensity
uniform float uDecay;        // weathering / age
uniform float uDrift;        // object/element movement speed
uniform float uLightPool;    // light pool intensity
uniform float uArchGhost;    // architectural ghost visibility
uniform float uGrain;        // texture grain amount
uniform float uFogHeight;    // where fog transition occurs
uniform float uShadowAngle;  // shadow band rotation

// ---- NOISE FUNCTIONS ----

// Hash
vec2 hash22(vec2 p) {
  p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
  return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
}

float hash21(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

// Gradient noise
float gnoise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(dot(hash22(i+vec2(0,0)), f-vec2(0,0)),
                 dot(hash22(i+vec2(1,0)), f-vec2(1,0)), u.x),
             mix(dot(hash22(i+vec2(0,1)), f-vec2(0,1)),
                 dot(hash22(i+vec2(1,1)), f-vec2(1,1)), u.x), u.y);
}

// FBM
float fbm(vec2 p, int octaves) {
  float val = 0.0;
  float amp = 0.5;
  float freq = 1.0;
  for(int i = 0; i < 6; i++) {
    if(i >= octaves) break;
    val += amp * gnoise(p * freq);
    freq *= 2.0;
    amp *= 0.5;
  }
  return val;
}

// Domain-warped FBM for organic feel
float warpedFbm(vec2 p, float warpAmt) {
  vec2 q = vec2(fbm(p, 4), fbm(p + vec2(5.2, 1.3), 4));
  vec2 r = vec2(fbm(p + warpAmt * q + vec2(1.7, 9.2), 4),
                fbm(p + warpAmt * q + vec2(8.3, 2.8), 4));
  return fbm(p + warpAmt * r, 5);
}

// ---- ATMOSPHERE ----

vec3 atmosphere(vec2 uv, vec2 mouse) {
  // Mouse-driven camera drift
  vec2 drift = (mouse - 0.5) * 0.15 * uDepth;
  vec2 p = uv + drift;
  
  float t = p.y; // vertical position
  float time = uTime * 0.02 * uDrift;
  
  // Warped noise fields
  float n1 = warpedFbm(p * 2.0 + time * 0.3, 0.8 + uDensity * 0.4);
  float n2 = warpedFbm(p * 3.0 - time * 0.2 + vec2(10.0), 0.6);
  float n3 = fbm(p * 1.5 + time * 0.1, 5);
  
  // Color zones with warmth control
  vec3 warmGold = vec3(0.78, 0.66, 0.42) + n1 * 0.08;
  vec3 fogBlue = vec3(0.50, 0.56, 0.62) + n2 * 0.06;
  vec3 ruinedGreen = vec3(0.38, 0.46, 0.34) + n1 * 0.05;
  vec3 deepShadow = vec3(0.16, 0.14, 0.12);
  vec3 warmCream = vec3(0.85, 0.78, 0.66);
  
  // Vertical gradient with noise-driven transitions
  float fogLine = uFogHeight + n3 * 0.08;
  
  vec3 col;
  if(t < fogLine * 0.5) {
    // Upper: warm gold haze
    float blend = t / (fogLine * 0.5);
    col = mix(warmGold * (0.9 + uWarmth * 0.2), 
              mix(warmGold, fogBlue, 0.3), blend);
    col += warmCream * n1 * 0.1 * (1.0 - blend);
  } else if(t < fogLine) {
    // Middle: fog transition
    float blend = (t - fogLine * 0.5) / (fogLine * 0.5);
    vec3 midColor = mix(fogBlue, ruinedGreen, n2 * 0.4);
    col = mix(mix(warmGold, fogBlue, 0.4), midColor, blend);
  } else {
    // Lower: deepening shadow
    float blend = (t - fogLine) / (1.0 - fogLine);
    blend = pow(blend, 0.8);
    vec3 groundColor = mix(fogBlue * 0.7, deepShadow, blend * 0.7);
    groundColor = mix(groundColor, ruinedGreen * 0.5, n1 * 0.15 * (1.0 - blend));
    col = groundColor;
  }
  
  // Warmth modulation
  col = mix(col, col * vec3(1.1, 0.95, 0.8), uWarmth * 0.3);
  
  return col;
}

// ---- SPECTRAL ARCHITECTURE ----

float building(vec2 uv, float bx, float bw, float by, float bh, float lean) {
  vec2 p = uv;
  p.x -= lean * (p.y - by) * 0.02;
  
  float mask = step(bx, p.x) * step(p.x, bx + bw) *
               step(by, p.y) * step(p.y, by + bh);
  return mask;
}

float architectureLayer(vec2 uv, float time) {
  float acc = 0.0;
  
  // Multiple buildings at various positions
  acc += building(uv, 0.05, 0.08, 0.08, 0.50, -1.0) * 0.4;
  acc += building(uv, 0.18, 0.10, 0.06, 0.55, 0.5) * 0.35;
  acc += building(uv, 0.35, 0.07, 0.12, 0.42, 0.0) * 0.3;
  acc += building(uv, 0.48, 0.09, 0.09, 0.52, -0.5) * 0.35;
  acc += building(uv, 0.62, 0.06, 0.11, 0.40, 0.8) * 0.25;
  acc += building(uv, 0.72, 0.11, 0.07, 0.54, -0.3) * 0.38;
  acc += building(uv, 0.87, 0.08, 0.10, 0.48, 1.0) * 0.3;
  
  // Window grid overlay
  float wx = fract(uv.x * 40.0);
  float wy = fract(uv.y * 60.0);
  float windowGrid = step(0.2, wx) * step(wx, 0.7) * step(0.15, wy) * step(wy, 0.75);
  float windowNoise = step(0.7, hash21(floor(uv * vec2(40.0, 60.0))));
  float litWindow = windowGrid * windowNoise * 0.15;
  
  return acc * uArchGhost + litWindow * acc * uArchGhost * 0.5;
}

// ---- LIGHT POOLS ----

float lightPool(vec2 uv, vec2 center, vec2 size) {
  vec2 d = (uv - center) / size;
  return exp(-dot(d, d) * 2.0);
}

float lightPools(vec2 uv, vec2 mouse) {
  float acc = 0.0;
  
  // Fixed pools
  acc += lightPool(uv, vec2(0.25, 0.48), vec2(0.18, 0.12)) * 0.6;
  acc += lightPool(uv, vec2(0.65, 0.58), vec2(0.15, 0.10)) * 0.5;
  acc += lightPool(uv, vec2(0.15, 0.75), vec2(0.12, 0.08)) * 0.4;
  acc += lightPool(uv, vec2(0.80, 0.35), vec2(0.10, 0.14)) * 0.35;
  acc += lightPool(uv, vec2(0.45, 0.85), vec2(0.20, 0.08)) * 0.3;
  
  // Mouse-following pool (subtle)
  acc += lightPool(uv, mouse, vec2(0.12, 0.10)) * 0.25;
  
  return acc * uLightPool;
}

// ---- SHADOW BANDS ----

float shadowBands(vec2 uv) {
  float angle = uShadowAngle * 3.14159;
  vec2 dir = vec2(cos(angle), sin(angle));
  float proj = dot(uv, dir);
  
  float bands = 0.0;
  bands += smoothstep(0.0, 0.02, abs(proj - 0.2)) * 
           (1.0 - smoothstep(0.0, 0.02, abs(proj - 0.28)));
  bands += smoothstep(0.0, 0.02, abs(proj - 0.5)) * 
           (1.0 - smoothstep(0.0, 0.02, abs(proj - 0.55)));
  bands += smoothstep(0.0, 0.02, abs(proj - 0.78)) * 
           (1.0 - smoothstep(0.0, 0.02, abs(proj - 0.84)));
  
  return bands * 0.12 * uDensity;
}

// ---- GRAIN ----

float filmGrain(vec2 uv, float time) {
  return (hash21(uv * 500.0 + time * 100.0) - 0.5) * 2.0;
}

// ---- VIGNETTE ----

float vignette(vec2 uv) {
  vec2 d = uv - 0.5;
  return 1.0 - dot(d, d) * 1.2;
}

// ---- MAIN ----

void main() {
  vec2 uv = vUv;
  float aspect = uResolution.x / uResolution.y;
  
  vec2 mouse = uMouse;
  float time = uTime;
  
  // Base atmosphere
  vec3 col = atmosphere(uv, mouse);
  
  // Spectral architecture (additive, ghostly)
  float arch = architectureLayer(uv + (mouse - 0.5) * 0.05 * uDepth, time);
  col = mix(col, col + vec3(0.04, 0.035, 0.025), arch);
  
  // Light pools (warm additive)
  float lp = lightPools(uv, mouse);
  vec3 lightColor = vec3(0.85, 0.75, 0.55) * lp;
  col += lightColor * 0.15;
  
  // Shadow bands
  float sb = shadowBands(uv + (mouse - 0.5) * 0.02);
  col *= (1.0 - sb);
  
  // Decay / weathering desaturation
  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  col = mix(col, vec3(lum), uDecay * 0.35);
  
  // Color unification pull toward warm center
  col = mix(col, vec3(0.55, 0.48, 0.38), 0.06);
  
  // Film grain
  float g = filmGrain(uv, time) * uGrain * 0.04;
  col += g;
  
  // Vignette
  col *= vignette(uv) * 0.85 + 0.15;
  
  // Edge dissolution (top and bottom haze)
  float topHaze = smoothstep(0.15, 0.0, uv.y);
  col = mix(col, vec3(0.75, 0.65, 0.48) * 0.6, topHaze * 0.4);
  
  float botHaze = smoothstep(0.85, 1.0, uv.y);
  col = mix(col, vec3(0.12, 0.11, 0.09), botHaze * 0.5);
  
  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
// ============================================================
// INTERPOLATION SPACES — parameter vectors for exploration
// ============================================================

const SPACES = {
  // Each space is a named point in parameter space
  // Parameters: warmth, density, depth, decay, drift, lightPool, archGhost, grain, fogHeight, shadowAngle
  
  'accumulated_drift': {
    name: 'Accumulated Drift',
    params: {
      warmth: 0.55, density: 0.6, depth: 0.5, decay: 0.4,
      drift: 0.4, lightPool: 0.6, archGhost: 0.35, grain: 0.5,
      fogHeight: 0.45, shadowAngle: 0.12
    }
  },
  
  'deep_gold': {
    name: 'Deep Gold',
    params: {
      warmth: 0.9, density: 0.7, depth: 0.6, decay: 0.2,
      drift: 0.3, lightPool: 0.8, archGhost: 0.2, grain: 0.4,
      fogHeight: 0.55, shadowAngle: 0.08
    }
  },
  
  'fog_memory': {
    name: 'Fog Memory',
    params: {
      warmth: 0.2, density: 0.85, depth: 0.3, decay: 0.6,
      drift: 0.2, lightPool: 0.3, archGhost: 0.5, grain: 0.7,
      fogHeight: 0.35, shadowAngle: 0.18
    }
  },
  
  'spectral_city': {
    name: 'Spectral City',
    params: {
      warmth: 0.35, density: 0.5, depth: 0.8, decay: 0.3,
      drift: 0.5, lightPool: 0.4, archGhost: 0.75, grain: 0.3,
      fogHeight: 0.5, shadowAngle: 0.25
    }
  },
  
  'warm_entropy': {
    name: 'Warm Entropy',
    params: {
      warmth: 0.7, density: 0.4, depth: 0.4, decay: 0.8,
      drift: 0.6, lightPool: 0.5, archGhost: 0.15, grain: 0.8,
      fogHeight: 0.4, shadowAngle: 0.05
    }
  },
  
  'the_stillness': {
    name: 'The Stillness',
    params: {
      warmth: 0.45, density: 0.3, depth: 0.2, decay: 0.5,
      drift: 0.05, lightPool: 0.7, archGhost: 0.1, grain: 0.2,
      fogHeight: 0.5, shadowAngle: 0.15
    }
  },
  
  'ruined_green': {
    name: 'Ruined Green',
    params: {
      warmth: 0.15, density: 0.65, depth: 0.45, decay: 0.55,
      drift: 0.35, lightPool: 0.35, archGhost: 0.4, grain: 0.6,
      fogHeight: 0.38, shadowAngle: 0.22
    }
  }
};

const SPACE_KEYS = Object.keys(SPACES);

// ============================================================
// WEBGL SETUP
// ============================================================

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false });

if (!gl) {
  document.body.innerHTML = '<p style="color:#b4a587;font-family:monospace;padding:40px">WebGL not available</p>';
  throw new Error('No WebGL');
}

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = compileShader(document.getElementById('vs').textContent, gl.VERTEX_SHADER);
const fs = compileShader(document.getElementById('fs').textContent, gl.FRAGMENT_SHADER);

const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);

if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(program));
}

gl.useProgram(program);

// Fullscreen quad
const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

const posLoc = gl.getAttribLocation(program, 'position');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uniforms = {};
const uNames = [
  'uTime', 'uResolution', 'uMouse', 'uMouseSpeed',
  'uWarmth', 'uDensity', 'uDepth', 'uDecay', 'uDrift',
  'uLightPool', 'uArchGhost', 'uGrain', 'uFogHeight', 'uShadowAngle'
];
for (const name of uNames) {
  uniforms[name] = gl.getUniformLocation(program, name);
}

// ============================================================
// STATE — current interpolated parameters
// ============================================================

const state = {
  warmth: 0.55, density: 0.6, depth: 0.5, decay: 0.4,
  drift: 0.4, lightPool: 0.6, archGhost: 0.35, grain: 0.5,
  fogHeight: 0.45, shadowAngle: 0.12
};

const target = { ...state };

// Mouse state
let mouseX = 0.5, mouseY = 0.5;
let targetMouseX = 0.5, targetMouseY = 0.5;
let mouseSpeed = 0;
let prevMX = 0.5, prevMY = 0.5;

// Current space tracking
let currentSpaceIndex = 0;
let presetLabelTimeout = null;

// ============================================================
// INTERPOLATION ENGINE
// ============================================================

const LERP_SPEED = 0.025; // How fast we interpolate between spaces
const MOUSE_LERP = 0.04;  // Mouse smoothing

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function lerpState() {
  const keys = Object.keys(state);
  for (const key of keys) {
    state[key] = lerp(state[key], target[key], LERP_SPEED);
  }
  
  // Smooth mouse
  mouseX = lerp(mouseX, targetMouseX, MOUSE_LERP);
  mouseY = lerp(mouseY, targetMouseY, MOUSE_LERP);
  
  // Mouse speed (smoothed)
  const dx = mouseX - prevMX;
  const dy = mouseY - prevMY;
  mouseSpeed = lerp(mouseSpeed, Math.sqrt(dx*dx + dy*dy) * 100, 0.1);
  prevMX = mouseX;
  prevMY = mouseY;
}

function setSpace(spaceKey) {
  const space = SPACES[spaceKey];
  if (!space) return;
  
  Object.assign(target, space.params);
  
  // Show label
  showPresetLabel(space.name);
  updateSpaceUI(space.name);
}

function showPresetLabel(name) {
  const el = document.getElementById('preset-label');
  el.textContent = name;
  el.classList.add('visible');
  
  clearTimeout(presetLabelTimeout);
  presetLabelTimeout = setTimeout(() => {
    el.classList.remove('visible');
  }, 2500);
}

function updateSpaceUI(name) {
  document.getElementById('space-name').textContent = name;
}

// ============================================================
// INPUT HANDLING
// ============================================================

canvas.addEventListener('mousemove', (e) => {
  targetMouseX = e.clientX / window.innerWidth;
  targetMouseY = e.clientY / window.innerHeight;
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  targetMouseX = t.clientX / window.innerWidth;
  targetMouseY = t.clientY / window.innerHeight;
}, { passive: false });

document.addEventListener('keydown', (e) => {
  const num = parseInt(e.key);
  if (num >= 1 && num <= SPACE_KEYS.length) {
    currentSpaceIndex = num - 1;
    setSpace(SPACE_KEYS[currentSpaceIndex]);
    return;
  }
  
  // Arrow keys: nudge parameters continuously
  if (e.key === 'ArrowRight') {
    currentSpaceIndex = (currentSpaceIndex + 1) % SPACE_KEYS.length;
    setSpace(SPACE_KEYS[currentSpaceIndex]);
  } else if (e.key === 'ArrowLeft') {
    currentSpaceIndex = (currentSpaceIndex - 1 + SPACE_KEYS.length) % SPACE_KEYS.length;
    setSpace(SPACE_KEYS[currentSpaceIndex]);
  }
  
  // Space bar: return to home (accumulated drift)
  if (e.key === ' ') {
    e.preventDefault();
    currentSpaceIndex = 0;
    setSpace('accumulated_drift');
  }
});

// Mouse wheel: blend toward next/prev space
let wheelAccum = 0;
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  wheelAccum += e.deltaY * 0.001;
  
  if (Math.abs(wheelAccum) > 0.3) {
    if (wheelAccum > 0) {
      currentSpaceIndex = (currentSpaceIndex + 1) % SPACE_KEYS.length;
    } else {
      currentSpaceIndex = (currentSpaceIndex - 1 + SPACE_KEYS.length) % SPACE_KEYS.length;
    }
    setSpace(SPACE_KEYS[currentSpaceIndex]);
    wheelAccum = 0;
  }
}, { passive: false });

// ============================================================
// RESIZE
// ============================================================

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', resize);
resize();

// ============================================================
// RENDER LOOP
// ============================================================

let startTime = performance.now();

function render() {
  const time = (performance.now() - startTime) * 0.001;
  
  lerpState();
  
  gl.uniform1f(uniforms.uTime, time);
  gl.uniform2f(uniforms.uResolution, canvas.width, canvas.height);
  gl.uniform2f(uniforms.uMouse, mouseX, mouseY);
  gl.uniform1f(uniforms.uMouseSpeed, mouseSpeed);
  
  gl.uniform1f(uniforms.uWarmth, state.warmth);
  gl.uniform1f(uniforms.uDensity, state.density);
  gl.uniform1f(uniforms.uDepth, state.depth);
  gl.uniform1f(uniforms.uDecay, state.decay);
  gl.uniform1f(uniforms.uDrift, state.drift);
  gl.uniform1f(uniforms.uLightPool, state.lightPool);
  gl.uniform1f(uniforms.uArchGhost, state.archGhost);
  gl.uniform1f(uniforms.uGrain, state.grain);
  gl.uniform1f(uniforms.uFogHeight, state.fogHeight);
  gl.uniform1f(uniforms.uShadowAngle, state.shadowAngle);
  
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  
  // Update coordinate display
  document.getElementById('coords').textContent = 
    `${mouseX.toFixed(2)}, ${mouseY.toFixed(2)}`;
  
  requestAnimationFrame(render);
}

// Initialize with first space
setSpace('accumulated_drift');
render();

console.log('%c ChrisO.org — Accumulated Drift ', 
  'background:#2a2520;color:#b4a587;padding:8px;font-family:monospace');
console.log('Interpolation Spaces:');
SPACE_KEYS.forEach((k, i) => {
  console.log(`  [${i+1}] ${SPACES[k].name}`);
});
console.log('  [←/→] Cycle spaces');
console.log('  [Space] Return to Accumulated Drift');
console.log('  [Scroll] Navigate between spaces');
console.log('  [Mouse] Explore atmosphere');
</script>
</body>
</html>
