<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChrisO.org</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { 
  width: 100%; height: 100%; overflow: hidden; 
  background: #1e1c18; 
  cursor: crosshair;
}
canvas#bg { 
  display: block; width: 100%; height: 100%; 
  position: fixed; top: 0; left: 0; z-index: 0;
}
canvas#particles {
  display: block; width: 100%; height: 100%;
  position: fixed; top: 0; left: 0; z-index: 1;
  pointer-events: none;
}

/* UI Layer */
#ui-layer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 10; pointer-events: none;
}

#site-name {
  position: fixed; bottom: 28px; right: 28px;
  font-family: 'Crimson Pro', serif; font-weight: 300; font-style: italic;
  font-size: 15px; letter-spacing: 2px;
  color: rgba(180, 165, 135, 0.25);
  pointer-events: none;
}

#space-label {
  position: fixed; top: 24px; left: 28px;
  font-family: 'DM Mono', monospace; font-weight: 300;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(180, 165, 135, 0.0);
  pointer-events: none;
  transition: color 0.8s ease;
}
#space-label.visible { color: rgba(180, 165, 135, 0.45); }

#coords {
  position: fixed; bottom: 28px; left: 28px;
  font-family: 'DM Mono', monospace; font-weight: 300;
  font-size: 10px; letter-spacing: 0.8px;
  color: rgba(180, 165, 135, 0.18);
  pointer-events: none;
}

#nav-hint {
  position: fixed; top: 24px; right: 28px;
  font-family: 'DM Mono', monospace; font-weight: 300;
  font-size: 10px; letter-spacing: 0.5px;
  color: rgba(180, 165, 135, 0.0);
  pointer-events: none;
  transition: color 2s ease;
  text-align: right;
  line-height: 1.8;
}
#nav-hint.visible { color: rgba(180, 165, 135, 0.22); }

#space-index {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Crimson Pro', serif; font-weight: 300; font-style: italic;
  font-size: 42px; letter-spacing: 4px;
  color: rgba(180, 165, 135, 0.0);
  pointer-events: none;
  transition: color 0.3s ease;
}
#space-index.flash { color: rgba(180, 165, 135, 0.12); }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="particles"></canvas>

<div id="ui-layer">
  <div id="space-label"></div>
  <div id="nav-hint">
    [1-7] spaces · [←→] cycle · [scroll] drift<br>
    [space] home · [mouse] explore

<!-- ================================ -->
<!-- ATMOSPHERIC SHADER               -->
<!-- ================================ -->

<script type="x-shader/x-vertex" id="vs">
precision highp float;
attribute vec2 position;
varying vec2 vUv;
void main() {
  vUv = position * 0.5 + 0.5;
  gl_Position = vec4(position, 0.0, 1.0);
}
</script>

<script type="x-shader/x-fragment" id="fs">
precision highp float;

varying vec2 vUv;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uMouse;
uniform float uMouseSpeed;

// Interpolation Space parameters
uniform float uWarmth;
uniform float uDensity;
uniform float uDepth;
uniform float uDecay;
uniform float uDrift;
uniform float uLightPool;
uniform float uArchGhost;
uniform float uGrain;
uniform float uFogHeight;
uniform float uShadowAngle;

// ---- NOISE ----
vec2 hash22(vec2 p) {
  p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
  return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
}

float hash21(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float gnoise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(dot(hash22(i), f),
                 dot(hash22(i+vec2(1,0)), f-vec2(1,0)), u.x),
             mix(dot(hash22(i+vec2(0,1)), f-vec2(0,1)),
                 dot(hash22(i+vec2(1,1)), f-vec2(1,1)), u.x), u.y);
}

float fbm(vec2 p, int oct) {
  float v = 0.0, a = 0.5, f = 1.0;
  for(int i = 0; i < 8; i++) {
    if(i >= oct) break;
    v += a * gnoise(p * f);
    f *= 2.0; a *= 0.5;
  }
  return v;
}

float wfbm(vec2 p, float w) {
  vec2 q = vec2(fbm(p, 4), fbm(p + vec2(5.2,1.3), 4));
  vec2 r = vec2(fbm(p + w*q + vec2(1.7,9.2), 4),
                fbm(p + w*q + vec2(8.3,2.8), 4));
  return fbm(p + w*r, 6);
}

// ---- ATMOSPHERE ----
vec3 atmosphere(vec2 uv, vec2 mouse) {
  vec2 drift = (mouse - 0.5) * 0.12 * uDepth;
  vec2 p = uv + drift;
  float t = p.y;
  float time = uTime * 0.015 * (0.2 + uDrift);
  
  float n1 = wfbm(p * 2.5 + time * 0.25, 0.7 + uDensity * 0.5);
  float n2 = wfbm(p * 3.5 - time * 0.15 + 10.0, 0.5);
  float n3 = fbm(p * 1.8 + time * 0.08, 6);
  float n4 = fbm(p * 5.0 + time * 0.05, 3); // fine detail
  
  vec3 warmGold  = vec3(0.78, 0.66, 0.42);
  vec3 fogBlue   = vec3(0.50, 0.56, 0.62);
  vec3 ruinGreen = vec3(0.38, 0.46, 0.34);
  vec3 deepShad  = vec3(0.15, 0.13, 0.11);
  vec3 warmCream = vec3(0.86, 0.78, 0.65);
  vec3 duskRose  = vec3(0.55, 0.42, 0.45);
  
  float fogLine = uFogHeight + n3 * 0.06;
  
  vec3 col;
  if(t < fogLine * 0.4) {
    float b = t / (fogLine * 0.4);
    col = mix(warmGold * (0.85 + uWarmth * 0.25) + warmCream * n1 * 0.12,
              mix(warmGold, fogBlue, 0.25 + n2 * 0.1), b);
  } else if(t < fogLine * 0.7) {
    float b = (t - fogLine * 0.4) / (fogLine * 0.3);
    vec3 mid = mix(fogBlue, ruinGreen, n2 * 0.35);
    mid += duskRose * n4 * 0.08;
    col = mix(mix(warmGold * 0.85, fogBlue, 0.35), mid, b);
  } else if(t < fogLine) {
    float b = (t - fogLine * 0.7) / (fogLine * 0.3);
    col = mix(mix(fogBlue, ruinGreen, 0.3), fogBlue * 0.75, b);
    col += duskRose * (1.0 - b) * n1 * 0.06;
  } else {
    float b = (t - fogLine) / (1.0 - fogLine);
    b = pow(b, 0.75);
    vec3 ground = mix(fogBlue * 0.65, deepShad, b * 0.65);
    ground = mix(ground, ruinGreen * 0.4, n1 * 0.12 * (1.0-b));
    ground += warmGold * 0.03 * (1.0-b) * n2;
    col = ground;
  }
  
  // Warmth modulation
  col = mix(col, col * vec3(1.12, 0.96, 0.82), uWarmth * 0.25);
  
  return col;
}

// ---- ARCHITECTURE ----
float building(vec2 uv, float bx, float bw, float by, float bh, float lean) {
  vec2 p = uv;
  p.x -= lean * (p.y - by) * 0.015;
  float mask = step(bx, p.x) * step(p.x, bx + bw) *
               step(by, p.y) * step(p.y, by + bh);
  // Soft edges
  float edgeX = min(smoothstep(bx, bx+0.005, p.x), smoothstep(bx+bw, bx+bw-0.005, p.x));
  float edgeY = min(smoothstep(by, by+0.005, p.y), smoothstep(by+bh, by+bh-0.005, p.y));
  return mask * edgeX * edgeY;
}

float archLayer(vec2 uv) {
  float a = 0.0;
  a += building(uv, 0.04, 0.09, 0.06, 0.52, -1.2) * 0.40;
  a += building(uv, 0.17, 0.11, 0.04, 0.58, 0.6) * 0.35;
  a += building(uv, 0.33, 0.07, 0.10, 0.44, 0.0) * 0.30;
  a += building(uv, 0.46, 0.10, 0.07, 0.54, -0.6) * 0.35;
  a += building(uv, 0.60, 0.065, 0.09, 0.42, 0.9) * 0.28;
  a += building(uv, 0.71, 0.12, 0.05, 0.56, -0.4) * 0.38;
  a += building(uv, 0.86, 0.09, 0.08, 0.50, 1.1) * 0.32;
  
  // Window glow
  vec2 wc = uv * vec2(45.0, 65.0);
  float wg = step(0.25, fract(wc.x)) * step(fract(wc.x), 0.65) *
             step(0.2, fract(wc.y)) * step(fract(wc.y), 0.7);
  float wn = step(0.78, hash21(floor(wc)));
  
  return a * uArchGhost + wg * wn * a * uArchGhost * 0.4;
}

// ---- OBJECTS (silhouettes in fog) ----
float sdBox(vec2 p, vec2 b) {
  vec2 d = abs(p) - b;
  return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
}

float sdCircle(vec2 p, float r) {
  return length(p) - r;
}

float objectSilhouettes(vec2 uv, vec2 mouse) {
  float acc = 0.0;
  vec2 drift = (mouse - 0.5) * 0.03 * uDepth;
  vec2 p = uv + drift;
  
  // Chair silhouette (left area, on ground)
  float chair = 0.0;
  vec2 cp = p - vec2(0.20, 0.62);
  // seat
  chair = max(chair, 1.0 - smoothstep(0.0, 0.003, sdBox(cp, vec2(0.04, 0.008))));
  // back
  chair = max(chair, 1.0 - smoothstep(0.0, 0.002, sdBox(cp - vec2(0.0, -0.04), vec2(0.035, 0.002))));
  // legs (as thin rects)
  chair = max(chair, 1.0 - smoothstep(0.0, 0.002, sdBox(cp - vec2(-0.032, 0.025), vec2(0.002, 0.02))));
  chair = max(chair, 1.0 - smoothstep(0.0, 0.002, sdBox(cp - vec2(0.032, 0.025), vec2(0.002, 0.022))));
  chair = max(chair, 1.0 - smoothstep(0.0, 0.002, sdBox(cp - vec2(-0.03, -0.035), vec2(0.002, 0.012))));
  chair = max(chair, 1.0 - smoothstep(0.0, 0.002, sdBox(cp - vec2(0.03, -0.035), vec2(0.002, 0.012))));
  acc += chair * 0.12;
  
  // Clock (upper right, no hands)
  vec2 clkp = p - vec2(0.78, 0.28);
  float clockFace = 1.0 - smoothstep(0.025, 0.027, length(clkp));
  float clockRim = smoothstep(0.023, 0.025, length(clkp)) * (1.0 - smoothstep(0.025, 0.027, length(clkp)));
  // hour marks
  float marks = 0.0;
  for(int i = 0; i < 12; i++) {
    float angle = float(i) * 3.14159 * 2.0 / 12.0;
    vec2 mp = vec2(cos(angle), sin(angle));
    float d = length(clkp - mp * 0.02);
    marks += 1.0 - smoothstep(0.001, 0.002, d);
  }
  // wire
  float wire = 1.0 - smoothstep(0.001, 0.002, abs(clkp.x + 0.008) + abs(clkp.y + 0.03) * 0.3);
  acc += (clockFace * 0.06 + clockRim * 0.1 + marks * 0.05) * 0.8;
  
  // Easel (center)
  vec2 ep = p - vec2(0.55, 0.50);
  float easel = 0.0;
  // legs  
  float leg1 = 1.0 - smoothstep(0.0, 0.002, abs(ep.x + 0.02 + ep.y*0.15) + abs(ep.y) * 0.5 - 0.04);
  float leg2 = 1.0 - smoothstep(0.0, 0.002, abs(ep.x - 0.02 - ep.y*0.15) + abs(ep.y) * 0.5 - 0.04);
  // canvas
  float cv = 1.0 - smoothstep(0.0, 0.003, sdBox(ep - vec2(0.0, -0.03), vec2(0.03, 0.04)));
  acc += (max(0.0, leg1) + max(0.0, leg2)) * 0.04 + cv * 0.07;
  
  // Cat (small silhouette on ground)
  vec2 catp = p - vec2(0.35, 0.64);
  float catBody = 1.0 - smoothstep(0.012, 0.015, length(catp * vec2(1.0, 1.5)));
  float catHead = 1.0 - smoothstep(0.006, 0.008, length(catp - vec2(0.015, -0.005)));
  // ears
  float ear1 = 1.0 - smoothstep(0.002, 0.004, length(catp - vec2(0.012, -0.012)));
  float ear2 = 1.0 - smoothstep(0.002, 0.004, length(catp - vec2(0.019, -0.011)));
  acc += (catBody + catHead + ear1 * 0.5 + ear2 * 0.5) * 0.06;
  
  // Apple (lower left)
  vec2 ap = p - vec2(0.14, 0.82);
  float apple = 1.0 - smoothstep(0.008, 0.01, length(ap));
  acc += apple * 0.08;
  
  // Cup (center-right ground)
  vec2 cup = p - vec2(0.65, 0.72);
  float cupBody = 1.0 - smoothstep(0.0, 0.003, sdBox(cup, vec2(0.01, 0.015)));
  acc += cupBody * 0.06;
  
  return acc;
}

// ---- LIGHT POOLS ----
float lightPools(vec2 uv, vec2 mouse) {
  float a = 0.0;
  a += exp(-length((uv - vec2(0.25, 0.50)) / vec2(0.20, 0.14)) * 2.0) * 0.55;
  a += exp(-length((uv - vec2(0.65, 0.60)) / vec2(0.16, 0.12)) * 2.0) * 0.45;
  a += exp(-length((uv - vec2(0.15, 0.78)) / vec2(0.14, 0.10)) * 2.0) * 0.35;
  a += exp(-length((uv - vec2(0.82, 0.38)) / vec2(0.12, 0.15)) * 2.0) * 0.30;
  a += exp(-length((uv - vec2(0.45, 0.88)) / vec2(0.22, 0.09)) * 2.0) * 0.25;
  // Mouse pool
  a += exp(-length((uv - mouse) / vec2(0.14, 0.12)) * 2.0) * 0.20;
  return a * uLightPool;
}

// ---- SHADOW BANDS ----
float shadows(vec2 uv) {
  float ang = uShadowAngle * 3.14159;
  vec2 dir = vec2(cos(ang), sin(ang));
  float proj = dot(uv, dir);
  float b = 0.0;
  b += smoothstep(0.18, 0.20, proj) * (1.0 - smoothstep(0.26, 0.28, proj));
  b += smoothstep(0.48, 0.50, proj) * (1.0 - smoothstep(0.54, 0.56, proj));
  b += smoothstep(0.76, 0.78, proj) * (1.0 - smoothstep(0.83, 0.85, proj));
  return b * 0.10 * uDensity;
}

// ---- GRAIN ----
float grain(vec2 uv, float t) {
  return (hash21(uv * 600.0 + fract(t * 7.0) * 100.0) - 0.5) * 2.0;
}

// ---- MAIN ----
void main() {
  vec2 uv = vUv;
  vec2 mouse = uMouse;
  
  // Atmosphere
  vec3 col = atmosphere(uv, mouse);
  
  // Architecture (ghostly additive)
  float arch = archLayer(uv + (mouse - 0.5) * 0.04 * uDepth);
  col += vec3(0.045, 0.038, 0.028) * arch;
  
  // Object silhouettes (darker, subtractive)
  float objs = objectSilhouettes(uv, mouse);
  col = mix(col, col * 0.7, objs);
  // Slight warm edge on objects
  col += vec3(0.02, 0.015, 0.005) * objs;
  
  // Light pools
  float lp = lightPools(uv, mouse);
  col += vec3(0.82, 0.72, 0.52) * lp * 0.12;
  
  // Shadows
  col *= 1.0 - shadows(uv + (mouse - 0.5) * 0.015);
  
  // Decay desaturation
  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  col = mix(col, vec3(lum), uDecay * 0.30);
  
  // Color unification
  col = mix(col, vec3(0.54, 0.47, 0.37), 0.05);
  
  // Grain
  col += grain(uv, uTime) * uGrain * 0.035;
  
  // Vignette
  vec2 vig = uv - 0.5;
  col *= 1.0 - dot(vig, vig) * 0.9;
  
  // Edge hazes
  col = mix(col, vec3(0.72, 0.62, 0.46) * 0.55, smoothstep(0.12, 0.0, uv.y) * 0.35);
  col = mix(col, vec3(0.11, 0.10, 0.08), smoothstep(0.88, 1.0, uv.y) * 0.45);
  
  // Subtle dithering to prevent banding
  col += (hash21(gl_FragCoord.xy) - 0.5) / 255.0;
  
  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
// ============================================================
// INTERPOLATION SPACES
// ============================================================

const SPACES = {
  'accumulated_drift': {
    name: 'Accumulated Drift',
    params: { warmth:0.55, density:0.6, depth:0.5, decay:0.4, drift:0.4, lightPool:0.6, archGhost:0.35, grain:0.5, fogHeight:0.45, shadowAngle:0.12 }
  },
  'deep_gold': {
    name: 'Deep Gold',
    params: { warmth:0.92, density:0.7, depth:0.6, decay:0.18, drift:0.3, lightPool:0.85, archGhost:0.18, grain:0.35, fogHeight:0.58, shadowAngle:0.06 }
  },
  'fog_memory': {
    name: 'Fog Memory',
    params: { warmth:0.18, density:0.88, depth:0.28, decay:0.62, drift:0.15, lightPool:0.28, archGhost:0.52, grain:0.72, fogHeight:0.32, shadowAngle:0.2 }
  },
  'spectral_city': {
    name: 'Spectral City',
    params: { warmth:0.32, density:0.48, depth:0.82, decay:0.28, drift:0.55, lightPool:0.38, archGhost:0.78, grain:0.28, fogHeight:0.5, shadowAngle:0.28 }
  },
  'warm_entropy': {
    name: 'Warm Entropy',
    params: { warmth:0.72, density:0.38, depth:0.42, decay:0.82, drift:0.65, lightPool:0.48, archGhost:0.12, grain:0.82, fogHeight:0.42, shadowAngle:0.04 }
  },
  'the_stillness': {
    name: 'The Stillness',
    params: { warmth:0.42, density:0.25, depth:0.18, decay:0.48, drift:0.04, lightPool:0.72, archGhost:0.08, grain:0.18, fogHeight:0.52, shadowAngle:0.15 }
  },
  'ruined_green': {
    name: 'Ruined Green',
    params: { warmth:0.12, density:0.68, depth:0.48, decay:0.58, drift:0.32, lightPool:0.32, archGhost:0.42, grain:0.62, fogHeight:0.36, shadowAngle:0.24 }
  }
};

const SPACE_KEYS = Object.keys(SPACES);

// ============================================================
// WEBGL
// ============================================================

const bgCanvas = document.getElementById('bg');
const gl = bgCanvas.getContext('webgl', { antialias: false, alpha: false, preserveDrawingBuffer: false });

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = compileShader(document.getElementById('vs').textContent, gl.VERTEX_SHADER);
const fs = compileShader(document.getElementById('fs').textContent, gl.FRAGMENT_SHADER);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  console.error('Link error:', gl.getProgramInfoLog(program));
}
gl.useProgram(program);

const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
const posLoc = gl.getAttribLocation(program, 'position');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

const U = {};
['uTime','uResolution','uMouse','uMouseSpeed',
 'uWarmth','uDensity','uDepth','uDecay','uDrift',
 'uLightPool','uArchGhost','uGrain','uFogHeight','uShadowAngle'
].forEach(n => U[n] = gl.getUniformLocation(program, n));

// ============================================================
// PARTICLE SYSTEM (2D Canvas overlay)
// ============================================================

const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');

class Particle {
  constructor(w, h) {
    this.reset(w, h, true);
  }
  
  reset(w, h, initial = false) {
    this.x = Math.random() * w;
    this.y = initial ? Math.random() * h : -10;
    this.size = 0.5 + Math.random() * 2.5;
    this.speedY = 0.08 + Math.random() * 0.25;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.wobbleAmp = Math.random() * 0.8;
    this.wobbleFreq = 0.5 + Math.random() * 1.5;
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.opacity = 0.03 + Math.random() * 0.08;
    this.life = 0;
    
    // Some particles are "pages" (rectangles)
    this.isPage = Math.random() > 0.85;
    if (this.isPage) {
      this.size = 2 + Math.random() * 4;
      this.pageW = this.size * (0.6 + Math.random() * 0.4);
      this.pageH = this.size * (0.8 + Math.random() * 0.3);
      this.rotation = Math.random() * Math.PI;
      this.rotSpeed = (Math.random() - 0.5) * 0.005;
      this.opacity = 0.04 + Math.random() * 0.06;
    }
  }
  
  update(w, h, time, mouseX, mouseY, driftSpeed) {
    this.life += 0.016;
    
    // Base movement
    this.y += this.speedY * (0.3 + driftSpeed * 0.7);
    this.x += this.speedX + Math.sin(this.life * this.wobbleFreq + this.wobblePhase) * this.wobbleAmp * 0.3;
    
    // Mouse influence (subtle push)
    const dx = this.x - mouseX * w;
    const dy = this.y - mouseY * h;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 150) {
      const force = (1 - dist / 150) * 0.3;
      this.x += dx / dist * force;
      this.y += dy / dist * force * 0.5;
    }
    
    if (this.isPage) {
      this.rotation += this.rotSpeed;
    }
    
    if (this.y > h + 20 || this.x < -20 || this.x > w + 20) {
      this.reset(w, h);
    }
  }
  
  draw(ctx) {
    ctx.globalAlpha = this.opacity;
    
    if (this.isPage) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.fillStyle = 'rgb(205, 195, 175)';
      ctx.fillRect(-this.pageW/2, -this.pageH/2, this.pageW, this.pageH);
      // Text lines on page
      ctx.fillStyle = 'rgba(140, 130, 115, 0.3)';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(-this.pageW/2 + 1, -this.pageH/2 + 1.5 + i * 1.5, this.pageW * 0.6 + Math.random() * this.pageW * 0.3, 0.5);
      }
      ctx.restore();
    } else {
      ctx.fillStyle = 'rgb(190, 175, 150)';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

let particles = [];
const PARTICLE_COUNT = 120;

function initParticles(w, h) {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle(w, h));
  }
}

// ============================================================
// STATE & INTERPOLATION
// ============================================================

const state = { warmth:0.55, density:0.6, depth:0.5, decay:0.4, drift:0.4, lightPool:0.6, archGhost:0.35, grain:0.5, fogHeight:0.45, shadowAngle:0.12 };
const target = { ...state };

let mouseX = 0.5, mouseY = 0.5;
let tMouseX = 0.5, tMouseY = 0.5;
let mouseSpeed = 0, prevMX = 0.5, prevMY = 0.5;

let currentSpaceIdx = 0;
let labelTimeout = null;
let hintShown = false;

function lerp(a, b, t) { return a + (b - a) * t; }

function lerpState(dt) {
  const speed = 1.0 - Math.pow(0.03, dt); // frame-rate independent
  for (const k of Object.keys(state)) {
    state[k] = lerp(state[k], target[k], speed);
  }
  
  const mSpeed = 1.0 - Math.pow(0.06, dt);
  mouseX = lerp(mouseX, tMouseX, mSpeed);
  mouseY = lerp(mouseY, tMouseY, mSpeed);
  
  const dx = mouseX - prevMX;
  const dy = mouseY - prevMY;
  mouseSpeed = lerp(mouseSpeed, Math.sqrt(dx*dx + dy*dy) * 50, 0.1);
  prevMX = mouseX;
  prevMY = mouseY;
}

function setSpace(key) {
  const sp = SPACES[key];
  if (!sp) return;
  Object.assign(target, sp.params);
  showLabel(sp.name);
  flashIndex(SPACE_KEYS.indexOf(key) + 1);
}

function showLabel(name) {
  const el = document.getElementById('space-label');
  el.textContent = name;
  el.classList.add('visible');
  clearTimeout(labelTimeout);
  labelTimeout = setTimeout(() => el.classList.remove('visible'), 3000);
}

function flashIndex(n) {
  const el = document.getElementById('space-index');
  el.textContent = n;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 600);
}

// ============================================================
// INPUT
// ============================================================

bgCanvas.addEventListener('mousemove', e => {
  tMouseX = e.clientX / window.innerWidth;
  tMouseY = e.clientY / window.innerHeight;
  
  if (!hintShown) {
    hintShown = true;
    document.getElementById('nav-hint').classList.add('visible');
    setTimeout(() => document.getElementById('nav-hint').classList.remove('visible'), 5000);
  }
});

bgCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  tMouseX = t.clientX / window.innerWidth;
  tMouseY = t.clientY / window.innerHeight;
}, { passive: false });

document.addEventListener('keydown', e => {
  const num = parseInt(e.key);
  if (num >= 1 && num <= SPACE_KEYS.length) {
    currentSpaceIdx = num - 1;
    setSpace(SPACE_KEYS[currentSpaceIdx]);
    return;
  }
  if (e.key === 'ArrowRight') {
    currentSpaceIdx = (currentSpaceIdx + 1) % SPACE_KEYS.length;
    setSpace(SPACE_KEYS[currentSpaceIdx]);
  } else if (e.key === 'ArrowLeft') {
    currentSpaceIdx = (currentSpaceIdx - 1 + SPACE_KEYS.length) % SPACE_KEYS.length;
    setSpace(SPACE_KEYS[currentSpaceIdx]);
  } else if (e.key === ' ') {
    e.preventDefault();
    currentSpaceIdx = 0;
    setSpace('accumulated_drift');
  }
});

let wheelAcc = 0;
bgCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  wheelAcc += e.deltaY * 0.0008;
  if (Math.abs(wheelAcc) > 0.25) {
    currentSpaceIdx = wheelAcc > 0
      ? (currentSpaceIdx + 1) % SPACE_KEYS.length
      : (currentSpaceIdx - 1 + SPACE_KEYS.length) % SPACE_KEYS.length;
    setSpace(SPACE_KEYS[currentSpaceIdx]);
    wheelAcc = 0;
  }
}, { passive: false });

// ============================================================
// RESIZE
// ============================================================

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  bgCanvas.width = window.innerWidth * dpr;
  bgCanvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, bgCanvas.width, bgCanvas.height);
  
  pCanvas.width = window.innerWidth * dpr;
  pCanvas.height = window.innerHeight * dpr;
  pCanvas.style.width = window.innerWidth + 'px';
  pCanvas.style.height = window.innerHeight + 'px';
  pCtx.scale(dpr, dpr);
  
  initParticles(window.innerWidth, window.innerHeight);
}

window.addEventListener('resize', resize);
resize();

// ============================================================
// RENDER LOOP
// ============================================================

let lastTime = performance.now();
const startTime = lastTime;

function render(now) {
  const dt = Math.min((now - lastTime) * 0.001, 0.1); // seconds, capped
  lastTime = now;
  const time = (now - startTime) * 0.001;
  
  lerpState(dt);
  
  // --- WebGL atmospheric pass ---
  gl.uniform1f(U.uTime, time);
  gl.uniform2f(U.uResolution, bgCanvas.width, bgCanvas.height);
  gl.uniform2f(U.uMouse, mouseX, mouseY);
  gl.uniform1f(U.uMouseSpeed, mouseSpeed);
  gl.uniform1f(U.uWarmth, state.warmth);
  gl.uniform1f(U.uDensity, state.density);
  gl.uniform1f(U.uDepth, state.depth);
  gl.uniform1f(U.uDecay, state.decay);
  gl.uniform1f(U.uDrift, state.drift);
  gl.uniform1f(U.uLightPool, state.lightPool);
  gl.uniform1f(U.uArchGhost, state.archGhost);
  gl.uniform1f(U.uGrain, state.grain);
  gl.uniform1f(U.uFogHeight, state.fogHeight);
  gl.uniform1f(U.uShadowAngle, state.shadowAngle);
  
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  
  // --- 2D particle overlay ---
  const w = window.innerWidth;
  const h = window.innerHeight;
  pCtx.clearRect(0, 0, w, h);
  
  for (const p of particles) {
    p.update(w, h, time, mouseX, mouseY, state.drift);
    p.draw(pCtx);
  }
  pCtx.globalAlpha = 1;
  
  // --- UI updates ---
  document.getElementById('coords').textContent = 
    `${mouseX.toFixed(3)} · ${mouseY.toFixed(3)}`;
  
  requestAnimationFrame(render);
}

// Start
setSpace('accumulated_drift');
requestAnimationFrame(render);

// Console guide
console.log(
  '%c ChrisO.org — Interpolation Spaces ',
  'background:#2a2520;color:#b4a587;padding:10px 16px;font-family:monospace;font-size:13px'
);
console.log('%cNavigation:', 'color:#b4a587;font-weight:bold');
SPACE_KEYS.forEach((k, i) => {
  console.log(`  %c[${i+1}]%c ${SPACES[k].name}`, 'color:#8a7d65', 'color:#b4a587');
});
console.log('%c  [←/→] Cycle   [Scroll] Drift   [Space] Home   [Mouse] Explore', 'color:#8a7d65');

// Expose API for future expansion
window.ChrisO = {
  SPACES,
  state,
  target,
  setSpace,
  addSpace(key, name, params) {
    SPACES[key] = { name, params };
    SPACE_KEYS.push(key);
    console.log(`Added space: ${name}`);
  },
  getState() { return { ...state }; },
  setParam(key, value) { target[key] = Math.max(0, Math.min(1, value)); }
};
</script>
