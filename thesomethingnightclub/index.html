<!--
  ============================================================================
  THE SOMETHING NIGHTCLUB — visual + audio + glitch + tensegrity flora + heads
  ============================================================================
  Deploy path:    chriso.org/thesomethingnightclub/index.html
  Original scene: My Websites Claude (claude.ai web session, 2026-05-02)
  Audio + glitch +
  tensegrity plants +
  floating heads:  TelloFoam Claude Code, 2026-05-02 / 03

  WHAT'S HERE NOW:
    - Three.js wireframe room: corner couch, two cafe tables, bar with stool
      + implied bottles, two walls, dust motes, slow drift camera.
    - BACKROOM: doorway in back wall + glow plane that pulses with the audio
      sub, three swaying dancer-silhouettes inside.
    - TENSEGRITY PLANT (replaces the old simple plant): a 3-strut T-prism
      tensegrity structure in a pot — 3 rigid struts that don't touch,
      held by 6 cables in tension. Inspired by Christophero's tensegrity-
      robot work. Top endpoints wobble gently (sin-driven, per-strut
      phase) — cables track endpoint positions live.
    - TENSEGRITY TREE (new): 3-stage stacked T-prism, taller (~3.8u),
      struts get smaller toward the top, cables more dense. Wobble
      amplitude grows with height (like wind in a tree).
    - FIGURE AT THE BAR: a single still figure standing facing the back-
      bar — title says "empty" but somebody's there.
    - FLOATING HEADS (3): wireframe spheres at three positions in the
      room (above the bar, above the couch, mid-room). Each turns to
      look around (random target every 4-8s, sometimes the camera).
      Every 8-22s, a head opens its mouth (a ring) and emits a short
      garbled-alien speech burst; an expanding visual ring shows the
      sound coming out. Each head has its own HRTF panner, so the
      voices arrive from their actual room positions. These are
      placeholders for the future binaural-listening / generating
      voice positions per the planning doc.
    - VELOCITY GLITCH: pointer velocity → energy → per-line jitter +
      depthTest sabotage + renderOrder shuffle + camera FOV wobble.
      Calms back when motion stops. Pointer Events so it works on phone.
    - BINAURAL ENGINE: every audible source (sub + each head) routes
      through a `PannerNode`. The `AudioContext.listener` position +
      orientation are coupled to the camera, so as the camera drifts
      around the room the sound field rotates with it. Default is HRTF
      (assumes headphones); the audio settings tab swaps everything to
      equalpower stereo for speakers.
    - SETTINGS TAB: top-right, "audio" tab — opens a tiny panel with
      headphones / speakers toggle. Switching toggles all PannerNodes
      between 'HRTF' and 'equalpower' modes.

  WHAT'S STILL TBD (per the planning doc):
    - Multiple binaural CONVERSATIONAL voices (Claude left, ChatGPT right)
      with TTS — heads here are placeholders making nonsense sound
    - Persistent log via localStorage / Notion fetch
    - Quote crystallization / artologue accumulation
    - Tables 1–4 spatial mapping (AI Salon, GDB, Tech, Provocations)
    - TelloFoam-style multi-peer integration

  COORD: log on Notion "NightClub Working Notes" 355dbb52-…81fa…
  ============================================================================

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Cross-IIFE shared state ───────────────────────────────────────────────
let audioCtx = null;
let panningMode = 'HRTF';                  // or 'equalpower' for stereo
const allPanners = [];                     // every PannerNode created — toggled in lockstep
const heads = [];                          // populated in scene IIFE; speakHead() reads
let speakHeadFn = null;                    // assigned by audio IIFE; called by scene IIFE on schedule

// Live-tunable PannerNode parameters. Applied to every panner in lockstep
// whenever the user moves a slider or loads a preset. The default values
// match what the panners are originally created with so loading "default"
// is a true reset.
const binauralParams = {
  distanceModel: 'inverse',
  refDistance:   1.0,
  rolloffFactor: 1.4,
  maxDistance:   30,
};

function setPanningMode(mode) {
  panningMode = mode;
  for (const p of allPanners) p.panningModel = mode;
}
function applyBinauralParams() {
  for (const p of allPanners) {
    p.distanceModel = binauralParams.distanceModel;
    p.refDistance   = binauralParams.refDistance;
    p.rolloffFactor = binauralParams.rolloffFactor;
    p.maxDistance   = binauralParams.maxDistance;
  }
}

// ── Presets — built-ins are read-only, user presets persist via localStorage
const BUILTIN_PRESETS = {
  'default':  { distanceModel: 'inverse',     refDistance: 1.0, rolloffFactor: 1.4, maxDistance: 30 },
  'intimate': { distanceModel: 'inverse',     refDistance: 0.5, rolloffFactor: 2.5, maxDistance: 12 },
  'spacious': { distanceModel: 'inverse',     refDistance: 2.0, rolloffFactor: 0.6, maxDistance: 60 },
  'distant':  { distanceModel: 'exponential', refDistance: 1.0, rolloffFactor: 1.0, maxDistance: 50 },
};
const PRESETS_KEY = 'nightclub.binauralPresets';
function loadUserPresets() {
  try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || '{}'); }
  catch (e) { return {}; }
}
function saveUserPresets(p) { localStorage.setItem(PRESETS_KEY, JSON.stringify(p)); }
function isBuiltin(name) { return Object.prototype.hasOwnProperty.call(BUILTIN_PRESETS, name); }

// ─── Settings tab handler (independent of scene/audio init) ────────────────
(() => {
  const tab = document.getElementById('audioTab');
  const panel = document.getElementById('audioPanel');
  tab.addEventListener('click', () => {
    const open = panel.classList.toggle('open');
    tab.classList.toggle('open', open);
  });
  // Close panel when clicking outside it (but not the tab itself).
  // Skip close while interacting with form controls inside the panel.
  document.addEventListener('pointerdown', e => {
    if (e.target.closest('.tab-panel') || e.target.closest('.tabs')) return;
    panel.classList.remove('open');
    tab.classList.remove('open');
  });

  // Listening mode (binaural / stereo)
  panel.querySelectorAll('.opt[data-listening]').forEach(btn => {
    btn.addEventListener('click', () => {
      panel.querySelectorAll('.opt[data-listening]').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      const mode = btn.dataset.listening === 'speakers' ? 'equalpower' : 'HRTF';
      setPanningMode(mode);
    });
  });

  // ── Binaural parameter sliders ──────────────────────
  const $ = id => document.getElementById(id);
  const bDistModel = $('bDistModel');
  const bRef = $('bRef'),  bRefVal = $('bRefVal');
  const bRoll = $('bRoll'), bRollVal = $('bRollVal');
  const bMax = $('bMax'),   bMaxVal = $('bMaxVal');

  function syncControlsFromParams() {
    bDistModel.value = binauralParams.distanceModel;
    bRef.value = binauralParams.refDistance;
    bRefVal.textContent = binauralParams.refDistance.toFixed(1);
    bRoll.value = binauralParams.rolloffFactor;
    bRollVal.textContent = binauralParams.rolloffFactor.toFixed(1);
    bMax.value = binauralParams.maxDistance;
    bMaxVal.textContent = String(Math.round(binauralParams.maxDistance));
  }
  bDistModel.addEventListener('change', () => {
    binauralParams.distanceModel = bDistModel.value;
    applyBinauralParams();
  });
  bRef.addEventListener('input', () => {
    binauralParams.refDistance = parseFloat(bRef.value);
    bRefVal.textContent = binauralParams.refDistance.toFixed(1);
    applyBinauralParams();
  });
  bRoll.addEventListener('input', () => {
    binauralParams.rolloffFactor = parseFloat(bRoll.value);
    bRollVal.textContent = binauralParams.rolloffFactor.toFixed(1);
    applyBinauralParams();
  });
  bMax.addEventListener('input', () => {
    binauralParams.maxDistance = parseFloat(bMax.value);
    bMaxVal.textContent = String(Math.round(binauralParams.maxDistance));
    applyBinauralParams();
  });

  // ── Presets ─────────────────────────────────────────
  const presetSel = $('presetSel');
  const savePresetBtn = $('savePresetBtn');
  const delPresetBtn = $('delPresetBtn');

  function rebuildPresetList(selectName) {
    const user = loadUserPresets();
    const all = { ...BUILTIN_PRESETS, ...user };
    presetSel.innerHTML = '';
    for (const name of Object.keys(all)) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = isBuiltin(name) ? name : '· ' + name;
      presetSel.appendChild(opt);
    }
    if (selectName && all[selectName]) presetSel.value = selectName;
  }
  function applyPreset(name) {
    const all = { ...BUILTIN_PRESETS, ...loadUserPresets() };
    const p = all[name];
    if (!p) return;
    binauralParams.distanceModel = p.distanceModel;
    binauralParams.refDistance   = p.refDistance;
    binauralParams.rolloffFactor = p.rolloffFactor;
    binauralParams.maxDistance   = p.maxDistance;
    syncControlsFromParams();
    applyBinauralParams();
  }
  presetSel.addEventListener('change', () => applyPreset(presetSel.value));
  savePresetBtn.addEventListener('click', () => {
    const name = (prompt('preset name?') || '').trim();
    if (!name) return;
    if (isBuiltin(name)) { alert('that name is taken by a built-in preset'); return; }
    const user = loadUserPresets();
    user[name] = { ...binauralParams };
    saveUserPresets(user);
    rebuildPresetList(name);
  });
  delPresetBtn.addEventListener('click', () => {
    const name = presetSel.value;
    if (isBuiltin(name)) { alert('built-in presets cannot be deleted'); return; }
    if (!confirm('delete preset "' + name + '"?')) return;
    const user = loadUserPresets();
    delete user[name];
    saveUserPresets(user);
    rebuildPresetList('default');
    applyPreset('default');
  });

  rebuildPresetList('default');
  syncControlsFromParams();
})();

// ─── Scene ─────────────────────────────────────────────────────────────────
(() => {
  const container = document.getElementById('scene');
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050304, 0.055);

  const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 200);
  const baseFov = 42;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const matBright = new THREE.LineBasicMaterial({ color: 0xc4a878, transparent: true, opacity: 0.78 });
  const matMid    = new THREE.LineBasicMaterial({ color: 0x8a6840, transparent: true, opacity: 0.6 });
  const matDim    = new THREE.LineBasicMaterial({ color: 0x4a3520, transparent: true, opacity: 0.5 });
  const matCable  = new THREE.LineBasicMaterial({ color: 0xa8845a, transparent: true, opacity: 0.45 });
  const matHead   = new THREE.LineBasicMaterial({ color: 0xd4b888, transparent: true, opacity: 0.7 });

  const allLines = [];

  function addEdges(geom, x, y, z, mat = matBright) {
    const edges = new THREE.EdgesGeometry(geom, 1);
    const line = new THREE.LineSegments(edges, mat);
    line.position.set(x, y, z);
    line.userData.origPos = line.position.clone();
    scene.add(line);
    allLines.push(line);
    return line;
  }

  function trackGroup(group, x, y, z, ry = 0) {
    group.position.set(x, y, z);
    group.rotation.y = ry;
    group.userData.origPos = group.position.clone();
    group.userData.origRotY = ry;
    scene.add(group);
    allLines.push(group);
  }

  // ── Floor + walls ───────────────────────────────────
  const grid = new THREE.GridHelper(40, 40, 0x3a2918, 0x1f140a);
  grid.material.transparent = true; grid.material.opacity = 0.55;
  scene.add(grid);
  addEdges(new THREE.PlaneGeometry(10, 6), -5, 3, -6, matDim).rotation.y = 0;
  addEdges(new THREE.PlaneGeometry(10, 6), -8, 3, -1, matDim).rotation.y = Math.PI / 2;

  // ── Corner couch ─────────────────────────────────────
  addEdges(new THREE.BoxGeometry(1.4, 0.55, 4.5), -6.5, 0.45, -3, matBright);
  addEdges(new THREE.BoxGeometry(3.6, 0.55, 1.4), -4.4, 0.45, -5, matBright);
  addEdges(new THREE.BoxGeometry(0.25, 1.2, 4.5), -7.1, 0.95, -3, matMid);
  addEdges(new THREE.BoxGeometry(3.6, 1.2, 0.25), -4.4, 0.95, -5.6, matMid);

  // ── Tables ───────────────────────────────────────────
  const tableTop = (x, z) => {
    addEdges(new THREE.CylinderGeometry(0.55, 0.55, 0.05, 32), x, 0.78, z, matBright);
    addEdges(new THREE.CylinderGeometry(0.06, 0.06, 0.78, 8), x, 0.39, z, matMid);
    addEdges(new THREE.CylinderGeometry(0.07, 0.06, 0.18, 12), x + 0.18, 0.89, z - 0.1, matBright);
  };
  tableTop(-4.2, -2.4);
  tableTop(-2.8,  0.2);

  // ── Bar ──────────────────────────────────────────────
  addEdges(new THREE.BoxGeometry(1.2, 1.05, 7),    4.5, 0.525, -1, matBright);
  addEdges(new THREE.BoxGeometry(1.55, 0.06, 7.2), 4.5, 1.08,  -1, matBright);
  addEdges(new THREE.BoxGeometry(0.18, 2.6, 7),    5.9, 1.3,   -1, matMid);
  for (let i = -2; i <= 2; i += 2) {
    addEdges(new THREE.CylinderGeometry(0.06, 0.06, 0.4, 8), 5.78, 1.55, -1 + i, matBright);

  addEdges(new THREE.CylinderGeometry(0.22, 0.22, 0.04, 24), 3.4, 0.78, -1, matBright);
  addEdges(new THREE.CylinderGeometry(0.04, 0.04, 0.78, 8),  3.4, 0.39, -1, matMid);

  // ── Backroom ─────────────────────────────────────────
  const doorFrame = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.PlaneGeometry(1.7, 2.5)), matBright
  );
  doorFrame.position.set(-1.6, 1.55, -5.95);

  const backGlowMat = new THREE.MeshBasicMaterial({
    color: 0xa83020, transparent: true, opacity: 0.18,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const backGlow = new THREE.Mesh(new THREE.PlaneGeometry(1.55, 2.4), backGlowMat);
  backGlow.position.set(-1.6, 1.55, -6.4);
  scene.add(backGlow);

  const dancers = [];
  for (let i = 0; i < 3; i++) {
    const d = addEdges(
      new THREE.CylinderGeometry(0.16, 0.16, 1.4, 8),
      -1.6 + (i - 1) * 0.42, 1.0, -6.7 - i * 0.18, matMid
    );

    dancers.push(d);
  }

  // ── Bar figure (the surprise) ────────────────────────
  const figure = new THREE.Group();
  const body = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.CylinderGeometry(0.22, 0.20, 1.55, 10)), matBright
  );
  body.position.y = 0.78; figure.add(body);
  const fHead = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.SphereGeometry(0.18, 12, 8)), matBright
  );
  fHead.position.y = 1.72; fHead.rotation.z = -0.1; figure.add(fHead);
  const shoulders = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(0.55, 0.06, 0.18)), matMid
  );
  shoulders.position.y = 1.45; figure.add(shoulders);
  trackGroup(figure, 3.7, 0, -1, -Math.PI / 2);

  // ── TENSEGRITY HELPERS ───────────────────────────────
  // A strut is a 1-unit cylinder rendered as edges, scaled+oriented per
  // frame to span p1→p2. Cables are 2-vertex Line objects whose endpoint
  // buffers are rewritten each frame to follow strut tips. When a strut's
  // endpoint moves, its cables follow naturally.
  function makeStrut(mat) {
    const geo = new THREE.CylinderGeometry(0.04, 0.04, 1.0, 6);
    const edges = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edges, mat);
    line.userData.origPos = new THREE.Vector3();   // satisfied by placeStrut
    line.userData.glitchExtreme = true;            // tensegrity glitches harder
    scene.add(line);
    allLines.push(line);
    return line;
  }
  function placeStrut(line, p1, p2) {
    const dir = new THREE.Vector3().subVectors(p2, p1);
    const len = dir.length();
    line.position.copy(p1).addScaledVector(dir, 0.5);
    line.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
    line.scale.set(1, len, 1);
    line.userData.origPos.copy(line.position);  // re-anchor for glitch
  }
  function makeCable(p1, p2, mat = matCable) {
    const geo = new THREE.BufferGeometry();
    const arr = new Float32Array(6);
    arr[0]=p1.x; arr[1]=p1.y; arr[2]=p1.z;
    arr[3]=p2.x; arr[4]=p2.y; arr[5]=p2.z;
    geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const line = new THREE.Line(geo, mat);
    // Cable's vertex buffer is rewritten each frame to track strut tips.
    // The line's own .position is at origin; the glitch loop jitters that
    // origin → during high energy, cables visibly detach from the struts.
    line.userData.origPos = new THREE.Vector3(0, 0, 0);
    line.userData.glitchExtreme = true;
    scene.add(line);
    allLines.push(line);
    return { line, geo };
  }
  function updateCable(c, p1, p2) {
    const a = c.geo.attributes.position.array;
    a[0]=p1.x; a[1]=p1.y; a[2]=p1.z;
    a[3]=p2.x; a[4]=p2.y; a[5]=p2.z;
    c.geo.attributes.position.needsUpdate = true;
  }

  // Build a single 3-strut T-prism. Returns { struts, cables, basePts, anchors }.
  // anchors are the bottom points (pinned, attached to whatever it's planted in).
  function makeTPrism(cx, cy, cz, opts = {}) {
    const numStruts = 3;
    const heightTop  = opts.height    || 1.0;
    const radiusBot  = opts.radiusBot || 0.30;
    const radiusTop  = opts.radiusTop || 0.32;
    const twist      = opts.twist     || (Math.PI * 5 / 6);  // ~150° — classic T-prism twist
    const wobble     = opts.wobble    || 0.04;
    const mat        = opts.mat       || matBright;

    const anchors = [];     // bottom points (pinned)
    const tops    = [];     // top points (mutable)
    const baseTops = [];    // pristine reference
    const phases  = [];
    const struts  = [];

    for (let i = 0; i < numStruts; i++) {
      const aBot = (i / numStruts) * Math.PI * 2;
      const aTop = aBot + twist;
      const bot = new THREE.Vector3(
        cx + Math.cos(aBot) * radiusBot,
        cy,
        cz + Math.sin(aBot) * radiusBot
      );
      const top = new THREE.Vector3(
        cx + Math.cos(aTop) * radiusTop,
        cy + heightTop,
        cz + Math.sin(aTop) * radiusTop
      );
      anchors.push(bot);
      tops.push(top);
      baseTops.push(top.clone());
      phases.push(Math.random() * Math.PI * 2);
      const strut = makeStrut(mat);
      placeStrut(strut, bot, top);
      struts.push(strut);
    }

    // Cables:
    //   3 forming the top triangle
    //   3 forming the bottom triangle
    //   3 lateral cables: bot[i] → top[(i+1)%3] (the tension that lifts the strut)
    const cables = [];
    for (let i = 0; i < numStruts; i++) {
      const j = (i + 1) % numStruts;
      cables.push({ ...makeCable(tops[i], tops[j]),    fromTop: i, toTop: j,  fromBot: -1, toBot: -1 });
      cables.push({ ...makeCable(anchors[i], anchors[j]), fromTop: -1, toTop: -1, fromBot: i, toBot: j });
      cables.push({ ...makeCable(anchors[i], tops[j]),    fromTop: -1, toTop: j,  fromBot: i, toBot: -1 });
    }

    return { struts, cables, anchors, tops, baseTops, phases, wobble };
  }

  // Update a tensegrity structure: wobble top points, reposition struts, redraw cables.
  function updateTPrism(t, p) {
    for (let i = 0; i < p.tops.length; i++) {
      const phase = p.phases[i];
      p.tops[i].x = p.baseTops[i].x + Math.sin(t * 0.6 + phase) * p.wobble;
      p.tops[i].z = p.baseTops[i].z + Math.cos(t * 0.5 + phase) * p.wobble;
      p.tops[i].y = p.baseTops[i].y + Math.sin(t * 0.9 + phase + 1) * p.wobble * 0.4;
      placeStrut(p.struts[i], p.anchors[i], p.tops[i]);
    }
    for (const c of p.cables) {
      const from = c.fromBot >= 0 ? p.anchors[c.fromBot] : p.tops[c.fromTop];
      const to   = c.toBot   >= 0 ? p.anchors[c.toBot]   : p.tops[c.toTop];
      updateCable(c, from, to);
    }
  }

  // ── PLANT (replaces old simple plant): tensegrity T-prism in a pot ──
  // Pot
  addEdges(new THREE.CylinderGeometry(0.32, 0.26, 0.42, 16), -2.6, 0.21, -3.4, matBright);
  addEdges(new THREE.CylinderGeometry(0.34, 0.32, 0.06, 16), -2.6, 0.42, -3.4, matMid);
  // T-prism above the pot
  const plantPrism = makeTPrism(-2.6, 0.45, -3.4, {
    height: 1.4, radiusBot: 0.18, radiusTop: 0.40, wobble: 0.05, mat: matBright
  });

  // ── TREE (new, taller): 3-stage stacked T-prism ─────────────────
  // Bigger pot
  addEdges(new THREE.CylinderGeometry(0.50, 0.42, 0.55, 18),   1.5, 0.275, -3.6, matBright);
  addEdges(new THREE.CylinderGeometry(0.52, 0.50, 0.06, 18),   1.5, 0.55,  -3.6, matMid);
  // Stage 1 — the lower trunk: thicker, less wobble
  const treeS1 = makeTPrism(1.5, 0.58, -3.6, {
    height: 1.2, radiusBot: 0.30, radiusTop: 0.42, wobble: 0.025, mat: matBright
  });
  // Stage 2 — middle: anchor on stage1's tops, smaller, more wobble
  // We can't literally chain anchors (the anchors are pinned ground points
  // in the helper). Instead we build stage 2 as a separate prism centered
  // above stage 1. It looks stacked even if the geometric anchors are
  // independent.
  const treeS2 = makeTPrism(1.5, 1.78, -3.6, {
    height: 1.2, radiusBot: 0.36, radiusTop: 0.32, wobble: 0.045,
    twist: Math.PI * 7 / 6,  // counter-twist for visual interest
    mat: matBright,
  });
  // Stage 3 — crown: smaller still, most wobble
  const treeS3 = makeTPrism(1.5, 2.98, -3.6, {
    height: 0.95, radiusBot: 0.26, radiusTop: 0.18, wobble: 0.07, mat: matBright
  });

  const tensegrities = [plantPrism, treeS1, treeS2, treeS3];

  // ── FLOATING HEADS — 3 placeholders for binaural voice positions ────
  // Each head: wireframe sphere, two eye dots, one mouth ring (scaleable
  // during speech). Position is fixed; rotation tweens toward random
  // look-targets. The audio side reads each head's `position` for its
  // PannerNode, and the mouth scale + a spawned ring visualize speech.
  const headPositions = [
    new THREE.Vector3(4.5,  2.55, -1),    // above the bar
    new THREE.Vector3(-5.5, 2.45, -3),    // above the corner couch
    new THREE.Vector3( 0.4, 2.65,  1.4),  // mid-room, slightly forward
  ];
  const ringPool = [];

  function makeHead(pos, idx) {
    const g = new THREE.Group();
    // Sphere
    const sphereLines = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.SphereGeometry(0.32, 14, 10)), matHead
    );
    g.add(sphereLines);
    // Eyes — two small circles offset
    const eyeMat = new THREE.LineBasicMaterial({ color: 0xe4d4a8, transparent: true, opacity: 0.85 });
    const eyeGeo = new THREE.EdgesGeometry(new THREE.CircleGeometry(0.04, 12));
    const eyeL = new THREE.LineSegments(eyeGeo, eyeMat);
    const eyeR = new THREE.LineSegments(eyeGeo, eyeMat);
    eyeL.position.set(-0.10, 0.05, 0.30);
    eyeR.position.set( 0.10, 0.05, 0.30);
    g.add(eyeL); g.add(eyeR);
    // Mouth — a small ring on the front face
    const mouth = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.CircleGeometry(0.07, 16)), matHead
    );
    mouth.position.set(0, -0.10, 0.30);
    g.add(mouth);

    g.position.copy(pos);
    g.userData.origPos = pos.clone();
    g.userData.origRotY = 0;
    scene.add(g);
    allLines.push(g);

    return {
      group: g,
      mouth,
      pos,
      idx,
      curRotY: 0,
      curRotX: 0,
      targetRotY: Math.random() * Math.PI * 2,
      targetRotX: 0,
      nextLookAt: 2 + Math.random() * 4,
      nextSpeak: 6 + Math.random() * 12,   // first speak between 6–18s
      mouthOpen: 0,                        // 0..1
      mouthDecay: 0,
      bobPhase: Math.random() * Math.PI * 2,
    };
  }

  for (let i = 0; i < headPositions.length; i++) {
    heads.push(makeHead(headPositions[i], i));
  }

  // Spawn an expanding ring visual at a head's mouth — the visual sound burst.
  function spawnSoundRing(headObj) {
    const ringGeo = new THREE.RingGeometry(0.05, 0.07, 24);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xe8c87a, transparent: true, opacity: 0.5,
      side: THREE.DoubleSide, depthWrite: false,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(headObj.group.position);
    ring.position.y -= 0.10;  // align to mouth
    // face camera (we'll re-orient each frame in update)
    scene.add(ring);
    ringPool.push({ ring, mat: ringMat, geo: ringGeo, born: 0, _t0: performance.now() / 1000 });
  }

  // ── Dust motes ───────────────────────────────────────
  const motes = [];
  const moteGeom = new THREE.BufferGeometry();
  const moteCount = 60;
  const moteArr = new Float32Array(moteCount * 3);
  for (let i = 0; i < moteCount; i++) {
    moteArr[i*3]   = (Math.random() - 0.5) * 18;
    moteArr[i*3+1] =  Math.random() * 5 + 0.4;
    moteArr[i*3+2] = (Math.random() - 0.5) * 14;
    motes.push({ baseY: moteArr[i*3+1], phase: Math.random() * Math.PI * 2 });
  }
  moteGeom.setAttribute('position', new THREE.BufferAttribute(moteArr, 3));
  const moteMat = new THREE.PointsMaterial({
    color: 0xc4a878, size: 0.045, transparent: true, opacity: 0.5, sizeAttenuation: true
  });
  const motePts = new THREE.Points(moteGeom, moteMat);
  scene.add(motePts);

  // ── Pointer velocity → glitch energy ─────────────────
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let lx = mx, ly = my;
  let energy = 0;
  window.addEventListener('pointermove', e => { mx = e.clientX; my = e.clientY; });

  // ══ User avatar + camera rig ═════════════════════════
  // The avatar is the listener's BODY. The camera relates to it in three
  // modes (3rd / 2nd-over-shoulder / 1st); the AudioContext.listener
  // couples to the avatar — NOT the free camera — so spatial audio is
  // heard from where the body sits, even when the camera is orbiting in
  // 3rd person. This is the "detach from head" model from the binaural
  // explorer, generalized into view modes.
  const avatar = new THREE.Group();
  const avHead = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.SphereGeometry(0.26, 14, 10)),
    new THREE.LineBasicMaterial({ color: 0x6ec6ff, transparent: true, opacity: 0.9 })
  );
  avHead.position.y = 1.5; avatar.add(avHead);
  const avNose = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.ConeGeometry(0.07, 0.2, 8)),
    new THREE.LineBasicMaterial({ color: 0x6ec6ff, transparent: true, opacity: 0.65 })
  );
  avNose.geometry.translate(0, -0.1, 0); avNose.geometry.rotateX(Math.PI / 2);
  avNose.position.set(0, 1.47, -0.26); avatar.add(avNose);
  const avSh = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(0.5, 0.06, 0.18)),
    new THREE.LineBasicMaterial({ color: 0x4a90c0, transparent: true, opacity: 0.55 })
  );
  avSh.position.y = 1.22; avatar.add(avSh);
  const AVATAR_POS = new THREE.Vector3(-3.0, 0, 1.6);  // a seat facing the room
  const AVATAR_EYE = 1.5;
  avatar.position.copy(AVATAR_POS);
  scene.add(avatar);

  const VIEW_MODES  = ['third', 'over', 'first'];
  const VIEW_LABELS = { third: '3rd', over: '2nd', first: '1st' };
  let viewModeIdx = 0;          // entrance = 3rd person
  // UNIFIED GAZE — for now we're always a 1st-person listener: the ears
  // stay attached to the avatar (body model) and the gaze (lookYaw/lookPitch)
  // drives the avatar head rotation, the listener orientation, AND the
  // camera, in every view mode. Rotating the view therefore rotates both
  // the sound field and the visible head. (Later this will be detachable —
  // free camera with ears left on the body — but not yet.)
  let lookYaw = 0, lookPitch = 0;
  let camDist = 6.0;            // 3rd-person observer distance
  let camOrbit = 0.6;           // 3rd-person observer azimuth (independent of gaze)
  let idleSec = 0, autoBlend = 1;
  const IDLE_BEFORE_AUTO = 3.0;
  const viewMode = () => VIEW_MODES[viewModeIdx];

  // Movement state — WASD / R-F (fly) on desktop, on-screen joystick on touch
  const moveKeys = { w:false, a:false, s:false, d:false, up:false, down:false };
  const joy = { active:false, x:0, y:0 };   // -1..1 ; +y is "pull back"
  const MOVE_SPEED = 3.4;                    // world units / second

  // MUST match Three.js avatar.rotation.y: rotating the avatar's local -Z
  // forward by yaw gives (-sin yaw, 0, -cos yaw). Earlier this used +sin,
  // so the body faced one way while it moved / heard / aimed the camera the
  // mirror way — that was the root of "x backwards" + "walks toward camera
  // not avatar."
  function fwdVec(yaw, pitch) {
    return new THREE.Vector3(
      -Math.sin(yaw) * Math.cos(pitch),
       Math.sin(pitch),
      -Math.cos(yaw) * Math.cos(pitch)
    );
  }
  function faceRoom() {
    const c = new THREE.Vector3(-1.2, AVATAR_EYE, -2);
    const d = new THREE.Vector3().subVectors(c, avatar.position);
    lookYaw = Math.atan2(d.x, -d.z);
  }
  faceRoom();
  function recenterView() {
    avatar.position.copy(AVATAR_POS);
    faceRoom();
    lookPitch = 0; camDist = 6.0;
    idleSec = 0; autoBlend = 0;
  }

  // ── Interaction — device-aware ───────────────────────
  const isTouch = window.matchMedia('(pointer: coarse)').matches || ('ontouchstart' in window);
  const navHintEl = document.getElementById('navHint');
  navHintEl.textContent = isTouch
    ? 'left thumb-stick to move · drag to look · pinch to zoom · double-tap to recenter'
    : 'wasd to move · r/f up·down · drag to look · scroll to zoom · double-click to recenter';

  const sceneEl = renderer.domElement;
  let dragging = false, lastPX = 0, lastPY = 0;
  let pinchActive = false, pinchStartDist = 0, pinchStartCamDist = 0;
  let lastTapMs = 0;
  const DRAG_SENS = 0.005;

  function bumpIdle() { idleSec = 0; autoBlend = 0; navHintEl.classList.add('show'); }
  function touchDist(e) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.hypot(dx, dy);
  }
  // Drag turns the PLAYER's gaze — head, ears (listener), and the bound
  // camera in 1st/2nd. In 3rd person the observer camera is independent,
  // so drag visibly turns the avatar's head + the sound field rather than
  // just swinging the camera. (+dx so drag-right looks right.)
  function applyDrag(dx, dy) {
    bumpIdle();
    // Matches the binaural-explorer convention: drag-right looks right,
    // drag-down looks down (yaw -= dx, pitch -= dy). Pitch range is wide
    // and deliberately hyperreal — near ±83°, far past natural neck range.
    lookYaw   -= dx * DRAG_SENS;
    lookPitch -= dy * DRAG_SENS;
    lookPitch = Math.max(-1.45, Math.min(1.45, lookPitch));
  }

  // Mouse / pen
  sceneEl.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch') return;
    dragging = true; lastPX = e.clientX; lastPY = e.clientY; bumpIdle();
    sceneEl.setPointerCapture && sceneEl.setPointerCapture(e.pointerId);
  });
  sceneEl.addEventListener('pointermove', e => {
    if (!dragging || e.pointerType === 'touch') return;
    applyDrag(e.clientX - lastPX, e.clientY - lastPY);
    lastPX = e.clientX; lastPY = e.clientY;
  });
  sceneEl.addEventListener('pointerup',     () => { dragging = false; });
  sceneEl.addEventListener('pointercancel', () => { dragging = false; });
  sceneEl.addEventListener('wheel', e => {
    e.preventDefault();
    camDist = Math.max(2.2, Math.min(16, camDist + e.deltaY * 0.01));
    bumpIdle();
  }, { passive: false });
  sceneEl.addEventListener('dblclick', recenterView);

  // Touch — 1-finger drag = look, 2-finger pinch = zoom, double-tap recenter.
  // (The joystick is a separate element with its own handlers; touches that
  // land on it never reach the canvas.)
  sceneEl.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      dragging = true; lastPX = e.touches[0].clientX; lastPY = e.touches[0].clientY; bumpIdle();
    } else if (e.touches.length === 2) {
      pinchActive = true; pinchStartDist = touchDist(e); pinchStartCamDist = camDist;
    }
  }, { passive: true });
  sceneEl.addEventListener('touchmove', e => {
    if (pinchActive && e.touches.length === 2) {
      const d = touchDist(e);
      camDist = Math.max(2.2, Math.min(16, pinchStartCamDist * (pinchStartDist / Math.max(1, d))));
      bumpIdle();
    } else if (dragging && e.touches.length === 1) {
      applyDrag(e.touches[0].clientX - lastPX, e.touches[0].clientY - lastPY);
      lastPX = e.touches[0].clientX; lastPY = e.touches[0].clientY;
    }
  }, { passive: true });
  sceneEl.addEventListener('touchend', e => {
    if (e.touches.length === 0) {
      dragging = false; pinchActive = false;
      const now = performance.now();
      if (now - lastTapMs < 300) recenterView();
      lastTapMs = now;
    }
  });

  // ── WASD / fly keys ──────────────────────────────────
  // NOTE: space is deliberately NOT a movement key — pressing space is the
  // natural "press a key to start the audio" gesture, and binding it to
  // fly-up sent the avatar into the ceiling. R = up, F = down.
  const MOVE_KEYCODES = new Set(['w','a','s','d','r','f','arrowup','arrowdown','arrowleft','arrowright']);
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'arrowup')    moveKeys.w = true;
    else if (k === 's' || k === 'arrowdown')  moveKeys.s = true;
    else if (k === 'a' || k === 'arrowleft')  moveKeys.a = true;
    else if (k === 'd' || k === 'arrowright') moveKeys.d = true;
    else if (k === 'r')                  moveKeys.up = true;
    else if (k === 'f')                  moveKeys.down = true;
    if (MOVE_KEYCODES.has(k)) { bumpIdle(); e.preventDefault(); }
  });
  window.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'arrowup')    moveKeys.w = false;
    else if (k === 's' || k === 'arrowdown')  moveKeys.s = false;
    else if (k === 'a' || k === 'arrowleft')  moveKeys.a = false;
    else if (k === 'd' || k === 'arrowright') moveKeys.d = false;
    else if (k === 'r')                  moveKeys.up = false;
    else if (k === 'f')                  moveKeys.down = false;
  });

  // ── On-screen joystick (touch) ───────────────────────
  const joyEl = document.getElementById('joystick');
  const joyThumb = document.getElementById('joyThumb');
  if (isTouch) joyEl.style.display = 'block';
  let joyId = null;
  function joyGeom() {
    const r = joyEl.getBoundingClientRect();
    return { cx: r.left + r.width / 2, cy: r.top + r.height / 2, rad: r.width / 2 };
  }
  function updateJoy(touch) {
    const g = joyGeom();
    let dx = touch.clientX - g.cx, dy = touch.clientY - g.cy;
    const dist = Math.hypot(dx, dy);
    if (dist > g.rad) { dx = dx / dist * g.rad; dy = dy / dist * g.rad; }
    joy.x = dx / g.rad; joy.y = dy / g.rad;
    joyThumb.style.transform = `translate(${dx}px, ${dy}px)`;
    bumpIdle();
  }
  joyEl.addEventListener('touchstart', e => {
    e.preventDefault();
    joy.active = true; joyId = e.changedTouches[0].identifier;
    updateJoy(e.changedTouches[0]);
  }, { passive: false });
  joyEl.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const tch of e.changedTouches) if (tch.identifier === joyId) updateJoy(tch);
  }, { passive: false });
  function endJoy(e) {
    for (const tch of e.changedTouches) {
      if (tch.identifier === joyId) {
        joy.active = false; joy.x = 0; joy.y = 0; joyId = null;
        joyThumb.style.transform = 'translate(0,0)';
      }
    }
  }
  joyEl.addEventListener('touchend', endJoy);
  joyEl.addEventListener('touchcancel', endJoy);

  // View-mode toggle button (cycles 3rd → 2nd → 1st)
  const viewTabBtn = document.getElementById('viewTab');
  viewTabBtn.addEventListener('click', () => {
    viewModeIdx = (viewModeIdx + 1) % VIEW_MODES.length;
    viewTabBtn.textContent = 'view: ' + VIEW_LABELS[viewMode()];
    bumpIdle();
  });

  // ── Main frame loop ──────────────────────────────────
  let t = 0;
  const lookTarget = new THREE.Vector3(-1.2, 0.9, -2);
  camera.position.set(2, 4, 8);   // seed near the 3rd-person spot; lerps in

  function frame() {
    t += 0.0024;

    // ── Camera rig ─────────────────────────────────────
    const dt = 0.016;
    idleSec += dt;
    // After a few idle seconds, auto-rotate gradually re-engages: the orbit
    // drifts in 3rd person, the gaze drifts in over/first. Interaction snaps
    // autoBlend back to 0 (full manual).
    if (idleSec > IDLE_BEFORE_AUTO) autoBlend = Math.min(1, autoBlend + dt * 0.2);
    // Idle auto-motion: in 3rd person the third-party observer camera orbits
    // (you watch yourself from shifting angles, gaze held); in 1st/2nd the
    // gaze itself slowly pans. Eases back in after a few idle seconds.
    if (autoBlend > 0) lookYaw += dt * 0.07 * autoBlend;

    // ── Movement (WASD + joystick), relative to the gaze ───
    let mvF = 0, mvR = 0, mvU = 0;
    if (moveKeys.w) mvF += 1;
    if (moveKeys.s) mvF -= 1;
    if (moveKeys.d) mvR += 1;
    if (moveKeys.a) mvR -= 1;
    if (moveKeys.up) mvU += 1;
    if (moveKeys.down) mvU -= 1;
    if (joy.active) { mvR += joy.x; mvF -= joy.y; }   // +joy.y is pull-back
    if (mvF || mvR || mvU) {
      bumpIdle();
      const step = MOVE_SPEED * dt;
      const fF = new THREE.Vector3(-Math.sin(lookYaw), 0, -Math.cos(lookYaw));  // facing (matches avatar)
      const rF = new THREE.Vector3( Math.cos(lookYaw), 0, -Math.sin(lookYaw));  // avatar's right = F × up
      avatar.position.addScaledVector(fF, mvF * step);
      avatar.position.addScaledVector(rF, mvR * step);
      avatar.position.y = Math.max(0, Math.min(6, avatar.position.y + mvU * step));
      avatar.position.x = Math.max(-12, Math.min(12, avatar.position.x));
      avatar.position.z = Math.max(-12, Math.min(12, avatar.position.z));
    }

    // ── Gaze drives head + camera + listener ───────────
    avatar.rotation.y = lookYaw;   // visible head turns with the gaze
    const eye  = new THREE.Vector3(avatar.position.x, avatar.position.y + AVATAR_EYE, avatar.position.z);
    const fwd  = fwdVec(lookYaw, lookPitch);
    const fwdFlat = fwdVec(lookYaw, 0);

    let camTarget, lookAtP;
    const vm = viewMode();
    if (vm === 'first') {
      avHead.visible = false; avNose.visible = false;
      camTarget = eye.clone();
      lookAtP = eye.clone().add(fwd);
    } else if (vm === 'over') {       // over-the-shoulder, behind the gaze
      avHead.visible = true; avNose.visible = true;
      camTarget = eye.clone().addScaledVector(fwdFlat, -1.6); camTarget.y += 0.4;
      lookAtP = eye.clone().add(fwd.clone().multiplyScalar(3));
    } else {  // third — follow camera BEHIND the gaze, lagging (slow lerp)
              // so head-turns stay visible before the camera catches up.
              // Movement (W) runs along the facing = into the screen, so
              // "forward" is unambiguous; sound + head turn with the gaze.
      avHead.visible = true; avNose.visible = true;
      camTarget = eye.clone().addScaledVector(fwdFlat, -camDist);
      camTarget.y += camDist * 0.32 + 0.6;
      lookAtP = eye.clone().add(fwd.clone().multiplyScalar(1.8));
    }
    camera.position.lerp(camTarget, vm === 'first' ? 0.5 : (vm === 'over' ? 0.25 : 0.08));
    camera.lookAt(lookAtP);
    lookTarget.copy(lookAtP);

    // Listener: ears stay ON the avatar (eye position), oriented along the
    // gaze. So rotating the view rotates the binaural field — the sound
    // turns with the head, as it should for a 1st-person listener.
    if (audioCtx) {
      const l = audioCtx.listener;
      if (l.positionX) {
        l.positionX.value = eye.x; l.positionY.value = eye.y; l.positionZ.value = eye.z;
        l.forwardX.value = fwd.x; l.forwardY.value = fwd.y; l.forwardZ.value = fwd.z;
        l.upX.value = 0; l.upY.value = 1; l.upZ.value = 0;
      } else {
        l.setPosition(eye.x, eye.y, eye.z);
        l.setOrientation(fwd.x, fwd.y, fwd.z, 0, 1, 0);
      }
    }

    // Energy
    const dx = mx - lx, dy = my - ly;
    const speed = Math.sqrt(dx*dx + dy*dy);
    energy = Math.min(300, energy + speed * 0.6);
    energy *= 0.92;
    lx = mx; ly = my;
    const e = Math.min(1, energy / 180);

    // Backroom glow pulse (sync to audio LFO)
    const audioT = audioCtx ? audioCtx.currentTime : t * 60;
    const pulse = (Math.sin(audioT * 1.16 * Math.PI * 2) + 1) / 2;
    backGlowMat.opacity = 0.10 + pulse * 0.22 + e * 0.18;

    // Dancer sway
    for (const d of dancers) {
      const i = d.userData.dancerIdx;
      const baseX = -1.6 + (i - 1) * 0.42;
      d.userData.origPos.x = baseX + Math.sin(t * 5 + i) * 0.06 * (1 + e * 4);
    }

    // Tensegrities — wobble + cable update
    for (const p of tensegrities) updateTPrism(t, p);

    // Heads — looking around + bobbing + speech
    const nowSec = audioT;  // use audio clock if available, else proxy
    for (const h of heads) {
      h.bobPhase += 0.018;
      h.group.position.copy(h.pos);
      h.group.position.y += Math.sin(h.bobPhase) * 0.05;

      h.nextLookAt -= 0.016;  // ~ assumes 60fps; close enough for a "look around" cadence
      if (h.nextLookAt <= 0) {
        // Sometimes look at the camera (most attention-grabbing), sometimes a random direction
        if (Math.random() < 0.45) {
          const dirToCam = new THREE.Vector3().subVectors(camera.position, h.group.position);
          h.targetRotY = Math.atan2(dirToCam.x, dirToCam.z);
          h.targetRotX = -Math.atan2(dirToCam.y - 0, Math.sqrt(dirToCam.x*dirToCam.x + dirToCam.z*dirToCam.z));
        } else {
          h.targetRotY += (Math.random() - 0.5) * Math.PI;
          h.targetRotX = (Math.random() - 0.5) * 0.4;
        }
        h.nextLookAt = 3 + Math.random() * 5;
      }
      h.curRotY += (h.targetRotY - h.curRotY) * 0.04;
      h.curRotX += (h.targetRotX - h.curRotX) * 0.04;
      h.group.rotation.y = h.curRotY;
      h.group.rotation.x = h.curRotX;
      h.group.userData.origRotY = h.curRotY;  // rebase so glitch jitters around current

      // Speech scheduling
      h.nextSpeak -= 0.016;
      if (h.nextSpeak <= 0 && audioCtx && speakHeadFn) {
        speakHeadFn(h.idx);
        spawnSoundRing(h);
        h.mouthOpen = 1.0;
        h.mouthDecay = 0;
        h.nextSpeak = 8 + Math.random() * 14;  // 8–22s
      }

      // Mouth: open + decay
      if (h.mouthOpen > 0) {
        h.mouthDecay += 0.04;
        h.mouthOpen = Math.max(0, 1 - h.mouthDecay);
      }
      const sc = 1 + h.mouthOpen * 1.1 + Math.sin(t * 36) * h.mouthOpen * 0.3;
      h.mouth.scale.set(sc, sc, sc);
    }

    // Sound rings — expand + fade
    for (let i = ringPool.length - 1; i >= 0; i--) {
      const r = ringPool[i];
      const age = (performance.now() / 1000) - r._t0;
      if (age > 0.8) {
        scene.remove(r.ring); r.geo.dispose(); r.mat.dispose();
        ringPool.splice(i, 1);
        continue;
      }
      const s = 1 + age * 14;
      r.ring.scale.set(s, s, s);
      r.mat.opacity = Math.max(0, 0.5 * (1 - age / 0.8));
      r.ring.lookAt(camera.position);
    }

    // Glitch — much more subtle on the room as a whole; tensegrity flora
    // (struts + cables) glitches harder via the glitchExtreme flag, so the
    // plant + tree visibly disintegrate while the architecture barely
    // shudders. Numbers reduced ~75% from the previous pass.
    const jX = e * 0.32, jY = e * 0.16, jZ = e * 0.32;       // base
    const eX = e * 1.9,  eY = e * 1.0,  eZ = e * 1.9;        // extreme (tensegrity)
    for (const obj of allLines) {
      const orig = obj.userData.origPos;
      if (!orig) continue;
      const ext = obj.userData.glitchExtreme === true;
      const aX = ext ? eX : jX, aY = ext ? eY : jY, aZ = ext ? eZ : jZ;
      obj.position.x = orig.x + (Math.random() - 0.5) * aX;
      obj.position.y = orig.y + (Math.random() - 0.5) * aY;
      obj.position.z = orig.z + (Math.random() - 0.5) * aZ;
      // RenderOrder shuffle: only at higher energies, and meaningful only
      // for the extreme group.
      if (e > 0.3) {
        obj.renderOrder = (Math.random() - 0.5) * (e - 0.3) * (ext ? 6 : 1.2);
      } else {
        obj.renderOrder = 0;
      }
      // depthTest sabotage: rare for the room, more frequent for extremes.
      const flickerProb = ext ? e * 0.42 : e * 0.10;
      if (obj.material) {
        obj.material.depthTest = Math.random() > flickerProb;
      } else if (obj.children) {
        for (const c of obj.children) {
          if (c.material) c.material.depthTest = Math.random() > flickerProb;
        }
      }
    }
    if (e > 0.15) {
      figure.rotation.y = figure.userData.origRotY + (Math.random() - 0.5) * e * 0.18;
    } else {
      figure.rotation.y = figure.userData.origRotY;
    }

    // FOV wobble — subtle. Was e*14 + e*4; now e*3 + e*1.
    camera.fov = baseFov + Math.sin(t * 7) * e * 3 + (Math.random() - 0.5) * e * 1;
    camera.updateProjectionMatrix();

    // Motes
    const pos = motePts.geometry.attributes.position.array;
    for (let i = 0; i < moteCount; i++) {
      pos[i*3+1] = motes[i].baseY + Math.sin(t * 4 + motes[i].phase) * 0.35;
      pos[i*3]   += Math.sin(t * 0.7 + motes[i].phase) * 0.0006;
      pos[i*3+2] += Math.cos(t * 0.5 + motes[i].phase) * 0.0006;
    }
    motePts.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
    requestAnimationFrame(frame);
  }
  frame();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

// ─── Audio ─────────────────────────────────────────────────────────────────
(() => {
  let started = false;

  function startAudio() {
    if (started) return;
    started = true;
    document.getElementById('enterHint').classList.add('gone');

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;

    const master = audioCtx.createGain();
    master.gain.value = 0;
    // Quieter overall — was 0.55, dropped to 0.42. Sub is meant to be
    // background atmosphere, not an event you notice.
    const MASTER_LEVEL = 0.42;
    master.gain.setTargetAtTime(MASTER_LEVEL, now, 6);
    master.connect(audioCtx.destination);

    // ── Fade + suspend when this "frontpage" goes to the background ──────
    // Standard for ambient frontpages (NOT instruments / not TelloFoam):
    // when the tab is hidden, fade the master to silence and suspend the
    // context; when it returns, resume + fade back. On desktop the audio
    // WOULD keep playing in a background tab — this is a deliberate UX
    // choice. On mobile the OS suspends the context for us anyway; this
    // handler also drives the resume + fade-back-in on return (mobile
    // can't smoothly fade OUT because the page is frozen the instant it
    // backgrounds, but it fades back IN cleanly).
    document.addEventListener('visibilitychange', () => {
      if (!audioCtx) return;
      if (document.hidden) {
        try { master.gain.setTargetAtTime(0, audioCtx.currentTime, 0.25); } catch (e) {}
        // Suspend slightly after the fade so the tail isn't chopped on desktop.
        setTimeout(() => { if (document.hidden && audioCtx.state === 'running') audioCtx.suspend(); }, 400);
      } else {
        const resume = () => {
          master.gain.setTargetAtTime(MASTER_LEVEL, audioCtx.currentTime, 0.6);
        };
        if (audioCtx.state === 'suspended') audioCtx.resume().then(resume).catch(resume);
        else resume();
      }
    });

    // Helper: every panner created here picks up the current live binaural
    // params + panning mode at construction. After creation the panner is
    // pushed to allPanners so the settings tab keeps it in lockstep.
    function makePanner(x, y, z) {
      const p = audioCtx.createPanner();
      p.panningModel  = panningMode;
      p.distanceModel = binauralParams.distanceModel;
      p.refDistance   = binauralParams.refDistance;
      p.rolloffFactor = binauralParams.rolloffFactor;
      p.maxDistance   = binauralParams.maxDistance;
      p.coneInnerAngle = 360;
      p.setPosition(x, y, z);
      p.connect(master);
      allPanners.push(p);
      return p;
    }

    // ── Sub-pulse from the backroom — pushed deeper + quieter ─────────
    // Was at (-1.6, 1.0, -6.8); now well past the back wall and a touch
    // lower. With distance attenuation this reads as "further away."
    const subPanner = makePanner(-1.6, 0.7, -9.2);

    const sub = audioCtx.createOscillator(); sub.type = 'sine'; sub.frequency.value = 52;
    const subTwin = audioCtx.createOscillator(); subTwin.type = 'sine'; subTwin.frequency.value = 52.6;

    const pulseGain = audioCtx.createGain(); pulseGain.gain.value = 0.55;
    const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 1.16;
    const lfoDepth = audioCtx.createGain(); lfoDepth.gain.value = 0.45;
    lfo.connect(lfoDepth).connect(pulseGain.gain);

    const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = 85; lpf.Q.value = 0.5;

    const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
    const nch = noiseBuf.getChannelData(0);
    let lastSample = 0;
    for (let i = 0; i < nch.length; i++) {
      const white = Math.random() * 2 - 1;
      lastSample = (lastSample + 0.025 * white) / 1.025;
      nch[i] = lastSample * 3.5;
    }
    const noise = audioCtx.createBufferSource(); noise.buffer = noiseBuf; noise.loop = true;
    const noiseLpf = audioCtx.createBiquadFilter(); noiseLpf.type = 'lowpass'; noiseLpf.frequency.value = 240; noiseLpf.Q.value = 0.7;
    const noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.045;

    sub.connect(pulseGain); subTwin.connect(pulseGain);
    pulseGain.connect(lpf); lpf.connect(subPanner);
    noise.connect(noiseLpf); noiseLpf.connect(noiseGain); noiseGain.connect(subPanner);

    sub.start(now); subTwin.start(now); lfo.start(now); noise.start(now);

    // ── Zippery — non-steady high-freq wisp from the backroom ───────────
    // High frequencies localize cleanly under HRTF (the inter-aural cues
    // are strongest in 1.5–6 kHz), while the sub is essentially un-
    // localizable on its own. This wisp gives the listener a directional
    // anchor for "the backroom is over there" without raising volume.
    // It's a bandpass-filtered noise burst whose center frequency sweeps
    // during each burst, fired at irregular intervals.
    // Slightly different position than the sub so the two don't read as
    // a single point source.
    const zipPanner = makePanner(-2.4, 1.7, -8.4);
    const zipNoise = audioCtx.createBufferSource();
    zipNoise.buffer = noiseBuf; zipNoise.loop = true;
    const zipBp = audioCtx.createBiquadFilter();
    zipBp.type = 'bandpass'; zipBp.Q.value = 11; zipBp.frequency.value = 2800;
    const zipGain = audioCtx.createGain(); zipGain.gain.value = 0;
    zipNoise.connect(zipBp); zipBp.connect(zipGain); zipGain.connect(zipPanner);
    zipNoise.start(now);

    function scheduleZip() {
      if (!audioCtx) return;
      const t0 = audioCtx.currentTime + 0.01;
      const dur = 0.18 + Math.random() * 0.55;
      const startFreq = 2000 + Math.random() * 3500;
      const endFreq   = 600  + Math.random() * 4500;
      zipBp.frequency.cancelScheduledValues(t0);
      zipBp.frequency.setValueAtTime(startFreq, t0);
      zipBp.frequency.exponentialRampToValueAtTime(Math.max(150, endFreq), t0 + dur);
      zipGain.gain.cancelScheduledValues(t0);
      zipGain.gain.setValueAtTime(0, t0);
      zipGain.gain.linearRampToValueAtTime(0.22, t0 + 0.04);
      zipGain.gain.linearRampToValueAtTime(0,    t0 + dur);
      // Irregular gaps so it never feels metronomic
      setTimeout(scheduleZip, (dur + 1.6 + Math.random() * 4.5) * 1000);
    }
    setTimeout(scheduleZip, 2500 + Math.random() * 3000);

    // ── Per-head speech voices ──────────────────────────
    // Each head has its own oscillator chain → bandpass → AM gain →
    // panner → master. The osc runs continuously; speakHead() ramps the
    // AM gain in a short pattern of "syllables" while randomly tweaking
    // the oscillator frequency to produce garbled, alien speech tone.
    const headBaseFreqs = [180, 240, 130];  // 3 distinct registers
    const headVoices = [];
    for (let i = 0; i < heads.length; i++) {
      const h = heads[i];
      const panner = makePanner(h.pos.x, h.pos.y, h.pos.z);

      // Two oscillators (saw + square detuned) for richness
      const osc1 = audioCtx.createOscillator(); osc1.type = 'sawtooth'; osc1.frequency.value = headBaseFreqs[i];
      const osc2 = audioCtx.createOscillator(); osc2.type = 'square';   osc2.frequency.value = headBaseFreqs[i] * 1.005;

      const oscMix = audioCtx.createGain(); oscMix.gain.value = 0.5;
      osc1.connect(oscMix); osc2.connect(oscMix);

      // Bandpass — formant-ish, gives a vocal-tract feel
      const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = 1200 + i * 350; bp.Q.value = 6;

      // Highpass to kill DC/sub mud from the saw
      const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 200;

      // AM gate — gated open during speak()
      const am = audioCtx.createGain(); am.gain.value = 0;

      oscMix.connect(hp); hp.connect(bp); bp.connect(am); am.connect(panner);
      osc1.start(now); osc2.start(now);

      headVoices.push({ osc1, osc2, am, bp, baseFreq: headBaseFreqs[i] });
    }

    // Expose the speak function so the scene loop can trigger it.
    // Longer, more elaborate gibberish than v0: 6–11 syllables, varied
    // syllable durations, occasional held vowels, total ~1.0–2.4s.
    speakHeadFn = function (idx) {
      const v = headVoices[idx];
      if (!v) return;
      const t0 = audioCtx.currentTime;
      const segs = 6 + Math.floor(Math.random() * 6);   // 6–11 syllables
      const segDurs = [];
      const gaps    = [];
      let totalDur = 0;
      for (let s = 0; s < segs; s++) {
        // Some syllables short, some held — gives a more speech-like rhythm
        const isHeld = Math.random() < 0.18;
        const segDur = isHeld ? 0.22 + Math.random() * 0.18 : 0.08 + Math.random() * 0.10;
        const gap    = 0.04 + Math.random() * 0.06;
        segDurs.push(segDur); gaps.push(gap);
        totalDur += segDur + gap;
      }

      // Schedule AM envelope per syllable
      v.am.gain.cancelScheduledValues(t0);
      v.am.gain.setValueAtTime(0, t0);
      let cursor = 0;
      for (let s = 0; s < segs; s++) {
        const ts = t0 + cursor;
        v.am.gain.linearRampToValueAtTime(0.30, ts + 0.018);
        v.am.gain.linearRampToValueAtTime(0.0,  ts + segDurs[s]);
        cursor += segDurs[s] + gaps[s];
      }

      // Pitch warble — random walk on osc1 around base freq, denser sampling.
      v.osc1.frequency.cancelScheduledValues(t0);
      const fineSteps = Math.max(20, segs * 6);
      const stepDur = totalDur / fineSteps;
      for (let f = 0; f < fineSteps; f++) {
        const ts = t0 + f * stepDur;
        const ratio = 0.65 + Math.random() * 0.8;        // 0.65×–1.45× base
        v.osc1.frequency.setValueAtTime(v.baseFreq * ratio, ts);
      }
      // After speak ends, return to base
      v.osc1.frequency.setValueAtTime(v.baseFreq, t0 + totalDur + 0.05);
    };

    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function unlockOnce() {
    startAudio();
    document.removeEventListener('pointerdown', unlockOnce);
    document.removeEventListener('keydown', unlockOnce);
  }
  document.addEventListener('pointerdown', unlockOnce);
  document.addEventListener('keydown', unlockOnce);
})();
</script>
