<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>__</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    background: #000;
    font-family: 'Helvetica Neue', 'Inter', system-ui, sans-serif;
  }
  canvas {
    display: block;
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  canvas#field   { z-index: 1; }
  canvas#strobe  { z-index: 2; mix-blend-mode: screen; }
  /* Scanline tint */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(255,255,255,0.025) 2px,
      rgba(255,255,255,0.025) 3px);
    mix-blend-mode: overlay;
  }
  .nav-link {
    position: fixed;
    color: #ffffff;
    font-size: clamp(11px, 1.1vw, 13px);
    font-weight: 800;
    letter-spacing: 0.22em;
    text-decoration: none;
    z-index: 10;
    transform: translate(-50%, -50%);
    text-align: center;
    text-transform: uppercase;
    mix-blend-mode: difference;
    white-space: nowrap;
    transition: text-shadow 0.12s, letter-spacing 0.4s;
  }
  .nav-link::before {
    content: '[';
    margin-right: 0.4em;
    color: #ff00aa;
  }
  .nav-link::after {
    content: ']';
    margin-left: 0.4em;
    color: #00ffaa;
  }
  .nav-link:hover {
    text-shadow:
      -2px 0 #ff00aa,
       2px 0 #00ffaa,
       0 -2px #ffe700;
    animation: jitter 0.07s steps(2) infinite;
    letter-spacing: 0.32em;
  }
  @keyframes jitter {
    0%   { transform: translate(-50%, -50%); }
    50%  { transform: translate(-50.6%, -49.6%); }
    100% { transform: translate(-49.4%, -50.4%); }
  }
  .nav-link .sublabel {
    display: block;
    font-size: 0.7em;
    margin-top: 0.3em;
    opacity: 0.7;
    letter-spacing: 0.18em;
  }
  /* Title — heavy, glitch-jittered */
  #title {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.08);
    font-size: clamp(28px, 6vw, 96px);
    mix-blend-mode: screen;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="field"></canvas>
<canvas id="strobe"></canvas>
<div id="title">CHRISTOPHER&nbsp;O.</div>
<a class="nav-link" href="/about/"                 style="left:8vw;  top:14vh;">about</a>
<a class="nav-link" href="/calendar/"              style="left:92vw; top:14vh;">events<span class="sublabel">public</span></a>
<a class="nav-link" href="/lessons/"               style="left:8vw;  top:88vh;">lessons</a>
<a class="nav-link" href="/web-instruments/"       style="left:92vw; top:88vh;">playables</a>
<a class="nav-link" href="/thesomethingnightclub/" style="left:50vw; top:6vh;">the something nightclub<span class="sublabel">doors · 2 a.m.</span></a>

<script>
// ── Particle storm ─────────────────────────────────────────────────────
// 1800 particles in a 2D curl-noise flow field. Periodically pulled
// toward letterform attractor points sampled from CHRISTOPHER OVERSTREET.
// Strobe band glitches sweep the canvas. Hot palette cycles.
const fieldC = document.getElementById('field');
const fctx   = fieldC.getContext('2d');
const stroC  = document.getElementById('strobe');
const sctx   = stroC.getContext('2d');

const dpr = Math.min(window.devicePixelRatio || 1, 2);
let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  for (const c of [fieldC, stroC]) {
    c.width  = W * dpr;
    c.height = H * dpr;
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  rebuildAttractors();
}

const N_PART = (() => {
  const isPhone = Math.min(window.innerWidth, window.innerHeight) < 600;
  return isPhone ? 900 : 1800;
})();
const particles = [];
let mx = -9999, my = -9999, mxLast = mx, myLast = my, mSpeed = 0;

document.addEventListener('pointermove', e => {
  mx = e.clientX; my = e.clientY;
});

// Pseudo curl-noise (cheap)
function noise(x, y, t) {
  return Math.sin(x*0.011 + t*0.4)  * 0.40
       + Math.sin(y*0.017 + t*0.3)  * 0.30
       + Math.sin((x+y)*0.008 + t*0.5) * 0.20
       + Math.sin((x-y)*0.014 + t*0.7) * 0.10;
}
function curlAt(x, y, t) {
  const eps = 1.6;
  const dndy = noise(x, y+eps, t) - noise(x, y-eps, t);
  const dndx = noise(x+eps, y, t) - noise(x-eps, y, t);
  return [dndy, -dndx];
}

// Letter attractor points
let attractors = [];
function rebuildAttractors() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const o = off.getContext('2d');
  o.fillStyle = '#fff';
  const fs = Math.min(W * 0.07, 80);
  o.font = `900 ${fs}px "Helvetica Neue", system-ui, sans-serif`;
  o.textAlign = 'center';
  o.textBaseline = 'middle';
  o.fillText('CHRISTOPHER OVERSTREET', W/2, H/2);
  const data = o.getImageData(0, 0, W, H).data;
  attractors = [];
  const step = Math.max(3, Math.floor(W / 380));
  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      if (data[(y*W + x)*4] > 100) attractors.push([x, y]);
    }
  }
}

resize();
window.addEventListener('resize', resize);

for (let i = 0; i < N_PART; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: 0, vy: 0,
    hue: Math.random() * 360,
    target: Math.floor(Math.random() * Math.max(1, attractors.length))
  });
}

// Attractor mode timeline: free-flow → assembly → hold → scatter
// state cycles over ~10 s with an easing curve
let modeT = 0;          // seconds
let modeFlow = 1;       // 0..1 ; 1 = curl flow only, 0 = pure attractor
let lastTick = performance.now();

let frame = 0;
fctx.fillStyle = '#000';
fctx.fillRect(0, 0, W, H);

function tick() {
  requestAnimationFrame(tick);
  frame++;
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastTick) / 1000);
  lastTick = now;
  modeT += dt;

  // Cycle: 5 s flow → 1 s assemble-in → 2.5 s hold → 1.5 s explode out
  // (10 s total). Phase value 0..1 across cycle.
  const cyc = (modeT % 10) / 10;
  if (cyc < 0.50)      modeFlow = 1;
  else if (cyc < 0.62) modeFlow = 1 - (cyc - 0.50) / 0.12;
  else if (cyc < 0.85) modeFlow = 0;
  else                 modeFlow = (cyc - 0.85) / 0.15;

  // Cursor speed for warp strength
  const dx = mx - mxLast, dy = my - myLast;
  mSpeed = mSpeed * 0.86 + Math.min(160, Math.sqrt(dx*dx + dy*dy)) * 0.14;
  mxLast = mx; myLast = my;

  // Trail decay — additive layering for glow
  fctx.globalCompositeOperation = 'source-over';
  fctx.fillStyle = 'rgba(0,0,0,0.10)';
  fctx.fillRect(0, 0, W, H);

  fctx.globalCompositeOperation = 'lighter';

  const tn = frame * 0.012;
  const cursorActive = mx > -9000;

  for (const p of particles) {
    // Curl flow
    const [cx, cy] = curlAt(p.x, p.y, tn);
    let ax = cx * 1.4;
    let ay = cy * 1.4;

    // Cursor attractor — strong when cursor active and moving
    if (cursorActive) {
      const px = mx - p.x, py = my - p.y;
      const d = Math.max(40, Math.sqrt(px*px + py*py));
      const k = (mSpeed > 5 ? 80 : 22) / d;
      ax += (px / d) * k;
      ay += (py / d) * k;
    }

    // Attractor pull during assembly phase
    if (modeFlow < 1 && attractors.length) {
      const a = attractors[p.target % attractors.length];
      const tx = a[0] - p.x, ty = a[1] - p.y;
      const ad = Math.max(2, Math.sqrt(tx*tx + ty*ty));
      const aw = (1 - modeFlow) * 0.18;
      ax += (tx / ad) * aw * Math.min(40, ad);
      ay += (ty / ad) * aw * Math.min(40, ad);
    }

    p.vx = (p.vx + ax) * 0.92;
    p.vy = (p.vy + ay) * 0.92;
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;

    // Wrap edges
    if (p.x < 0) p.x += W;
    if (p.x > W) p.x -= W;
    if (p.y < 0) p.y += H;
    if (p.y > H) p.y -= H;

    // Color cycle, hot palette
    p.hue = (p.hue + 0.6) % 360;
    const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    const a = 0.16 + Math.min(0.6, speed * 0.06);

    // Hot bias: shift hue toward magenta/cyan/yellow
    const hueDisplay = (p.hue * 0.5 + 280) % 360;
    fctx.fillStyle = `hsla(${hueDisplay},92%,62%,${a})`;
    fctx.fillRect(p.x, p.y, 1.4, 1.4);

    // Speed streak
    if (speed > 2.5) {
      fctx.fillStyle = `hsla(${hueDisplay},92%,75%,${a*0.5})`;
      fctx.fillRect(p.x - p.vx*0.3, p.y - p.vy*0.3, 1.0, 1.0);
    }
  }

  // ── Strobe / glitch band layer ──────────────────────────────────────
  sctx.clearRect(0, 0, W, H);

  // Random horizontal strobe sweep
  if (Math.random() < 0.05) {
    const y = Math.random() * H;
    const h = 2 + Math.random() * 24;
    sctx.globalAlpha = 0.4 + Math.random() * 0.5;
    sctx.fillStyle = ['#fff', '#ff00aa', '#00ffe7', '#ffe700'][Math.floor(Math.random()*4)];
    sctx.fillRect(0, y, W, h);
    sctx.globalAlpha = 1;
  }

  // Slice tear: copy a horizontal slice from field to strobe with shift
  if (Math.random() < 0.18) {
    const y = Math.random() * H;
    const h = 4 + Math.random() * 40;
    const shift = (Math.random() - 0.5) * W * 0.4;
    sctx.globalAlpha = 0.65;
    sctx.drawImage(fieldC, 0, y * dpr, W * dpr, h * dpr,
                           shift, y, W, h);
    sctx.globalAlpha = 1;
  }

  // Block displacement
  if (Math.random() < 0.07) {
    const bx = Math.random() * W;
    const by = Math.random() * H;
    const bw = 30 + Math.random() * 200;
    const bh = 6  + Math.random() * 40;
    const tx = bx + (Math.random() - 0.5) * 200;
    const ty = by + (Math.random() - 0.5) * 60;
    sctx.globalAlpha = 0.55;
    sctx.drawImage(fieldC, bx*dpr, by*dpr, bw*dpr, bh*dpr,
                           tx, ty, bw, bh);
    sctx.globalAlpha = 1;
  }
}
tick();


// ── Audio ─────────────────────────────────────────────────────────────
// Drone with FM. Granular at 6-12 grains/sec. Ring mod on noise bed.
// Crackle ever-present, intensity follows cursor speed.
let actx, master, droneGain, modOsc, modGain, granGain, crackleGain;
let noiseGain, noiseRingOsc;
let started = false, grainBuf;

const MASTER_LEVEL = 0.28;       // overall output (bumped from 0.18)
let pageVisible = (document.visibilityState !== 'hidden');

function startAudio() {
  if (started) return;
  started = true;
  actx = new (window.AudioContext || window.webkitAudioContext)();

  master = actx.createGain();
  master.gain.value = MASTER_LEVEL;
  master.connect(actx.destination);

  // Drone with FM — modOsc → modGain → carrier.frequency
  droneGain = actx.createGain();
  droneGain.gain.value = 0.06;
  droneGain.connect(master);

  const fund = 50;
  modOsc = actx.createOscillator();
  modOsc.type = 'sine';
  modOsc.frequency.value = 0.7;     // slow LFO baseline
  modGain = actx.createGain();
  modGain.gain.value = 6;            // depth (Hz)
  modOsc.connect(modGain);
  modOsc.start();

  for (const r of [1, 1.5, 2.04, 2.97]) {
    const o = actx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = fund * r;
    o.detune.value = (Math.random() - 0.5) * 18;
    modGain.connect(o.frequency);

    const lpf = actx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 1400;
    lpf.Q.value = 0.4;

    const g = actx.createGain();
    g.gain.value = 0.55 / (r * r);
    o.connect(lpf); lpf.connect(g); g.connect(droneGain);
    o.start();
  }

  // Noise bed × ring mod
  noiseGain = actx.createGain();
  noiseGain.gain.value = 0.02;
  noiseGain.connect(master);

  const nb = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random()*2-1;
  const ns = actx.createBufferSource();
  ns.buffer = nb;
  ns.loop = true;

  const ringG = actx.createGain();
  ringG.gain.value = 0;          // multiplied by oscillator → ring mod
  noiseRingOsc = actx.createOscillator();
  noiseRingOsc.type = 'sine';
  noiseRingOsc.frequency.value = 220;
  noiseRingOsc.connect(ringG.gain);
  noiseRingOsc.start();

  ns.connect(ringG); ringG.connect(noiseGain);
  ns.start();

  // Granular bus
  granGain = actx.createGain();
  granGain.gain.value = 0.15;
  granGain.connect(master);

  grainBuf = actx.createBuffer(2, actx.sampleRate * 5, actx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = grainBuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random()*2-1) * 0.7;
      if (Math.random() < 0.005) d[i] = (Math.random() < 0.5 ? 1 : -1);
    }
  }

  // Crackle bus
  crackleGain = actx.createGain();
  crackleGain.gain.value = 0.06;
  crackleGain.connect(master);

  scheduleGrain();
  scheduleCrackle();
}

function scheduleGrain() {
  if (!actx) return;
  const wait = 60 + Math.random() * 110;            // 60–170 ms
  setTimeout(() => {
    if (!actx) return;
    const dur = 0.04 + Math.random() * 0.18;        // 40–220 ms
    const t0 = actx.currentTime + 0.01;
    const src = actx.createBufferSource();
    src.buffer = grainBuf;
    src.playbackRate.value = 0.4 + Math.random() * 1.6;
    src.detune.value = (Math.random() - 0.5) * 200;

    const start = Math.random() * (grainBuf.duration - dur - 0.01);

    const lpf = actx.createBiquadFilter();
    lpf.type = Math.random() < 0.5 ? 'bandpass' : 'highpass';
    lpf.frequency.value = 600 + Math.random() * 4000;
    lpf.Q.value = 0.6 + Math.random() * 4;

    const env = actx.createGain();
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.5 + Math.random() * 0.4, t0 + dur*0.25);
    env.gain.linearRampToValueAtTime(0, t0 + dur);

    const pan = actx.createStereoPanner();
    pan.pan.value = (Math.random() - 0.5) * 1.6;
    pan.pan.value = Math.max(-1, Math.min(1, pan.pan.value));

    src.connect(lpf); lpf.connect(env); env.connect(pan); pan.connect(granGain);
    src.start(t0, start, dur);
    src.stop(t0 + dur + 0.05);

    scheduleGrain();
  }, wait);
}

function scheduleCrackle() {
  if (!actx) return;
  setTimeout(() => {
    if (!actx) return;
    const t0 = actx.currentTime + 0.01;
    const dur = 0.005 + Math.random() * 0.020;
    const src = actx.createBufferSource();
    src.buffer = grainBuf;
    src.playbackRate.value = 1 + Math.random() * 0.5;

    const env = actx.createGain();
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.6, t0 + dur*0.2);
    env.gain.linearRampToValueAtTime(0, t0 + dur);

    const hpf = actx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.value = 2200;

    const pan = actx.createStereoPanner();
    pan.pan.value = (Math.random() - 0.5) * 1.4;
    pan.pan.value = Math.max(-1, Math.min(1, pan.pan.value));

    src.connect(hpf); hpf.connect(env); env.connect(pan); pan.connect(crackleGain);
    src.start(t0, Math.random() * grainBuf.duration * 0.9, dur);
    src.stop(t0 + dur + 0.05);

    scheduleCrackle();
  }, 30 + Math.random() * 90);
}

// Cursor → audio modulation
setInterval(() => {
  if (!actx) return;
  const speedNorm = Math.min(1, mSpeed / 100);
  // Crackle volume tracks cursor speed
  crackleGain.gain.linearRampToValueAtTime(
    0.04 + speedNorm * 0.10, actx.currentTime + 0.2);
  // FM depth + ring mod rate respond to cursor energy
  modGain.gain.linearRampToValueAtTime(
    4 + speedNorm * 18, actx.currentTime + 0.2);
  noiseRingOsc.frequency.linearRampToValueAtTime(
    180 + speedNorm * 800, actx.currentTime + 0.2);
}, 80);

// Hover → beating sine pair
document.querySelectorAll('.nav-link').forEach(a => {
  let nodes = null;
  a.addEventListener('pointerenter', () => {
    if (!actx) return;
    const f = 220 + Math.random() * 180;
    const oscs = [], gains = [];
    for (const df of [-3, 3, -5.4, 5.4]) {
      const o = actx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f + df;
      const g = actx.createGain();
      g.gain.setValueAtTime(0, actx.currentTime);
      g.gain.linearRampToValueAtTime(0.025, actx.currentTime + 0.2);
      o.connect(g); g.connect(master);
      o.start();
      oscs.push(o); gains.push(g);
    }
    nodes = { oscs, gains };
  });
  a.addEventListener('pointerleave', () => {
    if (!actx || !nodes) return;
    const t = actx.currentTime;
    for (let i = 0; i < nodes.oscs.length; i++) {
      nodes.gains[i].gain.cancelScheduledValues(t);
      nodes.gains[i].gain.setValueAtTime(nodes.gains[i].gain.value, t);
      nodes.gains[i].gain.linearRampToValueAtTime(0, t + 0.4);
      nodes.oscs[i].stop(t + 0.45);
    }
    nodes = null;
  });
});

// First-gesture audio unlock — resume() inside the gesture (iOS starts
// the context suspended), retried until 'running', then detached.
// touchend + click are the most reliable unlock events on iOS.
function tryStart() {
  startAudio();
  if (!actx) return;
  actx.resume().then(() => {
    if (actx.state === 'running') {
      for (const ev of ['pointerdown','pointermove','touchstart','touchend','click','keydown'])
        document.removeEventListener(ev, tryStart);
    }
  });
}
document.addEventListener('pointerdown', tryStart);
document.addEventListener('pointermove', tryStart);
document.addEventListener('touchstart', tryStart, { passive: true });
document.addEventListener('touchend',   tryStart, { passive: true });
document.addEventListener('click',      tryStart);
document.addEventListener('keydown',    tryStart);

// Auto-mute + suspend when tab is not in front (standard for non-instrument pages)
// Fade out + suspend when hidden OR the window loses focus; resume + fade
// in on return. Covers tab-switch AND app/window-switch (visibilitychange
// alone misses the latter on desktop).
let bgHidden = false;
function applyBackgroundState() {
  const hidden = (document.visibilityState === 'hidden') || !document.hasFocus();
  pageVisible = !hidden;
  if (hidden === bgHidden) return;
  bgHidden = hidden;
  if (!actx || !master) return;
  const t = actx.currentTime;
  master.gain.cancelScheduledValues(t);
  master.gain.setValueAtTime(master.gain.value, t);
  if (hidden) {
    master.gain.linearRampToValueAtTime(0, t + 0.3);
    setTimeout(() => { if (bgHidden && actx) actx.suspend(); }, 360);
  } else {
    actx.resume();
    master.gain.linearRampToValueAtTime(MASTER_LEVEL, t + 0.4);
  }
}
document.addEventListener('visibilitychange', applyBackgroundState);
window.addEventListener('blur',  applyBackgroundState);
window.addEventListener('focus', applyBackgroundState);
</script>
</body>
