<!--
  ============================================================================
  Binaural Explorer — phone-targeted spatial-audio interface sketch
  ============================================================================
  Deploy path: chriso.org/TestCases/binaural-explorer/

  HISTORY:
    v0.1–v0.5  — see prior versions in git / Notion.
    v0.6 (2026-05-19)
      • iOS audio unlock (silent-buffer trick + resume on every user gesture).
        Note: iOS Safari respects the ringer/silent switch — banner reminds.
      • AUDIO SETTINGS panel (top-right): mute toggle, STEREO/BINAURAL spatial
        mode switch, HRTF refDistance + rolloff sliders.
      • Switchable spatial routing:
          binaural  → PannerNode(panningModel='HRTF') with AudioListener
                      tracking the visual listener's position+orientation
          stereo    → StereoPannerNode with pan derived from
                      speaker-position-in-listener's-right-vector frame
      • Conversation manager now allows ~15% overlap and ~10% interrupt so
        the room feels less rigidly turn-taken.
      • Voice pitch variation widened substantially (per-utterance spread
        0.4–1.8, trend ±0.6, per-word multiplier wider range).
      • WASD navigation (desktop) + virtual joystick (mobile / touch).
        Movement is in the listener's local frame.
      • Player can TALK: spacebar (desktop) or TALK button (mobile).
        Quick tap = short burst; hold = continuous utterance.
      • Three rooms placed around the salon, each with a speaker inside
        and a distinct ConvolverNode reverb (brick / soft / dry).
        Listener+speaker on opposite sides of a wall → direct path is
        occluded (lowpass + gain reduction). Player voice is routed to
        whichever room's reverb the player is currently inside.
      • Top-down camera follows the listener so they don't walk off-screen.

  NOTE TO OTHER CLAUDE SESSIONS:
    Phone-targeted counterpart to /TestCases/spatialAudio/Test01-binaural/.
    Audio is intentionally exploratory — formant garble, synthetic IRs,
    binary occlusion. NOT a serious binaural production rig.
  ============================================================================
-->

<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100vh;
    overflow: hidden;

  #scene { position: fixed; inset: 0; z-index: 1; cursor: grab; }

  .corner {
    position: fixed; z-index: 10;

  .back {

  /* iOS silent-switch reminder (shown briefly when audio is first enabled) */

  #ios-reminder small { color: #d8e2f0; font-size: 0.65rem; letter-spacing: 0.1em; opacity: 0.75; display: block; margin-top: 6px; }

  /* AUDIO settings panel toggle (top-right) */
  #audio-settings-btn {

    font-family: 'Inter', sans-serif; font-weight: 400;

  .ap-toggle-pair { display: flex; gap: 4px; flex: 1; }
  .ap-toggle {

  #track-status {

  #track-row { display: flex; gap: 5px; align-items: center; }

  /* Desktop-specific hint */

  /* Hide joystick on desktop, hide desktop hints on touch */
  body.has-touch .desktop-hint { display: none; }
  body:not(.has-touch) #joystick { display: none; }
  body:not(.has-touch) #talk-btn { display: none; }
</style>

<div class="corner top-center">binaural explorer · v0.6</div>

<div id="ios-reminder">
  iOS · check the ringer switch<br>
  <small>Safari respects the silent-mode switch for Web Audio.<br>

<button id="audio-settings-btn"><span class="dot"></span>AUDIO</button>

<div id="audio-panel">
  <div class="ap-title">Audio Settings</div>

  <div class="ap-row">

<div id="scene"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

const container = document.getElementById('scene');

// Detect touch capability so the right controls show
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.body.classList.add('has-touch');
}
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

// ─── Scene + cameras ────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a1424, 0.010);

const FRUSTUM_H = 22;
function frustumWidth() { return FRUSTUM_H * (window.innerWidth / window.innerHeight); }
const orthoCam = new THREE.OrthographicCamera(
  -frustumWidth()/2, frustumWidth()/2,
   FRUSTUM_H/2, -FRUSTUM_H/2, 0.1, 200
);
orthoCam.position.set(6, 16, 8);
orthoCam.lookAt(0, 0.5, 0);

const perspCam = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.05, 200);

let cameraMode = 'topdown';
let activeCam = orthoCam;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

// ─── Floor / grid / axes ────────────────────────────────────────────────
const grid = new THREE.GridHelper(36, 36, 0x2c4a78, 0x152035);
grid.material.transparent = true; grid.material.opacity = 0.5;
scene.add(grid);
const axisMat = new THREE.LineBasicMaterial({ color: 0x4a7088, transparent: true, opacity: 0.55 });
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
  [new THREE.Vector3(-16, 0.01, 0), new THREE.Vector3(16, 0.01, 0)]), axisMat));
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
  [new THREE.Vector3(0, 0.01, -16), new THREE.Vector3(0, 0.01, 16)]), axisMat));

// ─── Center marker (world origin) ───────────────────────────────────────
function makeCenterMarker(x, z) {
  const grp = new THREE.Group();
  const m  = new THREE.LineBasicMaterial({ color: 0x80c0ff, transparent: true, opacity: 0.75 });
  const md = new THREE.LineBasicMaterial({ color: 0x80c0ff, transparent: true, opacity: 0.4 });
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0,0,0), new THREE.Vector3(0,3.2,0)]), m));
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(-0.45,2.9,0), new THREE.Vector3(0.45,2.9,0)]), m));
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0,2.9,-0.45), new THREE.Vector3(0,2.9,0.45)]), m));
  const top = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.SphereGeometry(0.18, 14, 10)), m);
  top.position.set(0, 3.35, 0); grp.add(top);
  const ringPts = [];
  for (let i = 0; i <= 48; i++) {
    const a = i * Math.PI * 2 / 48;
    ringPts.push(new THREE.Vector3(Math.cos(a)*0.7, 0.02, Math.sin(a)*0.7));
  }
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ringPts), m));
  grp.position.set(x, 0, z);
  return grp;
}
function makeStandingMarker(color) {
  const grp = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 });
  const pts1 = [], pts2 = [];
  for (let i = 0; i <= 32; i++) {
    const a = i * Math.PI * 2 / 32;
    pts1.push(new THREE.Vector3(Math.cos(a)*0.45, 0.005, Math.sin(a)*0.45));
    pts2.push(new THREE.Vector3(Math.cos(a)*0.55, 0.005, Math.sin(a)*0.55));
  }
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts1), mat));
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), mat));
  return grp;
}

// ─── Person factory ─────────────────────────────────────────────────────
const HEAD_R = 0.32;
const HEAD_Y = 1.72;
const SHOULDER_Y = 1.4;
const HIP_Y = 0.65;
const CONE_LENGTH = 1.55;

function makePerson(name, color, x, z) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  const mat  = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.92 });
  const matD = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.55 });

  const bodyGroup = new THREE.Group();
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(-0.42, SHOULDER_Y, 0), new THREE.Vector3(0.42, SHOULDER_Y, 0)]), mat));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.28, SHOULDER_Y, 0),
    new THREE.Vector3(   0,  SHOULDER_Y, -0.42),
    new THREE.Vector3( 0.28, SHOULDER_Y, 0),
  ]), mat));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.40, SHOULDER_Y, -0.02),
    new THREE.Vector3( 0.40, SHOULDER_Y, -0.02),
    new THREE.Vector3( 0.28, HIP_Y,      -0.02),
    new THREE.Vector3(-0.28, HIP_Y,      -0.02),
    new THREE.Vector3(-0.40, SHOULDER_Y, -0.02),
  ]), matD));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.40, SHOULDER_Y, 0.05),
    new THREE.Vector3( 0.40, SHOULDER_Y, 0.05),
    new THREE.Vector3( 0.28, HIP_Y,      0.05),
    new THREE.Vector3(-0.28, HIP_Y,      0.05),
    new THREE.Vector3(-0.40, SHOULDER_Y, 0.05),
  ]), matD));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(0, SHOULDER_Y, 0), new THREE.Vector3(0, HIP_Y, 0)]), matD));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
    [new THREE.Vector3(-0.28, HIP_Y, 0), new THREE.Vector3(0.28, HIP_Y, 0)]), mat));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.42, SHOULDER_Y, 0),
    new THREE.Vector3(-0.50, SHOULDER_Y - 0.42, 0.02),
    new THREE.Vector3(-0.46, HIP_Y - 0.05, 0.04),
  ]), matD));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3( 0.42, SHOULDER_Y, 0),
    new THREE.Vector3( 0.50, SHOULDER_Y - 0.42, 0.02),
    new THREE.Vector3( 0.46, HIP_Y - 0.05, 0.04),
  ]), matD));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.16, HIP_Y, 0),
    new THREE.Vector3(-0.18, HIP_Y - 0.32, -0.02),
    new THREE.Vector3(-0.20, 0, 0),
  ]), matD));
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3( 0.16, HIP_Y, 0),
    new THREE.Vector3( 0.18, HIP_Y - 0.32, -0.02),
    new THREE.Vector3( 0.20, 0, 0),
  ]), matD));
  const footPts = [];
  for (let i = 0; i <= 32; i++) {
    const a = i * Math.PI * 2 / 32;
    footPts.push(new THREE.Vector3(Math.cos(a)*0.34, 0.005, Math.sin(a)*0.34));
  }
  bodyGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(footPts), mat));
  group.add(bodyGroup);

  const headGroup = new THREE.Group();
  headGroup.position.y = HEAD_Y;
  const shell = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.SphereGeometry(HEAD_R, 16, 12)), mat);
  shell.scale.set(0.96, 1.0, 1.12);
  headGroup.add(shell);

  const earGeo = new THREE.SphereGeometry(0.08, 10, 8);
  const lEar = new THREE.LineSegments(new THREE.EdgesGeometry(earGeo), matD);
  lEar.position.set(-0.30, 0.02, 0); lEar.scale.set(0.55, 1.0, 0.85); headGroup.add(lEar);
  const rEar = new THREE.LineSegments(new THREE.EdgesGeometry(earGeo), matD);
  rEar.position.set(0.30, 0.02, 0);  rEar.scale.set(0.55, 1.0, 0.85); headGroup.add(rEar);

  const noseGeo = new THREE.ConeGeometry(0.07, 0.20, 10);
  noseGeo.rotateX(-Math.PI/2); noseGeo.translate(0, -0.04, -0.40);
  headGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(noseGeo), mat));

  const mouth = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.RingGeometry(0.08, 0.13, 16)), mat);
  mouth.position.set(0, -0.14, -0.34); headGroup.add(mouth);

  const eyeGeo = new THREE.SphereGeometry(0.035, 8, 6);
  const lEye = new THREE.LineSegments(new THREE.EdgesGeometry(eyeGeo), mat);
  lEye.position.set(-0.11, 0.08, -0.30); headGroup.add(lEye);
  const rEye = new THREE.LineSegments(new THREE.EdgesGeometry(eyeGeo), mat);
  rEye.position.set(0.11, 0.08, -0.30);  headGroup.add(rEye);

  const coneMat = new THREE.MeshBasicMaterial({
    color, transparent:true, opacity:0, side:THREE.DoubleSide, depthWrite:false });
  const coneGeom = new THREE.ConeGeometry(0.55, CONE_LENGTH, 28, 1, true);
  coneGeom.rotateX(Math.PI/2); coneGeom.translate(0, 0, -CONE_LENGTH/2);
  const coneMesh = new THREE.Mesh(coneGeom, coneMat);
  coneMesh.position.set(0, -0.14, -0.42); headGroup.add(coneMesh);
  const coneEdges = new THREE.LineSegments(
    new THREE.EdgesGeometry(coneGeom),
    new THREE.LineBasicMaterial({ color, transparent:true, opacity:0 }));
  coneEdges.position.copy(coneMesh.position);
  headGroup.add(coneEdges);

  group.add(headGroup);
  scene.add(group);

  return {
    name, group, bodyGroup, headGroup,
    shell, mouth, coneMesh, coneEdges,
    color,
    speakStart: 0, speakEnd: 0, speakIntensity: 0,
    // Audio nodes — filled in by ensureAudio()
    audioInput: null, occGain: null, occFilter: null,
    pannerNode: null, stereoPan: null, binauralGain: null, stereoGain: null,
    analyser: null, fftData: null,
    wetSend: null,
    homeRoom: null,
    voiceChar: null,
    target: null,
    currentLookYaw: 0,
    labelEl: null,
  };
}

// Rooms — wireframe boxes, each with a speaker inside.
// Each room exposes: name, x, z (center), w, d, h, color, convolver (audio).
function makeRoomBox(opts) {
  const { x, z, w, d, h, color, name, doorSide } = opts;
  const grp = new THREE.Group();
  const m  = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 });
  const md = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.32 });

  // Floor outline (heavier)
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-w/2, 0.015, -d/2),
    new THREE.Vector3( w/2, 0.015, -d/2),
    new THREE.Vector3( w/2, 0.015,  d/2),
    new THREE.Vector3(-w/2, 0.015,  d/2),
    new THREE.Vector3(-w/2, 0.015, -d/2),
  ]), m));

  // Ceiling outline (lighter)
  grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-w/2, h, -d/2),
    new THREE.Vector3( w/2, h, -d/2),
    new THREE.Vector3( w/2, h,  d/2),
    new THREE.Vector3(-w/2, h,  d/2),
    new THREE.Vector3(-w/2, h, -d/2),
  ]), md));

  // Vertical edges
  for (const [cx, cz] of [[-w/2,-d/2], [w/2,-d/2], [w/2,d/2], [-w/2,d/2]]) {
    grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
      [new THREE.Vector3(cx, 0, cz), new THREE.Vector3(cx, h, cz)]), md));
  }

  // "Wall lines" at mid height, with a gap on the doorSide
  const DOOR_W = 1.0;
  function wallLine(p1, p2, hasDoor) {
    // p1, p2 in XZ; draw at mid-height and at h*0.7
    const ys = [h * 0.35, h * 0.7];
    for (const y of ys) {
      if (!hasDoor) {
        grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
          [new THREE.Vector3(p1.x, y, p1.z), new THREE.Vector3(p2.x, y, p2.z)]), md));
      } else {
        // Compute midpoint and break with DOOR_W gap
        const mx = (p1.x + p2.x) / 2, mz = (p1.z + p2.z) / 2;
        const dx = p2.x - p1.x, dz = p2.z - p1.z;
        const len = Math.hypot(dx, dz);
        const ux = dx/len, uz = dz/len;
        const gap = Math.min(DOOR_W, len * 0.5);
        const a = { x: mx - ux*gap/2, z: mz - uz*gap/2 };
        const b = { x: mx + ux*gap/2, z: mz + uz*gap/2 };
        grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
          [new THREE.Vector3(p1.x, y, p1.z), new THREE.Vector3(a.x, y, a.z)]), md));
        grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(
          [new THREE.Vector3(b.x, y, b.z), new THREE.Vector3(p2.x, y, p2.z)]), md));
      }
    }
  }
  // Four walls (corners NW, NE, SE, SW); doorSide enums: 'N','S','E','W'
  const NW = { x: -w/2, z: -d/2 };
  const NE = { x:  w/2, z: -d/2 };
  const SE = { x:  w/2, z:  d/2 };
  const SW = { x: -w/2, z:  d/2 };
  wallLine(NW, NE, doorSide === 'N');
  wallLine(NE, SE, doorSide === 'E');
  wallLine(SE, SW, doorSide === 'S');
  wallLine(SW, NW, doorSide === 'W');

  grp.position.set(x, 0, z);
  scene.add(grp);

  const room = {
    name, x, z, w, d, h, color,
    convolver: null,        // assigned in ensureAudio()
    wetGain: null,
    contains(px, pz) {
      return (px >= x - w/2 && px <= x + w/2 && pz >= z - d/2 && pz <= z + d/2);
    },
  };
  return room;
}

// ─── Listener orientation ────────────────────────────────────────────────
let yaw = 0, pitch = 0, roll = 0;
const PITCH_LIMIT = Math.PI * 0.45;
const ROLL_LIMIT  = Math.PI * 0.35;

function applyListenerOrientation() {
  listener.bodyGroup.rotation.set(0, yaw, 0);
  listener.headGroup.rotation.order = 'YXZ';
  listener.headGroup.rotation.set(pitch, yaw, roll);
}
applyListenerOrientation();

let dragging = false;
let lastX = 0, lastY = 0;
const DRAG_SENS = 0.005;
container.addEventListener('pointerdown', e => {
  unlockAudio();
  if (orientEnabled) return;
  // Don't drag if pointer started on the joystick or talk button
  if (e.target && (e.target.closest('#joystick') || e.target.closest('#talk-btn'))) return;
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  container.classList.add('dragging');
  container.setPointerCapture?.(e.pointerId);
});
container.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  yaw   -= dx * DRAG_SENS;
  pitch -= dy * DRAG_SENS;
  pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitch));
  applyListenerOrientation();
  lastX = e.clientX; lastY = e.clientY;
});
container.addEventListener('pointerup',     () => { dragging = false; container.classList.remove('dragging'); });
container.addEventListener('pointercancel', () => { dragging = false; container.classList.remove('dragging'); });

function resetFacing() {
  const dx = 0 - listener.group.position.x;
  const dz = 0 - listener.group.position.z;
  yaw = Math.atan2(-dx, -dz);
  pitch = 0; roll = 0;
  if (orientEnabled) orientCal = null;
  applyListenerOrientation();
}
container.addEventListener('dblclick', resetFacing);
let lastTap = 0;
container.addEventListener('touchend', e => {
  const now = performance.now();
  if (now - lastTap < 320) { resetFacing(); e.preventDefault(); }
  lastTap = now;
}, { passive: false });

// ─── Device orientation ──────────────────────────────────────────────────
let orientEnabled = false;
let orientCal = null;
const trackEnableBtn  = document.getElementById('track-enable');
const trackRecalBtn   = document.getElementById('track-recal');
const trackDisableBtn = document.getElementById('track-disable');
const trackStatus     = document.getElementById('track-status');
function normDeg180(d) { while (d>180) d-=360; while (d<-180) d+=360; return d; }
function onOrientation(e) {
  if (e.alpha == null || e.beta == null || e.gamma == null) return;
  if (!orientCal) orientCal = { alpha:e.alpha, beta:e.beta, gamma:e.gamma };
  const dAlpha = normDeg180(e.alpha - orientCal.alpha);
  const dBeta  = e.beta  - orientCal.beta;
  const dGamma = e.gamma - orientCal.gamma;
  yaw   =  dAlpha * Math.PI/180;
  pitch =  dBeta  * Math.PI/180;
  roll  = -dGamma * Math.PI/180;
  pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitch));
  roll  = Math.max(-ROLL_LIMIT,  Math.min(ROLL_LIMIT,  roll));
  applyListenerOrientation();
  trackStatus.textContent =
    `α ${e.alpha.toFixed(0)}°  β ${e.beta.toFixed(0)}°  γ ${e.gamma.toFixed(0)}°`;
}
function showTrackingUI(on) {
  trackEnableBtn.style.display  = on ? 'none' : '';
  trackRecalBtn.style.display   = on ? '' : 'none';
  trackDisableBtn.style.display = on ? '' : 'none';
  trackStatus.classList.toggle('visible', on);
}
async function enableHeadTracking() {
  unlockAudio();
  if (typeof DeviceOrientationEvent === 'undefined') {
    trackEnableBtn.textContent = 'NOT SUPPORTED';
    trackEnableBtn.classList.add('error'); return;
  }
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const resp = await DeviceOrientationEvent.requestPermission();
      if (resp !== 'granted') {
        trackEnableBtn.textContent = 'PERMISSION DENIED';
        trackEnableBtn.classList.add('error'); return;
      }
    } catch (err) {
      trackEnableBtn.textContent = 'PERMISSION ERROR';
      trackEnableBtn.classList.add('error'); return;
    }
  }
  window.addEventListener('deviceorientation', onOrientation);
  orientEnabled = true; orientCal = null;
  showTrackingUI(true);
}
function disableHeadTracking() {
  window.removeEventListener('deviceorientation', onOrientation);
  orientEnabled = false; orientCal = null;
  showTrackingUI(false);
}
trackEnableBtn .addEventListener('click', enableHeadTracking);
trackRecalBtn  .addEventListener('click', () => { orientCal = null; });
trackDisableBtn.addEventListener('click', disableHeadTracking);

function setCameraMode(mode) {

  document.querySelectorAll('.cam-btn').forEach(b => {

  });
  if (mode === 'firstperson') {

}

function updateCamera() {
  if (cameraMode === 'topdown') {
    activeCam = orthoCam;
    // Camera follows listener so they don't walk off-screen.
    const lp = listener.group.position;
    orthoCam.position.set(lp.x + 6, 16, lp.z + 8);
    orthoCam.lookAt(lp.x, 0.5, lp.z);
  } else if (cameraMode === 'overshoulder') {
    activeCam = perspCam;
    const localCamPos = new THREE.Vector3(0.85, 0.95, 1.7);
    const c = Math.cos(yaw), s = Math.sin(yaw);
    const off = new THREE.Vector3(
      localCamPos.x * c + localCamPos.z * s,
      localCamPos.y,
      -localCamPos.x * s + localCamPos.z * c
    );
    const headWorld = new THREE.Vector3();
    listener.headGroup.getWorldPosition(headWorld);
    perspCam.position.copy(headWorld).add(off);
    const localTgt = new THREE.Vector3(-0.25, -0.25, -4);
    const tgt = new THREE.Vector3(
      localTgt.x * c + localTgt.z * s,
      localTgt.y,
      -localTgt.x * s + localTgt.z * c
    );
    perspCam.up.set(0, 1, 0);
    perspCam.lookAt(headWorld.clone().add(tgt));
  } else if (cameraMode === 'firstperson') {
    activeCam = perspCam;
    const headWorld = new THREE.Vector3();
    listener.headGroup.getWorldPosition(headWorld);
    perspCam.position.copy(headWorld);
    perspCam.rotation.order = 'YXZ';
    perspCam.rotation.set(pitch, yaw, roll);
  }
}

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
let masterGain = null;
let audioMuted = false;
let audioUnlockBufferPlayed = false;
let spatialMode = 'binaural'; // 'binaural' | 'stereo'
let panSettings = { refDist: 1.5, rolloff: 1.0, maxDist: 80 };
let masterVolume = 0.5;

// Generate a synthetic impulse response (mono → stereo) with stereo decorrelation
function generateIR(ctx, durationSec, decayExp, brightness) {
  const sr = ctx.sampleRate;
  const len = Math.max(1, Math.floor(sr * durationSec));
  const buf = ctx.createBuffer(2, len, sr);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    let prev = 0;
    // Brightness 0..1 → α 0.05..0.95
    const alpha = 0.05 + brightness * 0.90;
    for (let i = 0; i < len; i++) {
      const t = i / len;
      const env = Math.pow(1 - t, decayExp);
      const noise = (Math.random() * 2 - 1) * env;
      prev = prev + alpha * (noise - prev);  // 1-pole LPF for darkness control
      d[i] = prev * 0.8;
    }
  }
  return buf;
}

function ensureAudio() {
  if (audioCtx) return audioCtx;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e) { return null; }

  masterGain = audioCtx.createGain();
  masterGain.gain.value = audioMuted ? 0 : masterVolume;
  masterGain.connect(audioCtx.destination);

  // Build per-room convolvers
  const ROOM_IRS = [
    { dur: 2.4, decay: 1.8, bright: 0.85 },  // Brick
    { dur: 0.5, decay: 3.8, bright: 0.25 },  // Soft
    { dur: 0.12,decay: 2.0, bright: 0.55 },  // Dry
  ];
  rooms.forEach((r, i) => {
    const conv = audioCtx.createConvolver();
    conv.buffer = generateIR(audioCtx, ROOM_IRS[i].dur, ROOM_IRS[i].decay, ROOM_IRS[i].bright);
    r.convolver = conv;
    r.wetReturn = audioCtx.createGain();
    r.wetReturn.gain.value = 0.45;
    conv.connect(r.wetReturn).connect(masterGain);
  });

  // Build per-person audio chains
  function buildChain(person, voiceIdx, homeRoom) {
    person.voiceChar = VOICE_CHARACTERS[voiceIdx % VOICE_CHARACTERS.length];
    person.audioInput = audioCtx.createGain();
    // Occlusion stage (dry path only)
    person.occGain   = audioCtx.createGain();   person.occGain.gain.value = 1.0;
    person.occFilter = audioCtx.createBiquadFilter();
    person.occFilter.type = 'lowpass'; person.occFilter.frequency.value = 18000;
    // Parallel spatial paths — crossfade between them via gains
    person.pannerNode = audioCtx.createPanner();
    person.pannerNode.panningModel = 'HRTF';
    person.pannerNode.distanceModel = 'inverse';
    person.pannerNode.refDistance = panSettings.refDist;
    person.pannerNode.rolloffFactor = panSettings.rolloff;
    person.pannerNode.maxDistance = panSettings.maxDist;
    person.binauralGain = audioCtx.createGain();
    person.binauralGain.gain.value = (spatialMode === 'binaural') ? 1 : 0;

    person.stereoPan = audioCtx.createStereoPanner();
    person.stereoGain = audioCtx.createGain();
    person.stereoGain.gain.value = (spatialMode === 'stereo') ? 1 : 0;

    person.analyser = audioCtx.createAnalyser();
    person.analyser.fftSize = 128;
    person.analyser.smoothingTimeConstant = 0.55;
    person.fftData = new Uint8Array(person.analyser.frequencyBinCount);

    // Routing: audioInput → occFilter → occGain → [pannerNode | stereoPan] → analyser → master
    person.audioInput.connect(person.occFilter);
    person.occFilter.connect(person.occGain);
    person.occGain.connect(person.pannerNode);
    person.pannerNode.connect(person.binauralGain);
    person.occGain.connect(person.stereoPan);
    person.stereoPan.connect(person.stereoGain);
    person.binauralGain.connect(person.analyser);
    person.stereoGain.connect(person.analyser);
    person.analyser.connect(masterGain);

    // Wet send → home room's convolver (if any)
    if (homeRoom) {
      person.wetSend = audioCtx.createGain();
      person.wetSend.gain.value = 0.6;
      person.audioInput.connect(person.wetSend);
      person.wetSend.connect(homeRoom.convolver);
      person.homeRoom = homeRoom;
    }
  }
  salon.forEach((s, i)        => buildChain(s, i, null));
  roomSpeakers.forEach((s, i) => buildChain(s, 3 + i, rooms[i]));

  // Player chain (own talking) — voice index 6
  buildChain(player, 6, null);
  // Player's wet send is dynamic (changes room as you walk)
  player.wetSend = audioCtx.createGain();
  player.wetSend.gain.value = 0.55;
  player.audioInput.connect(player.wetSend);
  player.currentRoomConv = null;
  // (wetSend will be connected/disconnected to current room's convolver each frame)

  // Bypass spatialization for player's own voice (it comes from their own head).
  // We do this by overriding the routing for player: skip occlusion, mute the binaural
  // path, but allow stereoPan at center so they hear themselves. Actually easiest:
  // also route player.audioInput directly to masterGain (with reduced gain).
  player.dryToMaster = audioCtx.createGain();
  player.dryToMaster.gain.value = 0.7;
  player.audioInput.connect(player.dryToMaster).connect(masterGain);
  // Mute the panner path for player so we don't double-hear them
  player.binauralGain.gain.value = 0;
  player.stereoGain.gain.value   = 0;

  return audioCtx;
}

function unlockAudio() {
  const ctx = ensureAudio();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  // iOS silent-buffer trick — must be called from a user gesture
  if (!audioUnlockBufferPlayed) {
    try {
      const b = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = b; src.connect(ctx.destination); src.start(0);
      audioUnlockBufferPlayed = true;
      // iOS reminder banner (silent-switch caveat)
      if (isIOS) {
        const r = document.getElementById('ios-reminder');
        r.classList.add('visible');
        setTimeout(() => r.classList.remove('visible'), 4500);
      }
    } catch(e) {}
  }
}

// ─── Voice synth (per-word) ─────────────────────────────────────────────
function playWord(speaker, ws, wd, pitchMult) {
  if (!audioCtx || audioMuted || wd < 0.04 || !speaker.audioInput) return;
  const v = speaker.voiceChar;
  const f0 = Math.max(45, v.baseFreq * pitchMult);

  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(f0, ws);
  osc1.frequency.linearRampToValueAtTime(f0 * (0.65 + Math.random() * 0.70), ws + wd * 0.55);
  osc1.frequency.linearRampToValueAtTime(f0 * 0.70, ws + wd);

  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sawtooth';
  osc2.frequency.setValueAtTime(f0 * v.detune, ws);
  osc2.frequency.linearRampToValueAtTime(f0 * v.detune * (0.65 + Math.random() * 0.70), ws + wd * 0.55);
  osc2.frequency.linearRampToValueAtTime(f0 * v.detune * 0.70, ws + wd);

  const f1 = audioCtx.createBiquadFilter();
  f1.type = 'bandpass'; f1.Q.value = v.q;
  const fA = v.fSweep[0] * (0.65 + Math.random() * 0.70);
  const fB = v.fSweep[1] * (0.65 + Math.random() * 0.70);
  f1.frequency.setValueAtTime(fA, ws);
  f1.frequency.linearRampToValueAtTime(fB, ws + wd * 0.55);
  f1.frequency.linearRampToValueAtTime(fA * 0.7, ws + wd);

  const f2 = audioCtx.createBiquadFilter();
  f2.type = 'bandpass'; f2.Q.value = 3.5;
  f2.frequency.setValueAtTime(fA * 2.2, ws);
  f2.frequency.linearRampToValueAtTime(fB * 1.9, ws + wd * 0.55);
  f2.frequency.linearRampToValueAtTime(fA * 1.6, ws + wd);

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, ws);
  env.gain.linearRampToValueAtTime(0.32, ws + Math.min(0.04, wd * 0.15));
  env.gain.linearRampToValueAtTime(0.28, ws + wd * 0.85);
  env.gain.linearRampToValueAtTime(0, ws + wd);

  osc1.connect(f1);
  osc2.connect(f1);
  f1.connect(f2).connect(env).connect(speaker.audioInput);
  osc1.start(ws); osc1.stop(ws + wd + 0.04);
  osc2.start(ws); osc2.stop(ws + wd + 0.04);
}

// Wider variety: speed factor 0.45..1.8, pitch spread 0.4..1.8, trend ±0.6.
function playUtterance(speaker, t0, durSec) {
  if (!audioCtx || audioMuted) return;
  const speedFactor = 0.45 + Math.random() * 1.35;
  const pitchTrend  = (Math.random() - 0.5) * 1.2;
  const pitchSpread = 0.4 + Math.random() * 1.4;
  const avgWordDur  = 0.30 / speedFactor;
  const wordCount   = Math.max(1, Math.round(durSec / avgWordDur));

  let t = t0;
  for (let w = 0; w < wordCount; w++) {
    const wd = avgWordDur * (0.5 + Math.random() * 1.0);
    if (t + wd > t0 + durSec) break;
    const trendOffset = (w / Math.max(1, wordCount - 1)) * pitchTrend;
    const pitchMult = 0.4 + Math.random() * pitchSpread + trendOffset;
    playWord(speaker, t, wd * 0.88, pitchMult);
    t += wd;
    if (Math.random() < 0.25) t += 0.05 + Math.random() * 0.22;
  }
}

// ─── Spatial mode switching ─────────────────────────────────────────────
function setSpatialMode(mode) {
  spatialMode = mode;
  document.getElementById('mode-stereo').classList.toggle('active', mode === 'stereo');
  document.getElementById('mode-binaural').classList.toggle('active', mode === 'binaural');
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  for (const p of [...salon, ...roomSpeakers]) {
    if (!p.binauralGain || !p.stereoGain) continue;
    p.binauralGain.gain.setTargetAtTime(mode === 'binaural' ? 1 : 0, t, 0.03);
    p.stereoGain.gain  .setTargetAtTime(mode === 'stereo'   ? 1 : 0, t, 0.03);
  }
}

// ─── Per-frame audio updates (pan, listener, occlusion, player room) ────
function updateAudioListener() {
  if (!audioCtx) return;
  const L = audioCtx.listener;
  const lp = listener.group.position;
  // Forward in three.js convention with our yaw (rotates -Z toward -X for positive yaw)
  const fx = -Math.sin(yaw) * Math.cos(pitch);
  const fy = -Math.sin(pitch);
  const fz = -Math.cos(yaw) * Math.cos(pitch);
  // Up vector — assume world up tilts a bit with roll (simplified, ignores pitch coupling)
  const ux = Math.sin(roll) * Math.cos(yaw);
  const uy = Math.cos(roll) * Math.cos(pitch);
  const uz = Math.sin(roll) * Math.sin(yaw);
  if (L.positionX) {
    L.positionX.setTargetAtTime(lp.x, audioCtx.currentTime, 0.02);
    L.positionY.setTargetAtTime(HEAD_Y, audioCtx.currentTime, 0.02);
    L.positionZ.setTargetAtTime(lp.z, audioCtx.currentTime, 0.02);
    L.forwardX.setTargetAtTime(fx, audioCtx.currentTime, 0.02);
    L.forwardY.setTargetAtTime(fy, audioCtx.currentTime, 0.02);
    L.forwardZ.setTargetAtTime(fz, audioCtx.currentTime, 0.02);
    L.upX.setTargetAtTime(ux, audioCtx.currentTime, 0.02);
    L.upY.setTargetAtTime(uy, audioCtx.currentTime, 0.02);
    L.upZ.setTargetAtTime(uz, audioCtx.currentTime, 0.02);
  } else if (L.setPosition) {
    L.setPosition(lp.x, HEAD_Y, lp.z);
    L.setOrientation(fx, fy, fz, ux, uy, uz);
  }
}

function updateSpeakerPanAndPos(speaker) {
  if (!audioCtx || !speaker.pannerNode) return;
  // PannerNode position
  const sp = speaker.group.position;
  if (speaker.pannerNode.positionX) {
    speaker.pannerNode.positionX.setTargetAtTime(sp.x, audioCtx.currentTime, 0.02);
    speaker.pannerNode.positionY.setTargetAtTime(HEAD_Y, audioCtx.currentTime, 0.02);
    speaker.pannerNode.positionZ.setTargetAtTime(sp.z, audioCtx.currentTime, 0.02);
  } else if (speaker.pannerNode.setPosition) {
    speaker.pannerNode.setPosition(sp.x, HEAD_Y, sp.z);
  }
  // StereoPan from listener-relative right vector
  const dx = sp.x - listener.group.position.x;
  const dz = sp.z - listener.group.position.z;
  const rightDot = dx * Math.cos(yaw) + dz * (-Math.sin(yaw));
  const dist = Math.max(1, Math.sqrt(dx*dx + dz*dz));
  const pan = Math.max(-1, Math.min(1, rightDot / dist));
  speaker.stereoPan.pan.setTargetAtTime(pan, audioCtx.currentTime, 0.06);
}

// Occlusion — if listener and speaker are not in the same "acoustic zone"
// (= same room OR both outside), apply lowpass + gain reduction.
function listenerRoom() {
  for (const r of rooms) if (r.contains(listener.group.position.x, listener.group.position.z)) return r;
  return null;
}
function updateOcclusion(speaker) {
  if (!audioCtx || !speaker.occGain) return;
  const lr = listenerRoom();
  const sr = speaker.homeRoom; // null for salon speakers
  const sameZone = (lr === sr); // null===null fine for salon speakers + listener in salon
  const t = audioCtx.currentTime;
  if (sameZone) {
    speaker.occGain.gain.setTargetAtTime(1.0, t, 0.05);
    speaker.occFilter.frequency.setTargetAtTime(18000, t, 0.05);
  } else {
    speaker.occGain.gain.setTargetAtTime(0.30, t, 0.05);
    speaker.occFilter.frequency.setTargetAtTime(1100, t, 0.05);
  }
}

// Player room routing — connect player.wetSend to whichever room contains them
let lastPlayerRoom = null;
function updatePlayerRoomRouting() {
  if (!audioCtx || !player.wetSend) return;
  const lr = listenerRoom();
  if (lr === lastPlayerRoom) return;
  // Disconnect from previous
  if (lastPlayerRoom && lastPlayerRoom.convolver) {
    try { player.wetSend.disconnect(lastPlayerRoom.convolver); } catch(e) {}
  }
  if (lr && lr.convolver) {
    player.wetSend.connect(lr.convolver);
  }
  lastPlayerRoom = lr;
}

function updateSpeakerCone(speaker) {
  let amp = 0, low = 0, mid = 0, high = 0;
  if (speaker.analyser && !audioMuted) {
    speaker.analyser.getByteFrequencyData(speaker.fftData);
    let sum = 0;
    for (let i = 0; i < speaker.fftData.length; i++) sum += speaker.fftData[i];
    amp = (sum / speaker.fftData.length) / 255;
    const n = speaker.fftData.length;
    low  = speaker.fftData[Math.floor(n * 0.08)] / 255;
    mid  = speaker.fftData[Math.floor(n * 0.28)] / 255;
    high = speaker.fftData[Math.floor(n * 0.55)] / 255;
  } else if (audioMuted) {
    const t = performance.now() * 0.001;
    amp  = speaker.speakIntensity * 0.7;
    low  = speaker.speakIntensity * (0.4 + 0.3 * Math.sin(t*6.0 + speaker.color));
    mid  = speaker.speakIntensity * (0.4 + 0.3 * Math.cos(t*4.5 + speaker.color));
    high = speaker.speakIntensity * 0.25;
  }
  const lenScale = 0.5 + amp*0.9 + speaker.speakIntensity*0.25;
  const widthX   = 0.55 + low*0.6 + high*0.15;
  const widthY   = 0.55 + mid*0.6 + high*0.15;
  speaker.coneMesh.scale.set(widthX, widthY, lenScale);
  speaker.coneEdges.scale.set(widthX, widthY, lenScale);
  speaker.coneMesh.material.opacity  = amp*0.32 + speaker.speakIntensity*0.08;
  speaker.coneEdges.material.opacity = amp*0.70 + speaker.speakIntensity*0.15;
  speaker.mouth.material.opacity     = 0.55 + amp*0.35 + speaker.speakIntensity*0.10;
}

// ─── Conversation manager ───────────────────────────────────────────────
function pickTarget(speaker) {
  const r = Math.random();
  if (r < 0.55) return { type:'one', who: listener };
  if (r < 0.82) {
    const others = allSpeakers.filter(s => s !== speaker);
    return { type:'one', who: others[Math.floor(Math.random() * others.length)] };
  }
  return { type:'all' };
}
function pickNextSpeaker(prev) {
  const candidates = prev ? allSpeakers.filter(s => s !== prev) : allSpeakers;
  if (Math.random() < 0.85) return candidates[Math.floor(Math.random() * candidates.length)];
  return allSpeakers[Math.floor(Math.random() * allSpeakers.length)];
}

let conversationCurrent = null;
let conversationPaused = false;

function startUtterance(speaker, prev) {
  speaker.target = pickTarget(speaker);
  // Wider duration range
  const durMs = 400 + Math.random() * 4000;
  speaker.speakStart = performance.now();
  speaker.speakEnd   = speaker.speakStart + durMs;
  conversationCurrent = speaker;
  if (audioCtx && !audioMuted) {
    playUtterance(speaker, audioCtx.currentTime + 0.03, durMs / 1000);
  }
  setTimeout(() => {
    if (conversationCurrent === speaker) conversationCurrent = null;
    speaker.target = null;
    scheduleNextUtterance(speaker);
  }, durMs);
}

function scheduleNextUtterance(prev) {
  if (conversationPaused) return;
  const r = Math.random();
  let delay;
  if (r < 0.10) {
    // INTERRUPT — fires while prev is (likely) still talking
    delay = 50 + Math.random() * 250;
  } else if (r < 0.25) {
    // OVERLAP — small overlap with prev tail
    delay = 200 + Math.random() * 700;
  } else {
    // Normal pause between turns
    delay = 500 + Math.random() * 2400;
  }
  setTimeout(() => {
    if (conversationPaused) return;
    const next = pickNextSpeaker(prev);
    if (!next) return;
    startUtterance(next, prev);
  }, delay);
}
scheduleNextUtterance(null);

// Smooth eye-contact / facing
function updateSpeakerFacing(speaker, now) {
  let lookAtPos = listener.group.position;
  if (speaker === conversationCurrent && speaker.target && now < speaker.speakEnd) {
    if (speaker.target.type === 'one' && speaker.target.who) {
      lookAtPos = speaker.target.who.group.position;
    } else if (speaker.target.type === 'all') {
      const everyone = [listener, ...allSpeakers.filter(s => s !== speaker)];
      const utterDur = Math.max(0.3, (speaker.speakEnd - speaker.speakStart) / 1000);
      const cycleLen = Math.max(0.6, utterDur / everyone.length);
      const elapsed = (now - speaker.speakStart) / 1000;
      const idx = Math.floor(elapsed / cycleLen) % everyone.length;
      lookAtPos = everyone[idx].group.position;
    }
  } else if (conversationCurrent && conversationCurrent !== speaker) {
    if ((Math.floor(now / 1800) + speaker.color) % 2 === 0) {
      lookAtPos = conversationCurrent.group.position;
    }
  }
  const dx = lookAtPos.x - speaker.group.position.x;
  const dz = lookAtPos.z - speaker.group.position.z;
  const desired = Math.atan2(-dx, -dz);
  let diff = desired - speaker.currentLookYaw;
  while (diff >  Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  speaker.currentLookYaw += diff * 0.10;
  speaker.bodyGroup.rotation.set(0, speaker.currentLookYaw, 0);
  speaker.headGroup.rotation.set(0, speaker.currentLookYaw, 0);
}

for (const s of allSpeakers) {
  const dx = listener.group.position.x - s.group.position.x;
  const dz = listener.group.position.z - s.group.position.z;
  s.currentLookYaw = Math.atan2(-dx, -dz);
  s.bodyGroup.rotation.set(0, s.currentLookYaw, 0);
  s.headGroup.rotation.set(0, s.currentLookYaw, 0);
}

// ─── Player object (uses the listener's position; has its own audio chain) ─
// We treat the player as a "speaker" for audio purposes, but their visual
// IS the listener. Player.group.position should be kept in sync with listener.
const player = {
  name: 'me',
  // Use a virtual group whose position we sync to the listener each frame.
  // This lets the audio chain pretend the player is a normal speaker.
  group: new THREE.Group(),
  voiceChar: VOICE_CHARACTERS[6],
  audioInput: null,
  // unused visual fields (we don't render the player separately)
  coneMesh: null, coneEdges: null, mouth: null,
  shell: null, bodyGroup: null, headGroup: null,
  occGain: null, occFilter: null,
  pannerNode: null, stereoPan: null, binauralGain: null, stereoGain: null,
  analyser: null, fftData: null,
  wetSend: null, dryToMaster: null,
  speakStart: 0, speakEnd: 0, speakIntensity: 0,
  homeRoom: null,
};
player.group.position.copy(listener.group.position);

// ─── Player TALK control (spacebar + button) ────────────────────────────
let playerTalking = false;
let playerWordTimer = null;

function playerSpeakOneWord() {
  if (!audioCtx || audioMuted || !player.audioInput) return;
  const t0 = audioCtx.currentTime + 0.01;
  const wd = 0.12 + Math.random() * 0.32;
  const pitchMult = 0.5 + Math.random() * 1.4;
  playWord(player, t0, wd * 0.88, pitchMult);
  return wd;
}

function startPlayerTalking() {
  unlockAudio();
  if (playerTalking) return;
  playerTalking = true;
  document.getElementById('talk-btn').classList.add('active');
  // Speak one word immediately
  const firstWd = playerSpeakOneWord() || 0.2;
  // Schedule subsequent words at variable intervals while held
  const tick = () => {
    if (!playerTalking) return;
    const wd = playerSpeakOneWord() || 0.2;
    const gap = wd * 1000 * (0.8 + Math.random() * 0.7);
    playerWordTimer = setTimeout(tick, gap);
  };
  playerWordTimer = setTimeout(tick, firstWd * 1000 * (0.8 + Math.random() * 0.6));
}

function stopPlayerTalking() {
  if (!playerTalking) return;
  playerTalking = false;
  document.getElementById('talk-btn').classList.remove('active');
  if (playerWordTimer) { clearTimeout(playerWordTimer); playerWordTimer = null; }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); startPlayerTalking(); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { e.preventDefault(); stopPlayerTalking(); }
});

const talkBtn = document.getElementById('talk-btn');
talkBtn.addEventListener('pointerdown', e => { e.preventDefault(); startPlayerTalking(); });
talkBtn.addEventListener('pointerup',   e => { e.preventDefault(); stopPlayerTalking(); });
talkBtn.addEventListener('pointercancel', stopPlayerTalking);
talkBtn.addEventListener('pointerleave',  stopPlayerTalking);

// ─── Navigation: WASD + virtual joystick ─────────────────────────────────
const moveInput = { forward: 0, right: 0 };
const MOVE_SPEED = 0.045;  // world units per frame at 60fps

const keys = { w:false, a:false, s:false, d:false };
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'a' || k === 's' || k === 'd') {
    keys[k] = true; e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'a' || k === 's' || k === 'd') {
    keys[k] = false; e.preventDefault();
  }
});

function readKeyboardInput() {
  let f = 0, r = 0;
  if (keys.w) f += 1;
  if (keys.s) f -= 1;
  if (keys.d) r += 1;
  if (keys.a) r -= 1;
  return { f, r };
}

// Joystick
const joy = document.getElementById('joystick');
const knob = document.getElementById('joystick-knob');
const JOY_R = 48, KNOB_R = 15;
let joyActive = false;
let joyCenter = { x: 0, y: 0 };
joy.addEventListener('pointerdown', e => {
  unlockAudio();
  joyActive = true;
  joy.setPointerCapture?.(e.pointerId);
  const r = joy.getBoundingClientRect();
  joyCenter = { x: r.left + r.width/2, y: r.top + r.height/2 };
  updateJoy(e);
  e.preventDefault();
});
window.addEventListener('pointermove', e => { if (joyActive) updateJoy(e); });
window.addEventListener('pointerup',   () => { if (!joyActive) return; joyActive = false; resetJoy(); });
window.addEventListener('pointercancel', () => { joyActive = false; resetJoy(); });
function updateJoy(e) {
  let dx = e.clientX - joyCenter.x;
  let dy = e.clientY - joyCenter.y;
  const mag = Math.hypot(dx, dy);
  const max = JOY_R;
  if (mag > max) { dx *= max/mag; dy *= max/mag; }
  knob.style.left = (JOY_R - KNOB_R + dx) + 'px';
  knob.style.top  = (JOY_R - KNOB_R + dy) + 'px';
  moveInput.right    = dx / max;
  moveInput.forward  = -dy / max;
}
function resetJoy() {
  knob.style.left = (JOY_R - KNOB_R) + 'px';
  knob.style.top  = (JOY_R - KNOB_R) + 'px';
  moveInput.forward = 0; moveInput.right = 0;
}
resetJoy();

function applyMovement() {
  const kb = readKeyboardInput();
  // Combine keyboard + joystick (clamped)
  const f = Math.max(-1, Math.min(1, kb.f + moveInput.forward));
  const r = Math.max(-1, Math.min(1, kb.r + moveInput.right));
  if (!f && !r) return;
  // Forward in listener's local frame (forward = -Z rotated by yaw)
  // forward vector = (-sin yaw, 0, -cos yaw); right = (cos yaw, 0, -sin yaw)
  const fx = -Math.sin(yaw), fz = -Math.cos(yaw);
  const rx =  Math.cos(yaw), rz = -Math.sin(yaw);
  const dx = (fx * f + rx * r) * MOVE_SPEED;
  const dz = (fz * f + rz * r) * MOVE_SPEED;
  listener.group.position.x += dx;
  listener.group.position.z += dz;
  // Clamp to world bounds
  listener.group.position.x = Math.max(-14, Math.min(14, listener.group.position.x));
  listener.group.position.z = Math.max(-14, Math.min(14, listener.group.position.z));
  // Sync player.group to listener
  player.group.position.copy(listener.group.position);
}

// ─── AUDIO SETTINGS panel ────────────────────────────────────────────────
const apBtn   = document.getElementById('audio-settings-btn');
const apPanel = document.getElementById('audio-panel');
apBtn.addEventListener('click', () => {
  unlockAudio();
  apPanel.classList.toggle('visible');
});
document.addEventListener('pointerdown', e => {
  // Click-outside to close
  if (!apPanel.classList.contains('visible')) return;
  if (e.target.closest('#audio-panel') || e.target.closest('#audio-settings-btn')) return;
  apPanel.classList.remove('visible');
});

document.getElementById('mute-on').addEventListener('click', () => setMute(false));
document.getElementById('mute-off').addEventListener('click', () => setMute(true));
function setMute(m) {
  audioMuted = m;
  document.getElementById('mute-on').classList.toggle('active', !m);
  document.getElementById('mute-off').classList.toggle('active', m);
  apBtn.classList.toggle('muted', m);
  if (audioCtx && masterGain) {
    masterGain.gain.setTargetAtTime(m ? 0 : masterVolume, audioCtx.currentTime, 0.02);
  }
}

document.getElementById('mode-stereo').addEventListener('click', () => setSpatialMode('stereo'));
document.getElementById('mode-binaural').addEventListener('click', () => setSpatialMode('binaural'));

document.getElementById('ref-dist').addEventListener('input', e => {
  panSettings.refDist = parseFloat(e.target.value);
  document.getElementById('ref-dist-v').textContent = panSettings.refDist.toFixed(1);
  if (audioCtx) {
    for (const p of [...salon, ...roomSpeakers]) {
      if (p.pannerNode) p.pannerNode.refDistance = panSettings.refDist;
    }
  }
});
document.getElementById('rolloff').addEventListener('input', e => {
  panSettings.rolloff = parseFloat(e.target.value);
  document.getElementById('rolloff-v').textContent = panSettings.rolloff.toFixed(1);
  if (audioCtx) {
    for (const p of [...salon, ...roomSpeakers]) {
      if (p.pannerNode) p.pannerNode.rolloffFactor = panSettings.rolloff;
    }
  }
});
document.getElementById('master-vol').addEventListener('input', e => {
  masterVolume = parseFloat(e.target.value);
  document.getElementById('master-vol-v').textContent = masterVolume.toFixed(2);
  if (audioCtx && masterGain && !audioMuted) {
    masterGain.gain.setTargetAtTime(masterVolume, audioCtx.currentTime, 0.02);
  }
});

// ─── Frame loop ─────────────────────────────────────────────────────────
function frame() {
  requestAnimationFrame(frame);
  const now = performance.now();

  applyMovement();
  if (audioCtx) {
    updateAudioListener();
    updatePlayerRoomRouting();
  }

  // Player envelope (drives their own cone-stand-in if we ever add one)
  if (playerTalking) {
    player.speakIntensity = Math.min(1, player.speakIntensity + 0.08);
  } else {
    player.speakIntensity *= 0.9;
  }

  for (const s of allSpeakers) {
    updateSpeakerFacing(s, now);
    if (s.speakStart && now < s.speakEnd) {
      const t = now - s.speakStart;
      const atk = Math.min(1, t / 80);
      const rel = Math.min(1, (s.speakEnd - now) / 200);
      const env = Math.min(atk, rel);
      const flutter = 0.88 + 0.12 * Math.sin(now * 0.012 + s.color);
      s.speakIntensity = env * flutter;
    } else {
      s.speakIntensity *= 0.92;
    }
    if (audioCtx) { updateSpeakerPanAndPos(s); updateOcclusion(s); }
    updateSpeakerCone(s);
  }

  updateCamera();
  updateLabels();
  renderer.render(scene, activeCam);
}
frame();

// ─── Resize ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  orthoCam.left   = -frustumWidth()/2;
  orthoCam.right  =  frustumWidth()/2;
  orthoCam.top    =  FRUSTUM_H/2;
  orthoCam.bottom = -FRUSTUM_H/2;
  orthoCam.updateProjectionMatrix();
  perspCam.aspect = innerWidth / innerHeight;
  perspCam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

setCameraMode('topdown');
</script>
