<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sight-Reading Trainer · notation test case 01</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<script src="./synth.js"></script>
<script src="./tunings.js"></script>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font-family:-apple-system, system-ui, sans-serif; background:#15171c; color:#e6e8ec; padding:18px 22px; }
  .topbar { display:flex; align-items:center; gap:13px; flex-wrap:wrap; margin-bottom:9px; }
  .topbar .title { font-size:18px; font-weight:600; }
  .topbar label { font-size:13px; color:#b6bcc6; display:flex; gap:6px; align-items:center; }
  select, .topbar select { background:#2a2e37; color:#e6e8ec; border:1px solid #3a3f4a; border-radius:6px; font-size:13px; padding:4px 7px; }
  select option:disabled { color:#565b63; }
  .cur { font-size:13px; color:#b6bcc6; } .cur b { color:#e6e8ec; font-variant-numeric:tabular-nums; }
  .who { font-size:13px; color:#9aa1ad; } .who b { color:#cdd3dd; }
  button { background:#2a2e37; color:#e6e8ec; border:1px solid #3a3f4a; padding:7px 14px; border-radius:8px; font-size:14px; cursor:pointer; }
  button:hover { background:#343a45; }
  .controls { display:flex; gap:13px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  .stat { font-size:14px; color:#b6bcc6; font-variant-numeric:tabular-nums; }
  .stat .ok { color:#67d98b; } .stat .no { color:#f0a06a; } .stat .miss { color:#f06a6a; }

  #stage { position:relative; background:#fbfbf8; border-radius:10px; overflow:hidden; height:230px; }
  #staff { position:absolute; inset:0; z-index:1; }
  #clip  { position:absolute; top:0; bottom:0; right:0; overflow:hidden; z-index:2; }
  #track { position:absolute; top:0; left:0; will-change:transform; }
  #fb    { position:absolute; top:0; left:0; } #notes { position:absolute; top:0; left:0; }
  #failline { position:absolute; top:0; bottom:0; width:3px; background:rgba(220,70,70,0.9); z-index:4; }
  #failline::after { content:"downbeat"; position:absolute; top:6px; left:8px; font-size:10px; color:#cc5555; white-space:nowrap; }
  .dot { position:absolute; width:24px; height:24px; border-radius:50%; transform:translate(-50%,-50%); }
  .dot.correct { background:rgba(45,180,95,0.55); } .dot.missed { background:rgba(220,70,70,0.5); }
  .ring { position:absolute; width:28px; height:28px; border-radius:50%; transform:translate(-50%,-50%);
          border:2.5px solid rgba(40,110,220,0.85); box-sizing:border-box; display:none; z-index:3; }
  #count { position:absolute; inset:0; display:none; align-items:center; justify-content:center; font-size:90px; font-weight:700; color:rgba(40,110,220,0.5); z-index:5; pointer-events:none; }
  #msg { position:absolute; inset:0; display:none; align-items:center; justify-content:center; font-size:22px; font-weight:600; color:#15171c; z-index:6; pointer-events:none; }

  /* always-on instrument */
  #instbar { margin-top:12px; }
  #instbar label { font-size:13px; color:#b6bcc6; display:inline-flex; gap:6px; align-items:center; }
  #inst { margin-top:7px; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  .piano { position:relative; height:120px; }
  .wk { position:absolute; top:0; background:#f4f4ef; border:1px solid #999; border-radius:0 0 6px 6px; box-sizing:border-box;
        display:flex; flex-direction:column; justify-content:flex-end; align-items:center; padding-bottom:6px; cursor:pointer; }
  .wk:active, .wk.lit { background:#bcdcff; }
  .wk b { color:#222; font-size:14px; } .wk span { color:#777; font-size:10px; }
  .bk { position:absolute; top:0; height:74px; background:#222; border:1px solid #000; border-radius:0 0 5px 5px; z-index:2;
        display:flex; flex-direction:column; justify-content:flex-end; align-items:center; padding-bottom:5px; cursor:pointer; }
  .bk:active, .bk.lit { background:#3a6ea5; }
  .bk b { color:#fff; font-size:12px; } .bk span { color:#bbb; font-size:9px; }
  .letrow { display:flex; gap:8px; }
  .lk { width:54px; height:64px; background:#23262d; border:1px solid #3a3f4a; border-radius:8px; display:flex; flex-direction:column;
        align-items:center; justify-content:center; cursor:pointer; }
  .lk:active, .lk.lit { background:#39414f; } .lk b { font-size:18px; } .lk span { font-size:10px; color:#8b909a; }

  /* about / stats drawer */
  #about { display:none; margin-top:16px; max-width:760px; color:#b6bcc6; font-size:13px; line-height:1.55; }
  #about h3 { font-size:14px; color:#e6e8ec; margin:14px 0 4px; }
  #about .lvls div { padding:1px 0; color:#9aa1ad; } #about .lvls b { color:#cdd3dd; }
  #about table { border-collapse:collapse; margin-top:4px; font-size:12.5px; }
  #about td, #about th { border:1px solid #2f343d; padding:3px 9px; text-align:left; }
  #about textarea { width:100%; min-height:120px; background:#1d2026; color:#e6e8ec; border:1px solid #3a3f4a; border-radius:8px; padding:8px; font:13px/1.5 inherit; }

  #fx { position:fixed; inset:0; z-index:50; display:none; opacity:0; }
  #guy { position:fixed; inset:0; z-index:51; display:none; pointer-events:none; }
  #fxhint { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); z-index:52; display:none; color:#fff; font-size:13px; opacity:0.85; text-shadow:0 1px 4px #000; }
  #powers { position:fixed; top:14px; right:14px; z-index:60; width:240px; background:rgba(21,23,28,0.93); border:1px solid #2f343d; border-radius:10px; padding:9px 11px; font-size:12px; color:#b6bcc6; display:none; }
  #powers .ptitle { font-weight:600; color:#e6e8ec; margin-bottom:5px; }
  #powers .prow { display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:3px 0; border-top:1px solid #23262d; }
  #powers .prow.locked { opacity:0.45; } #powers .pname { color:#e6e8ec; }
  #powers .ptag { color:#7a7f88; font-size:10.5px; } #powers .plock { color:#c9a24a; font-size:11px; }
  #powers .pen { display:flex; align-items:center; gap:3px; color:#8b909a; cursor:pointer; }
  #powers .iv { width:54px; background:#2a2e37; color:#e6e8ec; border:1px solid #3a3f4a; border-radius:5px; }
  #leader { display:none; margin-top:16px; max-width:620px; color:#b6bcc6; font-size:13px; }
  #leader h3 { font-size:14px; color:#e6e8ec; margin:10px 0 4px; }
  #leader table { border-collapse:collapse; margin-top:4px; font-size:12.5px; }
  #leader td, #leader th { border:1px solid #2f343d; padding:3px 9px; text-align:left; }
  #rankings { position:fixed; inset:0; z-index:53; display:none; align-items:center; justify-content:center; background:rgba(8,9,12,0.82); }
  #rankings .rcard { text-align:center; }
  #rankings .rh { font-size:30px; font-weight:700; color:#dfeede; margin-bottom:14px; }
  #rankings .rcols { display:flex; gap:34px; justify-content:center; flex-wrap:wrap; }
  #rankings .rcol { font-size:13px; color:#b6bcc6; line-height:1.6; } #rankings .rcol b { color:#e6e8ec; }
  #rankings .rsub { margin-top:16px; color:#7a7f88; font-size:12px; }

  /* ── phone: ask for landscape, and compact the layout on short screens ── */
  #rotate { position:fixed; inset:0; z-index:200; display:none; flex-direction:column;
            align-items:center; justify-content:center; text-align:center; padding:28px;
            background:#15171c; color:#e6e8ec; }
  #rotate .ic { font-size:52px; margin-bottom:14px; animation:rothint 2.4s ease-in-out infinite; transform-origin:center; }
  #rotate .rt { font-size:19px; font-weight:600; } #rotate .rd { color:#9aa1ad; font-size:14px; margin-top:9px; max-width:340px; line-height:1.5; }
  @keyframes rothint { 0%,55%{transform:rotate(0)} 80%,100%{transform:rotate(-90deg)} }
  @media (orientation:portrait) and (max-width:820px) { #rotate { display:flex; } }
  @media (max-height:560px) {
    body { padding:8px 13px; }
    .topbar { gap:9px; margin-bottom:5px; } .topbar .title { font-size:16px; }
    .controls { gap:10px; margin-bottom:6px; } #instbar { margin-top:7px; }
    #count { font-size:62px; }
  }
</style>
</head>
<body>
  <div id="rotate"><div class="ic">📱</div><div class="rt">Rotate to landscape</div>
    <div class="rd">This trainer needs a wider screen — turn your phone sideways to play.</div></div>
  <div class="app" id="app">
    <div class="topbar">
      <span class="title">Sight-Reading Trainer</span>
      <label>Level <select id="levelSel"></select></label>
      <label>Tempo <select id="tempoSel"></select></label>
      <span class="cur">to&nbsp;beat <b id="curLevel">1</b></span>
      <span class="who">player <b id="who">—</b></span>
      <button id="aboutBtn">About the levels</button>
      <button id="leaderBtn">Leaderboard</button>
      <button id="resetAll">Reset</button>
    </div>
    <div class="controls">
      <button id="start">Play</button>
      <span class="stat"><span class="ok" id="cOk">0</span> correct · <span class="no" id="cNo">0</span> wrong · <span class="miss" id="cMi">0</span> missed &nbsp;·&nbsp; <span id="prog">0 / 0</span></span>
      <label>Notes <input type="number" id="notesN" min="4" max="60" value="24" style="width:54px"></label>
      <button id="modebtn">Keys: piano</button>
    </div>

    <div id="stage">
      <div id="staff"></div>
      <div id="clip"><div id="track"><div id="fb"></div><div id="notes"></div></div></div>
      <div id="failline"></div>
      <div id="count"></div>
      <div id="msg"></div>
    </div>

    <div id="instbar"><label>Sound <select id="soundSel"></select></label></div>
    <div id="inst"></div>
    <div id="about"></div>
    <div id="leader"></div>
  </div>

  <div id="rankings"></div>
  <canvas id="fx"></canvas>
  <canvas id="guy"></canvas>
  <div id="fxhint">notes roam on their own — toggle a superpower (top-right) · Esc to return</div>
  <div id="powers"></div>

<script>
const VF = Vex.Flow;

// ── note ladders / tunings helpers ──────────────────────────────────────────
const LADDER = ["c","d","e","f","g","a","b"];
function idxOf(k){ const [L,o]=k.split("/"); return LADDER.indexOf(L)+7*(+o); }
function fromIdx(i){ return LADDER[((i%7)+7)%7]+"/"+Math.floor(i/7); }
function stepKey(k,n){ return fromIdx(idxOf(k)+n); }
function range(lo,hi){ const a=idxOf(lo),b=idxOf(hi),out=[]; for(let i=a;i<=b;i++) out.push(fromIdx(i)); return out; }
const PIANO = { a:"c/4", w:"c#/4", s:"d/4", e:"d#/4", d:"e/4", r:"f/4", f:"f/4", t:"f#/4", g:"g/4", y:"g#/4", h:"a/4", u:"a#/4", j:"b/4", i:"c/5", k:"c/5", o:"c#/5", l:"d/5", p:"d#/5", ";":"e/5" };
function pcOf(k){ const m=/^([a-g])(#|b)?\//.exec(k); const base={c:0,d:2,e:4,f:5,g:7,a:9,b:11}[m[1]]; return ((base+(m[2]==="#"?1:m[2]==="b"?-1:0))%12+12)%12; }
function notePc(n){ const base={c:0,d:2,e:4,f:5,g:7,a:9,b:11}[n.letter]; return ((base+(n.acc==="#"?1:n.acc==="b"?-1:0))%12+12)%12; }
function noteFreqAcc(n){ let f=Tunings.noteFreq(n.key.replace("/","")); if(n.acc==="#")f*=Math.pow(2,1/12); else if(n.acc==="b")f/=Math.pow(2,1/12); return f; }

// ── levels ───────────────────────────────────────────────────────────────────
const TSLOW=50, TMED=80, TFAST=110;
function tempoName(b){ return b<=54?"Largo":b<=63?"Larghetto":b<=76?"Adagio":b<=108?"Andante":b<=120?"Moderato":b<=156?"Allegro":"Presto"; }
const TEMPOS=[TSLOW,TMED,TFAST];
const bassPrim=["g/2","c/3","f/3","c/4"], bassRange=range("g/2","c/4"), bassLedger=range("c/2","e/4");
const trebPrim=["c/4","e/4","g/4","c/5"], trebRange=range("c/4","f/5"), trebLedger=range("a/3","c/6");
function L(clef,pool,bpm,accid){ return {clef,pool,bpm,accid:!!accid}; }
const LEVELS = [
  L("bass",bassPrim,TSLOW),  L("bass",bassRange,TSLOW),  L("bass",bassRange,TMED),  L("bass",bassRange,TFAST),
  L("treble",trebPrim,TSLOW),L("treble",trebRange,TSLOW),L("treble",trebRange,TMED),L("treble",trebRange,TFAST),
  L("bass",bassLedger,TFAST),L("treble",trebLedger,TFAST),
  L("bass",bassPrim,TSLOW,1),  L("bass",bassRange,TSLOW,1),  L("bass",bassRange,TMED,1),  L("bass",bassRange,TFAST,1),
  L("treble",trebPrim,TSLOW,1),L("treble",trebRange,TSLOW,1),L("treble",trebRange,TMED,1),L("treble",trebRange,TFAST,1),
  L("bass",bassLedger,TFAST,1),L("treble",trebLedger,TFAST,1),
];
// remaining clefs, one block (10 levels) at a time
function clefBlock(clef, prim, rng, ledger){ return [
  L(clef,prim,TSLOW),  L(clef,rng,TSLOW),  L(clef,rng,TMED),  L(clef,rng,TFAST), L(clef,ledger,TFAST),
  L(clef,prim,TSLOW,1),L(clef,rng,TSLOW,1),L(clef,rng,TMED,1),L(clef,rng,TFAST,1),L(clef,ledger,TFAST,1) ]; }
LEVELS.push(...clefBlock("soprano",["c/4","g/4","c/5"], range("c/4","d/5"), range("a/3","f/5")));
LEVELS.push(...clefBlock("alto",   ["f/3","c/4","g/4"], range("f/3","g/4"), range("b/2","d/5")));
LEVELS.push(...clefBlock("tenor",  ["d/3","a/3","c/4"], range("d/3","e/4"), range("g/2","b/4")));
LEVELS.push(...clefBlock("baritone-f",["b/2","f/3","c/4"], range("b/2","c/4"), range("e/2","g/4")));
const NLEVELS = LEVELS.length;
const POWER_LEVELS = [4,8,10,14,18,20];   // levels that grant the next powerup

// ── player + progress (per name) ─────────────────────────────────────────────
let players = JSON.parse(localStorage.getItem("sr.players") || "{}");
let player = localStorage.getItem("sr.player") || "";
function ensurePlayer() {
  if (!player) { player = (prompt("What's your name? (saved with your scores)") || "Player").trim() || "Player"; localStorage.setItem("sr.player", player); }
  if (!players[player]) players[player] = { level: 0, plays: {} };       // level = highest beaten
  savePlayers();
}
function savePlayers(){ localStorage.setItem("sr.players", JSON.stringify(players)); }
const beaten = () => players[player] ? players[player].level : 0;
const currentLevel = () => Math.min(NLEVELS, beaten() + 1);
function powerEarned(){ const lv = beaten(); return POWER_LEVELS.filter(m => m <= lv).length; }

let activeLevel = 1, tempoBpm = TSLOW, notesN = 24, mode = "piano";

// ── instrument voices (one synth, a dozen colors) — {timbre, decay=ring-out, gain} ──
const SOUNDS = [
  { name:"Piano",      timbre:"piano",    decay:0.30, gain:0.20 },
  { name:"Mallet",     timbre:"mallet",   decay:0.45, gain:0.20 },
  { name:"Music box",  timbre:"musicbox", decay:0.55, gain:0.19 },
  { name:"Marimba",    timbre:"marimba",  decay:0.26, gain:0.20 },
  { name:"Vibes/bell", timbre:"bell",     decay:1.40, gain:0.16 },
  { name:"Gamelan",    timbre:"gamelan",  decay:0.80, gain:0.16 },
  { name:"Glass",      timbre:"glass",    decay:1.00, gain:0.17 },
  { name:"Pluck",      timbre:"pluck",    decay:0.22, gain:0.20 },
  { name:"E-piano",    timbre:"tine",     decay:0.60, gain:0.18 },
  { name:"Organ",      timbre:"organ",    decay:1.60, gain:0.14 },
  { name:"Reed",       timbre:"reed",     decay:0.70, gain:0.15 },
  { name:"Sine",       timbre:"sine",     decay:0.60, gain:0.20 },
];
let soundIdx = Math.max(0, SOUNDS.findIndex(s => s.name === localStorage.getItem("sr.sound")));
const curSound = () => SOUNDS[soundIdx] || SOUNDS[0];

// ── runtime ──────────────────────────────────────────────────────────────────
let notes = [], activeIdx = 0, cOk = 0, cNo = 0, cMi = 0;
let beatPos = 0, lastT = 0, lastBeat = -1, running = false, raf = null;
let N = 24;
const SPACING = 88, FAILX = 120, LEADIN = 4;
let SVG_H = 230, STAVE_Y = 92;            // adapt on small/landscape-phone screens
const GRACE_SEC = 0.10;                   // late-hit leeway past the downbeat (never need to be early)

const stage = document.getElementById("stage"), staffEl = document.getElementById("staff");
const clipEl = document.getElementById("clip"), trackEl = document.getElementById("track");
const fbEl = document.getElementById("fb"), notesEl = document.getElementById("notes");
const failEl = document.getElementById("failline"), countEl = document.getElementById("count"), elMsg = document.getElementById("msg");
clipEl.style.left = FAILX + "px"; failEl.style.left = FAILX + "px";
const ringEl = document.createElement("div"); ringEl.className = "ring"; fbEl.appendChild(ringEl);

const clefOf = () => LEVELS[activeLevel - 1].clef;
function baseOffset(){ return FAILX + LEADIN * SPACING - (notes[0] ? notes[0].xRel : 20); }
function screenX(i){ return notes[i].xRel + baseOffset() - beatPos * SPACING; }

function genSequence() {
  const cfg = LEVELS[activeLevel - 1];
  N = notesN; notes = [];
  for (let i = 0; i < N; i++) {
    const key = cfg.pool[(Math.random() * cfg.pool.length) | 0]; let acc = "";
    if (cfg.accid && Math.random() < 0.45) acc = Math.random() < 0.5 ? "#" : "b";
    notes.push({ key, acc, letter: key[0], xRel: 0, y: 0, state: "pending" });
  }
  activeIdx = 0; cOk = 0; cNo = 0; cMi = 0;
}
function renderStaff() {
  staffEl.innerHTML = ""; const w = stage.clientWidth || 900;
  const r = new VF.Renderer(staffEl, VF.Renderer.Backends.SVG); r.resize(w, SVG_H);
  const stave = new VF.Stave(8, STAVE_Y, w - 16); stave.addClef(clefOf()); stave.setContext(r.getContext()).draw();
}
function renderNotes() {
  notesEl.innerHTML = ""; const width = N * SPACING + 140;
  const r = new VF.Renderer(notesEl, VF.Renderer.Backends.SVG); r.resize(width, SVG_H);
  const ctx = r.getContext(); const stave = new VF.Stave(0, STAVE_Y, width); stave.setContext(ctx);
  const clef = clefOf();
  const sn = notes.map(n => { const s = new VF.StaveNote({ keys:[n.key], duration:"q", clef });
    if (n.acc) s.addModifier(new VF.Accidental(n.acc), 0); return s; });
  const voice = new VF.Voice({ num_beats: N, beat_value: 4 }).setStrict(false);
  voice.addTickables(sn); new VF.Formatter().joinVoices([voice]).format([voice], N * SPACING); voice.draw(ctx, stave);
  const groups = [...notesEl.querySelectorAll(".vf-stavenote")];
  sn.forEach((s, i) => { const nh = groups[i].querySelector(".vf-notehead") || groups[i]; const b = nh.getBBox();
    notes[i].xRel = b.x + b.width / 2; notes[i].y = b.y + b.height / 2; });
}
function placeDot(i){ const n = notes[i]; if (!n.dot){ n.dot = document.createElement("div"); fbEl.appendChild(n.dot); }
  n.dot.className = "dot " + n.state; n.dot.style.left = n.xRel + "px"; n.dot.style.top = n.y + "px"; }
function paint(){
  trackEl.style.transform = `translateX(${baseOffset() - beatPos * SPACING - FAILX}px)`;
  if (activeIdx < N && notes[activeIdx].state === "pending") { ringEl.style.display = "block";
    ringEl.style.left = notes[activeIdx].xRel + "px"; ringEl.style.top = notes[activeIdx].y + "px"; } else ringEl.style.display = "none";
}
function updateStats(){ document.getElementById("cOk").textContent = cOk; document.getElementById("cNo").textContent = cNo;
  document.getElementById("cMi").textContent = cMi; document.getElementById("prog").textContent = Math.min(activeIdx, N) + " / " + N; }

// ── input (physical + on-screen + touch) — always playable ───────────────────
function pressPitch(pitchKey) {
  const freq = Tunings.noteFreq(pitchKey.replace("/", "")); const s = curSound();
  if (!running || activeIdx >= N) { Synth.playFreq(freq, { timbre: s.timbre, decay: s.decay, gain: s.gain }); return; }
  const n = notes[activeIdx];
  const correct = (mode === "letters") ? (pitchKey[0] === n.letter) : (pcOf(pitchKey) === notePc(n));
  if (correct) { n.state = "correct"; placeDot(activeIdx); Synth.playFreq(noteFreqAcc(n), { timbre:s.timbre, decay:s.decay, gain:s.gain });
    cOk++; activeIdx++; if (activeIdx >= N) finish(); }
  else { cNo++; Synth.playFreq(freq, { timbre:"wrong", decay:0.5, gain:0.18 });
    ringEl.animate([{ borderColor:"rgba(220,70,70,0.95)" }, { borderColor:"rgba(40,110,220,0.85)" }], { duration:220 }); }
  updateStats();
}
function buildInstrument() {
  const el = document.getElementById("inst"); el.innerHTML = "";
  document.getElementById("modebtn").textContent = "Keys: " + mode;
  const compact = innerHeight < 560 || innerWidth < 600;
  if (mode === "piano") {
    const WK = compact ? 46 : 56, BK = compact ? 28 : 34, WH = compact ? 84 : 120, BH = Math.round(WH*0.62);
    // each white key shows the NOTE NAME big, with its computer-key small below
    const whites = [["a","C"],["s","D"],["d","E"],["f","F"],["g","G"],["h","A"],["j","B"],["k","C"],["l","D"],[";","E"]];
    const blacks = [{ after:0,k:"w",n:"C♯" },{ after:1,k:"e",n:"D♯" },{ after:3,k:"t",n:"F♯" },{ after:4,k:"y",n:"G♯" },{ after:5,k:"u",n:"A♯" },{ after:7,k:"o",n:"C♯" },{ after:8,k:"p",n:"D♯" }];

// ── transport: fixed tempo, metronome, count-in ──────────────────────────────
function metroClick(){ Synth.playFreq(1760, { timbre:"sine", decay:0.018, gain:0.07 }); }
function loop() {
  const t = Synth.now(); let dt = t - lastT; lastT = t; if (dt < 0 || dt > 0.5) dt = 0;
  beatPos += dt * (tempoBpm / 60);
  const b = Math.floor(beatPos);
  if (b > lastBeat) { lastBeat = b; metroClick(); }
  if (beatPos < LEADIN) { countEl.style.display = "flex"; countEl.textContent = (Math.floor(beatPos) + 1); }
  else countEl.style.display = "none";
  // a note is only "missed" once it scrolls GRACE_SEC *past* the downbeat —
  // so playing a touch late is fine; you never have to be early.
  const lateGrace = SPACING * (tempoBpm / 60) * GRACE_SEC;
  while (activeIdx < N && notes[activeIdx].state === "pending" && screenX(activeIdx) < FAILX - lateGrace) {
    notes[activeIdx].state = "missed"; placeDot(activeIdx); cMi++; activeIdx++;
  }
  if (activeIdx >= N) { finish(); return; }
  paint(); updateStats(); raf = requestAnimationFrame(loop);
}
function start() {
  Synth.ensure(); stopFinale(); elMsg.style.display = "none";
  fbEl.querySelectorAll(".dot").forEach(d => d.remove());
  genSequence(); renderStaff(); renderNotes(); notes.forEach(n => n.dot = null);
  beatPos = 0; lastBeat = -1; lastT = Synth.now(); running = true;
  if (raf) cancelAnimationFrame(raf); paint(); updateStats(); raf = requestAnimationFrame(loop);
}
function finish() {
  running = false; if (raf) cancelAnimationFrame(raf); countEl.style.display = "none"; paint();
  const total = cOk + cNo + cMi, acc = total ? Math.round(100 * cOk / total) : 0;
  const passed = (cMi === 0);
  const pl = players[player], rec = pl.plays[activeLevel] || { acc:0, bpm:0 };
  if (passed) {
    rec.acc = Math.max(rec.acc, acc); rec.bpm = Math.max(rec.bpm, tempoBpm); pl.plays[activeLevel] = rec;
    const advanced = (activeLevel === currentLevel());
    if (advanced) pl.level = activeLevel;
    savePlayers();
    if (advanced && currentLevel() > activeLevel) { activeLevel = currentLevel(); tempoBpm = LEVELS[activeLevel - 1].bpm; }  // next Play starts the next level
    buildLevelMenu(); buildTempoMenu(); updateCur();
    runFinale();      // celebrate with the just-played notes (notes[] left intact)
  } else { elMsg.textContent = `missed ${cMi} — try again`; elMsg.style.display = "flex"; }
}

document.addEventListener("keydown", (e) => {

  if (/INPUT|SELECT|TEXTAREA/.test(e.target.tagName)) return;

let fx = null, hideTimer = null, transTimer = null;
function midiOf(key) { return Tunings.nameToMidi(key.replace("/", "")); }
// the original "play all the notes" sweep — used during the transition into the playground
function playAvantGarde() {
  const c = Synth.context(); let t = c.currentTime + 0.1;
  const mids = notes.map(n => midiOf(n.key)); const timbres = ["gamelan","mallet","sine"]; let step = 0.15;
  for (let pass = 0; pass < 3; pass++) {
    const order = pass % 2 ? [...mids].reverse() : mids;
    order.forEach((m, i) => {
      const oct = Math.random() < 0.3 ? (Math.random() < 0.5 ? -12 : 12) : 0;
      const cents = (Math.random() - 0.5) * (pass === 2 ? 70 : 25);
      const hz = 440 * Math.pow(2, (m + oct - 69) / 12 + cents / 1200);
      Synth.playFreq(hz, { timbre: timbres[(i + pass) % 3], decay: 0.5 + Math.random() * 1.1, gain: 0.09 + Math.random() * 0.05, when: t });
      if (Math.random() < 0.18) Synth.playFreq(hz * Math.pow(2, 3/12), { timbre: timbres[i % 3], decay: 0.8, gain: 0.06, when: t });
      t += step; step = Math.max(0.05, step * 0.985);
    });
  }
  Synth.playFreq(440 * Math.pow(2, (mids[0] - 24 - 69) / 12), { timbre: "gamelan", decay: 3.5, gain: 0.18, when: t + 0.1 });
  return (t - c.currentTime) * 1000;
}

const CRUISE = 1.15, CRUISE_HOMING = 3.3, SEEK = 9.0, SEEK_HOMING = 16.0;
const EAT_DIST = 0.05, CATCH_VMAX = 0.6, DIGEST = 0.22, EJECT_VEL = 1.6;

const FRAG = `
precision highp float;
uniform vec2 uRes; uniform float uTime;
uniform int uCount; uniform vec2 uPos[32]; uniform float uPitch[32]; uniform float uScale[32];
vec3 hue(float h){ return 0.55 + 0.45*cos(6.2831*(h+vec3(0.0,0.33,0.67))); }
void main(){
  vec2 uv = gl_FragCoord.xy/uRes; vec2 p = uv; p.x *= uRes.x/uRes.y;
  float field = 0.0; vec3 col = vec3(0.0);
  for(int i=0;i<32;i++){
    if(i>=uCount) break;
    if(uScale[i] < 0.01) continue;
    vec2 c = uPos[i]; c.x *= uRes.x/uRes.y;
    float ph = float(i)*1.7;
    c += 0.015*vec2(sin(uTime*0.9+ph), cos(uTime*0.7+ph*1.3));
    float r = dot(p-c,p-c);
    float w = uScale[i]*0.0034/(r+0.0012);
    field += w; col += hue(uPitch[i])*w;
  }
  col /= max(field,0.0001);
  float h = smoothstep(0.6,2.4,field);
  vec3 outc = mix(vec3(0.03,0.04,0.06), col*(0.5+0.9*h), smoothstep(0.35,1.2,field));
  outc += pow(h,3.0)*0.5;
  gl_FragColor = vec4(outc,1.0);
}`;
const VERT = `attribute vec2 a; void main(){ gl_Position = vec4(a,0.0,1.0); }`;

  void cv.offsetWidth; cv.style.opacity = "1";
  const mids = notes.map(n => midiOf(n.key)); const lo = Math.min(...mids), hi = Math.max(...mids);

  function eat(b){ b.state="inside"; b.tEat=(performance.now()-t0)/1000;
    const wild=Math.min(1,guy.cruise/CRUISE_HOMING); const oct=(Math.random()<0.25*wild)?(Math.random()<0.5?-12:12):0;
    const cents=(Math.random()-0.5)*(8+50*wild); const hz=440*Math.pow(2,(b.midi+oct-69)/12+cents/1200);

    guy.vx*=0.9; guy.vy*=0.9; const sp=Math.hypot(guy.vx,guy.vy); if(sp>guy.cruise&&sp>1e-4){ guy.vx*=guy.cruise/sp; guy.vy*=guy.cruise/sp; }
    guy.x+=guy.vx*dt; guy.y+=guy.vy*dt; if(guy.x<0.04||guy.x>0.96)guy.vx*=-0.6; if(guy.y<0.08||guy.y>0.92)guy.vy*=-0.6;
    guy.x=Math.max(0.04,Math.min(0.96,guy.x)); guy.y=Math.max(0.08,Math.min(0.92,guy.y)); if(sp>1e-3)guy.face=Math.atan2(guy.vy,guy.vx); guy.mouth=Math.max(0,guy.mouth-dt);
    if(tgt&&best<EAT_DIST&&tgt.state==="free"&&Math.hypot(tgt.vx,tgt.vy)<CATCH_VMAX) eat(tgt);
    guy.head+=(1-guy.head)*Math.min(1,dt*4); guy.butt+=(1-guy.butt)*Math.min(1,dt*5);
    const pos=new Float32Array(64),scl=new Float32Array(32);
    blobs.forEach((b,i)=>{ if(i<32){ pos[i*2]=b.x; pos[i*2+1]=b.y; scl[i]=b.scale; pit[i]=(b.midi-lo)/Math.max(1,hi-lo); } });
    gl.uniform2f(U("uRes"),cv.width,cv.height); gl.uniform1f(U("uTime"),tt); gl.uniform2fv(U("uPos"),pos); gl.uniform1fv(U("uScale"),scl); gl.uniform1fv(U("uPitch"),pit);
    gl.drawArrays(gl.TRIANGLES,0,3);
    g2.clearRect(0,0,gc.width,gc.height);
    for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt*1.4; if(p.life<=0){parts.splice(i,1);continue;}
      g2.globalAlpha=Math.max(0,p.life); g2.beginPath(); g2.arc(p.x*gc.width,(1-p.y)*gc.height,6,0,7); g2.fillStyle="hsl("+(p.hue*300)+",80%,65%)"; g2.fill(); }
    g2.globalAlpha=1; g2.font="bold 16px -apple-system,system-ui,sans-serif"; g2.textAlign="center"; g2.textBaseline="middle"; g2.lineWidth=3.5; g2.lineJoin="round";
    for(const b of blobs){ if(b.state!=="free"||b.scale<0.4)continue; const px=b.x*gc.width,py=(1-b.y)*gc.height,nm=midiToName(b.midi);
      g2.strokeStyle="rgba(0,0,0,0.78)"; g2.strokeText(nm,px,py); g2.fillStyle="#fff"; g2.fillText(nm,px,py); }
    drawGuy(g2, guy.x*gc.width, (1-guy.y)*gc.height, guy.face, guy.mouth, sp, guy.head, guy.butt);
    fx.r=requestAnimationFrame(frame);
  }
  fx = { stop(){ alive=false; if(fx.r)cancelAnimationFrame(fx.r); window.removeEventListener("resize",size); } };
  frame();
}
function drawGuy(c, x, y, face, mouth, sp, head, butt) {
  head=head||1; butt=butt||1; const wob=Math.sin(performance.now()/120)*0.3, T=performance.now()/1000; const fx=-Math.cos(face), fy=-Math.sin(face);
  c.save(); c.translate(x,y); c.lineCap="round"; c.lineJoin="round";
  c.beginPath(); c.moveTo(-2,-8); c.quadraticCurveTo(fx*26-6,fy*22+10,fx*18,24); c.lineTo(0,16); c.closePath(); c.fillStyle="rgba(220,60,90,0.8)"; c.fill();
  if(butt>1.03){ c.beginPath(); c.ellipse(fx*11,fy*11+9,9*butt,9*butt,0,0,7); c.fillStyle="rgba(255,210,170,0.95)"; c.fill(); }
  c.strokeStyle="#fff"; c.lineWidth=3;
  c.beginPath(); c.moveTo(0,-4); c.lineTo(0,16); c.stroke();
  c.beginPath(); c.moveTo(0,2); c.lineTo(13,-8+wob*4); c.moveTo(0,2); c.lineTo(-11,8-wob*4); c.stroke();
  c.beginPath(); c.moveTo(0,16); c.lineTo(9,30+wob*3); c.moveTo(0,16); c.lineTo(-9,30-wob*3); c.stroke();
  const hr=11*head; c.strokeStyle="rgba(150,80,40,0.92)"; c.lineWidth=2.4;
  for(let i=0;i<7;i++){ const a=-Math.PI/2+(i-3)*0.34; const ox=Math.cos(a)*hr,oy=Math.sin(a)*hr-15; const wv=Math.sin(T*3+i*0.8)*7;
    c.beginPath(); c.moveTo(ox,oy); c.quadraticCurveTo(ox+fx*18-fy*wv,oy+fy*18+fx*wv,ox+fx*34,oy+fy*34+12); c.stroke(); }
  c.beginPath(); c.arc(0,-15,hr,0,7); c.fillStyle="#ffe0b8"; c.fill(); c.lineWidth=2.5; c.strokeStyle="#fff"; c.stroke();
  c.fillStyle="#222"; c.beginPath(); c.arc(-4*head,-17,1.7,0,7); c.arc(4*head,-17,1.7,0,7); c.fill();
  const mw=3+mouth*30, mh=2+mouth*26; c.beginPath(); c.ellipse(0,-11-(head-1)*5,mw,mh,0,0,7); c.fillStyle="#7a1020"; c.fill(); c.restore();
}
function stopFinale() {
  const cv=document.getElementById("fx"), gc=document.getElementById("guy"), hint=document.getElementById("fxhint"), pw=document.getElementById("powers");
  if(fx){ fx.stop(); fx=null; } cv.style.opacity="0"; hint.style.display="none"; pw.style.display="none";
  clearTimeout(transTimer); document.getElementById("rankings").style.display="none";
  clearTimeout(hideTimer); hideTimer=setTimeout(()=>{ cv.style.display="none"; gc.style.display="none"; }, 1000);
}

// ── responsive layout (short / landscape-phone screens) ──────────────────────
function layout() {
  const compact = innerHeight < 560 || innerWidth < 600;
  SVG_H = compact ? 156 : 230; STAVE_Y = compact ? 70 : 92;
  stage.style.height = SVG_H + "px";
  renderStaff(); if (notes.length) renderNotes();
  notes.forEach(n => { if (n.dot) { n.dot.style.left = n.xRel + "px"; n.dot.style.top = n.y + "px"; } });
  paint();
}
let resizeTimer = null;
window.addEventListener("resize", () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { layout(); buildInstrument(); }, 180); });

// ── boot ──────────────────────────────────────────────────────────────────────
ensurePlayer();
activeLevel = currentLevel(); tempoBpm = LEVELS[activeLevel - 1].bpm;
buildLevelMenu(); buildTempoMenu(); buildSoundMenu(); updateCur(); buildInstrument();
selectLevel(activeLevel);
layout();
</script>
