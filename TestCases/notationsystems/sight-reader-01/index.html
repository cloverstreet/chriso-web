<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sight-Reading Trainer · notation test case 01</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<script src="./synth.js"></script>
<script src="./tunings.js"></script>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font-family:-apple-system, system-ui, sans-serif;
         background:#15171c; color:#e6e8ec; padding:24px; }
  h1 { font-size:18px; font-weight:600; margin:0 0 12px; }
  .controls { display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
  button { background:#2a2e37; color:#e6e8ec; border:1px solid #3a3f4a;
           padding:8px 16px; border-radius:8px; font-size:14px; cursor:pointer; }
  button:hover { background:#343a45; }
  .stat { font-size:14px; color:#b6bcc6; font-variant-numeric:tabular-nums; }
  .stat b { color:#e6e8ec; } .stat i { color:#f06a6a; font-style:normal; }

  #stage { position:relative; background:#fbfbf8; border-radius:10px; overflow:hidden; height:240px; }
  #staff  { position:absolute; inset:0; z-index:1; }
  #clip   { position:absolute; top:0; bottom:0; right:0; overflow:hidden; z-index:2; }
  #track  { position:absolute; top:0; left:0; will-change:transform; }
  #fb     { position:absolute; top:0; left:0; }
  #notes  { position:absolute; top:0; left:0; }
  #failline { position:absolute; top:0; bottom:0; width:2px; background:rgba(220,70,70,0.85); z-index:4; }
  #failline::after { content:"play before here"; position:absolute; top:6px; left:8px;
              font-size:10px; color:#cc5555; white-space:nowrap; }
  .dot { position:absolute; width:26px; height:26px; border-radius:50%; transform:translate(-50%,-50%); }
  .dot.correct { background:rgba(45,180,95,0.55); }
  .dot.missed  { background:rgba(220,70,70,0.5); }
  .ring { position:absolute; width:30px; height:30px; border-radius:50%; transform:translate(-50%,-50%);
          border:2.5px solid rgba(40,110,220,0.85); box-sizing:border-box; display:none; z-index:3; }
  #msg { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
         font-size:22px; font-weight:600; color:#15171c; z-index:5; pointer-events:none; }

  #fx { position:fixed; inset:0; z-index:50; display:none; opacity:0; }
  #guy { position:fixed; inset:0; z-index:51; display:none; pointer-events:none; }
  #fxhint { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); z-index:52; display:none;
            color:#fff; font-size:13px; opacity:0.85; text-shadow:0 1px 4px #000; }

  .keymap { display:none; margin-top:14px; color:#8b909a; font-size:13px; line-height:1.6; max-width:760px; }
  .app.keysopen .keymap { display:block; }
  .kbrow { display:flex; gap:6px; margin-top:6px; }
  .kc { display:flex; flex-direction:column; align-items:center; min-width:40px; padding:5px 0;
        background:#23262d; border:1px solid #3a3f4a; border-radius:7px; }
  .kc b { color:#e6e8ec; font-size:14px; } .kc span { color:#8b909a; font-size:11px; margin-top:2px; }
  /* piano diagram */
  .piano { position:relative; height:128px; margin-top:10px; width:360px; }
  .wk { position:absolute; top:0; width:44px; height:128px; background:#f4f4ef; border:1px solid #999;
        border-radius:0 0 5px 5px; box-sizing:border-box; display:flex; flex-direction:column;
        justify-content:flex-end; align-items:center; padding-bottom:6px; }
  .wk b { color:#222; font-size:14px; } .wk span { color:#777; font-size:10px; }
  .bk { position:absolute; top:0; width:28px; height:80px; background:#222; border:1px solid #000;
        border-radius:0 0 4px 4px; z-index:2; display:flex; flex-direction:column;
        justify-content:flex-end; align-items:center; padding-bottom:5px; }
  .bk b { color:#fff; font-size:12px; } .bk span { color:#bbb; font-size:9px; }
</style>
</head>
<body>
  <div class="app" id="app">
    <h1>Sight-Reading Trainer</h1>
    <div class="controls">
      <button id="start">New sequence</button>
      <span class="stat">tempo <b id="tempo">—</b> · <span id="prog">0 / 0</span> · missed <i id="miss">0</i></span>
      <button id="modebtn">Mode: letters</button>
      <button id="keysbtn">Key map&nbsp;▸</button>
    </div>

    <div id="stage">
      <div id="staff"></div>
      <div id="clip"><div id="track"><div id="fb"></div><div id="notes"></div></div></div>
      <div id="failline"></div>
      <div id="msg"></div>
    </div>

    <div class="keymap" id="keymap"></div>
  </div>

  <canvas id="fx"></canvas>
  <canvas id="guy"></canvas>
  <div id="fxhint">move the mouse to mold the notes · Esc to return</div>

<script>
const VF = Vex.Flow;

// ── input mappings ──────────────────────────────────────────────────────
// piano/chromatic: home row = white keys C..C; top row = sharps (each top key
// is the sharp of the white to its lower-left). r=E#(=F), i=B#(=C) are
// intentional enharmonic redundancies.
const PIANO = {
  a:"c/4", w:"c#/4", s:"d/4", e:"d#/4", d:"e/4", r:"f/4", f:"f/4", t:"f#/4",
  g:"g/4", y:"g#/4", h:"a/4", u:"a#/4", j:"b/4", i:"c/5", k:"c/5", o:"c#/5",
};
let mode = "letters";   // "letters" (note name, any octave) | "piano"

// diatonic C-major pool the staff draws from (two octaves)
const POOL = ["c/4","d/4","e/4","f/4","g/4","a/4","b/4","c/5","d/5","e/5","f/5","g/5","a/5","b/5"];

let N = 10;              // notes per sequence — grows by 5 each clean round
const SPACING = 92;
const FAILX = 58;
const LEADIN = 4;
const SVG_H = 240, STAVE_Y = 96;
const NOTE_BEATS = 2;    // half notes (2x the whole-note speed). gap between notes = 60*NOTE_BEATS/bpm

// adaptive tempo (musical MM). time between notes crossing the line = 60*NOTE_BEATS/bpm.
const BASE = 72, TMIN = 34, TMAX = 170;
const COMFORT = 4, LEADK = 13, WRONG_PEN = 22, PEN_DECAY = 0.6;

let notes = [];
let activeIdx = 0, missed = 0;
let scrollX = 0, bpm = BASE, penalty = 0;
let running = false, lastT = 0, raf = null;

const stage = document.getElementById("stage");
const staffEl = document.getElementById("staff");
const clipEl = document.getElementById("clip");
const trackEl = document.getElementById("track");
const fbEl = document.getElementById("fb");
const notesEl = document.getElementById("notes");
const failEl = document.getElementById("failline");
const elTempo = document.getElementById("tempo");
const elProg = document.getElementById("prog");
const elMiss = document.getElementById("miss");
const elMsg = document.getElementById("msg");

clipEl.style.left = FAILX + "px";
failEl.style.left = FAILX + "px";
const ringEl = document.createElement("div"); ringEl.className = "ring"; fbEl.appendChild(ringEl);

function pcOf(noteKey) {       // 'c#/4' -> pitch class 0..11
  const m = /^([a-g])(#|b)?\//.exec(noteKey);
  const base = { c:0, d:2, e:4, f:5, g:7, a:9, b:11 }[m[1]];
  return ((base + (m[2] === "#" ? 1 : m[2] === "b" ? -1 : 0)) % 12 + 12) % 12;
}
function baseOffset() { return FAILX + LEADIN * SPACING - (notes[0] ? notes[0].xRel : 20); }
function screenX(i) { return notes[i].xRel + baseOffset() - scrollX; }

function makeSequence() {
  notes = [];
  for (let i = 0; i < N; i++) notes.push({ key: POOL[(Math.random() * POOL.length) | 0], xRel: 0, y: 0, state: "pending" });
  activeIdx = 0; missed = 0;
}

function renderStaff() {
  staffEl.innerHTML = "";
  const w = stage.clientWidth || 900;
  const r = new VF.Renderer(staffEl, VF.Renderer.Backends.SVG);
  r.resize(w, SVG_H);
  const ctx = r.getContext();
  const stave = new VF.Stave(8, STAVE_Y, w - 16);
  stave.addClef("treble");
  stave.setContext(ctx).draw();
}

function renderNotes() {
  notesEl.innerHTML = "";
  const width = N * SPACING + 120;
  const r = new VF.Renderer(notesEl, VF.Renderer.Backends.SVG);
  r.resize(width, SVG_H);
  const ctx = r.getContext();
  const stave = new VF.Stave(0, STAVE_Y, width);   // positioning only — not drawn
  stave.setContext(ctx);
  const dur = NOTE_BEATS >= 4 ? "w" : "h";
  const sn = notes.map(n => new VF.StaveNote({ keys: [n.key], duration: dur, clef: "treble" }));
  const voice = new VF.Voice({ num_beats: N * NOTE_BEATS, beat_value: 4 }).setStrict(false);
  voice.addTickables(sn);
  new VF.Formatter().joinVoices([voice]).format([voice], N * SPACING);
  voice.draw(ctx, stave);
  const groups = [...notesEl.querySelectorAll(".vf-stavenote")];
  sn.forEach((s, i) => {
    const nh = groups[i].querySelector(".vf-notehead") || groups[i];
    const b = nh.getBBox();
    notes[i].xRel = b.x + b.width / 2;
    notes[i].y = b.y + b.height / 2;
  });
}

function placeDot(i) {
  const n = notes[i];
  if (!n.dot) { n.dot = document.createElement("div"); fbEl.appendChild(n.dot); }
  n.dot.className = "dot " + n.state;
  n.dot.style.left = n.xRel + "px"; n.dot.style.top = n.y + "px";
}
function paint() {
  trackEl.style.transform = `translateX(${baseOffset() - scrollX - FAILX}px)`;
  if (activeIdx < N && notes[activeIdx].state === "pending") {
    ringEl.style.display = "block";
    ringEl.style.left = notes[activeIdx].xRel + "px";
    ringEl.style.top = notes[activeIdx].y + "px";
  } else ringEl.style.display = "none";
}

function judge(correct, pressedKey) {
  const n = notes[activeIdx];
  if (correct) {
    n.state = "correct"; placeDot(activeIdx);
    Synth.playFreq(Tunings.noteFreq(n.key.replace("/", "")), { timbre: "mallet", decay: 0.5, gain: 0.2 });
    activeIdx++;
    if (activeIdx >= N) finish();
  } else {
    penalty += WRONG_PEN;
    // sound the pitch they actually pressed, but "wrong" (sour but recognizable)
    if (pressedKey) Synth.playFreq(Tunings.noteFreq(pressedKey.replace("/", "")), { timbre: "wrong", decay: 0.5, gain: 0.18 });
    ringEl.animate([{ borderColor: "rgba(220,70,70,0.95)" }, { borderColor: "rgba(40,110,220,0.85)" }], { duration: 240 });
  }
  updateStats();
}
function updateStats() {
  elProg.textContent = Math.min(activeIdx, N) + " / " + N;
  elMiss.textContent = missed;
  elTempo.textContent = Math.round(bpm);
}

function loop() {
  const t = Synth.now();
  let dt = t - lastT; lastT = t;
  if (dt < 0 || dt > 0.5) dt = 0;
  if (activeIdx < N) {
    const lead = (screenX(activeIdx) - FAILX) / SPACING;
    const target = Math.max(TMIN, Math.min(TMAX, BASE + LEADK * (lead - COMFORT) - penalty));
    bpm += (target - bpm) * Math.min(1, dt * 3);
  }
  penalty *= Math.pow(PEN_DECAY, dt);
  // scroll: one note-gap takes NOTE_BEATS beats at the current MM
  scrollX += (bpm / (60 * NOTE_BEATS)) * SPACING * dt;

  while (activeIdx < N && notes[activeIdx].state === "pending" && screenX(activeIdx) < FAILX) {
    notes[activeIdx].state = "missed"; placeDot(activeIdx); missed++; activeIdx++;
  }
  if (activeIdx >= N) { finish(); return; }
  paint(); updateStats();
  raf = requestAnimationFrame(loop);
}

function start() {
  Synth.ensure();
  stopFinale();
  elMsg.style.display = "none";
  fbEl.querySelectorAll(".dot").forEach(d => d.remove());
  makeSequence();
  renderStaff(); renderNotes();
  notes.forEach(n => n.dot = null);
  scrollX = 0; bpm = BASE; penalty = 0; lastT = Synth.now();
  running = true;
  if (raf) cancelAnimationFrame(raf);
  paint(); updateStats();
  raf = requestAnimationFrame(loop);
}

function finish() {
  running = false;
  if (raf) cancelAnimationFrame(raf);
  paint();
  if (missed === 0) { runFinale(); N += 5; }   // reward grows by 5 notes next round
  else { elMsg.textContent = `${N - missed} / ${N}`; elMsg.style.display = "flex"; }
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { stopFinale(); return; }
  if (!running || activeIdx >= N) return;
  const k = e.key.toLowerCase();
  let correct = null, pressedKey = null;
  if (mode === "letters") {
    if (!/^[a-g]$/.test(k)) return;
    const oct = notes[activeIdx].key.split("/")[1];
    pressedKey = k + "/" + oct;                       // sound it near the target octave
    correct = (notes[activeIdx].key[0] === k);        // octave-agnostic
  } else {
    pressedKey = PIANO[k];
    if (!pressedKey) return;
    correct = (pcOf(pressedKey) === pcOf(notes[activeIdx].key));
  }
  e.preventDefault();
  judge(correct, pressedKey);
});

// ── visual key map ──────────────────────────────────────────────────────
function renderKeymap() {
  const km = document.getElementById("keymap");
  if (mode === "letters") {
    const caps = ["A","B","C","D","E","F","G"].map(L => `<div class="kc"><b>${L}</b><span>${L}</span></div>`).join("");
    km.innerHTML = `Press the note's <b>letter name</b> — octave doesn't matter.<div class="kbrow">${caps}</div>` +
      `<div style="margin-top:10px">Self-paced: a correct note lets you play the next at once. Stay ahead and tempo climbs; ` +
      `wrong tries sound sour and slow it down — retry until the note slips past the red line (a miss). Zero misses → a surprise.</div>`;
  } else {
    const whites = [["a","C"],["s","D"],["d","E"],["f","F"],["g","G"],["h","A"],["j","B"],["k","C"]];
    const blacks = [{ after:0, k:"w", n:"C♯" },{ after:1, k:"e", n:"D♯" },{ after:3, k:"t", n:"F♯" },{ after:4, k:"y", n:"G♯" },{ after:5, k:"u", n:"A♯" }];
    const WK = 44, BK = 28;
    let html = `<div class="piano">`;
    whites.forEach((w, i) => { html += `<div class="wk" style="left:${i*WK}px"><b>${w[0].toUpperCase()}</b><span>${w[1]}</span></div>`; });
    blacks.forEach(b => { html += `<div class="bk" style="left:${(b.after+1)*WK - BK/2}px"><b>${b.k.toUpperCase()}</b><span>${b.n}</span></div>`; });
    html += `</div>`;
    km.innerHTML = `Play the note's <b>position</b> — letters sit on a piano. Top row = sharps/flats ` +
      `(also <b>R</b>=E♯/F, <b>I</b>=B♯/C, <b>O</b>=C♯).${html}` +
      `<div style="margin-top:8px">Octave-agnostic. Wrong notes still sound (sour) so you hear what you pressed.</div>`;
  }
}

document.getElementById("start").onclick = start;
document.getElementById("modebtn").onclick = () => {
  mode = mode === "letters" ? "piano" : "letters";
  document.getElementById("modebtn").textContent = "Mode: " + mode;
  renderKeymap();
};
document.getElementById("keysbtn").onclick = () => {
  const open = document.getElementById("app").classList.toggle("keysopen");
  document.getElementById("keysbtn").innerHTML = open ? "Key map&nbsp;◂" : "Key map&nbsp;▸";
};

/* ───────────────── 100% finale — the note-eater playground ─────────────────
   The notes become glowing blobs (WebGL metaballs). A stick-figure superhero
   flies around organically (spring-seek toward the nearest blob + multi-sine
   wander), swallows each blob — playing its note — and ejects it out the rear.
   He starts fast (the opening flurry), slows after each note, and his cruise
   speed slews toward how fast you're moving the mouse (still mouse → he rests).
   Stir the field with the mouse: clustered blobs get eaten in quick succession,
   so the notes bunch up rhythmically. Plays on until you hit Esc. */
let fx = null, hideTimer = null;
function midiOf(key) { return Tunings.nameToMidi(key.replace("/", "")); }
function runFinale() { try { startPlayground(); } catch (e) {} }

const CRUISE_MAX = 3.4, SEEK = 14.0, EAT_DIST = 0.05, MOLD_R = 0.34, MOLD_PULL = 20.0, DIGEST = 0.22;
const EJECT_VEL = 1.6;     // a digested note is pooped out hard, shooting far
const CATCH_VMAX = 0.6;    // Marge only catches a note slower than this (moving ones slip past)
const SEP_R = 0.11, SEP_K = 7.0;   // inter-note repulsion (anti-glob), scaled by mouse speed
const TRANSPOSE = 3;       // Marge digests every note up a minor third (a "transformer")
function midiToName(m){ const N=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]; m=Math.round(m); return N[((m%12)+12)%12]+(Math.floor(m/12)-1); }

const FRAG = `
precision highp float;
uniform vec2 uRes; uniform float uTime;
uniform int uCount; uniform vec2 uPos[32]; uniform float uPitch[32]; uniform float uScale[32];
vec3 hue(float h){ return 0.55 + 0.45*cos(6.2831*(h+vec3(0.0,0.33,0.67))); }
void main(){
  vec2 uv = gl_FragCoord.xy/uRes; vec2 p = uv; p.x *= uRes.x/uRes.y;
  float field = 0.0; vec3 col = vec3(0.0);
  for(int i=0;i<32;i++){
    if(i>=uCount) break;
    if(uScale[i] < 0.01) continue;
    vec2 c = uPos[i]; c.x *= uRes.x/uRes.y;
    float ph = float(i)*1.7;
    c += 0.015*vec2(sin(uTime*0.9+ph), cos(uTime*0.7+ph*1.3));
    float r = dot(p-c,p-c);
    float w = uScale[i]*0.0018/(r+0.0009);
    field += w; col += hue(uPitch[i])*w;
  }
  col /= max(field,0.0001);
  float h = smoothstep(0.6,2.4,field);
  vec3 outc = mix(vec3(0.03,0.04,0.06), col*(0.5+0.9*h), smoothstep(0.35,1.2,field));
  outc += pow(h,3.0)*0.5;
  gl_FragColor = vec4(outc,1.0);
}`;
const VERT = `attribute vec2 a; void main(){ gl_Position = vec4(a,0.0,1.0); }`;

function startPlayground() {
  const cv = document.getElementById("fx"), gc = document.getElementById("guy"), hint = document.getElementById("fxhint");
  const gl = cv.getContext("webgl");
  const g2 = gc.getContext("2d");
  if (!gl || !g2) return;
  clearTimeout(hideTimer);
  cv.style.display = "block"; gc.style.display = "block"; hint.style.display = "block";
  void cv.offsetWidth;                 // flush layout so the fade-in transition fires reliably
  cv.style.opacity = "1";

  const mids = notes.map(n => midiOf(n.key));
  const lo = Math.min(...mids), hi = Math.max(...mids);
  const blobs = notes.map((n, i) => ({
    x: 0.12 + 0.76 * (i / Math.max(1, notes.length - 1)) + (Math.random() - 0.5) * 0.04,
    y: 0.25 + 0.5 * ((mids[i] - lo) / Math.max(1, hi - lo)),
    vx: 0, vy: 0, midi: mids[i], pitch: (mids[i] - lo) / Math.max(1, hi - lo),
    scale: 1, state: "free", tEat: 0,   // state: "free" | "inside" (being digested)
  }));
  const guy = { x: 0.5, y: 0.5, vx: 0, vy: 0, cruise: CRUISE_MAX, mouth: 0, face: 0, sitting: false, head: 1, butt: 1 };
  const mouse = { x: 0.5, y: 0.5, px: 0.5, py: 0.5, sp: 0 };
  const parts = [];

  function size() { cv.width = gc.width = innerWidth; cv.height = gc.height = innerHeight; gl.viewport(0, 0, cv.width, cv.height); }
  size();
  const onMove = (ev) => { mouse.x = ev.clientX / innerWidth; mouse.y = 1 - ev.clientY / innerHeight; };
  window.addEventListener("pointermove", onMove); window.addEventListener("resize", size);

  const sh = (type, src) => { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; };
  const prog = gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT)); gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog); gl.useProgram(prog);
  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const la = gl.getAttribLocation(prog, "a"); gl.enableVertexAttribArray(la); gl.vertexAttribPointer(la, 2, gl.FLOAT, false, 0, 0);
  const U = n => gl.getUniformLocation(prog, n);
  const pit = new Float32Array(32);   // uPitch refreshed each frame (pitch climbs as notes digest)
  gl.uniform1i(U("uCount"), Math.min(blobs.length, 32));

  function eat(b) {
    b.state = "inside"; b.tEat = (performance.now() - t0) / 1000;
    const wild = Math.min(1, guy.cruise / CRUISE_MAX);     // fast = wilder (like the opening flurry)
    const oct = (Math.random() < 0.3 * wild) ? (Math.random() < 0.5 ? -12 : 12) : 0;
    const cents = (Math.random() - 0.5) * (8 + 60 * wild);
    const hz = 440 * Math.pow(2, (b.midi + oct - 69) / 12 + cents / 1200);
    const tim = ["gamelan", "mallet", "sine"][(Math.random() * 3) | 0];
    Synth.playFreq(hz, { timbre: tim, decay: 0.5 + Math.random() * 1.1, gain: 0.1, when: Synth.now() + 0.001 });
    guy.cruise *= 0.85; guy.mouth = 0.55; guy.head = 1.8;   // head swells, mouth gapes while ingesting
  }

  let t0 = performance.now(), prevT = t0, alive = true;
  function frame() {
    if (!alive) return;
    const now = performance.now(); let dt = (now - prevT) / 1000; prevT = now; if (dt > 0.05) dt = 0.05;
    const tt = (now - t0) / 1000;

    // mouse speed (units/sec), smoothed
    const msp = Math.hypot(mouse.x - mouse.px, mouse.y - mouse.py) / Math.max(dt, 1e-3);
    mouse.sp += (msp - mouse.sp) * 0.25; mouse.px = mouse.x; mouse.py = mouse.y;

    // anchor points on the guy (mouth front / used for digesting)
    const mx = guy.x + Math.cos(guy.face) * 0.012, my = guy.y + Math.sin(guy.face) * 0.012;

    // blobs: a swallowed one shrinks into the mouth, then is EJECTED INTACT out the
    // rear (never destroyed); free ones are molded by the mouse + lightly separate.
    for (const b of blobs) {
      if (b.state === "inside") {
        b.x += (mx - b.x) * Math.min(1, dt * 16); b.y += (my - b.y) * Math.min(1, dt * 16);
        b.scale += (0 - b.scale) * Math.min(1, dt * 16);
        if (tt - b.tEat > DIGEST) {
          b.state = "free";                                  // poop it out the rear, shooting far
          b.midi += TRANSPOSE; if (b.midi > 93) b.midi -= 24; // digested -> up a minor third (Marge's transform)
          b.x = guy.x - Math.cos(guy.face) * 0.06; b.y = guy.y - Math.sin(guy.face) * 0.06;
          b.vx = -Math.cos(guy.face) * EJECT_VEL + (Math.random() - 0.5) * 0.2;
          b.vy = -Math.sin(guy.face) * EJECT_VEL + (Math.random() - 0.5) * 0.2;
          b.scale = 0.2; guy.butt = 1.9;                     // rear swells as the note comes out
          parts.push({ x: b.x, y: b.y, vx: b.vx * 0.4, vy: b.vy * 0.4, life: 0.5, hue: b.pitch });
        }
        continue;
      }
      b.scale += (1 - b.scale) * Math.min(1, dt * 7);
      // mouse molds: attract toward the cursor, but a close-range repel makes a
      // fast incomer swing past instead of collapsing onto a single point.
      const dx = mouse.x - b.x, dy = mouse.y - b.y, d = Math.hypot(dx, dy) || 1e-3;
      if (d < MOLD_R) { const f = (1 - d / MOLD_R) * MOLD_PULL * dt; b.vx += dx * f; b.vy += dy * f; }
      if (d < 0.07) { const r = (1 - d / 0.07) * MOLD_PULL * 1.1 * dt; b.vx -= (dx / d) * r * 0.07; b.vy -= (dy / d) * r * 0.07; }
    }
    // inter-note repulsion (anti-glob): firmer when the mouse moves fast (scatter),
    // gentle when slow so notes can still glob together.
    const sepK = SEP_K * (0.35 + mouse.sp * 2.2);
    for (let i = 0; i < blobs.length; i++) for (let j = i + 1; j < blobs.length; j++) {
      const a = blobs[i], c = blobs[j]; if (a.state !== "free" || c.state !== "free") continue;
      const dx = c.x - a.x, dy = c.y - a.y, d = Math.hypot(dx, dy) || 1e-3;
      if (d < SEP_R) { const f = (1 - d / SEP_R) * sepK * dt / d; a.vx -= dx * f; a.vy -= dy * f; c.vx += dx * f; c.vy += dy * f; }
    }
    for (const b of blobs) {
      if (b.state !== "free") continue;
      b.vx *= 0.92; b.vy *= 0.92; b.x += b.vx * dt; b.y += b.vy * dt;
      b.x = Math.max(0.05, Math.min(0.95, b.x)); b.y = Math.max(0.12, Math.min(0.9, b.y));
    }

    // guy cruise: a big OPENING BURST (the fast flurry), then slews toward how fast
    // you're moving the mouse; each eat knocks it down a notch.
    const openBoost = Math.max(0, 1 - tt / 2.6) * CRUISE_MAX * 0.8;
    const cruiseTarget = Math.min(CRUISE_MAX, 0.05 + mouse.sp * 1.4 + openBoost);
    guy.cruise += (cruiseTarget - guy.cruise) * Math.min(1, dt * 1.3);
    guy.sitting = guy.cruise < 0.12;                          // mouse still long enough -> he rests
    let tgt = null, best = 1e9;
    for (const b of blobs) { if (b.state !== "free") continue; const d = Math.hypot(b.x - guy.x, b.y - guy.y); if (d < best) { best = d; tgt = b; } }
    if (tgt && !guy.sitting) { guy.vx += (tgt.x - guy.x) * SEEK * dt; guy.vy += (tgt.y - guy.y) * SEEK * dt; }
    const wob = guy.sitting ? 0.05 : 1;                       // organic wander (multi-sine, not one LFO)
    guy.vx += wob * 0.6 * (Math.sin(tt * 1.7) + 0.6 * Math.sin(tt * 0.53 + 1.3)) * dt;
    guy.vy += wob * 0.6 * (Math.cos(tt * 1.31) + 0.6 * Math.sin(tt * 0.91 + 2.1)) * dt;
    guy.vx *= 0.9; guy.vy *= 0.9;
    const sp = Math.hypot(guy.vx, guy.vy);
    if (sp > guy.cruise && sp > 1e-4) { guy.vx *= guy.cruise / sp; guy.vy *= guy.cruise / sp; }
    if (guy.sitting && tgt) { guy.vx *= 0.5; guy.vy *= 0.5; }  // settle onto the glob
    guy.x += guy.vx * dt; guy.y += guy.vy * dt;
    if (guy.x < 0.04 || guy.x > 0.96) guy.vx *= -0.6; if (guy.y < 0.08 || guy.y > 0.92) guy.vy *= -0.6;
    guy.x = Math.max(0.04, Math.min(0.96, guy.x)); guy.y = Math.max(0.08, Math.min(0.92, guy.y));
    if (sp > 1e-3) guy.face = Math.atan2(guy.vy, guy.vx);
    guy.mouth = Math.max(0, guy.mouth - dt);

    // only catches a (nearly) still note — moving ones slip past her
    if (tgt && best < EAT_DIST && tgt.state === "free" && Math.hypot(tgt.vx, tgt.vy) < CATCH_VMAX) eat(tgt);
    guy.head += (1 - guy.head) * Math.min(1, dt * 4);    // head/rear relax back to normal
    guy.butt += (1 - guy.butt) * Math.min(1, dt * 5);

    // shader uniforms (uPitch refreshed: hue tracks the climbing pitch)
    const pos = new Float32Array(64), scl = new Float32Array(32);
    blobs.forEach((b, i) => { if (i < 32) { pos[i*2] = b.x; pos[i*2+1] = b.y; scl[i] = b.scale; pit[i] = (b.midi - lo) / Math.max(1, hi - lo); } });
    gl.uniform2f(U("uRes"), cv.width, cv.height); gl.uniform1f(U("uTime"), tt);
    gl.uniform2fv(U("uPos"), pos); gl.uniform1fv(U("uScale"), scl); gl.uniform1fv(U("uPitch"), pit);
    gl.drawArrays(gl.TRIANGLES, 0, 3);

    // 2D overlay: faint MOLD ring at the cursor, ejected-blob puffs, then the hero
    g2.clearRect(0, 0, gc.width, gc.height);
    g2.strokeStyle = "rgba(255,255,255,0.12)"; g2.lineWidth = 2;
    g2.beginPath(); g2.arc(mouse.x * gc.width, (1 - mouse.y) * gc.height, MOLD_R * gc.height, 0, 7); g2.stroke();
    for (let i = parts.length - 1; i >= 0; i--) {
      const p = parts[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 1.4;
      if (p.life <= 0) { parts.splice(i, 1); continue; }
      g2.globalAlpha = Math.max(0, p.life); g2.beginPath(); g2.arc(p.x * gc.width, (1 - p.y) * gc.height, 6, 0, 7);
      g2.fillStyle = "hsl(" + (p.hue * 300) + ",80%,65%)"; g2.fill();
    }
    // note label inside each free blob (e.g. C4, E2)
    g2.font = "11px -apple-system, system-ui, sans-serif"; g2.textAlign = "center"; g2.textBaseline = "middle";
    for (const b of blobs) {
      if (b.state !== "free" || b.scale < 0.4) continue;
      g2.fillStyle = "rgba(255,255,255,0.9)";
      g2.fillText(midiToName(b.midi), b.x * gc.width, (1 - b.y) * gc.height);
    }
    g2.globalAlpha = 1;
    drawGuy(g2, guy.x * gc.width, (1 - guy.y) * gc.height, guy.face, guy.mouth, sp, guy.head, guy.butt);
    fx.r = requestAnimationFrame(frame);
  }
  fx = { stop() { alive = false; if (fx.r) cancelAnimationFrame(fx.r); window.removeEventListener("pointermove", onMove); window.removeEventListener("resize", size); } };
  frame();
}

// Marge, the planet-eater — caped, long flowing hair; her head swells & mouth
// gapes while eating, and her rear swells as the note comes out the other end.
function drawGuy(c, x, y, face, mouth, sp, head, butt) {
  head = head || 1; butt = butt || 1;
  const wob = Math.sin(performance.now() / 120) * 0.3, T = performance.now() / 1000;
  const fx = -Math.cos(face), fy = -Math.sin(face);     // trailing direction (opposite motion)
  c.save(); c.translate(x, y); c.lineCap = "round"; c.lineJoin = "round";
  // cape
  c.beginPath(); c.moveTo(-2, -8);
  c.quadraticCurveTo(fx * 26 - 6, fy * 22 + 10, fx * 18, 24);
  c.lineTo(0, 16); c.closePath(); c.fillStyle = "rgba(220,60,90,0.8)"; c.fill();
  // rear bulge (grows as a note is expelled)
  if (butt > 1.03) {
    c.beginPath(); c.ellipse(fx * 11, fy * 11 + 9, 9 * butt, 9 * butt, 0, 0, 7);
    c.fillStyle = "rgba(255,210,170,0.95)"; c.fill();
  }
  // body, arms, legs
  c.strokeStyle = "#fff"; c.lineWidth = 3;
  c.beginPath(); c.moveTo(0, -4); c.lineTo(0, 16); c.stroke();
  c.beginPath(); c.moveTo(0, 2); c.lineTo(13, -8 + wob * 4); c.moveTo(0, 2); c.lineTo(-11, 8 - wob * 4); c.stroke();
  c.beginPath(); c.moveTo(0, 16); c.lineTo(9, 30 + wob * 3); c.moveTo(0, 16); c.lineTo(-9, 30 - wob * 3); c.stroke();
  // long flowing hair — strands stream opposite her motion, with a wave
  const hr = 11 * head;
  c.strokeStyle = "rgba(150,80,40,0.92)"; c.lineWidth = 2.4;
  for (let i = 0; i < 7; i++) {
    const a = -Math.PI / 2 + (i - 3) * 0.34;
    const ox = Math.cos(a) * hr, oy = Math.sin(a) * hr - 15;
    const wv = Math.sin(T * 3 + i * 0.8) * 7;
    c.beginPath(); c.moveTo(ox, oy);
    c.quadraticCurveTo(ox + fx * 18 - fy * wv, oy + fy * 18 + fx * wv, ox + fx * 34, oy + fy * 34 + 12);
    c.stroke();
  }
  // head (swells while ingesting)
  c.beginPath(); c.arc(0, -15, hr, 0, 7); c.fillStyle = "#ffe0b8"; c.fill();
  c.lineWidth = 2.5; c.strokeStyle = "#fff"; c.stroke();
  // eyes
  c.fillStyle = "#222";
  c.beginPath(); c.arc(-4 * head, -17, 1.7, 0, 7); c.arc(4 * head, -17, 1.7, 0, 7); c.fill();
  // mouth (gapes wide while eating)
  const mw = 3 + mouth * 30, mh = 2 + mouth * 26;
  c.beginPath(); c.ellipse(0, -11 - (head - 1) * 5, mw, mh, 0, 0, 7); c.fillStyle = "#7a1020"; c.fill();
  c.restore();
}

function stopFinale() {
  const cv = document.getElementById("fx"), gc = document.getElementById("guy"), hint = document.getElementById("fxhint");
  if (fx) { fx.stop(); fx = null; }
  cv.style.opacity = "0"; hint.style.display = "none";
  clearTimeout(hideTimer); hideTimer = setTimeout(() => { cv.style.display = "none"; gc.style.display = "none"; }, 1000);
}

// boot
renderKeymap();
makeSequence(); renderStaff(); renderNotes(); notes.forEach(n => n.dot = null); paint(); updateStats();
</script>
