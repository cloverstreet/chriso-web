<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sight-Reading Trainer · notation test case 01</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<script src="./synth.js"></script>
<script src="./tunings.js"></script>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font-family:-apple-system, system-ui, sans-serif;
         background:#15171c; color:#e6e8ec; padding:24px; }
  h1 { font-size:18px; font-weight:600; margin:0 0 12px; }
  .controls { display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
  button { background:#2a2e37; color:#e6e8ec; border:1px solid #3a3f4a;
           padding:8px 16px; border-radius:8px; font-size:14px; cursor:pointer; }
  button:hover { background:#343a45; }
  .stat { font-size:14px; color:#b6bcc6; font-variant-numeric:tabular-nums; }
  .stat b { color:#e6e8ec; } .stat i { color:#f06a6a; font-style:normal; }

  #stage { position:relative; background:#fbfbf8; border-radius:10px; overflow:hidden; height:240px; }
  #staff  { position:absolute; inset:0; z-index:1; }       /* static: clef + lines */
  #clip   { position:absolute; top:0; bottom:0; right:0; overflow:hidden; z-index:2; } /* left set in JS = FAILX */
  #track  { position:absolute; top:0; left:0; will-change:transform; }
  #fb     { position:absolute; top:0; left:0; }            /* behind the notes */
  #notes  { position:absolute; top:0; left:0; }            /* the scrolling noteheads */
  /* the line a note must be played BEFORE it crosses (just right of the clef) */
  #failline { position:absolute; top:0; bottom:0; width:2px; background:rgba(220,70,70,0.85); z-index:4; }
  #failline::after { content:"play before here"; position:absolute; top:6px; left:8px;
              font-size:10px; color:#cc5555; white-space:nowrap; }
  /* feedback dots — small, centered ON the notehead */
  .dot { position:absolute; width:26px; height:26px; border-radius:50%; transform:translate(-50%,-50%); }
  .dot.correct { background:rgba(45,180,95,0.55); }
  .dot.missed  { background:rgba(220,70,70,0.5); }
  .ring { position:absolute; width:30px; height:30px; border-radius:50%; transform:translate(-50%,-50%);
          border:2.5px solid rgba(40,110,220,0.85); box-sizing:border-box; display:none; z-index:3; }
  #msg { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
         font-size:22px; font-weight:600; color:#15171c; z-index:5; pointer-events:none; }

  #fx { position:fixed; inset:0; z-index:50; display:none; opacity:0; transition:opacity 1s ease; }
  #fxhint { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); z-index:51; display:none;
            color:#fff; font-size:13px; opacity:0.8; text-shadow:0 1px 4px #000; }

  /* key map — hidden behind a toggle (instrument first) */
  .keymap { display:none; margin-top:14px; color:#8b909a; font-size:13px; line-height:1.6; max-width:760px; }
  .app.keysopen .keymap { display:block; }
  .kbrow { display:flex; gap:6px; margin-top:6px; }
  .kc { display:flex; flex-direction:column; align-items:center; min-width:40px; padding:5px 0;
        background:#23262d; border:1px solid #3a3f4a; border-radius:7px; }
  .kc b { color:#e6e8ec; font-size:14px; } .kc span { color:#8b909a; font-size:11px; margin-top:2px; }
</style>
</head>
<body>
  <div class="app" id="app">
    <h1>Sight-Reading Trainer</h1>
    <div class="controls">
      <button id="start">New sequence</button>
      <span class="stat">tempo <b id="tempo">—</b> · <span id="prog">0 / 0</span> · missed <i id="miss">0</i></span>
      <button id="modebtn">Mode: letters</button>
      <button id="keysbtn">Key map&nbsp;▸</button>
    </div>

    <div id="stage">
      <div id="staff"></div>
      <div id="clip"><div id="track"><div id="fb"></div><div id="notes"></div></div></div>
      <div id="failline"></div>
      <div id="msg"></div>
    </div>

    <div class="keymap" id="keymap"></div>
  </div>

  <canvas id="fx"></canvas>
  <div id="fxhint">drag to mold · press Esc to return</div>

<script>
const VF = Vex.Flow;

// piano-style typing layout (positional) — used in "piano" mode
const KEYMAP = {
  z:"c/4", x:"d/4", c:"e/4", v:"f/4", b:"g/4", n:"a/4", m:"b/4",
  q:"c/5", w:"d/5", e:"e/5", r:"f/5", t:"g/5", y:"a/5", u:"b/5",
};
const POOL = Object.values(KEYMAP);
let mode = "letters";   // "letters" (press note name, any octave) | "piano" (positional)

const N = 24;
const SPACING = 92;
const FAILX = 58;        // deadline x — clef sits just to its left
const LEADIN = 4;
const SVG_H = 240, STAVE_Y = 96;

const BASE = 52, TMIN = 28, TMAX = 190;
const COMFORT = 2.2, LEADK = 16, WRONG_PEN = 26, PEN_DECAY = 0.6;

let notes = [];          // {key, xRel, y, state, dot}
let activeIdx = 0, missed = 0;
let scrollX = 0, bpm = BASE, penalty = 0;
let running = false, lastT = 0, raf = null;

const stage = document.getElementById("stage");
const staffEl = document.getElementById("staff");
const clipEl = document.getElementById("clip");
const trackEl = document.getElementById("track");
const fbEl = document.getElementById("notes") && document.getElementById("fb");
const notesEl = document.getElementById("notes");
const failEl = document.getElementById("failline");
const elTempo = document.getElementById("tempo");
const elProg = document.getElementById("prog");
const elMiss = document.getElementById("miss");
const elMsg = document.getElementById("msg");

clipEl.style.left = FAILX + "px";
failEl.style.left = FAILX + "px";

const ringEl = document.createElement("div"); ringEl.className = "ring"; fbEl.appendChild(ringEl);

function baseOffset() { return FAILX + LEADIN * SPACING - (notes[0] ? notes[0].xRel : 20); }
function screenX(i) { return notes[i].xRel + baseOffset() - scrollX; }   // x in stage coords

function makeSequence() {
  notes = [];
  for (let i = 0; i < N; i++) notes.push({ key: POOL[(Math.random() * POOL.length) | 0], xRel: 0, y: 0, state: "pending" });
  activeIdx = 0; missed = 0;
}

// static staff: clef + 5 lines, fixed, spanning the stage
function renderStaff() {
  staffEl.innerHTML = "";
  const w = stage.clientWidth || 900;
  const r = new VF.Renderer(staffEl, VF.Renderer.Backends.SVG);
  r.resize(w, SVG_H);
  const ctx = r.getContext();
  const stave = new VF.Stave(8, STAVE_Y, w - 16);
  stave.addClef("treble");
  stave.setContext(ctx).draw();
}

// scrolling notes layer: noteheads only (no staff lines / clef), same y as the static staff
function renderNotes() {
  notesEl.innerHTML = "";
  const width = N * SPACING + 120;
  const r = new VF.Renderer(notesEl, VF.Renderer.Backends.SVG);
  r.resize(width, SVG_H);
  const ctx = r.getContext();
  const stave = new VF.Stave(0, STAVE_Y, width);   // positioning context only — NOT drawn
  stave.setContext(ctx);
  const sn = notes.map(n => new VF.StaveNote({ keys: [n.key], duration: "w", clef: "treble" }));
  const voice = new VF.Voice({ num_beats: N * 4, beat_value: 4 }).setStrict(false);
  voice.addTickables(sn);
  new VF.Formatter().joinVoices([voice]).format([voice], N * SPACING);
  voice.draw(ctx, stave);   // draws noteheads + ledger lines, no staff lines

  const groups = [...notesEl.querySelectorAll(".vf-stavenote")];
  sn.forEach((s, i) => {
    const nh = groups[i].querySelector(".vf-notehead") || groups[i];
    const b = nh.getBBox();
    notes[i].xRel = b.x + b.width / 2;
    notes[i].y = b.y + b.height / 2;
  });
}

function placeDot(i) {
  const n = notes[i];
  if (!n.dot) { n.dot = document.createElement("div"); fbEl.appendChild(n.dot); }
  n.dot.className = "dot " + n.state;
  n.dot.style.left = n.xRel + "px";
  n.dot.style.top = n.y + "px";
}

function paint() {
  // scroll the whole track (notes + dots) as one
  trackEl.style.transform = `translateX(${baseOffset() - scrollX - FAILX}px)`;
  // active ring rides the current target note
  if (activeIdx < N && notes[activeIdx].state === "pending") {
    ringEl.style.display = "block";
    ringEl.style.left = notes[activeIdx].xRel + "px";
    ringEl.style.top = notes[activeIdx].y + "px";
  } else ringEl.style.display = "none";
}

function judge(correct) {
  const n = notes[activeIdx];
  if (correct) {
    n.state = "correct"; placeDot(activeIdx);
    Synth.playFreq(Tunings.noteFreq(n.key.replace("/", "")), { timbre: "mallet", decay: 0.5, gain: 0.2 });
    activeIdx++;
    if (activeIdx >= N) finish();
  } else {
    penalty += WRONG_PEN; Synth.buzz();
    ringEl.animate([{ borderColor: "rgba(220,70,70,0.95)" }, { borderColor: "rgba(40,110,220,0.85)" }], { duration: 220 });
  }
  updateStats();
}

function updateStats() {
  elProg.textContent = Math.min(activeIdx, N) + " / " + N;
  elMiss.textContent = missed;
  elTempo.textContent = Math.round(bpm);
}

function loop() {
  const t = Synth.now();
  let dt = t - lastT; lastT = t;
  if (dt < 0 || dt > 0.5) dt = 0;

  if (activeIdx < N) {
    const lead = (screenX(activeIdx) - FAILX) / SPACING;
    const target = Math.max(TMIN, Math.min(TMAX, BASE + LEADK * (lead - COMFORT) - penalty));
    bpm += (target - bpm) * Math.min(1, dt * 3);
  }
  penalty *= Math.pow(PEN_DECAY, dt);
  scrollX += (bpm / 60) * SPACING * dt;

  while (activeIdx < N && notes[activeIdx].state === "pending" && screenX(activeIdx) < FAILX) {
    notes[activeIdx].state = "missed"; placeDot(activeIdx); missed++; activeIdx++;
  }
  if (activeIdx >= N) { finish(); return; }

  paint(); updateStats();
  raf = requestAnimationFrame(loop);
}

function start() {
  Synth.ensure();
  stopFinale();
  elMsg.style.display = "none";
  fbEl.querySelectorAll(".dot").forEach(d => d.remove());
  makeSequence();
  renderStaff();
  renderNotes();
  notes.forEach(n => n.dot = null);
  scrollX = 0; bpm = BASE; penalty = 0; lastT = Synth.now();
  running = true;
  if (raf) cancelAnimationFrame(raf);
  paint(); updateStats();
  raf = requestAnimationFrame(loop);
}

function finish() {
  running = false;
  if (raf) cancelAnimationFrame(raf);
  paint();
  if (missed === 0) runFinale();
  else { elMsg.textContent = `${N - missed} / ${N}`; elMsg.style.display = "flex"; }
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { stopFinale(); return; }
  if (!running || activeIdx >= N) return;
  const k = e.key.toLowerCase();
  let correct = null;
  if (mode === "letters") {
    if (!/^[a-g]$/.test(k)) return;
    correct = (notes[activeIdx].key[0] === k);       // letter only, octave ignored
  } else {
    const pitch = KEYMAP[k];
    if (!pitch) return;
    correct = (pitch === notes[activeIdx].key);
  }
  e.preventDefault();
  judge(correct);
});

// ── visual key map (reflects current mode) ──────────────────────────────
function renderKeymap() {
  const km = document.getElementById("keymap");
  if (mode === "letters") {
    const caps = ["A","B","C","D","E","F","G"].map(L => `<div class="kc"><b>${L}</b><span>${L}</span></div>`).join("");
    km.innerHTML = `Press the note's <b>letter name</b> — octave doesn't matter.<div class="kbrow">${caps}</div>` +
      `<div style="margin-top:10px">Self-paced: a correct note lets you play the next at once. Stay ahead and tempo climbs; ` +
      `wrong tries slow it and you can retry until the note slips past the red line (a miss). Clear with zero misses for a surprise.</div>`;
  } else {
    const row = (keys, oct) => `<div class="kbrow">` + keys.map(k =>
      `<div class="kc"><b>${k.toUpperCase()}</b><span>${KEYMAP[k].replace("/", "").toUpperCase()}</span></div>`).join("") + `</div>`;
    km.innerHTML = `Play the note's <b>position</b>, like a piano — lower octave on the bottom row, upper on the top.` +
      row(["q","w","e","r","t","y","u"]) + row(["z","x","c","v","b","n","m"]) +
      `<div style="margin-top:10px">Self-paced; tempo rises as you get ahead, slows on wrong tries. Retry until the note passes the red line. Zero misses → surprise.</div>`;
  }
}

document.getElementById("start").onclick = start;
document.getElementById("modebtn").onclick = () => {
  mode = mode === "letters" ? "piano" : "letters";
  document.getElementById("modebtn").textContent = "Mode: " + mode;
  renderKeymap();
};
document.getElementById("keysbtn").onclick = () => {
  const open = document.getElementById("app").classList.toggle("keysopen");
  document.getElementById("keysbtn").innerHTML = open ? "Key map&nbsp;◂" : "Key map&nbsp;▸";
};

/* ───────────────────── 100% finale (unchanged) ───────────────────── */
let fxState = null, hideTimer = null;
function runFinale() { playAvantGarde(); try { startShader(); } catch (err) {} }
function midiOf(key) { return Tunings.nameToMidi(key.replace("/", "")); }

function playAvantGarde() {
  const c = Synth.context();
  let t = c.currentTime + 0.05;
  const timbres = ["gamelan", "mallet", "sine"];
  const mids = notes.map(n => midiOf(n.key));
  let step = 0.16;
  for (let pass = 0; pass < 3; pass++) {
    const order = pass % 2 ? [...mids].reverse() : mids;
    order.forEach((m, i) => {
      const oct = (Math.random() < 0.3) ? (Math.random() < 0.5 ? -12 : 12) : 0;
      const cents = (Math.random() - 0.5) * (pass === 2 ? 70 : 25);
      const hz = 440 * Math.pow(2, (m + oct - 69) / 12 + cents / 1200);
      const tim = timbres[(i + pass) % timbres.length];
      Synth.playFreq(hz, { timbre: tim, decay: 0.5 + Math.random() * 1.2, gain: 0.08 + Math.random() * 0.06, when: t });
      if (Math.random() < 0.18) Synth.playFreq(hz * Math.pow(2, 3 / 12), { timbre: tim, decay: 0.8, gain: 0.06, when: t });
      t += step; step = Math.max(0.05, step * 0.985);
    });
  }
  Synth.playFreq(440 * Math.pow(2, (mids[0] - 24 - 69) / 12), { timbre: "gamelan", decay: 3.5, gain: 0.18, when: t + 0.1 });
}

const FRAG = `
precision highp float;
uniform vec2 uRes; uniform float uTime; uniform vec2 uMouse;
uniform int uCount; uniform vec2 uPos[32]; uniform float uPitch[32];
vec3 hue(float h){ return 0.55 + 0.45*cos(6.2831*(h+vec3(0.0,0.33,0.67))); }
void main(){
  vec2 uv = gl_FragCoord.xy / uRes;
  vec2 p = uv; p.x *= uRes.x/uRes.y;
  float field = 0.0; vec3 col = vec3(0.0);
  for(int i=0;i<32;i++){
    if(i>=uCount) break;
    vec2 c = uPos[i]; c.x *= uRes.x/uRes.y;
    float ph = float(i)*1.7;
    c += 0.06*vec2(sin(uTime*0.9+ph), cos(uTime*0.7+ph*1.3));
    vec2 m = uMouse; m.x *= uRes.x/uRes.y;
    vec2 d = m - c; float md = dot(d,d);
    c += d * 0.18 * exp(-md*6.0);
    float r = dot(p-c,p-c);
    float w = 0.0016/(r+0.0009);
    field += w; col += hue(uPitch[i]) * w;
  }
  col /= max(field,0.0001);
  float h = smoothstep(0.6,2.4,field);
  vec3 bg = vec3(0.03,0.04,0.06);
  vec3 outc = mix(bg, col*(0.5+0.9*h), smoothstep(0.35,1.2,field));
  outc += pow(h,3.0)*0.5;
  gl_FragColor = vec4(outc,1.0);
}`;
const VERT = `attribute vec2 a; void main(){ gl_Position = vec4(a,0.0,1.0); }`;

function startShader() {
  const cv = document.getElementById("fx"), hint = document.getElementById("fxhint");
  const gl = cv.getContext("webgl");
  if (!gl) return;
  clearTimeout(hideTimer);
  cv.style.display = "block"; hint.style.display = "block";
  requestAnimationFrame(() => { cv.style.opacity = "1"; });
  function size() { cv.width = innerWidth; cv.height = innerHeight; gl.viewport(0, 0, cv.width, cv.height); }
  size();
  const sh = (type, src) => { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; };
  const prog = gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT)); gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog); gl.useProgram(prog);
  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const la = gl.getAttribLocation(prog, "a");
  gl.enableVertexAttribArray(la); gl.vertexAttribPointer(la, 2, gl.FLOAT, false, 0, 0);
  const count = Math.min(notes.length, 32);
  const pos = new Float32Array(64), pit = new Float32Array(32);
  const mids = notes.map(n => midiOf(n.key));
  const lo = Math.min(...mids), hi = Math.max(...mids);
  for (let i = 0; i < count; i++) {
    pos[i*2] = 0.08 + 0.84 * (i / Math.max(1, count - 1));
    pos[i*2+1] = 0.2 + 0.6 * ((mids[i] - lo) / Math.max(1, hi - lo));
    pit[i] = (mids[i] - lo) / Math.max(1, hi - lo);
  }
  const U = n => gl.getUniformLocation(prog, n);
  gl.uniform2fv(U("uPos"), pos); gl.uniform1fv(U("uPitch"), pit); gl.uniform1i(U("uCount"), count);
  let mouse = [0.5, 0.5];
  const onMove = (ev) => { mouse = [ev.clientX / innerWidth, 1 - ev.clientY / innerHeight]; };
  cv.addEventListener("pointermove", onMove); window.addEventListener("resize", size);
  const t0 = performance.now(); let alive = true;
  function frame() {
    if (!alive) return;
    gl.uniform2f(U("uRes"), cv.width, cv.height);
    gl.uniform1f(U("uTime"), (performance.now() - t0) / 1000);
    gl.uniform2f(U("uMouse"), mouse[0], mouse[1]);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    fxState.r = requestAnimationFrame(frame);
  }
  fxState = { stop() { alive = false; if (fxState.r) cancelAnimationFrame(fxState.r);
              cv.removeEventListener("pointermove", onMove); window.removeEventListener("resize", size); } };
  frame();
}
function stopFinale() {
  const cv = document.getElementById("fx"), hint = document.getElementById("fxhint");
  if (fxState) { fxState.stop(); fxState = null; }
  cv.style.opacity = "0"; hint.style.display = "none";
  clearTimeout(hideTimer); hideTimer = setTimeout(() => { cv.style.display = "none"; }, 1000);
}

// boot — idle render so the staff + notes are visible before starting
renderKeymap();
makeSequence(); renderStaff(); renderNotes(); notes.forEach(n => n.dot = null); paint(); updateStats();
</script>
</body>
</html>
