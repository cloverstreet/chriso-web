<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>hello worl</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #081818;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    /* Touch: drag drives the audio engine; never let it scroll/zoom the page. */
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }

  canvas#c {
    display: block;
    position: fixed;
    top: 0; left: 0;
    z-index: 2;            /* above glow (0), below links (10) */
    pointer-events: none;  /* don't steal clicks from links */
  }

  /* ── Scattered links ──────────────────────────────────────────
     Each link is fixed-positioned; proximity glow halos render on
     the #glow canvas behind everything (per-link phase/freq/hueBias
     seeds, pseudo-perlin organic flicker, hot core on proximity). */
  .scattered-link {
    position: fixed;
    transform: translate(-50%, -50%);
    font-family: 'Courier New', monospace;
    font-size: clamp(15px, 1.8vw, 22px);
    font-weight: 400;
    letter-spacing: 0.12em;
    color: #7a7468;
    text-decoration: none;
    cursor: pointer;
    z-index: 10;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.2;
    transition: color 0.3s ease, text-shadow 0.3s ease;
    white-space: nowrap;
    text-align: center;
  }
  .scattered-link .sublabel {
    font-size: 0.55em;
    letter-spacing: 0.22em;
    opacity: 0.6;
    margin-top: 0.3em;
  }
  .scattered-link:hover {
    color: #e6d4ae;
    text-shadow: 0 0 14px rgba(220,200,160,0.5);
  }
  /* Proximity glow canvas — sits behind everything, renders per-link
     halos with pseudo-perlin flicker + hot core on cursor proximity */
  canvas#glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  /* Film grain overlay — adds organic texture over everything */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  /* Quiet drifting underline of room hum */
  .room-hum {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,196,168,0.15), transparent);
    z-index: 4;
    pointer-events: none;
    animation: drift 22s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: translateX(-30%); opacity: 0.4; }
    50% { transform: translateX(30%); opacity: 0.8; }
  }
</style>
</head>
<body>
<canvas id="glow"></canvas>
<canvas id="c"></canvas>
<div id="links"></div>
<div class="room-hum"></div>

<script>

// ── Static nav links ──────────────────────────────────────────────────
// ── Scattered links + glow halos ─────────────────────────────────────
// Each link is positioned in vw/vh on the viewport and has a sibling
// halo div. Halo opacity is set every pointermove based on cursor
// distance to the link's center — bigger halo = earlier registration.
const linksContainer = document.getElementById('links');

const SCATTERED_LINKS = [
  // Spread across viewport, leaving the centerline clear so
  // "ChristopherO!" stays unobstructed.  Each link has its own
  // phase/freq/hueBias seeds (computed in JS) for per-link flicker.
  { label: 'about',                    href: '/about/',                  x: 12, y: 22 },
  { label: 'recommended events',       href: '/calendar/',               x: 86, y: 22, sublabel: 'public calendar' },
  { label: 'lessons',                  href: '/lessons/',                x: 14, y: 70 },
  { label: 'Playables',                href: '/web-instruments/',        x: 86, y: 70, sublabel: '(in progress)' },
  // The NightClub — center-bottom: doors are downstairs.
  { label: 'the something nightclub',  href: '/thesomethingnightclub/',  x: 50, y: 90, sublabel: 'doors open · 2 a.m.', special: 'nightclub' }
];

const linkEntries = [];   // { el, halo, cx, cy } cache

SCATTERED_LINKS.forEach((cfg, i) => {
  const a = document.createElement('a');
  a.className = 'scattered-link';
  a.href = cfg.href;
  a.style.left = cfg.x + 'vw';
  a.style.top  = cfg.y + 'vh';
  a.dataset.i = i;
  if (cfg.special) a.dataset.special = cfg.special;
  const main = document.createElement('span');
  main.textContent = cfg.label;
  a.appendChild(main);
  if (cfg.sublabel) {
    const sub = document.createElement('span');
    sub.className = 'sublabel';
    sub.textContent = cfg.sublabel;
    a.appendChild(sub);
  }
  linksContainer.appendChild(a);

  // Per-link seeds for the canvas glow flicker — set once, persistent
  linkEntries.push({
    el: a, cx: 0, cy: 0,
    phase:    i * 1.7 + Math.sin(i * 1.3) * 3,
    freq:     0.6 + (i % 3) * 0.18,
    hueBias:  (i * 7) % 18 - 9,
    isNight:  cfg.special === 'nightclub'
  });
});

// Cache pixel center positions; recompute on resize.
function recomputeLinkCenters() {
  linkEntries.forEach(entry => {
    const r = entry.el.getBoundingClientRect();
    entry.cx = r.left + r.width  / 2;
    entry.cy = r.top  + r.height / 2;
  });
}
recomputeLinkCenters();
window.addEventListener('resize', recomputeLinkCenters);

wireNavAudio();

// ── Proximity glow canvas ────────────────────────────────────────────
// Renders amber halos behind each link; each link has its own
// phase/freq/hueBias seed so flicker is per-link (algorithmic chorus).
// Cursor proximity within `reach` pixels expands the halo and lights
// a hot core.  Pseudo-perlin via summed sines for organic noise.
// — Inspired by an earlier prototype of this page; tuned to match
// the audio engine's amber/red palette and per-link aliveness.
const glowCanvas = document.getElementById('glow');
const glowCtx    = glowCanvas.getContext('2d');
const glowDpr    = Math.min(window.devicePixelRatio || 1, 2);
let   glowW, glowH;
const glowMouse  = { x: -9999, y: -9999, active: false };
let   glowT      = 0;

function resizeGlow() {
  glowW = window.innerWidth;
  glowH = window.innerHeight;
  glowCanvas.width  = glowW * glowDpr;
  glowCanvas.height = glowH * glowDpr;
  glowCanvas.style.width  = glowW + 'px';
  glowCanvas.style.height = glowH + 'px';
  glowCtx.setTransform(glowDpr, 0, 0, glowDpr, 0, 0);
  recomputeLinkCenters();
}
resizeGlow();
window.addEventListener('resize', resizeGlow);

// Pointermove updates the proximity cursor; touch shows all glows lit.
document.addEventListener('pointermove', e => {
  glowMouse.x = e.clientX;
  glowMouse.y = e.clientY;
  glowMouse.active = true;
});
window.addEventListener('mouseleave', () => { glowMouse.active = false; });

// Pseudo-perlin: summed sines, cheap and organic
function glowN2(x, y, time) {
  return Math.sin(x * 0.011 + time * 0.7)  * 0.42
       + Math.sin(y * 0.017 + time * 1.05) * 0.30
       + Math.sin((x + y) * 0.009 + time * 0.45) * 0.18
       + Math.sin((x - y) * 0.014 + time * 1.6)  * 0.10;
}

function glowFrame() {
  glowT += 0.014;

  // Clear with very dark warm wash
  glowCtx.globalCompositeOperation = 'source-over';
  glowCtx.fillStyle = '#0a0608';
  glowCtx.fillRect(0, 0, glowW, glowH);

  // Additive glow pass
  glowCtx.globalCompositeOperation = 'lighter';

  for (const L of linkEntries) {
    const dx = glowMouse.x - L.cx;
    const dy = glowMouse.y - L.cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Proximity reaches out far so links register from a distance
    const reach = L.isNight ? 540 : 480;
    let prox = 0;
    if (glowMouse.active) {
      prox = Math.max(0, 1 - dist / reach);
      prox = prox * prox * (3 - 2 * prox); // smoothstep
    }

    // Multi-frequency flicker (per-link offset)
    const slow = 0.5 + 0.5 * Math.sin(glowT * L.freq + L.phase);
    const wob  = glowN2(L.cx, L.cy, glowT + L.phase);
    const fast = 0.5 + 0.5 * Math.sin(glowT * 4.3 + L.phase * 2);

    // Always-on baseline so links are findable
    const baseRadius = 110 + 35 * slow + 18 * wob;
    const radius = baseRadius + prox * 260;

    // Tiny positional drift — like candlelight
    const cx = L.cx + Math.sin(glowT * 0.6 + L.phase) * 6 + wob * 4;
    const cy = L.cy + Math.cos(glowT * 0.8 + L.phase * 1.3) * 6;

    // Color: amber base for normal links; deeper red for the nightclub
    const baseHue = L.isNight ? 6 : 24;
    const hue = baseHue + L.hueBias + wob * 14 + prox * -4;
    const sat = (L.isNight ? 70 : 60) + prox * 18;
    const lit = 42 + slow * 8 + prox * 14;

    const ambientA = 0.10 + 0.04 * slow + 0.025 * fast * (0.5 + 0.5 * wob);
    const alpha = ambientA + prox * 0.55;

    // Outer halo
    const grad = glowCtx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0,    `hsla(${hue}, ${sat}%, ${lit + 14}%, ${alpha})`);
    grad.addColorStop(0.18, `hsla(${hue + 4}, ${sat}%, ${lit + 4}%, ${alpha * 0.55})`);
    grad.addColorStop(0.5,  `hsla(${hue + 10}, ${sat - 10}%, ${lit - 10}%, ${alpha * 0.18})`);
    grad.addColorStop(1,    `hsla(${hue + 14}, ${sat}%, ${lit - 20}%, 0)`);
    glowCtx.fillStyle = grad;
    glowCtx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

    // Hot core — only on proximity
    if (prox > 0.05) {
      const coreR = 28 + prox * 60;
      const coreG = glowCtx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
      coreG.addColorStop(0, `hsla(${hue + 8}, 78%, 62%, ${prox * 0.55})`);
      coreG.addColorStop(1, `hsla(${hue + 8}, 78%, 50%, 0)`);
      glowCtx.fillStyle = coreG;
      glowCtx.fillRect(cx - coreR, cy - coreR, coreR * 2, coreR * 2);
    }
  }

  requestAnimationFrame(glowFrame);
}
glowFrame();


// ── Canvas + glitch ────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const off  = document.createElement('canvas');
const octx = off.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  off.width  = canvas.width;
  off.height = canvas.height;
  renderText();
}

// ── Baroqueadelic per-letter motion state ─────────────────────────────
// Each letter in 'ChristopherO!' gets its own trio of mass-spring
// channels (R / G / B). That's 3 × N independent oscillators, each
// driven by a multi-harmonic target (fundamental + two irrational
// overtones per channel).  No two letters move alike.  Within each
// letter, the three channels beat against each other. The result is
// polyrhythmic, polyphonic motion across ~40 simultaneous oscillators.
const PHI = 1.6180339887;
const TEXT_STR = 'ChristopherO!';
const letters = [];

function makeLetter(char, sxLeft, yCenter, w, fs, i) {
  // y is the text baseline-middle position; expand sy/sh generously
  // so drawImage slices capture the full glyph bounding box.
  return {
    char,
    sx: sxLeft,
    sy: yCenter - fs * 0.75,
    sw: w,
    sh: fs * 1.5,
    idx: i,
    chans: [
      { x:0, y:0, vx:0, vy:0,
        k: 0.0042, d: 0.905,
        fr: 0.019,               phase: i * 0.37,
        rx: 1.00, ry: 0.95, yRatio: 1 / PHI,
        mWeightX:  0.55, mWeightY:  0.38 },
      { x:0, y:0, vx:0, vy:0,
        k: 0.0031, d: 0.922,
        fr: 0.019 * PHI,         phase: 2.09 + i * 0.43,
        rx: 0.82, ry: 1.20, yRatio: PHI,
        mWeightX: -0.40, mWeightY:  0.52 },
      { x:0, y:0, vx:0, vy:0,
        k: 0.0058, d: 0.882,
        fr: 0.019 * PHI * PHI,   phase: 4.19 + i * 0.29,
        rx: 1.08, ry: 0.78, yRatio: 1 / (PHI * PHI),
        mWeightX:  0.32, mWeightY: -0.46 }
    ]
  };
}

function renderText() {
  octx.clearRect(0, 0, off.width, off.height);
  const fs = Math.min(off.width * 0.13, 130);
  octx.font         = `900 ${fs}px 'Courier New', monospace`;
  octx.textAlign    = 'left';
  octx.textBaseline = 'middle';
  octx.fillStyle    = '#ede3c8';   /* warm champagne — Baroqueadelic base tint */

  // Per-letter layout: measure widths, center the whole word, render
  // each letter at a known x so we can carve them back out later.
  const widths = [];
  let totalW = 0;
  for (const ch of TEXT_STR) {
    const w = octx.measureText(ch).width;
    widths.push(w);
    totalW += w;
  }
  const startX = (off.width - totalW) / 2;
  const yCenter = off.height / 2;

  letters.length = 0;
  let x = startX;
  for (let i = 0; i < TEXT_STR.length; i++) {
    octx.fillText(TEXT_STR[i], x, yCenter);
    letters.push(makeLetter(TEXT_STR[i], x, yCenter, widths[i], fs, i));
    x += widths[i];
  }
}

resize();
window.addEventListener('resize', resize);


// ── Mouse velocity ─────────────────────────────────────────────────────
let mx = 0, my = 0, lx = 0, ly = 0;
let energy = 0, peak = 0;

// pointermove drives the audio engine's velocity tracking. On touch this
// only fires while a finger is down — which is exactly the behaviour we
// want: drag-to-play, lift-to-let-it-decay.
document.addEventListener('pointermove', e => { mx = e.clientX; my = e.clientY; });


// (per-letter channel state lives on `letters[]`, defined above)


// ══════════════════════════════════════════════════════════════════════
//  AUDIO ENGINE — native Web Audio API (no libraries)
//
//  Layer 1 — Noise bed: filtered white noise through BPF → static LPF
//            → mouse-Y LPF → gain. Mouse-Y LPF opens when mouse is
//            near top (brighter), closes near bottom (darker).
//            Curved fade-in (~3.5 s), curved fade-out (~10 s).
//  Layer 2 — Persistent drone: fundamental + fifth, always on (quiet).
//            Swells on nav hover. Configurable fundamental via settings.
//  Layer 3 — Sub-bass sine: deep hum for subwoofers, energy-reactive.
//  Layer 4 — Granular glitch: short grains from noise buffer,
//            heavily randomized start points, durations, and timing.
//            Highly velocity-reactive. Wider response radius.
//  Layer 5 — Crackle pops: short bursts, velocity-dense.
//  Nav     — Hover: beating sine pair (fund ± and fifth ±) layered
//            over the persistent drone. Click: granular whoosh + thud.
// ══════════════════════════════════════════════════════════════════════

let audioCtx     = null;
let audioStarted = false;

// Gain nodes
let masterGain, noiseGain, subGain, granGain, crackleGain;
let droneGain;                  // persistent drone bus

// Sources
let noiseSource, subOsc;
let noiseBPF, noiseLPF, noiseMouseLPF;   // mouse-Y lowpass filter
let grainBuffer = null;

// Persistent drone oscillators (always on, quiet)
let droneOscFund = null, droneOscFifth = null;
let droneGainFund = null, droneGainFifth = null;

let audioEnergy  = 0;
let mouseActive  = false;
let noiseTarget  = 0;
let noiseCurrent = 0;           // raw 0–1 interpolator (linear)

// Configurable drone fundamental (Hz) — exposed to settings UI
let droneFundamental = 55;

// Nav hover: only the beating pair (transient)
let hoverBeaters = null, hoverBeatGain = null;

// ── Performance tracking ──────────────────────────────────────────────
const perfStats = {
  fps: 0, frameTimes: [], activeNodes: 0,
  grainCount: 0, canvasOps: 0
};

function initAudio() {
  if (audioStarted) return;
  audioStarted = true;

  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.22;
  masterGain.connect(audioCtx.destination);

  // ── Noise bed: BPF → static LPF → mouse-Y LPF → gain ──────────
  noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0;

  noiseBPF = audioCtx.createBiquadFilter();
  noiseBPF.type = 'bandpass';
  noiseBPF.frequency.value = 2400;
  noiseBPF.Q.value = 0.4;

  noiseLPF = audioCtx.createBiquadFilter();
  noiseLPF.type = 'lowpass';
  noiseLPF.frequency.value = 3800;
  noiseLPF.Q.value = 0.3;

  // Mouse-Y controlled lowpass — replaces the old HPF
  // Mouse near top → high cutoff (bright), near bottom → low (dark)
  noiseMouseLPF = audioCtx.createBiquadFilter();
  noiseMouseLPF.type = 'lowpass';
  noiseMouseLPF.frequency.value = 4000;
  noiseMouseLPF.Q.value = 0.5;

  const bufLen = audioCtx.sampleRate * 2;
  const buf    = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data   = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

  noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = buf;
  noiseSource.loop   = true;
  noiseSource.connect(noiseBPF);
  noiseBPF.connect(noiseLPF);
  noiseLPF.connect(noiseMouseLPF);
  noiseMouseLPF.connect(noiseGain);
  noiseGain.connect(masterGain);
  noiseSource.start();

  // ── Persistent drone (fundamental + fifth, always on) ───────────
  droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.04;   // very quiet at rest
  droneGain.connect(masterGain);

  droneOscFund = audioCtx.createOscillator();
  droneOscFund.type = 'sine';
  droneOscFund.frequency.value = droneFundamental;
  droneGainFund = audioCtx.createGain();
  droneGainFund.gain.value = 0.5;
  droneOscFund.connect(droneGainFund);
  droneGainFund.connect(droneGain);
  droneOscFund.start();

  droneOscFifth = audioCtx.createOscillator();
  droneOscFifth.type = 'sine';
  droneOscFifth.frequency.value = droneFundamental * 1.5;
  droneGainFifth = audioCtx.createGain();
  droneGainFifth.gain.value = 0.25;
  droneOscFifth.connect(droneGainFifth);
  droneGainFifth.connect(droneGain);
  droneOscFifth.start();

  // ── Sub-bass sine ───────────────────────────────────────────────
  subGain = audioCtx.createGain();
  subGain.gain.value = 0;

  subOsc = audioCtx.createOscillator();
  subOsc.type = 'sine';
  subOsc.frequency.value = 38;
  subOsc.connect(subGain);
  subGain.connect(masterGain);
  subOsc.start();

  // ── Granular glitch bus ─────────────────────────────────────────
  granGain = audioCtx.createGain();
  granGain.gain.value = 0;
  granGain.connect(masterGain);

  // Longer, more textured grain buffer
  const grainBufLen = audioCtx.sampleRate * 6;
  grainBuffer = audioCtx.createBuffer(2, grainBufLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const gd = grainBuffer.getChannelData(ch);
    for (let i = 0; i < grainBufLen; i++) {
      gd[i] = (Math.random() * 2 - 1) * 0.7;
      // Scattered impulses for texture
      if (Math.random() < 0.003) gd[i] = (Math.random() < 0.5 ? 1 : -1);
      // Occasional short silence gaps
      if (Math.random() < 0.0005) {
        const gap = Math.min(800, Math.floor(Math.random() * 400));
        for (let j = 0; j < gap && (i + j) < grainBufLen; j++) gd[i + j] = 0;
        i += gap;
      }
    }
  }

  // ── Crackle bus ─────────────────────────────────────────────────
  crackleGain = audioCtx.createGain();
  crackleGain.gain.value = 0;
  crackleGain.connect(masterGain);

  scheduleCrackles();
  scheduleGrains();
}

// ── Granular engine ───────────────────────────────────────────────────
// Much wider randomization of start points, durations, inter-grain
// timing, and playback rates for a more organic granular character.
// ── 3D grain trajectories ─────────────────────────────────────────────
// Each grain is a little physical object: it appears at some 3D
// position relative to the listener, has a velocity, and sweeps a
// trajectory across the stereo field (HRTF-panned).  Types below are
// gestural — whoosh past, drift nearby, shoot away, pass overhead,
// fade into distance.  Intentionally un-realistic: longer-than-life
// durations, exaggerated Doppler, gestures that couldn't happen in
// actual rooms.  Listener is at origin facing -z.  Units are metres
// (approx — Panner refDistance = 1m).
const GRAIN_TYPES = [
  { name: 'whoosh',       weight: 0.24, durRange: [0.30, 1.40],
    // Fast pass-by: from one side to the other, close to head
    make: () => {
      const side = Math.random() < 0.5 ? -1 : 1;
      const z = -0.8 + Math.random() * 2.8;
      const y = (Math.random() - 0.5) * 2.0;
      const r = 8 + Math.random() * 7;
      return {
        start: { x: side * r, y, z },
        end:   { x: -side * r, y: y + (Math.random() - 0.5) * 1.0, z: z + (Math.random() - 0.5) * 2 }
      };
    }
  },
  { name: 'drift',        weight: 0.22, durRange: [0.60, 2.50],
    // Slow near-ear float, small arc
    make: () => {
      const a = Math.random() * Math.PI * 2;
      const r = 1.2 + Math.random() * 2.2;
      const da = (Math.random() < 0.5 ? -1 : 1) * (0.2 + Math.random() * 0.9);
      return {
        start: { x: Math.cos(a) * r,        y: (Math.random()-0.5)*1.6, z: Math.sin(a) * r },
        end:   { x: Math.cos(a + da) * r*1.3, y: (Math.random()-0.5)*1.6, z: Math.sin(a + da) * r*1.3 }
      };
    }
  },
  { name: 'shooting-star', weight: 0.18, durRange: [0.55, 3.80],
    // Starts far behind, shoots past listener to far ahead
    make: () => {
      const offX = (Math.random() - 0.5) * 6;
      const offY = (Math.random() - 0.5) * 3;
      return {
        start: { x: offX,                y: offY,                z: 5 + Math.random() * 4 },
        end:   { x: offX * -1.5 + (Math.random()-0.5)*3, y: offY * 0.5, z: -8 - Math.random() * 6 }
      };
    }
  },
  { name: 'fading-away',  weight: 0.18, durRange: [1.20, 6.00],
    // Starts close-ish, recedes into distance. Longest-lived type.
    make: () => {
      const a = Math.random() * Math.PI * 2;
      const r1 = 0.8 + Math.random() * 1.8;
      const r2 = 14 + Math.random() * 22;
      return {
        start: { x: Math.cos(a) * r1, y: (Math.random()-0.5)*2.0, z: Math.sin(a) * r1 },
        end:   { x: Math.cos(a) * r2, y: (Math.random()-0.5)*4.0, z: Math.sin(a) * r2 }
      };
    }
  },
  { name: 'overhead-arc', weight: 0.12, durRange: [0.60, 3.00],
    // Passes overhead (positive y), front to back or side to side
    make: () => {
      const side = Math.random() < 0.5 ? -1 : 1;
      const yPeak = 3 + Math.random() * 4;
      return {
        start: { x: side * (4 + Math.random() * 3), y: yPeak * 0.6, z: 2 + Math.random() * 2 },
        end:   { x: -side * (4 + Math.random() * 3), y: yPeak * 0.6, z: -2 - Math.random() * 2 }
      };
    }
  },
  { name: 'rushing-in',   weight: 0.06, durRange: [0.40, 1.80],
    // Rare: far-off grain suddenly rushes in close. Loud end-pan.
    make: () => {
      const a = Math.random() * Math.PI * 2;
      const r1 = 12 + Math.random() * 10;
      const off = (Math.random() - 0.5) * 0.6;
      return {
        start: { x: Math.cos(a) * r1, y: (Math.random()-0.5)*3, z: Math.sin(a) * r1 },
        end:   { x: off, y: off * 0.5, z: -0.5 + Math.random() * 1 }
      };
    }
  }
];
const GRAIN_WEIGHT_SUM = GRAIN_TYPES.reduce((s, t) => s + t.weight, 0);

function pickGrainType() {
  let r = Math.random() * GRAIN_WEIGHT_SUM;
  for (const t of GRAIN_TYPES) {
    if ((r -= t.weight) < 0) return t;
  }
  return GRAIN_TYPES[0];
}

function scheduleGrains() {
  function tick() {
    if (!audioCtx || !grainBuffer) { setTimeout(tick, 100); return; }
    const e = audioEnergy;

    // Still sparser + jittered base rate
    const baseInterval = Math.max(22, 520 - e * 3.0);
    const interval = baseInterval * (0.25 + Math.random() * 1.5);

    if (e > 1) {
      const now   = audioCtx.currentTime;
      const count = Math.min(3, 1 + Math.floor(e / 80));
      perfStats.grainCount += count;

      for (let i = 0; i < count; i++) {
        const type = pickGrainType();
        const [dMin, dMax] = type.durRange;
        // Bias toward middle of range, with occasional extreme end
        const rd = Math.random();
        const dur = dMin + (dMax - dMin) * (Math.random() < 0.3 ? rd * rd : rd);

        // Very wide pitch
        const rate = Math.pow(2, (Math.random() * 2 - 1) * 3.5);

        // Cubic-biased amplitude — many quiet, occasional shouts
        const ampRand = Math.random();
        const amp = Math.min(0.45, e / 200) * (0.03 + ampRand * ampRand * ampRand * 1.6);

        const offset = Math.random() * Math.max(0.01, grainBuffer.duration - dur - 0.05);

        const traj = type.make();
        const dStart = Math.hypot(traj.start.x, traj.start.y, traj.start.z);
        const dEnd   = Math.hypot(traj.end.x,   traj.end.y,   traj.end.z);

        // ── Signal chain: src → filter → gain → panner → granGain ──
        const src = audioCtx.createBufferSource();
        src.buffer = grainBuffer;
        src.playbackRate.value = rate;

        const filt = audioCtx.createBiquadFilter();
        const filtTypes = ['bandpass', 'highpass', 'lowpass', 'notch'];
        filt.type = filtTypes[Math.floor(Math.random() * filtTypes.length)];
        filt.frequency.value = 120 + Math.random() * 11500;
        filt.Q.value = 0.3 + Math.random() * Math.random() * 22;

        const g = audioCtx.createGain();

        const panner = audioCtx.createPanner();
        panner.panningModel  = 'HRTF';
        panner.distanceModel = 'inverse';
        panner.refDistance   = 1;
        panner.maxDistance   = 40;
        panner.rolloffFactor = 1.1;

        const schedTime = now + i * 0.004 + Math.random() * 0.07;

        // Seed panner positions
        const setP = (p, x, y, z, t) => {
          p.positionX.setValueAtTime(x, t);
          p.positionY.setValueAtTime(y, t);
          p.positionZ.setValueAtTime(z, t);
        };
        setP(panner, traj.start.x, traj.start.y, traj.start.z, schedTime);
        panner.positionX.linearRampToValueAtTime(traj.end.x, schedTime + dur);
        panner.positionY.linearRampToValueAtTime(traj.end.y, schedTime + dur);
        panner.positionZ.linearRampToValueAtTime(traj.end.z, schedTime + dur);

        // ── Gain envelope: attack · hold · long tail ──
        const attack   = 0.0003 + Math.random() * Math.random() * 0.030;
        const holdFrac = 0.15 + Math.random() * 0.70;
        g.gain.setValueAtTime(0, schedTime);
        g.gain.linearRampToValueAtTime(amp, schedTime + attack);
        g.gain.setValueAtTime(amp, schedTime + dur * holdFrac);
        g.gain.exponentialRampToValueAtTime(0.001, schedTime + dur);

        src.connect(filt);
        filt.connect(g);
        g.connect(panner);
        panner.connect(granGain);
        src.start(schedTime, offset, dur + 0.05);

        // ── Exaggerated Doppler via playbackRate ramp ──
        // Real Doppler: f' = f * c / (c - v_r).  We just use a
        // clamped linear mapping of radial-distance-change-per-sec
        // into a pitch factor.  Lower SOUND_SPEED = more audible
        // pitch swings. Using ~18 m/s makes even casual movement
        // sing, which is the point.
        const SOUND_SPEED = 18;
        const radialPerSec = (dStart - dEnd) / dur;   // + approaching
        const dopplerFactor = Math.max(0.55, Math.min(1.75,
          1 + radialPerSec / SOUND_SPEED
        ));
        // If approaching, start lower & ramp up; if receding, start
        // higher & ramp down. Split the swing evenly so the grain's
        // average pitch = `rate`.
        const startRate = rate / Math.sqrt(dopplerFactor);
        const endRate   = rate * Math.sqrt(dopplerFactor);
        src.playbackRate.setValueAtTime(startRate, schedTime);
        src.playbackRate.linearRampToValueAtTime(endRate, schedTime + dur);

        // ── Occasional extra artistic bend on top ──
        if (e > 40 && Math.random() < 0.4) {
          const bendFactor = Math.pow(2, (Math.random() * 2 - 1) * 1.8);
          src.playbackRate.linearRampToValueAtTime(
            endRate * bendFactor, schedTime + dur * 0.95
          );
        }
      }
    }

    setTimeout(tick, interval);
  }
  tick();
}

// ── Crackle pops ──────────────────────────────────────────────────────
function scheduleCrackles() {
  function tick() {
    if (!audioCtx) return;
    const e = audioEnergy;
    const interval = Math.max(30, 300 - e * 2.5);

    if (e > 3) {                  // was > 8 — wider response
      const dur = 0.002 + Math.random() * 0.012;
      const amp = Math.min(0.18, e / 400) * (0.3 + Math.random() * 0.7);
      const now = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.type = Math.random() < 0.5 ? 'square' : 'sawtooth';
      osc.frequency.value = 150 + Math.random() * 9000;
      g.gain.setValueAtTime(amp, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.connect(g);
      g.connect(crackleGain);
      osc.start(now);
      osc.stop(now + dur + 0.01);

      if (Math.random() < 0.12 && e > 30) {
        const osc2 = audioCtx.createOscillator();
        const g2   = audioCtx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = 30 + Math.random() * 90;
        const popDur = 0.015 + Math.random() * 0.04;
        g2.gain.setValueAtTime(amp * 2, now);
        g2.gain.exponentialRampToValueAtTime(0.001, now + popDur);
        osc2.connect(g2);
        g2.connect(crackleGain);
        osc2.start(now);
        osc2.stop(now + popDur + 0.01);
      }
    }

    setTimeout(tick, interval);
  }
  tick();
}

// ── Nav hover/drone system ────────────────────────────────────────────
// The persistent drone (fundamental + fifth) is always running quietly.
// On nav hover:
//   - Drone volume swells up
//   - Two beating oscillators start:
//     Beat A: fundamental ± 1 Hz (mapped to mouse X across link span)
//     Beat B: fifth ± 1.5 Hz (same mapping)

function getNavXNormalized(mouseEvent) {
  // Was: cursor X across the nav row. With scattered links, the
  // cleaner generalization is cursor X across viewport width.
  if (!window.innerWidth) return 0.5;
  return Math.max(0, Math.min(1, mouseEvent.clientX / window.innerWidth));
}

let lastNavMouseEvent = null;

function startHoverTone(e) {
  if (!audioCtx) return;
  if (hoverBeaters) return;

  lastNavMouseEvent = e;
  const fund  = droneFundamental;
  const fifth = fund * 1.5;
  const t     = getNavXNormalized(e);
  const now   = audioCtx.currentTime;

  // Swell the persistent drone up
  droneGain.gain.cancelScheduledValues(now);
  droneGain.gain.setValueAtTime(droneGain.gain.value, now);
  droneGain.gain.linearRampToValueAtTime(0.22, now + 0.3);

  // Beating pair bus
  hoverBeatGain = audioCtx.createGain();
  hoverBeatGain.gain.setValueAtTime(0, now);
  hoverBeatGain.gain.linearRampToValueAtTime(0.22, now + 0.35);
  hoverBeatGain.connect(masterGain);

  // Beat A: near the fundamental, ± 1 Hz
  const oscA = audioCtx.createOscillator();
  oscA.type = 'sine';
  oscA.frequency.value = fund + (t * 3 - 1.5) * 1.0; //clo change: wider mapping for more dramatic effect
  const gA = audioCtx.createGain();
  gA.gain.value = 0.45;
  oscA.connect(gA);
  gA.connect(hoverBeatGain);
  oscA.start();

  // Beat B: near the fifth, ± 1.5 Hz
  const oscB = audioCtx.createOscillator();
  oscB.type = 'sine';
  oscB.frequency.value = fifth + (t * 2 - 1) * 1.5;
  const gB = audioCtx.createGain();
  gB.gain.value = 0.35;
  oscB.connect(gB);
  gB.connect(hoverBeatGain);
  oscB.start();

  hoverBeaters = [
    { osc: oscA, gain: gA },
    { osc: oscB, gain: gB }
  ];
}

function updateHoverFreqs(e) {
  if (!hoverBeaters || !audioCtx) return;
  lastNavMouseEvent = e;
  const t     = getNavXNormalized(e);
  const fund  = droneFundamental;
  const fifth = fund * 1.5;
  const now   = audioCtx.currentTime;

  // Beat A: fund ± 1 Hz
  hoverBeaters[0].osc.frequency.setTargetAtTime(
    fund + (t * 2 - 1) * 1.0, now, 0.03
  );
  // Beat B: fifth ± 1.5 Hz
  hoverBeaters[1].osc.frequency.setTargetAtTime(
    fifth + (t * 2 - 1) * 1.5, now, 0.03
  );
}

function stopHoverTone() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Settle drone back to quiet
  droneGain.gain.cancelScheduledValues(now);
  droneGain.gain.setValueAtTime(droneGain.gain.value, now);
  droneGain.gain.linearRampToValueAtTime(0.04, now + 0.6);

  // Fade out and stop beating pair
  if (hoverBeaters && hoverBeatGain) {
    hoverBeatGain.gain.cancelScheduledValues(now);
    hoverBeatGain.gain.setValueAtTime(hoverBeatGain.gain.value, now);
    hoverBeatGain.gain.linearRampToValueAtTime(0, now + 0.5);
    const oscs = hoverBeaters;
    setTimeout(() => {
      oscs.forEach(o => { try { o.osc.stop(); } catch(_){} });
    }, 600);
  }
  hoverBeaters = null;
  hoverBeatGain = null;
}

// ── Nav click transition ──────────────────────────────────────────────
function playClickTransition() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const dur = 0.5;

  const clickGain = audioCtx.createGain();
  clickGain.gain.setValueAtTime(0.5, now);
  clickGain.gain.exponentialRampToValueAtTime(0.001, now + dur);
  clickGain.connect(audioCtx.destination);

  for (let i = 0; i < 18; i++) {
    const src  = audioCtx.createBufferSource();
    src.buffer = grainBuffer;
    src.playbackRate.value = 3.5 - (i / 18) * 3;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 4000 - (i / 18) * 3500;
    filt.Q.value = 2 + Math.random() * 4;
    const g = audioCtx.createGain();
    const t = now + i * 0.022;
    g.gain.setValueAtTime(0.3 - i * 0.012, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    src.connect(filt);
    filt.connect(g);
    g.connect(clickGain);
    src.start(t, Math.random() * 3, 0.06);
  }

  const thud = audioCtx.createOscillator();
  thud.type = 'sine';
  thud.frequency.setValueAtTime(90, now);
  thud.frequency.exponentialRampToValueAtTime(20, now + dur);
  const tg = audioCtx.createGain();
  tg.gain.setValueAtTime(0.5, now);
  tg.gain.exponentialRampToValueAtTime(0.001, now + dur);
  thud.connect(tg);
  tg.connect(clickGain);
  thud.start(now);
  thud.stop(now + dur + 0.05);

  for (let i = 0; i < 6; i++) {
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.value = 2000 + Math.random() * 6000;
    const g = audioCtx.createGain();
    const t = now + Math.random() * 0.08;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.015);
    o.connect(g);
    g.connect(clickGain);
    o.start(t);
    o.stop(t + 0.02);
  }
}

// Wire up nav links
function wireNavAudio() {
  document.querySelectorAll('.scattered-link').forEach(a => {
    // pointerenter/leave fire for mouse hover AND for finger-touching the
    // link area. updateHoverFreqs runs on pointermove so the touch-drag
    // experience matches the mouse-hover experience.
    a.addEventListener('pointerenter', startHoverTone);
    a.addEventListener('pointermove',  updateHoverFreqs);
    a.addEventListener('pointerleave', stopHoverTone);
    a.addEventListener('click', e => {
      e.preventDefault();
      playClickTransition();
      const href = a.href;
      setTimeout(() => { window.location.href = href; }, 400);
    });
  });
}

// ── Audio update — called every visual frame ──────────────────────────
let idleTime = 0;

function updateAudio(dt, rawSpeed) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  if (rawSpeed > 1.5) {
    mouseActive = true;
    idleTime = 0;
  } else {
    idleTime += dt;
    if (idleTime > 1.0) mouseActive = false;
  }

  // Faster energy tracking for wider response
  audioEnergy += (energy - audioEnergy) * 0.18;
  const e = audioEnergy;

  // ── Noise bed: curved fade-in (3.5s), curved fade-out (10s) ─────
  // noiseCurrent interpolates linearly 0↔1, then we apply a power
  // curve so the first ~30% of each fade is already very quiet/loud.
  noiseTarget = mouseActive ? 1 : 0;
  const fadeRate = mouseActive ? (dt / 3.5) : (dt / 10);
  noiseCurrent += (noiseTarget - noiseCurrent) * Math.min(1, fadeRate * 3);
  // Cubic curve: at 30% through fade-out (noiseCurrent=0.7),
  // gain = 0.7^3 = 0.34 — already much quieter.
  // At 30% through fade-in (noiseCurrent=0.3), gain = 0.027 — still very quiet.
  const noiseCurved = noiseCurrent * noiseCurrent * noiseCurrent;
  const noiseBedVol = noiseCurved * 0.03;
  noiseGain.gain.setTargetAtTime(noiseBedVol, now, 0.05);

  // ── Noise LPF: vertical mouse controls cutoff ──────────────────
  // Mouse at top (Y=0) → higher cutoff (brighter)
  // Mouse at bottom (Y=max) → lower cutoff (darker, muffled)
  const mouseYNorm = 1 - Math.max(0, Math.min(1, my / window.innerHeight));
  const lpfFreq = 600 + mouseYNorm * 5400;   // 600 Hz – 6000 Hz
  noiseMouseLPF.frequency.setTargetAtTime(lpfFreq, now, 0.08);

  // ── Persistent drone: update frequencies if slider changed ──────
  droneOscFund.frequency.setTargetAtTime(droneFundamental, now, 0.1);
  droneOscFifth.frequency.setTargetAtTime(droneFundamental * 1.5, now, 0.1);

  // ── Sub-bass ────────────────────────────────────────────────────
  const subVol = Math.min(0.4, e / 150) * 0.4 * noiseCurved;
  subGain.gain.setTargetAtTime(subVol, now, 0.3);
  subOsc.frequency.setTargetAtTime(38 - e * 0.033, now, 0.2);

  // ── Granular bus ────────────────────────────────────────────────
  const granVol = Math.min(0.7, e / 100) * noiseCurved;
  granGain.gain.setTargetAtTime(granVol, now, 0.03);

  // ── Crackle bus ─────────────────────────────────────────────────
  const crackVol = Math.min(0.6, e / 120) * noiseCurved;
  crackleGain.gain.setTargetAtTime(crackVol, now, 0.04);

  // ── Master: fade everything to zero after 10s idle ──────────────
  const fadeMul = Math.max(0, 1 - Math.max(0, idleTime - 1) / 10);
  masterGain.gain.setTargetAtTime(0.22 * fadeMul, now, 0.1);
}

// Start audio on first user interaction (browser autoplay policy).
// pointerdown / pointermove cover mouse, pen, and touch — so a finger
// tap or drag on a phone unlocks the audio context the same way a mouse
// click or move does on desktop.
function tryStartAudio() {
  initAudio();
  document.removeEventListener('pointermove', tryStartAudio);
  document.removeEventListener('pointerdown', tryStartAudio);
  document.removeEventListener('keydown',     tryStartAudio);
}
document.addEventListener('pointermove', tryStartAudio);
document.addEventListener('pointerdown', tryStartAudio);
document.addEventListener('keydown',     tryStartAudio);

    if (!panelOpen) return;
    const ft = perfStats.frameTimes;
    const avgFt = ft.length > 0 ? ft.reduce((a, b) => a + b, 0) / ft.length : 0;
    const maxFt = ft.length > 0 ? Math.max(...ft) : 0;
    const fps = avgFt > 0 ? (1000 / avgFt).toFixed(1) : '—';
    const nodes = audioCtx ? '~' + estimateAudioNodes() : '—';
    const grains = perfStats.grainCount;
    perfStats.grainCount = 0;

    let memStr = '—';
    if (performance.memory) {
      const mb = (performance.memory.usedJSHeapSize / 1048576).toFixed(1);
      const limit = (performance.memory.jsHeapSizeLimit / 1048576).toFixed(0);
      memStr = `${mb} / ${limit} MB`;
    }

    perfDiv.innerHTML =
      `fps: <span style="color:#aac">${fps}</span> ` +
      `<span style="color:#556">(${avgFt.toFixed(1)}ms avg, ${maxFt.toFixed(1)}ms peak)</span><br>` +
      `audio nodes: <span style="color:#aac">${nodes}</span><br>` +
      `grains/500ms: <span style="color:#aac">${grains}</span><br>` +
      `energy: <span style="color:#aac">${audioEnergy.toFixed(1)}</span> ` +
      `peak: <span style="color:#aac">${peak.toFixed(1)}</span><br>` +
      `shards: <span style="color:#aac">${shards.length}</span> / ${MAX_SHARDS}<br>` +
      `JS heap: <span style="color:#aac">${memStr}</span><br>` +
      `noise LPF: <span style="color:#aac">${noiseMouseLPF ? noiseMouseLPF.frequency.value.toFixed(0) + ' Hz' : '—'}</span><br>` +
      `noise bed: <span style="color:#aac">${(noiseCurrent * 100).toFixed(0)}%</span> → ` +
      `<span style="color:#aac">${(noiseCurrent * noiseCurrent * noiseCurrent * 100).toFixed(1)}% curved</span><br>` +
      `<span style="color:#556">canvas: ${canvas.width}×${canvas.height}, ` +
      `${(canvas.width * canvas.height / 1000000).toFixed(2)}MP</span>`;
  }, 500);
}

function estimateAudioNodes() {
  let n = 0;
  if (noiseSource) n += 5;     // source + BPF + LPF + mouseLPF + gain
  if (droneOscFund) n += 5;    // 2 oscs + 2 gains + bus gain
  if (subOsc) n += 2;
  n += 2;                       // granGain + crackleGain
  n += 1;                       // masterGain
  if (hoverBeaters) n += hoverBeaters.length * 2 + 1;
  return n;
}

createSettingsUI();


// ── RGB tint helpers ───────────────────────────────────────────────────
// Three separate canvases: one per channel for true RGB break-apart
const redC = document.createElement('canvas');
const grnC = document.createElement('canvas');
const bluC = document.createElement('canvas');
const rctx = redC.getContext('2d');
const gctx = grnC.getContext('2d');
const bctx = bluC.getContext('2d');

function tint(src, dst, dctx, r, g, b) {
  dst.width = src.width; dst.height = src.height;
  dctx.clearRect(0, 0, dst.width, dst.height);
  dctx.drawImage(src, 0, 0);
  dctx.globalCompositeOperation = 'source-in';
  dctx.fillStyle = `rgb(${r},${g},${b})`;
  dctx.fillRect(0, 0, dst.width, dst.height);
  dctx.globalCompositeOperation = 'source-over';
}


// ── Shatter particles ──────────────────────────────────────────────────
const shards = [];
const MAX_SHARDS = 60;

function spawnShards(e) {
  const W = off.width, H = off.height;
  const textH = Math.min(off.height * 0.13, 130) * 1.6;
  const textY = H / 2 - textH / 2;
  const count = Math.floor(e / 20);

  for (let i = 0; i < count && shards.length < MAX_SHARDS; i++) {
    const sw = 10 + Math.random() * 70;
    const sh = 3  + Math.random() * 35;
    const sx = Math.random() * (W - sw);
    const sy = textY + Math.random() * textH;
    const speed = (e / 300) * (4 + Math.random() * 10);
    const angle = Math.random() * Math.PI * 2;

    shards.push({
      sx, sy, sw, sh,
      x: sx, y: sy, ox: sx, oy: sy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed * 0.55,
      life: 1.0,
      decay: 0.006 + Math.random() * 0.012,
    });
  }
}

function updateShards() {
  for (let i = shards.length - 1; i >= 0; i--) {
    const s = shards[i];
    s.vx += (s.ox - s.x) * 0.01;
    s.vy += (s.oy - s.y) * 0.01;
    s.vx *= 0.93; s.vy *= 0.93;
    s.x += s.vx;  s.y += s.vy;
    s.life -= s.decay;
    if (s.life <= 0) shards.splice(i, 1);
  }
}

function drawShards() {
  for (const s of shards) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.life) * 0.85;
    ctx.drawImage(off, s.sx, s.sy, s.sw, s.sh, s.x, s.y, s.sw, s.sh);
    ctx.restore();
  }
}


// ── Main loop ──────────────────────────────────────────────────────────
let frame = 0;
let lastSpawnEnergy = 0;
let lastTime = performance.now();

// "Tear event" state — occasionally a big rip tears the whole frame
let tearActive    = false;
let tearProgress  = 0;
let tearY         = 0;
let tearDir       = 1;

function draw() {
  requestAnimationFrame(draw);
  frame++;

  const now = performance.now();
  const dt  = (now - lastTime) / 1000;
  // Track frame times for perf stats (keep last 60)
  perfStats.frameTimes.push(now - lastTime);
  if (perfStats.frameTimes.length > 60) perfStats.frameTimes.shift();
  lastTime  = now;

  const W = canvas.width;
  const H = canvas.height;

  const speed = Math.sqrt((mx - lx) ** 2 + (my - ly) ** 2);
  lx = mx; ly = my;

  energy += speed * 0.75;
  energy  = Math.min(energy, 300);
  peak    = Math.max(peak, energy);

  // Spawn shards at energy thresholds
  if (energy > 70 && energy > lastSpawnEnergy + 25) {
    spawnShards(energy);
    lastSpawnEnergy = energy;
  }
  if (energy < 15) lastSpawnEnergy = 0;

  // Occasional spontaneous tear event at high energy
  if (!tearActive && energy > 120 && Math.random() < 0.015) {
    tearActive   = true;
    tearProgress = 0;
    tearY        = H * (0.3 + Math.random() * 0.4);
    tearDir      = Math.random() < 0.5 ? 1 : -1;
  }
  if (tearActive) {
    tearProgress += 0.08;
    if (tearProgress >= 1) tearActive = false;
  }

  energy *= 0.87;
  peak   *= 0.972;
  if (energy < 0.05) energy = 0;
  if (peak   < 0.05) peak   = 0;

  updateShards();

  // ── Update audio ──────────────────────────────────────────────────
  updateAudio(dt, speed);

  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  if (peak < 0.5 && shards.length === 0 && !tearActive) {
    ctx.drawImage(off, 0, 0);
    return;
  }

  const e = peak;

  // ── 1. Per-letter chromatic break-apart — Baroqueadelic ─────────
  // Each letter has its own (R,G,B) trio of mass-spring channels.
  // Each channel chases a multi-harmonic target: fundamental +
  // two irrational overtones (φ, φ²), so the trajectory never
  // repeats cleanly.  Per-letter index staggers phase so the
  // word moves as a scattered chorus rather than a single string.
  // Wider vertical travel leaves the slice-tear layer room to
  // read through — the "stuff underneath" stays visible between
  // the drifting letters.  Blend is 'screen' (capped-additive)
  // instead of 'lighter' so overlaps glow without blowing out.
  const spread = e * 0.40;
  const mouseCx = (mx - W / 2) / Math.max(1, W / 2);   // -1 .. +1
  const mouseCy = (my - H / 2) / Math.max(1, H / 2);
  const mousePull = 40 + Math.min(120, e * 1.2);

  // Advance every letter's three springs
  for (const L of letters) {
    for (let k = 0; k < 3; k++) {
      const c = L.chans[k];
      const a  = frame * c.fr + c.phase;
      // Multi-harmonic x: 1 + 1/φ ≈ 0.42, 1/φ² ≈ 0.38 — use 0.42, 0.18
      const hx = Math.cos(a)
               + Math.cos(a * PHI + c.phase * 1.3) * 0.42
               + Math.cos(a * PHI * PHI + c.phase * 0.7) * 0.18;
      // Multi-harmonic y on a different base rate (Lissajous)
      const ay2 = a * c.yRatio;
      const hy = Math.sin(ay2)
               + Math.sin(ay2 * PHI + c.phase * 1.1) * 0.42
               + Math.sin(ay2 * PHI * PHI + c.phase * 0.4) * 0.18;

      // Per-letter index-phase adds a slow traveling wave across the word
      const letterWaveX = Math.cos(frame * 0.007 + L.idx * 0.73) * 0.35;
      const letterWaveY = Math.sin(frame * 0.011 + L.idx * 0.91) * 0.55;

      const ox = (hx * 0.58 + letterWaveX) * spread * c.rx * 0.78;
      const oy = (hy * 0.58 + letterWaveY) * spread * c.ry * 1.40;  // wider vertical

      const tx = ox + mouseCx * mousePull * c.mWeightX;
      const ty = oy + mouseCy * mousePull * c.mWeightY;

      const ax = (tx - c.x) * c.k;
      const ay = (ty - c.y) * c.k;
      c.vx = (c.vx + ax) * c.d;
      c.vy = (c.vy + ay) * c.d;
      c.x += c.vx;
      c.y += c.vy;
    }
  }

  // Desaturated jewel tones — warm rose, sage, periwinkle
  tint(off, redC, rctx, 224, 112, 140);   // antique rose
  tint(off, grnC, gctx, 132, 186, 162);   // dusty sage
  tint(off, bluC, bctx, 142, 146, 214);   // periwinkle

  // Softer blend than 'lighter': 'screen' caps at white instead of
  // super-adding, keeping jewel tones from blowing out to neon.
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const channelAlpha = 0.56 + 0.28 * Math.min(1, e / 150);
  ctx.globalAlpha = channelAlpha;

  const tinted = [redC, grnC, bluC];
  const jitter = e > 40 ? (e / 500) * 3 : 0;
  for (const L of letters) {
    for (let k = 0; k < 3; k++) {
      const c = L.chans[k];
      const jx = jitter ? (Math.random() - 0.5) * jitter : 0;
      const jy = jitter ? (Math.random() - 0.5) * jitter : 0;
      ctx.drawImage(
        tinted[k],
        L.sx, L.sy, L.sw, L.sh,
        L.sx + c.x + jx, L.sy + c.y + jy, L.sw, L.sh
      );
    }
  }
  ctx.restore();

  // ── 2. Horizontal slice tearing — much bigger ────────────────────
  {
    const slices   = Math.floor(10 + e * 0.25);
    const sliceH   = H / slices;
    const maxShift = e * 1.4 + 20;
    const ns       = Math.floor(frame / 2);

    ctx.save();
    for (let i = 0; i < slices; i++) {
      const sy = Math.round(i * sliceH);
      const sh = Math.round(sliceH) + 1;
      const r1 = Math.sin(ns * 0.3  + i * 127.1) * 0.5 + 0.5;
      const r2 = Math.sin(ns * 0.7  + i * 311.7) * 0.5 + 0.5;
      const r3 = Math.sin(ns * 0.15 + i * 53.3)  * 0.5 + 0.5;

      const prob = Math.min(e / 100, 0.95);
      if (r1 < prob) {
        const isMegaTear = r3 < 0.08 && e > 80;
        const baseShift  = (r2 - 0.5) * maxShift * 2;
        const shift      = isMegaTear ? baseShift * 3.5 : baseShift;
        ctx.drawImage(off, 0, sy, W, sh, shift, sy, W, sh);
      } else {
        ctx.drawImage(off, 0, sy, W, sh, 0, sy, W, sh);
      }
    }
    ctx.restore();
  }

  // ── 3. Spontaneous full tear event ───────────────────────────────
  if (tearActive) {
    const tearAmt = Math.sin(tearProgress * Math.PI) * W * 0.6 * tearDir;
    ctx.save();
    ctx.drawImage(off,
      0, 0, W, tearY,
      tearAmt, 0, W, tearY
    );
    ctx.restore();
  }

  // ── 4. Vertical slice corruption ─────────────────────────────────
  if (e > 25) {
    const slices   = Math.floor(3 + e * 0.08);
    const sliceW   = W / slices;
    const maxShiftV = e * 0.7;
    const ns       = Math.floor(frame / 4) + 500;

    ctx.save();
    ctx.globalAlpha = 0.55;
    for (let i = 0; i < slices; i++) {
      const sx = Math.round(i * sliceW);
      const sw = Math.round(sliceW) + 1;
      const r1 = Math.sin(ns * 0.4 + i * 89.3)  * 0.5 + 0.5;
      const r2 = Math.sin(ns * 0.9 + i * 213.5) * 0.5 + 0.5;
      const prob = Math.min(e / 140, 0.65);
      if (r1 < prob) {
        const shift = (r2 - 0.5) * maxShiftV * 2;
        ctx.drawImage(off, sx, 0, sw, H, sx, shift, sw, H);
      }
    }
    ctx.restore();
  }

  // ── 5. Shatter particles ─────────────────────────────────────────
  drawShards();

  // ── 6. Scan flashes ──────────────────────────────────────────────
  if (e > 40 && Math.random() < 0.07) {
    ctx.save();
    ctx.globalAlpha = 0.08 + Math.random() * 0.14;
    ctx.fillStyle = `hsl(${Math.random() * 360}, 100%, 75%)`;
    const fy = Math.random() * H;
    ctx.fillRect(0, fy, W, 1 + Math.random() * Math.floor(e * 0.09));
    ctx.restore();
  }

  // ── 7. Large block corruption ────────────────────────────────────
  if (e > 50 && Math.random() < 0.07) {
    const bx = Math.random() * W * 0.6 + W * 0.2;
    const by = Math.random() * H * 0.5 + H * 0.25;
    const bw = 40  + Math.random() * 200;
    const bh = 3   + Math.random() * 30;
    const tx = bx  + (Math.random() - 0.5) * e * 1.0;
    const ty = by  + (Math.random() - 0.5) * e * 0.25;
    ctx.save();
    ctx.globalAlpha = 0.5 + Math.random() * 0.5;
    ctx.drawImage(off, bx, by, bw, bh, tx, ty, bw, bh);
    ctx.restore();
  }
}

draw();

</script>
